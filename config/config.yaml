# =============================================================================
# jenkins-2026 :: central configuration
# =============================================================================
# Every script under scripts/ sources scripts/lib/config.sh, which loads this
# file via `yq` and exports it as environment variables (J2026_*).
#
# FEATURE FLAG: the target platform below can be overridden at runtime without
# FEATURE FLAG: the target platform below can be overridden at runtime without
# editing this file by exporting JENKINS2026_PLATFORM=gke
# before running scripts/up.sh (or any individual step script). This satisfies
# the "config file + feature flag" requirement.
# =============================================================================

platform:
  # Only GKE is supported
  target: gke

  gke:
    storageClassName: standard-rwo
    ingressClassName: gce
    ingressAnnotations:
      kubernetes.io/ingress.class: "gce"
    serviceType: ClusterIP

# -----------------------------------------------------------------------------
# Node Auto-Provisioning (NAP) — GKE-native, GA equivalent of Karpenter
# -----------------------------------------------------------------------------
# When enabled, the cluster auto-creates/deletes right-sized, Spot-first, scale-to-zero
# node pools on demand (terraform/gke `enable_node_autoprovisioning`), driven by the
# Custom ComputeClass in infrastructure/compute-classes/ci-spot.yaml. The static pool
# keeps the long-lived platform; NAP adds ephemeral capacity for bursty CI build agents,
# which opt in via the `cloud.google.com/compute-class` nodeSelector. Because no platform
# pod depends on it, the ComputeClass apply step is non-fatal — a NAP issue never blocks
# the core provision.
#
# `enabled` is the SINGLE SOURCE OF TRUTH for the whole feature: it gates the in-cluster
# wiring (the ComputeClass apply in 01-namespaces.sh + the agents' GKE_COMPUTE_CLASS
# targeting via JCasC) AND drives the cluster-level Terraform toggle
# (`enable_node_autoprovisioning`) — config.sh / test/e2e.sh / the Day1 workflow all derive
# `TF_VAR_enable_node_autoprovisioning` from this value, so cluster NAP and the in-cluster
# wiring can never desync. Flip this one flag to turn the whole thing on/off.
# FEATURE FLAG: override for a single run with JENKINS2026_NODE_AUTOPROVISIONING_ENABLED.
nodeAutoProvisioning:
  enabled: true
  # Name of the Custom ComputeClass the CI agents target (must match the metadata.name
  # in infrastructure/compute-classes/ci-spot.yaml).
  computeClass: ci-spot

# -----------------------------------------------------------------------------
# Log verbosity
# -----------------------------------------------------------------------------
# How chatty the scripts/0N-*.sh are (and TF_LOG for the Terraform steps).
#   info  (default) - the normal [STEP]/[INFO] output.
#   debug           - additionally emit [DEBUG] lines (log_debug in lib/common.sh)
#                     and TF_LOG=DEBUG. No 'trace'/`set -x` level by design: bash
#                     xtrace would leak script-derived secret values into the logs.
# Per-run override: JENKINS2026_LOG_LEVEL=debug (the GHA workflows expose it as the
# 'log_level' dropdown input). Use GitHub's ACTIONS_STEP_DEBUG for runner-level tracing.
logging:
  level: info

# -----------------------------------------------------------------------------
# CI engine selector
# -----------------------------------------------------------------------------
# Which continuous-integration engine the platform deploys and runs the
# microservices pipelines-as-code on. Mutually exclusive.
#   jenkins (default) - Helm chart + JCasC + Job-DSL seed + the shared Groovy
#                       library in vars/ (scripts/04-jenkins.sh, 06-seed-pipelines.sh).
#   tekton            - Tekton Pipelines + Triggers + the official Tekton
#                       Dashboard, with the pipeline ported to Tekton
#                       Tasks/Pipelines under tekton/ (scripts/04-tekton.sh,
#                       06-tekton-pipelines.sh).
#   githubactions     - GitHub Actions self-hosted runners via ARC (Actions
#                       Runner Controller): ephemeral runner pods on the ci-spot
#                       Spot ComputeClass, the pipeline as a .github/workflows
#                       file rendered into each fork (scripts/04-githubactions.sh,
#                       06-githubactions-pipelines.sh). No in-cluster UI.
#   argoworkflows     - Argo Workflows + Argo Events: K8s-native engine. The
#                       pipeline ported to a WorkflowTemplate (templates ~ Tekton
#                       Tasks) under argoworkflows/, an EventSource+Sensor (GitHub
#                       webhook -> one Workflow per push) ~ Tekton Triggers, and the
#                       Argo Workflows Server UI behind IAP like the Tekton Dashboard
#                       (scripts/04-argoworkflows.sh, 06-argoworkflows-pipelines.sh).
# FEATURE FLAG: override for a single run with JENKINS2026_CI_ENGINE=tekton
# (config.yaml is the durable default; the env var is the ephemeral override -
# same pattern as observability.mode / JENKINS2026_OBS_MODE).
ci:
  engine: jenkins

# -----------------------------------------------------------------------------
# Secrets backend
# -----------------------------------------------------------------------------
# How Kubernetes Secrets are materialised in the cluster:
#   imperative (default) - scripts/01-namespaces.sh runs `kubectl create secret`
#                          from the GitHub Actions secret env vars at provision time.
#   eso                  - the GitHub-sourced secret values are pushed to GCP
#                          Secret Manager, and the External Secrets Operator (ESO,
#                          already installed) syncs them into the cluster via
#                          Workload Identity (keyless). Adds a central source of
#                          truth, versioning and Cloud Audit Logs. See
#                          docs/201-ARCHITECTURE.md § Secrets Management +
#                          infrastructure/secrets/eso-bootstrap.yaml.
# FEATURE FLAG: override for a single run with JENKINS2026_SECRETS_BACKEND=eso
# (config.yaml is the durable default; env var is the ephemeral override - same
# pattern as ci.engine / observability.mode).
secrets:
  backend: imperative

# -----------------------------------------------------------------------------
# Jenkins (jenkinsci/helm-charts) - used when ci.engine == jenkins
# -----------------------------------------------------------------------------
jenkins:
  # Where the build-agent pods run. `static` (default) = the long-lived
  # `jenkins-2026-pool` (e2-standard-8) — robust, always present, no NAP/Spot/quota
  # dependency. `ci-spot` = the NAP-provisioned Spot ComputeClass (ephemeral,
  # scale-to-zero) from infrastructure/compute-classes/ — cheaper, but needs
  # nodeAutoProvisioning.enabled + SSD quota headroom, and a Spot preemption restarts
  # the build (fine for Jenkins's single-pod agents). FEATURE FLAG: override with
  # JENKINS2026_JENKINS_RUN_NODE_POOL. See docs/501 § Elastic Node Auto-Provisioning.
  runNodePool: static
  namespace: jenkins
  releaseName: jenkins
  chart:
    repoName: jenkins
    repoUrl: https://charts.jenkins.io
    chartName: jenkins/jenkins
    # Pinned for reproducibility (empty = latest, which silently moved to 5.9.x and
    # reintroduced the JCasC authz/securityRealm double-entry crash). 5.9.32 is the
    # latest as of 2026-07-06 (appVersion still 2.555.3, matching controller.image.tag -
    # 5.9.30-5.9.32 only bump agent.image/k8s-sidecar defaults + add an opt-in
    # addMasterProxyEnvVars flag, neither of which we consume: our JCasC k8s cloud
    # config pins its own inbound-agent image, and agent.enabled/image aren't set here).
    version: "5.9.32"
  adminUser: admin
  # Name of the k8s Secret (created by scripts/01-namespaces.sh) holding the
  # admin password and other pipeline credentials (registry, git, Grafana).
  # See helm/jenkins/values-common.yaml controller.containerEnv and
  # jenkins/casc/*.yaml for the keys it must contain.
  credentialsSecretName: jenkins-credentials
  # This repo's own coordinates, used by JCasC for the global pipeline shared
  # library and by the seed job to fetch Jenkinsfile.microservices + seed scripts.
  selfRepoUrl: https://github.com/nubenetes/jenkins-2026.git
  # Local/fallback default. In CI (GitHub Actions) lib/config.sh auto-tracks the
  # DISPATCHED branch via GITHUB_REF_NAME, so a Day1 from `develop` exercises
  # develop's library/seed and `main` from main — letting you validate library
  # changes on develop before the promotion PR. Override anywhere with
  # JENKINS2026_SELF_REPO_BRANCH. See scripts/lib/config.sh.
  selfRepoBranch: main

# -----------------------------------------------------------------------------
# Tekton (tektoncd) - used when ci.engine == tekton
# -----------------------------------------------------------------------------
# GitOps-managed by ArgoCD (app-of-apps), the same pattern as observability-oss /
# platform-postgres: scripts/04-tekton.sh applies argocd/tekton-app.yaml, whose
# children install Tekton Pipelines/Triggers/Dashboard (pinned upstream release
# YAMLs pulled as kustomize remote resources) + the pipelines-as-code under
# tekton/. The Dashboard has no native authentication, so it is exposed on the
# internet behind Google IAP at the Gateway, exactly like Headlamp (09-gateway.sh).
tekton:
  # Where the PipelineRun/TaskRun pods run (set as the Tekton `default-pod-template`
  # nodeSelector). `static` (default) = the long-lived `jenkins-2026-pool` (e2-standard-8)
  # — robust, no NAP/Spot/quota dependency. `ci-spot` = the NAP Spot ComputeClass.
  # ⚠ For Tekton, `static` is strongly recommended: the affinity-assistant pins ALL of a
  # PipelineRun's tasks (sharing one RWO workspace PVC) to a SINGLE node, so a Spot
  # preemption would kill the WHOLE run (not one task), and a too-small/full node hangs the
  # run. FEATURE FLAG: override with JENKINS2026_TEKTON_RUN_NODE_POOL. See docs/403.
  runNodePool: static
  # Control-plane namespace for Pipelines/Triggers/Dashboard (upstream default).
  namespace: tekton-pipelines
  # Namespace PipelineRuns execute in (service account, registry/git creds, RBAC).
  pipelineNamespace: tekton-ci
  # When true, Day1 (06-tekton-pipelines.sh) ALSO seeds one PipelineRun per service
  # under Pipelines-as-Code (from tekton/runs/), so the Tekton Dashboard is
  # pre-populated with runnable entries (click Rerun) from the first provision — at
  # the cost of one build per service per Day1. Default true: the Dashboard is
  # populated out of the box; set false to rely solely on PaC's git-push trigger.
  # Ephemeral override: JENKINS2026_TEKTON_SEED_RUNS.
  seedRuns: true
  # Reference of the pinned component versions. The EFFECTIVE manifests are
  # VENDORED at argocd/tekton/components/*/ (release*.yaml) because Tekton now
  # publishes these only as GitHub release assets, not on the GCS bucket - keep
  # these in sync with those files when bumping.
  versions:
    pipelines: v1.13.1   # latest
    triggers: v0.36.0    # latest
    dashboard: v0.69.0   # latest
    pruner: v0.4.0       # GC of completed runs (parity with Jenkins buildDiscarder)
    chains: v0.27.1      # supply-chain signing + SLSA provenance (DevSecOps)
    pac: v0.48.0         # Pipelines-as-Code: Git-driven CI on the nubenetes forks (webhook mode)
  # Dashboard Service (created by the dashboard release-full.yaml).
  dashboard:
    # release-full.yaml = read-write mode (lets you start/cancel runs from the UI).
    mode: full
    serviceName: tekton-dashboard
    servicePort: 9097
  # k8s Secrets (created by scripts/01-namespaces.sh / 08.5-argocd.sh in
  # pipelineNamespace) the pipeline ServiceAccount / Tasks consume. Populated from
  # the same REGISTRY_*/GIT_* env the Jenkins path uses. Never commit real values.
  # Full runtime set (only the first two are named knobs here; the rest are fixed
  # names referenced directly by the Tasks/scripts):
  #   - tekton-registry            ghcr.io push/pull (Jib/Kaniko/Trivy)         [below]
  #   - tekton-git                 git clone/push to the gitops repo            [below]
  #   - tekton-argocd              ArgoCD API token (gitops-deploy app sync)    (08.5-argocd.sh)
  #   - tekton-github-webhook-secret  GitHub HMAC for the Triggers EventListener (01-namespaces.sh, optional)
  #   - pac-webhook                Pipelines-as-Code webhook HMAC               (01-namespaces.sh, optional)
  #   - k6-cloud                   optional Grafana Cloud k6 token/project/url  (01-namespaces.sh, optional)
  registryCredentialsSecretName: tekton-registry
  gitCredentialsSecretName: tekton-git

# -----------------------------------------------------------------------------
# GitHub Actions / ARC (Actions Runner Controller) - used when ci.engine == githubactions
# -----------------------------------------------------------------------------
# GitOps-managed by ArgoCD (app-of-apps, same pattern as tekton): scripts/04-
# githubactions.sh applies argocd/githubactions-app.yaml, whose children install the
# gha-runner-scale-set-controller (CRDs + controller, sync-wave 0) and the gha-runner-
# scale-set (AutoscalingRunnerSet, sync-wave 1) that registers ephemeral runners with the
# org via the GitHub App. NO central web UI (runs are in GitHub's Actions tab) -> NO
# Gateway/IAP route is created for it.
githubactions:
  # Where the ephemeral runner pods run. DEFAULT ci-spot - this engine IS the NAP Spot
  # scale-to-zero showcase: each ARC runner is a single ephemeral pod that runs exactly one
  # job then terminates, so a Spot preemption loses at most one job (GitHub re-queues it).
  # FEATURE FLAG: JENKINS2026_GITHUBACTIONS_RUN_NODE_POOL (static | ci-spot).
  runNodePool: ci-spot
  namespace: arc-systems                       # ARC controller + CRDs
  runnerNamespace: arc-runners                 # AutoscalingRunnerSet + ephemeral runner pods + SA + creds
  runnerScaleSetName: jenkins-2026-runners     # the GitHub Actions `runs-on:` label the forks' workflows target
  githubConfigUrl: https://github.com/nubenetes  # org-level scale set (all forks share one)
  authMode: app                                # 'app' (GitHub App, recommended) | 'pat' (GIT_TOKEN fallback)
  containerMode: dind                          # 'dind' (privileged build sidecar, parity w/ Jenkins) | 'kubernetes'
  # When true, 06-githubactions-pipelines.sh ALSO `gh workflow run`s each fork's pipeline
  # on Day1 (parity with tekton.seedRuns). Override: JENKINS2026_GITHUBACTIONS_SEED_RUNS.
  seedRuns: true
  versions:
    arc: "0.12.1"                              # gha-runner-scale-set-controller + gha-runner-scale-set (must match); see docs/602
  # In-cluster Secrets (provisioned by 01-namespaces.sh into runnerNamespace):
  #   - arc-github-app   ARC GitHub App creds (app_id/installation_id/private_key)  [app mode]
  #   - arc-registry     ghcr.io push/pull dockerconfigjson (runner imagePullSecret)
  #   - arc-argocd       ArgoCD API token for the workflow's `argocd app sync`       (08.5-argocd.sh)
  registryCredentialsSecretName: arc-registry
  githubAppSecretName: arc-github-app

# -----------------------------------------------------------------------------
# Argo Workflows + Argo Events (argoproj) - used when ci.engine == argoworkflows
# -----------------------------------------------------------------------------
# GitOps-managed by ArgoCD (app-of-apps), identical pattern to tekton: scripts/
# 04-argoworkflows.sh applies argocd/argoworkflows-app.yaml, whose children install
# the Argo Workflows controller+server, the Argo Events controller+EventBus, and the
# pipelines-as-code under argoworkflows/ (the WorkflowTemplates + EventSource/Sensor).
# The Argo Workflows Server UI has no native auth, so it is exposed on the internet
# behind Google IAP at the Gateway, exactly like the Tekton Dashboard (09-gateway.sh).
argoworkflows:
  # Where Workflow pods run (Workflow spec.nodeSelector). static (default) = the
  # long-lived jenkins-2026-pool; ci-spot = the NAP Spot ComputeClass. static
  # recommended: a Workflow's steps share one RWO workspace PVC, so a Spot preemption
  # mid-run loses the whole run (same caveat as Tekton's affinity assistant).
  # FEATURE FLAG: JENKINS2026_ARGOWORKFLOWS_RUN_NODE_POOL (static | ci-spot).
  runNodePool: static
  namespace: argo                # control plane (workflow-controller + argo-server)
  eventsNamespace: argo-events   # Argo Events controller-manager + EventBus
  runNamespace: argo-ci          # where Workflows execute (SA, creds, RBAC, the argoworkflows/ pac)
  # When true, Day1 (06-argoworkflows-pipelines.sh) ALSO submits one Workflow per
  # service (from argoworkflows/runs/) so the Argo Workflows Server UI is pre-populated.
  # Parity with tekton.seedRuns. Override: JENKINS2026_ARGOWORKFLOWS_SEED_RUNS.
  seedRuns: true
  # Pinned component versions. The EFFECTIVE manifests are VENDORED at
  # argocd/argoworkflows/components/*/ (release.yaml) - keep in sync when bumping; docs/602.
  versions:
    workflows: v3.7.16   # argo-workflows install.yaml (controller + server)
    events: v1.9.4       # argo-events install.yaml (unified controller-manager) + EventBus
  server:
    serviceName: argo-server     # the argo-server Service the Gateway/IAP HTTPRoute targets
    servicePort: 2746
  # In-cluster Secrets (created by scripts/01-namespaces.sh / 08.5-argocd.sh in runNamespace):
  #   - argoworkflows-registry        ghcr.io push/pull dockerconfigjson
  #   - argoworkflows-git             git clone/push to the gitops repo (basic-auth)
  #   - argoworkflows-argocd          ArgoCD API token for `argocd app sync`   (08.5-argocd.sh)
  #   - argoworkflows-github-webhook  GitHub HMAC for the Sensor's EventSource
  registryCredentialsSecretName: argoworkflows-registry
  gitCredentialsSecretName: argoworkflows-git

# -----------------------------------------------------------------------------
# Observability
# -----------------------------------------------------------------------------
observability:
  namespace: observability
  # grafana-cloud (default) | oss | managed-azure | managed-aws
  #   grafana-cloud - export OTLP to Grafana Cloud's gateway.
  #   oss           - in-cluster Prometheus/Loki/Tempo + Grafana.
  #   managed-azure - export to Azure Monitor (managed Prometheus + App
  #                   Insights/Log Analytics); visualize in Azure Managed
  #                   Grafana. See observability/otel-collector/
  #                   secret-managed-azure.example.yaml + docs/301-OBSERVABILITY.md.
  #   managed-aws   - export to Amazon Managed Service for Prometheus +
  #                   X-Ray/CloudWatch; visualize in Amazon Managed Grafana.
  mode: oss


  # Grafana Cloud subscription tier — a PROFILE that governs the volume-control defaults
  # below so the free tier stays under its limits (15k active series + log volume). Only
  # meaningful in grafana-cloud mode. Override per-run with JENKINS2026_GRAFANA_CLOUD_TIER
  # or the grafana_cloud_tier GHA dropdown.
  #   free (default) → leanMetrics on,  logMinSeverity=warn  (aggressive trim — fits free)
  #   paid           → leanMetrics off, logMinSeverity=trace (full fidelity)
  grafanaCloudTier: free

  # When true (grafana-cloud mode), 03-observability disables the k8s-monitoring CLUSTER
  # INFRA metrics (cadvisor/kube-state/node-exporter) — the high-cardinality series the
  # custom jenkins2026-* dashboards don't use — to stay under the free-tier 15k cap.
  # App/CNPG/Tekton metrics (via the otel-collector) are unaffected. Loses the built-in
  # "K8s Compute" views.
  #   auto (default) → derive from grafanaCloudTier (free→true, paid→false; non-cloud→false)
  #   true | false   → force, regardless of tier. Per-run override JENKINS2026_OBS_LEAN_METRICS.
  leanMetrics: auto

  # Minimum log severity shipped to the backend (Loki / CloudWatch / Azure). Applied as a
  # `filter` processor in the otel-collector-logs DaemonSet (parses the level → severity,
  # drops below this), so it trims EVERY Grafana logs panel (app + platform) in all modes.
  # Levels: trace (keep all) · debug · info · warn · error (only ERROR/FATAL).
  # Structured lines (ECS/JSON `"level"`, logfmt `level=`) are classified; plain-text lines
  # have no level token and are NEVER dropped (no blackout).
  #   auto (default) → derive from grafanaCloudTier (free→warn, paid→trace; non-cloud→info)
  #   <level>        → force. Per-run override JENKINS2026_LOG_MIN_SEVERITY. See docs/301.
  logMinSeverity: auto

  otelOperator:
    chart:
      repoName: open-telemetry
      repoUrl: https://open-telemetry.github.io/opentelemetry-helm-charts
      chartName: open-telemetry/opentelemetry-operator
      # Pinned for reproducibility (empty would install latest). 0.117.0 =
      # appVersion 0.153.0, latest as of 2026-06-25.
      version: "0.117.0"
    releaseName: otel-operator

  otelCollector:
    chart:
      chartName: open-telemetry/opentelemetry-collector
      # Pinned (empty = latest). 0.159.0 = appVersion 0.154.0, latest 2026-06-25.
      version: "0.159.0"
    gatewayReleaseName: otel-collector-gateway
    logsReleaseName: otel-collector-logs
    # k8s Secret with Grafana Cloud OTLP endpoint + base64(instanceID:apiKey)
    # auth header. See observability/otel-collector/secret.example.yaml.
    grafanaCloudSecretName: grafana-cloud-credentials

  grafana:
    # Only used when observability.mode == oss
    chart:
      repoName: grafana
      repoUrl: https://grafana.github.io/helm-charts
    ossNamespace: observability

  # Only used when observability.mode == managed-azure / managed-aws. The
  # provider's managed Grafana + telemetry backends live outside the cluster;
  # the collectors here just export to them. The actual cloud resources are
  # provisioned separately (Terraform follow-up) and the credentials are
  # supplied via the per-provider Secret below.
  managed:
    azure:
      # k8s Secret with the Azure Monitor / Application Insights connection
      # string, the managed-Prometheus remote-write endpoint, and the Entra
      # (Azure AD) service-principal used by the collector to authenticate.
      # See observability/otel-collector/secret-managed-azure.example.yaml.
      credentialsSecretName: azure-monitor-credentials
    aws:
      # Planned - Amazon Managed Service for Prometheus + X-Ray/CloudWatch.
      credentialsSecretName: aws-managed-credentials

  # ---------------------------------------------------------------------------
  # Grafana LLM app (AI assistant in Grafana) - OPT-IN, default false, KEYLESS,
  # oss mode ONLY
  # ---------------------------------------------------------------------------
  # When true (and observability.mode=oss), the grafana-llm-app plugin is
  # installed + provisioned in the in-cluster Grafana, wired to Google Vertex AI
  # (Gemini) through a stateless in-cluster LiteLLM gateway (OpenAI-compatible
  # proxy) that authenticates via GKE Workload Identity (KSA
  # observability/grafana-llm-sa -> GSA grafana-llm-gsa with
  # roles/aiplatform.user; ADC - NO static API key anywhere, and NO new public
  # surface: Grafana->LiteLLM is ClusterIP-internal, LiteLLM->Vertex is
  # egress-only). terraform/gke creates the GSA + WI binding when
  # TF_VAR_observability_llm_enabled=true (exported from this flag).
  #
  # Other modes:
  #   grafana-cloud -> NO-OP: its AI assistant is native on the SaaS plane.
  #   managed-*     -> NO-OP by DECISION (2026-07-10): the plugin cannot
  #                    authenticate keylessly to Azure OpenAI (no managed-
  #                    identity support) nor talk to Amazon Bedrock (no
  #                    provider), with no roadmap commitment upstream, and the
  #                    only workaround (a public LLM proxy endpoint) was
  #                    rejected. The managed trust chains were implemented and
  #                    deliberately removed (recover from git history). See
  #                    docs/301 § Grafana LLM app.
  #
  # Rebuild-safe by design: the GCP resources are Terraform-conditional (count
  # on the flag) so true->false->true converges cleanly; the in-cluster LiteLLM
  # deployment is applied/retired symmetrically by scripts/08.8-grafana-llm.sh.
  # FEATURE FLAG: override for a single run with JENKINS2026_OBS_LLM_ENABLED
  # (config.yaml is the durable default; the env var is the ephemeral override -
  # same pattern as observability.mode / JENKINS2026_OBS_MODE).
  llm:
    enabled: false

    # --- oss mode: Vertex AI via LiteLLM ---------------------------------------
    gcp:
      # GSA (created by terraform/gke when the flag is on) + the KSA the LiteLLM
      # pod runs as. The WI binding is keyed on these exact names - change both
      # here AND terraform/gke/variables.tf defaults if you ever rename them.
      googleServiceAccount: grafana-llm-gsa
      kubernetesServiceAccount: grafana-llm-sa
      # Vertex AI location for Gemini inference. 'global' (the documented
      # global endpoint) rather than a pinned region: Gemini 2.5 single-region
      # EU coverage is patchy and shifts per model, while global always serves
      # the current lineup. Pin an EU region/multi-region only if data
      # residency requires it (and re-verify the model's regional availability).
      vertexLocation: global
      # Vertex model IDs surfaced to the plugin as its 'base'/'large' tiers.
      # Current lineup, verified 2026-07-10: Flash tier tops out at
      # gemini-3.5-flash (GA at I/O, 2026-05-19; LiteLLM day-0 support, global
      # location only); Pro tier at gemini-3.1-pro-preview (the -preview id is
      # what Vertex/LiteLLM register; 3.5 Pro not yet released). Older series
      # are dead or dying on Vertex: 1.5 retired 2025-09-24 (404s on new
      # projects), 2.5 deprecated with retirement no earlier than 2026-10-16.
      models:
        base: gemini-3.5-flash
        large: gemini-3.1-pro-preview

    # LiteLLM gateway (oss mode only): stateless single-pod OpenAI-compatible
    # proxy in the observability namespace; Grafana talks OpenAI to it, it talks
    # ADC/WIF to Vertex. Pinned for reproducibility (docs/602) - 'main' would
    # float. Bump deliberately. (LiteLLM retired the old '-stable' tag suffix in
    # 2025; releases are plain vX.Y.Z now - v1.91.1 manifest verified on ghcr
    # 2026-07-09.)
    litellm:
      image: ghcr.io/berriai/litellm
      version: "v1.91.1"
      serviceName: litellm-service
      servicePort: 4000

  # ---------------------------------------------------------------------------
  # Grafana Graft chat (open-source AI chat sidebar) - OPT-IN, default false,
  # oss mode ONLY, AUTO-ENABLES observability.llm.enabled (its model backend)
  # ---------------------------------------------------------------------------
  # When true (and observability.mode=oss - it AUTO-ENABLES observability.llm
  # .enabled if you left it false, since grafana-llm-app is its model backend),
  # installs the community `vikshana-graft-app` plugin: a natural-language CHAT
  # sidebar ("open and ask") over your dashboards/metrics/logs/traces/alerts.
  # It is the visible conversational UI the bare grafana-llm-app plugin does NOT
  # provide - Graft just REUSES grafana-llm-app (hence the llm.enabled
  # requirement) as its model backend, so it stays 100% keyless / in-cluster
  # (LiteLLM -> Vertex AI). This is the closest oss equivalent to Grafana
  # Cloud's Grafana Assistant. See docs/301 § Grafana Graft chat.
  #
  # Trade-offs (accepted, documented in docs/301): Graft is a COMMUNITY,
  # AGPL-3.0, UNSIGNED plugin (single maintainer), NOT in the Grafana catalog -
  # so it is installed by a FAIL-OPEN init container that pulls the latest GitHub
  # release into the Grafana plugins volume (NOT via the fatal
  # GF_PLUGINS_PREINSTALL_SYNC path that broke Grafana in #628), and Grafana
  # loads it unsigned. If the download fails, Grafana STILL STARTS without Graft.
  #
  # Rebuild-safe + retire-symmetric: scripts/08.9-grafana-graft.sh applies the
  # auto-update CronJob + RBAC and cleans them up when the flag is off or the
  # mode is not oss; the plugin self-heals away when 03 re-renders the oss
  # app-of-apps without the graft overlay.
  # FEATURE FLAG: override for a single run with JENKINS2026_OBS_GRAFT_ENABLED.
  graft:
    enabled: false
    # Community plugin id + its GitHub repo (the release source). Pinned by ID,
    # NOT by version: per the "always the latest stable release" choice, the init
    # container resolves the newest release at deploy time and the CronJob below
    # auto-updates on new releases. DELIBERATE exception to the version-pinning
    # policy (docs/602 documents it).
    pluginId: vikshana-graft-app
    githubRepo: vikshana/vikshana-graft-app
    # Auto-update polling: a CronJob checks the GitHub releases API on this
    # schedule and rolls Grafana (re-pulling the latest release) when a newer tag
    # appears. Default every 6h.
    autoUpdateSchedule: "0 */6 * * *"

# -----------------------------------------------------------------------------
# Headlamp (cluster management UI) - see README.md "Headlamp"
# -----------------------------------------------------------------------------
headlamp:
  namespace: headlamp
  releaseName: headlamp
  chart:
    repoName: headlamp
    repoUrl: https://kubernetes-sigs.github.io/headlamp/
    chartName: headlamp/headlamp
    # Pinned for reproducibility (empty = latest). 0.43.0 matches the version the
    # ArgoCD headlamp app installs (argocd/headlamp-app.yaml).
    version: "0.43.0"
  # k8s Secret (created by scripts/01-namespaces.sh) holding the Google OAuth
  # client ID/secret for Headlamp's in-app OIDC. NOT currently consumed by
  # helm/headlamp/values.yaml (which is intentionally empty) - per-user Google
  # OIDC -> GKE API auth doesn't work today, see README.md "Headlamp". Kept
  # for if/when upstream fixes that. Never commit real client ID/secret
  # values.
  credentialsSecretName: headlamp-credentials
  oidc:
    issuerURL: https://accounts.google.com
    # cloud-platform scope would be required for OIDC_USE_ACCESS_TOKEN=true
    # if/when helm/headlamp/values.yaml config.oidc is re-enabled - see
    # README.md "Headlamp".
    scopes: "openid email profile https://www.googleapis.com/auth/cloud-platform"
    # The redirect URI registered on the Google OAuth client is computed by
    # scripts/lib/config.sh: https://headlamp.<gateway.baseDomain>/oidc-callback
    # if gateway.baseDomain is set, else the kubectl port-forward default
    # (http://localhost:8080/oidc-callback). Override with
    # JENKINS2026_HEADLAMP_OIDC_CALLBACK_URL if neither fits. See README.md
    # "Headlamp" and "Public access (GKE Gateway API + IAP)".
  # Comma-separated Google account emails granted access through
  # Identity-Aware Proxy to https://headlamp.<baseDomain> and
  # https://jenkins.<baseDomain> (GCP IAM roles/iap.httpsResourceAccessor via
  # terraform/gke google_project_iam_member.iap_accessors). Empty by default -
  # never commit real emails here. Override with JENKINS2026_HEADLAMP_ADMIN_EMAILS
  # (sourced from the HEADLAMP_ADMIN_EMAILS GitHub secret in CI). See
  # README.md "Headlamp" and "Public access (GKE Gateway API + IAP)".
  adminEmails: ""

# -----------------------------------------------------------------------------
# ArgoCD (GitOps continuous delivery)
# -----------------------------------------------------------------------------
argocd:
  namespace: argocd
  releaseName: argocd
  # ArgoCD tracks the latest STABLE 3.4.x line. 3.5.0 has NO GA yet (only release
  # candidates), and v3.5.0-rc1 shipped multiple controller bugs that broke this
  # stack: the Lua health-check sandbox lacked the `string` library (→ ComparisonError,
  # microservices-stable stuck Unknown); completed Helm-hook Jobs weren't recognised
  # under k8s 1.35 Job conditions (→ kube-prometheus-stack syncs wedged on the admission
  # webhook hooks); and sync operations wedged. So we pin to the newest 3.4.x GA until
  # 3.5.0 is GA. resolve_argocd_version (08.5-argocd.sh) with constraint "3.4.x" resolves
  # the IMAGE to the newest 3.4.x GA — it only falls back to an rc when NO GA matches,
  # which never happens for 3.4.x, so we NEVER get an rc (the old "3.5.x" constraint did,
  # because 3.5 has no GA). The argocd-version-patch-watcher CronJob live-upgrades the
  # IMAGE to new 3.4.x patches daily. `version` is the offline fallback if the GitHub
  # Releases API is unreachable.
  #
  # ⚠️ MOVE TO 3.5.x ONLY WHEN 3.5.0 IS GA: bump version_constraint → "3.5.x", version →
  # the GA tag, chartVersion → the matching 9.6+/10.x chart, then re-verify the features
  # re-enabled for 3.4.x (kube-prometheus-stack admissionWebhooks in
  # observability/grafana/values-oss.yaml). See docs/602-VERSION_PINNING.md.
  version: "v3.4.4"
  version_constraint: "3.4.x"
  # Helm chart (argoproj/argo-helm `argo-cd`) pinned to the 3.4.x line: chart 9.5.x ships
  # ArgoCD 3.4.x (9.5.22 → 3.4.4), while 9.6+/10.x ship 3.5.x/3.6.x. Pin so the chart's
  # bundled CRDs/RBAC/templates match the pinned 3.4.x binary (08.5-argocd.sh otherwise
  # installs the LATEST chart). Bump together with `version` when moving to 3.5 GA.
  chartVersion: "9.5.22"

# -----------------------------------------------------------------------------
# pgAdmin (Postgres database administration UI)
# -----------------------------------------------------------------------------
pgadmin:
  namespace: pgadmin
  releaseName: pgadmin


# -----------------------------------------------------------------------------
# Public access via GKE Gateway API + Identity-Aware Proxy - see README.md
# "Public access (GKE Gateway API + IAP)"
# -----------------------------------------------------------------------------
gateway:
  # Public base domain. The Gateway's wildcard certificate (provisioned by
  # terraform/gateway-bootstrap) covers this domain and *.<baseDomain>.
  # nubenetes.com is the project's domain, on Google Cloud DNS; terraform/gateway-bootstrap
  # delegates a <baseDomain> sub-zone and manages its records (one-time NS
  # delegation in the parent). Not sensitive, so it's a committed default. Override via
  # JENKINS2026_BASE_DOMAIN for forks/local testing with a different domain.
  # An empty value disables the gateway entirely (no Gateway/HTTPRoutes are
  # created) - useful before terraform/gateway-bootstrap has been run once.
  baseDomain: "jenkins2026.nubenetes.com"
  # Fixed names of the persistent resources created by
  # terraform/gateway-bootstrap. Must match the "name" arguments of
  # google_compute_global_address.gateway_ip / google_certificate_manager_certificate_map.this
  # in terraform/gateway-bootstrap/main.tf - update both if you ever change
  # these.
  staticIPName: "jenkins-2026-gateway-ip"
  certMapName: "jenkins-2026-cert-map"
  # Engine-neutral namespace that hosts the shared Gateway object. Always created
  # (01-namespaces.sh), decoupled from any CI engine - so switching jenkins<->tekton,
  # or deleting an engine's namespace, never touches the public ingress. (The Gateway
  # used to live in the 'jenkins' namespace, which coupled all access to a CI engine.)
  namespace: "platform-ingress"
  # Hostname prefixes under baseDomain for each app.
  hosts:
    jenkins: "jenkins"
    microservices: "microservices"
    # Only used when microservices.developTrackEnabled=true (the lean develop
    # tier). Public, NO IAP - same edge posture as the stable microservices host.
    microservicesDevelop: "microservices-develop"
    headlamp: "headlamp"
    pgadmin: "pgadmin"
    # Grafana Faro RUM beacon endpoint (browser → otel-collector faro receiver).
    # Public, NO IAP (browser-facing; CORS-open receiver). Always routed.
    faro: "faro"
    # Only used when ci.engine=tekton (Tekton Dashboard, IAP-protected).
    tekton: "tekton"
    # PaC controller webhook receiver (ci.engine=tekton). Public, NO IAP - GitHub
    # must reach it; protected by the webhook HMAC secret instead.
    pac: "pac"
    # Only used when ci.engine=argoworkflows (Argo Workflows Server UI, IAP-protected).
    argoworkflows: "argo"
    # Argo Events webhook receiver (ci.engine=argoworkflows). Public, NO IAP - GitHub
    # must reach it; protected by the argoworkflows-github-webhook HMAC secret instead.
    argoevents: "argo-events"
    # Only used when observability.mode=oss (in-cluster Grafana). Ignored in
    # grafana-cloud mode, where Grafana is reached at its *.grafana.net URL.
    grafana: "grafana"
  # k8s Secret (per-namespace, created by scripts/01-namespaces.sh) holding
  # the IAP OAuth client ID/secret consumed by the GCPBackendPolicy resources
  # that put Identity-Aware Proxy in front of Jenkins and Headlamp. Never
  # commit real client ID/secret values - see README.md "Public access".
  iapCredentialsSecretName: gateway-iap-oauth

  # ---------------------------------------------------------------------------
  # Backend TLS - LB→pod re-encryption (OPT-IN, default false)
  # ---------------------------------------------------------------------------
  # By default TLS terminates at the L7 LB and the LB→pod hop is plain HTTP
  # (VPC-internal, riding Google's default network-layer encryption - see
  # docs/501 §3 Zero-Trust). When true, scripts/08.7-backend-tls.sh installs
  # cert-manager (pinned chart, GitOps via argocd/cert-manager-app.yaml) plus a
  # cluster-internal CA (selfsigned root -> CA ClusterIssuer) and mints
  # per-backend server certificates; the TLS-READY backends then serve HTTPS
  # themselves (stage 1: Headlamp, via helm/headlamp/values-backend-tls.yaml),
  # and scripts/09-gateway.sh attaches a BackendTLSPolicy (the LB re-encrypts
  # AND validates against the internal CA) + an HTTPS HealthCheckPolicy per
  # converted backend. Requires the BackendTLSPolicy CRD (GKE Gateway backend
  # TLS, GA 2026-05); on clusters without it every consumer gates on
  # j2026_backend_tls_active (lib/common.sh) and stays consistently on plain
  # HTTP with a warning. Disabling the flag (or down.sh) retires the policies,
  # certs and cert-manager symmetrically. See docs/504-BACKEND_TLS.md.
  # FEATURE FLAG: override for a single run with
  # JENKINS2026_GATEWAY_BACKEND_TLS_ENABLED (config.yaml is the durable
  # default; the env var is the ephemeral override - same pattern as ci.engine).
  backendTls:
    enabled: false

# -----------------------------------------------------------------------------
# Microservices (Modernized stack), GitFlow pipelines-as-code
# -----------------------------------------------------------------------------
microservices:
  # Optional second deployment tier. OFF by default: enabling it roughly doubles
  # the microservices footprint (a full gateway + services stack in a separate
  # 'develop' namespace). The nubenetes app forks now carry a real 'develop'
  # branch (off main), so 'develop' builds the app's develop branch (true
  # branch-based promotion) per jenkins/pipelines/seed/services.yaml; it also
  # differs in target namespace + its own gitops values-develop.yaml, and it
  # tracks the gitops-config repo's 'develop' branch for infra/config changes.
  # Observability (Grafana/Loki/Tempo/Prometheus) is a single shared stack - the
  # develop tier reports into it, distinguished by namespace/labels, not a
  # separate Grafana. Ephemeral override: JENKINS2026_DEVELOP_TRACK_ENABLED.
  developTrackEnabled: false

  namespaces:
    stable: microservices
    develop: microservices-develop

  # JHipster microservices monorepo coordinates
  git:
    org: nubenetes
    repo: jenkins-2026
    url: https://github.com/nubenetes/jenkins-2026.git

  branches:
    # Per-tier branch model — three DISTINCT axes, don't conflate:
    #  1. App SOURCE branch (what CI builds): jenkins/pipelines/seed/services.yaml
    #     `branches` (stable=main, develop=develop — both are now real branches on the
    #     nubenetes forks).
    #  2. GitOps branch the *develop* ArgoCD app tracks: `develop` below (always develop).
    #  3. GitOps branch the *stable* ArgoCD app tracks: the DEPLOY branch
    #     (J2026_SELF_REPO_BRANCH), NOT `stable` here — a Day1 from `develop` puts the
    #     stable tier's gitops on develop too (validate the whole platform end-to-end
    #     before promotion); a Day1 from `main` → stable gitops = main. Same auto-track
    #     pattern as the Jenkins shared-lib/seed. `stable` below feeds the TEKTON stable
    #     source branch (J2026_MICROSERVICES_BRANCH_STABLE), not the ArgoCD stable branch.
    stable: main
    develop: develop

  # Container images built by the pipelines are pushed here.
  registry: ghcr.io/nubenetes/jenkins-2026-microservices

  services:
    - name: gateway
    - name: jhipstersamplemicroservice
