# =============================================================================
# Template for the "azure-monitor-credentials" Secret consumed by
# observability/otel-collector/values-managed-azure*.yaml
# (observability.mode = managed-azure).
#
# 1. Copy this file to secret-managed-azure.local.yaml (gitignored - never
#    commit real credentials), fill in the values, and apply it BEFORE running
#    scripts/up.sh / scripts/03-observability.sh in managed-azure mode:
#       kubectl apply -f observability/otel-collector/secret-managed-azure.local.yaml
#
# 2. The Azure resources these point at (Azure Monitor workspace, Application
#    Insights, the Entra service principal, and Azure Managed Grafana) are
#    provisioned separately - see docs/observability.md "managed-azure". This
#    PoC currently ships the collector wiring only; the Terraform to create the
#    Azure resources is a follow-up.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: azure-monitor-credentials
  namespace: observability
type: Opaque
stringData:
  # Application Insights / Azure Monitor connection string (Portal -> your
  # Application Insights resource -> Overview -> "Connection String"). Used by
  # the azuremonitor exporter for traces + logs.
  AZURE_MONITOR_CONNECTION_STRING: "InstrumentationKey=<key>;IngestionEndpoint=https://<region>.in.applicationinsights.azure.com/;LiveEndpoint=https://<region>.livediagnostics.monitor.azure.com/"

  # Azure Monitor workspace metrics ingestion (remote-write) endpoint
  # (Portal -> Azure Monitor workspace -> "Metrics ingestion endpoint",
  # suffixed with the Prometheus remote-write path).
  AZURE_MONITOR_PROMETHEUS_ENDPOINT: "https://<workspace>.<region>.prometheus.monitor.azure.com/dataCollectionRules/<dcr-id>/streams/Microsoft-PrometheusMetrics/api/v1/write"

  # Microsoft Entra (Azure AD) service principal the collector uses to obtain a
  # token (scope https://monitor.azure.com/.default) for remote-write auth.
  # Grant it "Monitoring Metrics Publisher" on the data collection rule.
  AZURE_TENANT_ID: "<tenant-guid>"
  AZURE_CLIENT_ID: "<app-registration-client-id>"
  AZURE_CLIENT_SECRET: "<app-registration-client-secret>"

  # Azure Managed Grafana endpoint + a service-account token with dashboard
  # write, used by scripts/07-grafana-dashboards.sh to publish the metrics
  # dashboards. (Trace/log panels need Azure-specific rework - see docs.)
  GRAFANA_BASE_URL: "https://<your-amg>.<region>.grafana.azure.com"
  GRAFANA_API_KEY: "<azure-managed-grafana-service-account-token>"
