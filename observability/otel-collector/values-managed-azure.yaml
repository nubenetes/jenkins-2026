# Values for open-telemetry/opentelemetry-collector - "gateway" release,
# managed-azure variant (observability.mode: managed-azure).
#
# Azure Managed Grafana is a *frontend only* - it visualizes data from Azure
# Monitor datasources, it does NOT ingest OTLP. So this collector exports to
# Azure Monitor's backends, and Azure Managed Grafana reads from them:
#   - traces + logs -> Azure Monitor / Application Insights  (azuremonitor exporter)
#   - metrics ------> Azure Monitor managed Prometheus       (prometheusremotewrite,
#                     authenticated to Microsoft Entra via the oauth2client extension)
#
# All credentials/endpoints come from the "${azure-monitor-credentials}" Secret
# (see secret-managed-azure.example.yaml) via ${env:...}, so nothing sensitive
# is baked into this file.
#
# helm upgrade --install otel-collector-gateway open-telemetry/opentelemetry-collector \
#   -n observability -f observability/otel-collector/values-managed-azure.yaml

# Fixed Service name - same rationale as values-grafana-cloud.yaml /
# values-oss.yaml: jenkins/casc, helm/microservices and the Angular nginx
# proxy reach this collector at a stable address regardless of release name.
fullnameOverride: otel-collector-gateway

mode: deployment

replicaCount: 1


image:
  # contrib distro: required for the azuremonitor exporter and the
  # oauth2client extension (neither ships in the otelcol-k8s image).
  repository: otel/opentelemetry-collector-contrib

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Exposes the Azure Monitor connection string, the managed-Prometheus
# remote-write endpoint, and the Entra service-principal credentials as env
# vars for ${env:...} references below.
extraEnvsFrom:
  - secretRef:
      name: azure-monitor-credentials

# RBAC for the prometheus receiver's Kubernetes service discovery (node-exporter
# endpoints) - so the cluster infra metrics (kube-state-metrics + node-exporter)
# can be scraped and remote-written to Azure Monitor managed Prometheus. This is
# the managed-azure analogue of grafana-cloud's k8s-monitoring/Alloy.
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
      verbs: ["get", "list", "watch"]

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    hostPort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    hostPort: 4318
    protocol: TCP
  # Grafana Faro RUM beacon endpoint (browser → faro receiver).
  faro:
    enabled: true
    containerPort: 8027
    servicePort: 8027
    protocol: TCP

config:
  extensions:
    # The chart requires health_check (or healthcheckv2) in the extension list;
    # re-declare it since we override service.extensions below to add
    # oauth2client. Endpoint matches the chart default.
    health_check:
      endpoint: ${env:MY_POD_IP}:13133
    # Client-credentials token for Microsoft Entra, used by the
    # prometheusremotewrite exporter to authenticate to the Azure Monitor
    # workspace's metrics ingestion endpoint. monitor.azure.com/.default is the
    # scope Azure Monitor managed Prometheus expects.
    oauth2client:
      client_id: ${env:AZURE_CLIENT_ID}
      client_secret: ${env:AZURE_CLIENT_SECRET}
      token_url: https://login.microsoftonline.com/${env:AZURE_TENANT_ID}/oauth2/v2.0/token
      scopes:
        - https://monitor.azure.com/.default

  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
          # Allow the Angular RUM beacon (browser, no service mesh mTLS) and
          # any pod in the cluster to send OTLP/HTTP without per-origin config.
          cors:
            allowed_origins:
              - "*"
    # Grafana Faro RUM receiver (browser beacon → OTLP traces+logs). Contrib-only.
    faro:
      endpoint: 0.0.0.0:8027
      cors:
        allowed_origins:
          - "*"

    # Scrape Kubernetes infrastructure metrics (kube-state-metrics + node
    # exporter, both deployed by 03-observability.sh in managed-azure mode) and
    # remote-write them to Azure Monitor managed Prometheus - parity with the
    # k8s-monitoring/Alloy that grafana-cloud mode uses.
    prometheus:
      config:
        # The standard job set Azure Managed Grafana's built-in Kubernetes
        # dashboards (Compute Resources, Kubelet, Node Exporter, USE Method)
        # expect: cadvisor + kubelet (container/kubelet metrics, via the API
        # server proxy with the collector's ServiceAccount token), node-exporter
        # and kube-state-metrics. Every job carries cluster=jenkins-2026 so the
        # dashboards' cluster variable (label_values(up{job="cadvisor"},cluster))
        # populates. ($$1 escapes the collector's $-expansion -> $1 for the
        # prometheus relabel.)
        scrape_configs:
          - job_name: cadvisor
            scrape_interval: 30s
            scheme: https
            metrics_path: /metrics/cadvisor
            authorization:
              type: Bearer
              credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecure_skip_verify: true
            kubernetes_sd_configs:
              - role: node
            relabel_configs:
              - action: labelmap
                regex: __meta_kubernetes_node_label_(.+)
              - target_label: __address__
                replacement: kubernetes.default.svc:443
              - source_labels: [__meta_kubernetes_node_name]
                regex: (.+)
                target_label: __metrics_path__
                replacement: /api/v1/nodes/$$1/proxy/metrics/cadvisor
              - target_label: cluster
                replacement: jenkins-2026
          - job_name: kubelet
            scrape_interval: 30s
            scheme: https
            metrics_path: /metrics
            authorization:
              type: Bearer
              credentials_file: /var/run/secrets/kubernetes.io/serviceaccount/token
            tls_config:
              ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
              insecure_skip_verify: true
            kubernetes_sd_configs:
              - role: node
            relabel_configs:
              - action: labelmap
                regex: __meta_kubernetes_node_label_(.+)
              - target_label: __address__
                replacement: kubernetes.default.svc:443
              - source_labels: [__meta_kubernetes_node_name]
                regex: (.+)
                target_label: __metrics_path__
                replacement: /api/v1/nodes/$$1/proxy/metrics
              - target_label: cluster
                replacement: jenkins-2026
          - job_name: kube-state-metrics
            scrape_interval: 30s
            static_configs:
              - targets: ["kube-state-metrics.observability.svc.cluster.local:8080"]
            relabel_configs:
              - target_label: cluster
                replacement: jenkins-2026
          - job_name: node
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: endpoints
                namespaces:
                  names: [observability]
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_name]
                regex: prometheus-node-exporter
                action: keep
              - source_labels: [__meta_kubernetes_endpoint_node_name]
                target_label: instance
              - target_label: cluster
                replacement: jenkins-2026
          # Tekton controller metrics (tekton_pipelines_controller_*) feed the
          # Tekton CI dashboard when ci.engine=tekton. The controller Service
          # exposes them on the http-metrics (9090) port.
          - job_name: tekton-pipelines-controller
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: endpoints
                namespaces:
                  names: [tekton-pipelines]
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_name]
                regex: tekton-pipelines-controller
                action: keep
              - source_labels: [__meta_kubernetes_endpoint_port_name]
                regex: http-metrics
                action: keep
              - target_label: cluster
                replacement: jenkins-2026
          # Scrape Argo Workflows controller metrics (argo_workflows_*) so the
          # Argo Workflows CI dashboard works when ci.engine=argoworkflows. Argo
          # v3.6+ serves /metrics over HTTPS (self-signed) on the controller pod's
          # :9090 — there is no metrics Service, so discover the pod directly and
          # skip TLS verify. No targets when argoworkflows isn't deployed.
          - job_name: argo-workflows-controller
            scrape_interval: 30s
            scheme: https
            tls_config:
              insecure_skip_verify: true
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [argo]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_app]
                regex: workflow-controller
                action: keep
              - source_labels: [__meta_kubernetes_pod_container_port_name]
                regex: metrics
                action: keep
              - target_label: cluster
                replacement: jenkins-2026
          # CloudNativePG (CNPG) Postgres metrics (cnpg_*/pg_*) from the
          # postgres-* cluster instance pods (metrics port 9187). In oss mode
          # the in-cluster Prometheus scrapes these via the CNPG PodMonitor.
          - job_name: cnpg
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  # microservices-develop (optional lean tier) listed statically — an absent
                  # namespace yields no targets, so harmless when the tier is off.
                  names: [microservices, microservices-develop]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_cnpg_io_podRole]
                regex: instance
                action: keep
              - source_labels: [__meta_kubernetes_pod_container_port_number]
                regex: "9187"
                action: keep
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod
              - target_label: cluster
                replacement: jenkins-2026

  processors:
    batch: {}
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    resource:
      attributes:
        - key: deployment.environment.cluster
          value: jenkins-2026
          action: upsert

  # Same span-derived RED + service-graph metrics as the other modes, so the
  # metrics<->traces correlation works once the data is in Azure Monitor.
  connectors:
    span_metrics:
      namespace: traces.spanmetrics
      histogram:
        explicit:
          buckets: [2ms, 8ms, 25ms, 50ms, 100ms, 200ms, 500ms, 1s, 2s, 5s, 10s]
      exemplars:
        enabled: true
      metrics_flush_interval: 15s
    service_graph:
      store:
        ttl: 5s
        max_items: 1000

  exporters:
    # Traces + logs -> Azure Monitor / Application Insights.
    azuremonitor:
      connection_string: ${env:AZURE_MONITOR_CONNECTION_STRING}

    # Metrics -> Azure Monitor managed Prometheus (remote-write). The endpoint
    # is the workspace's metrics ingestion URL; auth is the Entra token from
    # the oauth2client extension above.
    prometheusremotewrite:
      endpoint: ${env:AZURE_MONITOR_PROMETHEUS_ENDPOINT}
      auth:
        authenticator: oauth2client
      resource_to_telemetry_conversion:
        enabled: true

  service:
    extensions: [health_check, oauth2client]
    pipelines:
      traces:
        receivers: [otlp, faro]
        processors: [memory_limiter, resource, batch]
        exporters: [azuremonitor, span_metrics, service_graph]
      metrics/spanmetrics:
        receivers: [span_metrics, service_graph]
        processors: [memory_limiter, resource, batch]
        exporters: [prometheusremotewrite]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [prometheusremotewrite]
      # Kubernetes infra metrics scraped from kube-state-metrics + node-exporter.
      metrics/infra:
        receivers: [prometheus]
        processors: [memory_limiter, resource, batch]
        exporters: [prometheusremotewrite]
      logs:
        receivers: [otlp, faro]
        processors: [memory_limiter, resource, batch]
        exporters: [azuremonitor]
