# Values for open-telemetry/opentelemetry-collector - "logs" release,
# managed-azure variant (observability.mode: managed-azure). DaemonSet
# counterpart of values-managed-azure.yaml - tails container logs on every
# node and ships them to Azure Monitor / Application Insights via the
# azuremonitor exporter.
#
# helm upgrade --install otel-collector-logs open-telemetry/opentelemetry-collector \
#   -n observability -f observability/otel-collector/values-managed-azure-logs.yaml

fullnameOverride: otel-collector-logs

mode: daemonset

image:
  # contrib distro for the azuremonitor exporter.
  repository: otel/opentelemetry-collector-contrib

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

extraEnvsFrom:
  - secretRef:
      name: azure-monitor-credentials

extraVolumes:
  - name: varlogpods
    hostPath:
      path: /var/log/pods
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

extraVolumeMounts:
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

securityContext:
  runAsUser: 0
  readOnlyRootFilesystem: false

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces"]
      verbs: ["get", "watch", "list"]

config:
  receivers:
    filelog:
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        - /var/log/pods/observability_*otel-collector*/*/*.log
        - /var/log/pods/kube-system_*/*/*.log
      start_at: beginning
      include_file_path: true
      include_file_name: false
      operators:
        - type: container
          id: container-parser

  processors:
    batch: {}
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    k8s_attributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.container.name
          - k8s.deployment.name
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid

  exporters:
    azuremonitor:
      connection_string: ${env:AZURE_MONITOR_CONNECTION_STRING}

  service:
    pipelines:
      logs:
        receivers: [filelog]
        processors: [memory_limiter, k8s_attributes, batch]
        exporters: [azuremonitor]
