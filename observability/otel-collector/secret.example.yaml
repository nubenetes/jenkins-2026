# =============================================================================
# Template for the "grafana-cloud-credentials" Secret consumed by
# observability/otel-collector/values-grafana-cloud*.yaml.
#
# 1. Copy this file to secret.yaml (gitignored - never commit real
#    credentials) OR export the equivalent env vars and let
#    scripts/03-observability.sh create the secret with `kubectl create
#    secret generic --from-literal`.
# 2. Fill in your Grafana Cloud OTLP gateway endpoint (Grafana Cloud Portal
#    -> "OpenTelemetry" -> "Configuration Details") and the Basic-auth header
#    value, computed as:
#
#      echo -n "<INSTANCE_ID>:<API_KEY>" | base64 -w0
#
# 3. Apply:
#      kubectl apply -f observability/otel-collector/secret.yaml
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: grafana-cloud-credentials
  namespace: observability
type: Opaque
stringData:
  # e.g. https://otlp-gateway-prod-eu-west-2.grafana.net/otlp
  GRAFANA_CLOUD_OTLP_ENDPOINT: "https://otlp-gateway-prod-<region>.grafana.net/otlp"

  # base64("<instance-id>:<api-key>") - used as the OTLP "Authorization: Basic ..." header
  GRAFANA_CLOUD_OTLP_AUTH: "<base64-instance-id:api-key>"

  # Optional - used by scripts/07-grafana-dashboards.sh to import dashboards
  # via the Grafana HTTP API and by jcasc-otel.yaml to add a "View trace in
  # Grafana" link on each Jenkins build.
  GRAFANA_BASE_URL: "https://<your-stack>.grafana.net"
  GRAFANA_API_KEY: "<grafana-cloud-service-account-token-with-dashboard-write>"
