# Values for open-telemetry/opentelemetry-collector - "gateway" release.
#
# Deployed as a Deployment that receives OTLP from Jenkins (jcasc-otel.yaml),
# the OTel Operator Java auto-instrumentation (helm/microservices/templates/
# instrumentation.yaml) and the Angular RUM snippet (resources/angular/
# otel-web.js, proxied through nginx at /otel/), and forwards traces +
# metrics + logs to Grafana Cloud's OTLP gateway.
#
# helm upgrade --install otel-collector-gateway open-telemetry/opentelemetry-collector \
#   -n observability -f observability/otel-collector/values-grafana-cloud.yaml
#
# Requires the "grafana-cloud-credentials" Secret - see secret.example.yaml.

# Fixed Service name so other components can reach this collector at a
# stable address regardless of the Helm release name:
#   otel-collector-gateway.<observability-namespace>.svc.cluster.local
# (referenced by jenkins/casc/jcasc-otel.yaml, helm/microservices/templates/
# instrumentation.yaml and resources/angular/nginx.conf).
fullnameOverride: otel-collector-gateway

mode: deployment

replicaCount: 1


# Contrib distro (superset of the k8s distro) — required for the `faro` receiver
# that ingests the Angular SPA's Grafana Faro RUM beacon (browser → collector →
# Grafana Cloud), keeping frontend telemetry on the same backend-agnostic path as
# the rest. All previously-used components (otlp/jaeger/zipkin/prometheus,
# span_metrics/service_graph, otlphttp) exist in contrib too, so this is drop-in.
image:
  repository: docker.io/otel/opentelemetry-collector-contrib

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Exposes GRAFANA_CLOUD_OTLP_ENDPOINT / GRAFANA_CLOUD_OTLP_AUTH as env vars so
# they can be referenced in config below via ${env:...} without baking
# credentials into this file.
extraEnvsFrom:
  - secretRef:
      name: grafana-cloud-credentials

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    hostPort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    hostPort: 4318
    protocol: TCP
  # Grafana Faro RUM beacon endpoint (browser → faro receiver). Service-exposed so
  # the Gateway HTTPRoute can publish it for the Angular SPA.
  faro:
    enabled: true
    containerPort: 8027
    servicePort: 8027
    protocol: TCP

# Backend TLS (opt-in, docs/504): the cert-manager-minted faro server cert, so the
# faro receiver can serve TLS on 8027 once values-backend-tls.yaml is layered
# (03-observability.sh, backend TLS active). optional:true keeps a flag-OFF
# collector starting — the Secret only exists when the feature is on.
extraVolumes:
  - name: faro-tls
    secret:
      secretName: faro-tls
      optional: true
extraVolumeMounts:
  - name: faro-tls
    mountPath: /faro-tls
    readOnly: true

# RBAC for the prometheus receiver's kubernetes_sd (Tekton controller scrape).
clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["services", "endpoints", "pods"]
      verbs: ["get", "list", "watch"]

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
          # Allow the Angular RUM beacon (browser, no service mesh mTLS) and
          # any pod in the cluster to send OTLP/HTTP without per-origin
          # config. cors is an http-only ServerConfig option - the grpc
          # protocol has no equivalent and rejects unknown keys.
          cors:
            allowed_origins:
              - "*"
    # Grafana Faro RUM receiver: ingests the Angular SPA's browser beacon (Web
    # Vitals, JS errors, browser spans) and converts it to OTLP traces+logs, so
    # frontend RUM rides the same collector→backend path as the Java services'
    # telemetry. Browser-facing, so CORS is open (no service-mesh mTLS for a
    # browser). Exposed publicly (no IAP) via the Gateway — see 09-gateway.sh /
    # the faro HTTPRoute. Contrib-only component (hence the contrib image above).
    faro:
      endpoint: 0.0.0.0:8027
      cors:
        allowed_origins:
          - "*"
    # Scrape Tekton controller metrics (tekton_pipelines_controller_*) so the
    # Tekton CI dashboard works in grafana-cloud (remote-written via otlp_http).
    prometheus:
      config:
        scrape_configs:
          - job_name: tekton-pipelines-controller
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: endpoints
                namespaces:
                  names: [tekton-pipelines]
            relabel_configs:
              - source_labels: [__meta_kubernetes_service_name]
                regex: tekton-pipelines-controller
                action: keep
              - source_labels: [__meta_kubernetes_endpoint_port_name]
                regex: http-metrics
                action: keep
          # Scrape Argo Workflows controller metrics (argo_workflows_*) so the
          # Argo Workflows CI dashboard works when ci.engine=argoworkflows. Argo
          # v3.6+ serves /metrics over HTTPS (self-signed) on the controller pod's
          # :9090 — there is no metrics Service, so discover the pod directly and
          # skip TLS verify. No targets when argoworkflows isn't deployed (the argo
          # namespace is absent), exactly like the tekton job above.
          - job_name: argo-workflows-controller
            scrape_interval: 30s
            scheme: https
            tls_config:
              insecure_skip_verify: true
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [argo]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_app]
                regex: workflow-controller
                action: keep
              - source_labels: [__meta_kubernetes_pod_container_port_name]
                regex: metrics
                action: keep
          # ArgoCD application-controller metrics (argocd_app_*) for the
          # engine-neutral DORA dashboard (docs/301 § DORA): deployment
          # frequency = successful microservices syncs, CFR = failed syncs,
          # restore time = app-health episodes. Pod discovery on the plain-HTTP
          # :8082/metrics containerPort (the argo-cd chart's metrics Service is
          # not enabled). The keep-list bounds the active series to the three
          # per-app families the dashboard reads - negligible against the
          # Grafana Cloud free-tier cap even with leanMetrics=false.
          - job_name: argocd-application-controller
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  names: [argocd]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_app_kubernetes_io_name]
                regex: argocd-application-controller
                action: keep
              - source_labels: [__meta_kubernetes_pod_container_port_name]
                regex: metrics
                action: keep
            metric_relabel_configs:
              - source_labels: [__name__]
                regex: argocd_app_info|argocd_app_sync_total|argocd_app_health_status
                action: keep
          # CloudNativePG (CNPG) Postgres metrics (cnpg_*/pg_*) from the
          # postgres-* cluster instance pods (metrics port 9187). In oss mode
          # the in-cluster Prometheus scrapes these via the CNPG PodMonitor.
          - job_name: cnpg
            scrape_interval: 30s
            kubernetes_sd_configs:
              - role: pod
                namespaces:
                  # microservices-develop (optional lean tier) listed statically — an absent
                  # namespace yields no targets, so harmless when the tier is off.
                  names: [microservices, microservices-develop]
            relabel_configs:
              - source_labels: [__meta_kubernetes_pod_label_cnpg_io_podRole]
                regex: instance
                action: keep
              - source_labels: [__meta_kubernetes_pod_container_port_number]
                regex: "9187"
                action: keep
              - source_labels: [__meta_kubernetes_namespace]
                target_label: namespace
              - source_labels: [__meta_kubernetes_pod_name]
                target_label: pod
              - target_label: cluster
                replacement: jenkins-2026
            # Drop the single biggest Grafana-Cloud active-series consumer:
            # cnpg_pg_settings_setting emits one series per postgresql.conf
            # setting per instance (~2300 series across the tiers) — static
            # config values, not a useful time-series, and used by no dashboard.
            # On the free-tier 15k active-series cap this alone was ~15% of the
            # budget and pushed app/JVM metrics into intermittent rejection
            # (err-mimir-max-active-series). See docs/301 + observability.leanMetrics.
            metric_relabel_configs:
              - source_labels: [__name__]
                regex: cnpg_pg_settings_setting
                action: drop

  processors:
    batch: {}
    # Caps memory usage of the collector itself under load spikes.
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    # Stamps every signal with a common cluster/platform identity so they can
    # be filtered/grouped consistently in Grafana regardless of source
    # (Jenkins, Microservices services, or the Angular RUM beacon).
    resource:
      attributes:
        - key: deployment.environment.cluster
          value: jenkins-2026
          action: upsert

  # Connectors derive metrics from the trace stream so the
  # metrics<->traces correlation is complete (otherwise no span-derived
  # metrics exist and Grafana's Service Map / node graph stays empty).
  # Both ship in the otelcol-k8s image used above.
  connectors:
    # RED metrics per service/operation (traces_spanmetrics_calls_total,
    # traces_spanmetrics_duration_*). exemplars carry the trace_id so the
    # generated metrics link back to the originating trace.
    span_metrics:
      namespace: traces.spanmetrics
      histogram:
        explicit:
          buckets: [2ms, 8ms, 25ms, 50ms, 100ms, 200ms, 500ms, 1s, 2s, 5s, 10s]
      exemplars:
        enabled: true
      metrics_flush_interval: 15s
    # Service graph metrics (traces_service_graph_request_*) that power the
    # Tempo datasource Service Map / node graph.
    service_graph:
      store:
        ttl: 5s
        max_items: 1000

  exporters:
    otlp_http/grafana_cloud:
      endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
      headers:
        Authorization: "Basic ${env:GRAFANA_CLOUD_OTLP_AUTH}"

  service:
    pipelines:
      # Spans are forwarded to Grafana Cloud AND fanned out to the
      # spanmetrics/servicegraph connectors.
      traces:
        receivers: [otlp, faro]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_http/grafana_cloud, span_metrics, service_graph]
      # Span-derived metrics produced by the connectors -> Grafana Cloud.
      metrics/spanmetrics:
        receivers: [span_metrics, service_graph]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_http/grafana_cloud]
      metrics:
        receivers: [otlp, prometheus]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_http/grafana_cloud]
      logs:
        receivers: [otlp, faro]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_http/grafana_cloud]
