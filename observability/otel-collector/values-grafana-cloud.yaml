# Values for open-telemetry/opentelemetry-collector - "gateway" release.
#
# Deployed as a Deployment that receives OTLP from Jenkins (jcasc-otel.yaml),
# the OTel Operator Java auto-instrumentation (helm/microservices/templates/
# instrumentation.yaml) and the Angular RUM snippet (resources/angular/
# otel-web.js, proxied through nginx at /otel/), and forwards traces +
# metrics + logs to Grafana Cloud's OTLP gateway.
#
# helm upgrade --install otel-collector-gateway open-telemetry/opentelemetry-collector \
#   -n observability -f observability/otel-collector/values-grafana-cloud.yaml
#
# Requires the "grafana-cloud-credentials" Secret - see secret.example.yaml.

# Fixed Service name so other components can reach this collector at a
# stable address regardless of the Helm release name:
#   otel-collector-gateway.<observability-namespace>.svc.cluster.local
# (referenced by jenkins/casc/jcasc-otel.yaml, helm/microservices/templates/
# instrumentation.yaml and resources/angular/nginx.conf).
fullnameOverride: otel-collector-gateway

mode: deployment

replicaCount: 1

# Recreate avoids rolling-update deadlocks when switching observability modes
# (old pod with different backend credentials blocks new pod scheduling).
updateStrategy:
  type: Recreate

image:
  repository: otel/opentelemetry-collector-k8s

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Exposes GRAFANA_CLOUD_OTLP_ENDPOINT / GRAFANA_CLOUD_OTLP_AUTH as env vars so
# they can be referenced in config below via ${env:...} without baking
# credentials into this file.
extraEnvsFrom:
  - secretRef:
      name: grafana-cloud-credentials

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    hostPort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    hostPort: 4318
    protocol: TCP

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318
          # Allow the Angular RUM beacon (browser, no service mesh mTLS) and
          # any pod in the cluster to send OTLP/HTTP without per-origin
          # config. cors is an http-only ServerConfig option - the grpc
          # protocol has no equivalent and rejects unknown keys.
          cors:
            allowed_origins:
              - "*"

  processors:
    batch: {}
    # Caps memory usage of the collector itself under load spikes.
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    # Stamps every signal with a common cluster/platform identity so they can
    # be filtered/grouped consistently in Grafana regardless of source
    # (Jenkins, Microservices services, or the Angular RUM beacon).
    resource:
      attributes:
        - key: deployment.environment.cluster
          value: jenkins-2026
          action: upsert

  # Connectors derive metrics from the trace stream so the
  # metrics<->traces correlation is complete (otherwise no span-derived
  # metrics exist and Grafana's Service Map / node graph stays empty).
  # Both ship in the otelcol-k8s image used above.
  connectors:
    # RED metrics per service/operation (traces_spanmetrics_calls_total,
    # traces_spanmetrics_duration_*). exemplars carry the trace_id so the
    # generated metrics link back to the originating trace.
    span_metrics:
      namespace: traces.spanmetrics
      histogram:
        explicit:
          buckets: [2ms, 8ms, 25ms, 50ms, 100ms, 200ms, 500ms, 1s, 2s, 5s, 10s]
      exemplars:
        enabled: true
      metrics_flush_interval: 15s
    # Service graph metrics (traces_service_graph_request_*) that power the
    # Tempo datasource Service Map / node graph.
    service_graph:
      store:
        ttl: 5s
        max_items: 1000

  exporters:
    otlp_http/grafana_cloud:
      endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
      headers:
        Authorization: "Basic ${env:GRAFANA_CLOUD_OTLP_AUTH}"

  service:
    pipelines:
      # Spans are forwarded to Grafana Cloud AND fanned out to the
      # spanmetrics/servicegraph connectors.
      traces:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_http/grafana_cloud, span_metrics, service_graph]
      # Span-derived metrics produced by the connectors -> Grafana Cloud.
      metrics/spanmetrics:
        receivers: [span_metrics, service_graph]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_http/grafana_cloud]
      metrics:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_http/grafana_cloud]
      logs:
        receivers: [otlp]
        processors: [memory_limiter, resource, batch]
        exporters: [otlp_http/grafana_cloud]
