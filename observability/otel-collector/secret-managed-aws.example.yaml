# =============================================================================
# Template for the "aws-managed-credentials" Secret consumed by
# observability/otel-collector/values-managed-aws*.yaml (observability.mode =
# managed-aws).
#
# IN CI you do NOT create this Secret by hand: "02.01 GKE provision" builds it
# from the terraform/aws-managed-grafana outputs (read from the GCS state,
# provisioned once by "01.04 AWS bootstrap"). This template is the LOCAL
# fallback for running scripts/up.sh outside CI - copy it to
# secret-managed-aws.local.yaml (gitignored), fill in from
# `terraform -chdir=terraform/aws-managed-grafana output`, and apply it first.
#
# Note: there are NO AWS access keys here - the collector authenticates with a
# projected ServiceAccount token (AssumeRoleWithWebIdentity) against AWS_ROLE_ARN.
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: aws-managed-credentials
  namespace: observability
type: Opaque
stringData:
  AWS_REGION: "eu-west-1"

  # IAM role the collector assumes via web identity (terraform output collector_role_arn).
  AWS_ROLE_ARN: "arn:aws:iam::<account-id>:role/jenkins-2026-otel-collector"

  # Amazon Managed Prometheus remote-write URL (terraform output amp_remote_write_endpoint).
  AMP_REMOTE_WRITE_ENDPOINT: "https://aps-workspaces.<region>.amazonaws.com/workspaces/<ws-id>/api/v1/remote_write"

  # CloudWatch log group for collector logs (terraform output cloudwatch_log_group).
  AWS_CLOUDWATCH_LOG_GROUP: "/jenkins-2026/jenkins-2026/otel"

  # Amazon Managed Grafana workspace URL (terraform output grafana_endpoint) -
  # banner link in jcasc-base.yaml.
  GRAFANA_BASE_URL: "https://g-<id>.grafana-workspace.<region>.amazonaws.com"

  # Amazon Managed Grafana workspace id (terraform output grafana_workspace_id) -
  # scripts/07 mints a short-lived service-account token against it to publish
  # the dashboards-aws variants (keyless: no Grafana API key is stored).
  GRAFANA_WORKSPACE_ID: "g-<id>"

  # Amazon Managed Prometheus query base URL (terraform output amp_query_url) -
  # scripts/07 uses it to create the AMG Prometheus (AMP) datasource.
  AMP_QUERY_URL: "https://aps-workspaces.<region>.amazonaws.com/workspaces/<ws-id>/"
