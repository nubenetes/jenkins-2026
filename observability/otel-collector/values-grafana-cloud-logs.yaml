# Values for open-telemetry/opentelemetry-collector - "logs" release.
#
# Deployed as a DaemonSet (one pod per node) that tails container stdout/
# stderr via the filelog receiver and forwards log records straight to
# Grafana Cloud Loki (via the OTLP gateway's /v1/logs endpoint). This covers
# any process that does NOT go through the OTel Java agent's log-appender
# bridge (e.g. nginx access logs for microservices-angular, Jenkins agent pods,
# kube-system noise is excluded below).
#
# helm upgrade --install otel-collector-logs open-telemetry/opentelemetry-collector \
#   -n observability -f observability/otel-collector/values-grafana-cloud-logs.yaml
#
# Requires the "grafana-cloud-credentials" Secret - see secret.example.yaml.

fullnameOverride: otel-collector-logs

mode: daemonset

image:
  repository: otel/opentelemetry-collector-k8s

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    # 256Mi caused constant memory_limiter refusals: filelog tails all node pod
    # logs (high burst on startup with start_at:beginning) and the limiter dropped
    # logs before they reached the exporter. 512Mi gives real headroom.
    memory: 512Mi

extraEnvsFrom:
  - secretRef:
      name: grafana-cloud-credentials

# Mounts the node's container log directories read-only into the collector
# pod so the filelog receiver below can tail them.
extraVolumes:
  - name: varlogpods
    hostPath:
      path: /var/log/pods
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

extraVolumeMounts:
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

# DaemonSets read host paths - the upstream chart's default restricted
# securityContext (non-root, read-only rootfs) is relaxed here so the
# collector can read root-owned log files on every node/platform.
securityContext:
  runAsUser: 0
  readOnlyRootFilesystem: false

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces"]
      verbs: ["get", "watch", "list"]

config:
  receivers:
    filelog:
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        # Skip the collector's own logs and kube-system noise to keep the
        # Grafana Cloud log volume focused on jenkins-2026 and microservices.
        - /var/log/pods/observability_*otel-collector*/*/*.log
        - /var/log/pods/kube-system_*/*/*.log
      start_at: beginning
      include_file_path: true
      include_file_name: false
      retry_on_failure:
        enabled: true
        initial_interval: 1s
        max_interval: 30s
        max_elapsed_time: 5m
      operators:
        - type: container
          id: container-parser
        # Extract the log level from structured lines into attributes.level and set the
        # record severity from it: JSON `"level":"X"` (covers the microservices' ECS
        # nested log.level AND flat level like CNPG) and logfmt `level=X` (e.g. ArgoCD).
        # This is what makes severity uniform across formats — powering both the Grafana
        # level filter/colouring and the severity-based filter/severity processor below.
        - type: regex_parser
          if: 'body matches "(?i)(\"level\"\\s*:\\s*\"\\w+\"|\\blevel=\\w+)"'
          regex: '(?i)(?:"level"\s*:\s*"|level=)(?P<level>\w+)'
          parse_from: body
          parse_to: attributes
          severity:
            parse_from: attributes.level
        # Plain-text lines (no level token) get level=unknown so the dashboard $level
        # variable (and its "All") include them instead of silently hiding them.
        - type: add
          if: 'attributes.level == nil'
          field: attributes.level
          value: unknown

  processors:
    batch: {}
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    # Derive jenkins-2026/microservices resource attributes from the k8s
    # namespace/pod/container metadata parsed by the container operator
    # above, so Loki labels line up with the trace/metric resource
    # attributes set by the OTel Java agent and the collector gateway.
    k8s_attributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.container.name
          - k8s.deployment.name
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid

  exporters:
    otlphttp/grafana_cloud:
      endpoint: ${env:GRAFANA_CLOUD_OTLP_ENDPOINT}
      headers:
        Authorization: "Basic ${env:GRAFANA_CLOUD_OTLP_AUTH}"

  service:
    pipelines:
      logs:
        receivers: [filelog]
        processors: [memory_limiter, k8s_attributes, batch]
        exporters: [otlphttp/grafana_cloud]
