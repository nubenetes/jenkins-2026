# Values for open-telemetry/opentelemetry-collector - "logs" release,
# OSS variant (observability.mode: oss). DaemonSet counterpart of
# values-oss.yaml - tails container logs on every node and ships them to
# the in-cluster Loki via its native OTLP endpoint.
#
# helm upgrade --install otel-collector-logs open-telemetry/opentelemetry-collector \
#   -n observability -f observability/otel-collector/values-oss-logs.yaml

fullnameOverride: otel-collector-logs

mode: daemonset

image:
  repository: otel/opentelemetry-collector-k8s

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 300m
    memory: 256Mi

extraVolumes:
  - name: varlogpods
    hostPath:
      path: /var/log/pods
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

extraVolumeMounts:
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

securityContext:
  runAsUser: 0
  readOnlyRootFilesystem: false

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces"]
      verbs: ["get", "watch", "list"]

config:
  receivers:
    filelog:
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        - /var/log/pods/observability_*otel-collector*/*/*.log
        - /var/log/pods/kube-system_*/*/*.log
      start_at: beginning
      include_file_path: true
      include_file_name: false
      operators:
        - type: container
          id: container-parser

  processors:
    batch: {}
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    k8sattributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.container.name
          - k8s.deployment.name
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid

  exporters:
    otlphttp/loki:
      endpoint: http://loki-gateway.observability.svc.cluster.local/otlp
      tls:
        insecure: true

  service:
    pipelines:
      logs:
        receivers: [filelog]
        processors: [memory_limiter, k8sattributes, batch]
        exporters: [otlphttp/loki]
