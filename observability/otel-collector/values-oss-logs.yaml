# Values for open-telemetry/opentelemetry-collector - "logs" release,
# OSS variant (observability.mode: oss). DaemonSet counterpart of
# values-oss.yaml - tails container logs on every node and ships them to
# the in-cluster Loki via its native OTLP endpoint.
#
# helm upgrade --install otel-collector-logs open-telemetry/opentelemetry-collector \
#   -n observability -f observability/otel-collector/values-oss-logs.yaml

fullnameOverride: otel-collector-logs

mode: daemonset

image:
  repository: otel/opentelemetry-collector-k8s

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 300m
    # 256Mi caused constant memory_limiter refusals: filelog tails all node pod
    # logs (high burst on startup with start_at:beginning) and the limiter dropped
    # logs before they reached the exporter. 512Mi gives real headroom.
    memory: 512Mi

extraVolumes:
  - name: varlogpods
    hostPath:
      path: /var/log/pods
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

extraVolumeMounts:
  - name: varlogpods
    mountPath: /var/log/pods
    readOnly: true
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

securityContext:
  runAsUser: 0
  readOnlyRootFilesystem: false

clusterRole:
  create: true
  rules:
    - apiGroups: [""]
      resources: ["pods", "namespaces"]
      verbs: ["get", "watch", "list"]

config:
  receivers:
    filelog:
      include:
        - /var/log/pods/*/*/*.log
      exclude:
        - /var/log/pods/observability_*otel-collector*/*/*.log
        - /var/log/pods/kube-system_*/*/*.log
      start_at: beginning
      include_file_path: true
      include_file_name: false
      retry_on_failure:
        enabled: true
        initial_interval: 1s
        max_interval: 30s
        max_elapsed_time: 5m
      operators:
        - type: container
          id: container-parser
        # Extract the log level from structured lines into attributes.level and set the
        # record severity from it: JSON `"level":"X"` (covers the microservices' ECS
        # nested log.level AND flat level like CNPG) and logfmt `level=X` (e.g. ArgoCD).
        # This is what makes severity uniform across formats — powering both the Grafana
        # level filter/colouring and the severity-based filter/severity processor below.
        - type: regex_parser
          if: 'body matches "(?i)(\"level\"\\s*:\\s*\"\\w+\"|\\blevel=\\w+)"'
          regex: '(?i)(?:"level"\s*:\s*"|level=)(?P<level>\w+)'
          parse_from: body
          parse_to: attributes
          severity:
            parse_from: attributes.level
        # Plain-text lines (no level token) get level=unknown so the dashboard $level
        # variable (and its "All") include them instead of silently hiding them.
        - type: add
          if: 'attributes.level == nil'
          field: attributes.level
          value: unknown

  processors:
    batch: {}
    memory_limiter:
      check_interval: 5s
      limit_percentage: 80
      spike_limit_percentage: 25
    k8s_attributes:
      auth_type: serviceAccount
      passthrough: false
      extract:
        metadata:
          - k8s.namespace.name
          - k8s.pod.name
          - k8s.container.name
          - k8s.deployment.name
      pod_association:
        - sources:
            - from: resource_attribute
              name: k8s.pod.uid

  exporters:
    otlphttp/loki:
      endpoint: http://oss-loki-gateway.observability.svc.cluster.local/otlp
      tls:
        insecure: true

  service:
    pipelines:
      logs:
        receivers: [filelog]
        processors: [memory_limiter, k8s_attributes, batch]
        exporters: [otlphttp/loki]
