# Values for open-telemetry/opentelemetry-operator (provides the
# OpenTelemetryCollector + Instrumentation CRDs used everywhere else in
# observability/ and helm/microservices/templates/instrumentation.yaml).
#
# helm upgrade --install otel-operator open-telemetry/opentelemetry-operator \
#   -n observability --create-namespace -f observability/otel-operator/values.yaml

admissionWebhooks:
  certManager:
    enabled: false
  autoGenerateCert:
    enabled: true
    # false: reuse the existing self-signed CA/cert across `helm upgrade`
    # re-runs instead of rotating it. `recreate: true` patches the
    # MutatingWebhookConfiguration's caBundle to a freshly-generated CA on
    # every upgrade, but the already-running operator pod keeps serving its
    # old cert until restarted - any admission request in that window (e.g.
    # helm/microservices's Instrumentation CR) fails with "certificate signed by
    # unknown authority".
    recreate: false

manager:
  collectorImage:
    repository: docker.io/otel/opentelemetry-collector-k8s
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
