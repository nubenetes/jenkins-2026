# Values for prometheus-community/kube-prometheus-stack - OSS observability
# mode (observability.mode: oss).
#
# Provides Prometheus (+ remote-write receiver, fed by
# observability/otel-collector/values-oss.yaml's prometheusremotewrite
# exporter), Alertmanager, and Grafana - pre-wired with Loki + Tempo
# datasources (see values-oss-loki.yaml / values-oss-tempo.yaml) so traces,
# metrics and logs correlate the same way they do in the Grafana Cloud mode:
#   - Prometheus exemplars -> Tempo traces
#   - Loki log lines (trace_id from the OTel logging MDC bridge) -> Tempo
#   - Tempo traces -> Loki logs and -> Prometheus service graph / RED metrics
#
# helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#   -n observability --create-namespace -f observability/grafana/values-oss.yaml

prometheus:
  prometheusSpec:
    # Required for the otel-collector "gateway" release's
    # prometheusremotewrite exporter (values-oss.yaml).
    enableRemoteWriteReceiver: true
    # By default kube-prometheus-stack only selects ServiceMonitors/PodMonitors
    # carrying its own release label (serviceMonitorSelector matchLabels
    # release=<release>). The CNPG operator creates PodMonitors for the
    # postgres-* clusters WITHOUT that label, so they were ignored and the
    # Postgres/CNPG dashboard had no data. Select all monitors cluster-wide so
    # cnpg_*/pg_* metrics are scraped (the collector handles this in non-oss
    # modes via its prometheus receiver cnpg job).
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    # Without this, exemplars arriving via remote-write are silently dropped,
    # so the Prometheus datasource's exemplarTraceIdDestinations (metrics ->
    # Tempo traces correlation) has nothing to render. Enables the in-memory
    # exemplar store (--enable-feature=exemplar-storage).
    enableFeatures:
      - exemplar-storage
    retention: 7d
    # Scrape Tekton controller metrics (tekton_pipelines_controller_*) so the
    # Tekton CI dashboard works in oss mode. The prometheus-operator's own RBAC
    # covers the endpoints discovery.
    additionalScrapeConfigs:
      - job_name: tekton-pipelines-controller
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: [tekton-pipelines]
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: tekton-pipelines-controller
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: http-metrics
            action: keep
    resources:
      requests:
        cpu: 200m
        memory: 512Mi
      limits:
        cpu: 1000m
        memory: 1Gi
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

alertmanager:
  enabled: false

grafana:
  adminUser: admin

  # Per-cluster runtime inputs that must NOT be baked into this file are surfaced
  # as env vars from companion objects created by scripts/03-observability.sh in
  # the Grafana namespace (both optional — a missing object just falls back):
  #   - Secret  grafana-jenkins-ds (key: apiToken) -> $JENKINS_API_TOKEN, consumed
  #     by the Jenkins datasource's secureJsonData.apiToken below (Grafana expands
  #     $ENV references inside provisioning files at startup). Mirrors the
  #     jenkins-credentials admin-password.
  #   - ConfigMap grafana-runtime-config (key: root_url) -> GF_SERVER_ROOT_URL,
  #     which overrides [server] root_url with https://grafana.<baseDomain> when
  #     the public gateway is enabled. When absent, the grafana.ini default below
  #     (in-cluster, for kubectl port-forward) applies.
  # This replaces the previous `helm upgrade --set ...` injections so the OSS
  # stack can be deployed declaratively by ArgoCD (argocd/observability-oss).
  envValueFrom:
    JENKINS_API_TOKEN:
      secretKeyRef:
        name: grafana-jenkins-ds
        key: apiToken
        optional: true
    GF_SERVER_ROOT_URL:
      configMapKeyRef:
        name: grafana-runtime-config
        key: root_url
        optional: true

  image:
    # Pinned for reproducibility (see CLAUDE.md "pin for reproducibility").
    # Overrides the Grafana version the kube-prometheus-stack subchart would
    # otherwise default to, so OSS mode tracks a known Grafana OSS release.
    tag: "13.0.2"

  # Absolute URL Grafana uses for redirects and generated links. The
  # in-cluster default below is correct for kubectl port-forward access; when
  # the public gateway is enabled (observability.mode=oss + gateway.baseDomain
  # set), scripts/03-observability.sh (which installs this release) overrides
  # server.root_url with https://grafana.<baseDomain> via `helm upgrade --set`
  # so redirects resolve to the public host.
  grafana.ini:
    server:
      root_url: "%(protocol)s://%(domain)s:%(http_port)s/"
    # Single sign-on with Google, same edge pattern as Jenkins/Headlamp: the GKE
    # Gateway puts Grafana behind Identity-Aware Proxy (the GCPBackendPolicy in
    # scripts/09-gateway.sh), which authenticates the user with their Google
    # account and forwards their identity in the X-Goog-Authenticated-User-Email
    # header. Grafana's auth.proxy trusts that header and auto-creates the user,
    # so there is no second Grafana login prompt - one Google sign-in (IAP) and
    # you land in Grafana. IAP already restricts access to allowlisted Google
    # accounts, so the proxied user is granted Admin (users.auto_assign_org_role).
    # The header carries an "accounts.google.com:" prefix (cosmetic in the
    # username). The login form stays enabled as a port-forward escape hatch:
    # when no IAP header is present (kubectl port-forward), admin/password works.
    "auth.proxy":
      enabled: true
      header_name: X-Goog-Authenticated-User-Email
      header_property: username
      auto_sign_up: true
      sync_ttl: 60
    users:
      auto_assign_org_role: Admin

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  # Disabled: a bound PVC's spec.volumeName (set by the dynamic provisioner
  # after binding) diverges from Helm's stored manifest, which makes every
  # subsequent `helm upgrade`/`rollback` fail to patch the PVC ("spec is
  # immutable after creation"). Dashboards are provisioned via the
  # dashboardsConfigMaps sidecar below, so no state needs to persist.
  persistence:
    enabled: false

  sidecar:
    datasources:
      # The chart's sidecar would otherwise auto-provision its own default
      # "Prometheus" datasource (isDefault: true). We declare our own
      # "Prometheus" entry below (also isDefault: true) so we can attach
      # exemplarTraceIdDestinations for Tempo correlation - having both
      # marked as default makes Grafana fail to start ("Only one datasource
      # per organization can be marked as default", see
      # prometheus-community/helm-charts#482). Disable the chart's copy.
      defaultDatasourceEnabled: false
    # File-based alerting provisioning. Grafana's DB is ephemeral here
    # (persistence.enabled: false above), so alert rules pushed via the HTTP
    # provisioning API would be lost on every Grafana pod restart (e.g. an
    # ArgoCD Replace sync or a node eviction). Instead scripts/07.5-grafana-alerts.sh
    # (oss branch) writes a Grafana file-provisioning document into a ConfigMap
    # labelled grafana_alert=1; this sidecar mounts it into provisioning/alerting/
    # on startup, so the rules/contact-point/policy are re-applied every boot and
    # survive restarts. Other obs modes use external Grafana (API provisioning).
    alerts:
      enabled: true
      label: grafana_alert
      labelValue: "1"

  # Loki + Tempo datasources, plus our own "Prometheus" entry (replacing the
  # chart's auto-provisioned one, see sidecar.datasources above) with
  # exemplar/derived-field correlation wired up.
  additionalDataSources:
    - name: Prometheus
      type: prometheus
      uid: prometheus
      url: http://oss-kube-prometheus-stack-prometheus.observability.svc.cluster.local:9090
      access: proxy
      isDefault: true
      jsonData:
        # The microservices' OTel metrics (http_server_*, jvm_*) are pushed every
        # 60s by the Java agent, so without a scrape-interval hint Grafana assumes
        # 15s, $__rate_interval collapses to ~60s, and rate() over that window sees
        # a single sample - every rate-based panel renders empty. Pin it to the 60s
        # ingestion cadence so $__rate_interval widens enough for rate() to resolve.
        timeInterval: 60s
        exemplarTraceIdDestinations:
          - name: trace_id
            datasourceUid: tempo

    - name: Loki
      type: loki
      uid: loki
      url: http://oss-loki-gateway.observability.svc.cluster.local
      access: proxy
      jsonData:
        derivedFields:
          # Matches the trace_id the OTel Java agent injects into the MDC,
          # whether the line is logfmt (trace_id=abc) or ECS JSON
          # ("trace_id":"abc") - the apps emit ECS JSON (see the
          # microservices-logback ConfigMap in the gitops repo).
          - datasourceUid: tempo
            matcherRegex: '[tT]race_?[iI][dD]"?[:=]"?(\w+)'
            name: TraceID
            url: '$${__value.raw}'
            urlDisplayLabel: "View Trace"

    - name: Tempo
      type: tempo
      uid: tempo
      # Tempo's HTTP query API (search/TraceQL/ready) is on the chart's
      # server.http_listen_port, exposed by the Service as port 3200 (there is
      # no 3200->3100 remap and no 3100 port at all). Pointing the datasource at
      # 3100 silently breaks every Tempo query - the panels look empty even
      # though spans are ingested fine.
      url: http://oss-tempo.observability.svc.cluster.local:3200
      access: proxy
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: "-5m"
          spanEndTimeShift: "5m"
          filterByTraceID: true
          tags: ["service.name"]
        tracesToMetrics:
          datasourceUid: prometheus
          tags:
            - key: service.name
              value: service
        serviceMap:
          datasourceUid: prometheus
        nodeGraph:
          enabled: true

    - name: Jenkins
      type: grafana-jenkins-datasource
      uid: jenkins
      url: http://jenkins.jenkins.svc.cluster.local:8080
      access: proxy
      secureJsonData:
        # Expanded by Grafana at startup from the JENKINS_API_TOKEN env var
        # (grafana.envValueFrom above -> grafana-jenkins-ds Secret, which
        # scripts/03-observability.sh mirrors from the jenkins-credentials
        # admin-password). Empty when the Secret is absent.
        apiToken: "$JENKINS_API_TOKEN"
      jsonData:
        username: "admin"

  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: jenkins-2026
          orgId: 1
          folder: "jenkins-2026"
          type: file
          disableDeletion: false
          editable: true
          options:
            path: /var/lib/grafana/dashboards/jenkins-2026

  dashboardsConfigMaps:
    jenkins-2026: "jenkins-2026-grafana-dashboards"
