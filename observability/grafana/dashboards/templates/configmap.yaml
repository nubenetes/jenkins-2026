{{- /*
Render the canonical dashboard JSONs (this chart's *.json files) into the
ConfigMap that values-oss.yaml mounts via grafana.dashboardsConfigMaps. Drop the
off-engine CI overview(s) so a cluster only ever shows the ACTIVE CI engine's CI
dashboard (never an empty one for an engine that isn't deployed) — the GitOps
equivalent of the SKIP_CI_DASHBOARD gating in scripts/07-grafana-dashboards.sh.
One dashboard per ci.engine: jenkins | tekton | githubactions | argoworkflows.
*/ -}}
{{- $ciDash := dict "jenkins" "jenkins-overview.json" "tekton" "tekton-overview.json" "githubactions" "github-actions-ci.json" "argoworkflows" "argo-workflows-ci.json" -}}
{{- $allCi := list "jenkins-overview.json" "tekton-overview.json" "github-actions-ci.json" "argo-workflows-ci.json" -}}
{{- $keep := index $ciDash .Values.ciEngine | default "" -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-2026-grafana-dashboards
  namespace: {{ .Values.namespace | quote }}
  labels:
    app.kubernetes.io/part-of: jenkins-2026
    app.kubernetes.io/component: grafana-dashboards
data:
{{- range $path, $_ := .Files.Glob "*.json" }}
{{- $name := base $path }}
{{- /* skip a CI-engine dashboard unless it is the active engine's */ -}}
{{- if not (and (has $name $allCi) (ne $name $keep)) }}
  {{ $name }}: |-
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- end }}
