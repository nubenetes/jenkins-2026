        vizConfig:
          kind: VizConfig
          group: text
          version: 13.2.0-28226228576
          spec:
            options:
              code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
              content: >-
                ## Node Auto-Provisioning (NAP) — Elastic Spot CI nodes


                GKE **Node Auto-Provisioning** creates and destroys Spot VM node
                pools on demand — the Google-native equivalent of Karpenter. The
                `ci-spot` **Custom ComputeClass** drives it: Spot-first VM
                families (`c3 › n2 › c2 › e2`) with on-demand fallback,
                targeting a **scale-to-zero** cost profile between builds.


                | Pool | Lifecycle | Healthy state |

                |---|---|---|

                | 🟠 **Spot (NAP)** | Auto-provisioned when CI pods are pending
                · deleted ≈5 min after idle | `0` at rest · rises during builds
                |

                | 🟣 **ci-spot ComputeClass** | Subset of Spot tagged with the
                `ci-spot` class | Should equal Spot count |

                | 🟢 **Static** (`jenkins-2026-pool`) | Always-on: Jenkins ·
                ArgoCD · CNPG · observability | Must stay **≥ 1** · if `0` →
                incident |


                **Reading the elasticity chart** — a healthy build cycle looks
                like **`0 → N → 0`**


                🟠 Spot climbs when the scheduler sees pending CI-agent pods (≈2
                min provisioning), peaks during the build, then drops as NAP
                consolidates idle nodes (≈5 min after the last pod exits). 🟢
                Static must stay flat — any dip is a platform incident. The
                dashed **Total** line always equals Static + Spot.


                ---

                **No Spot data?** `kube_node_spec_taint` only emits while a Spot
                node is live. ① Trigger a build · ② Verify `kube-state-metrics`
                is running · ③ Run `gcloud container node-pools list` to confirm
                NAP pools
              mode: markdown
            fieldConfig:
              defaults: {}
              overrides: []
