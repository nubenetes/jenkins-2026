  description: >-
    GKE Node Auto-Provisioning (NAP) — the GA, Google-native Karpenter
    equivalent. Visualizes the elastic, Spot, scale-to-zero capacity that the
    ci-spot Custom ComputeClass provisions for bursty CI agents, alongside the
    static platform pool. Node membership (Spot / ci-spot) is read from the node
    TAINTS via kube-state-metrics (kube_node_info / kube_node_spec_taint), which
    scripts/03-observability.sh keeps even in the lean/free Grafana Cloud
    profile (a tiny node-inventory allow-list), so this board works in all
    observability modes.
