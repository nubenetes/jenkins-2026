          group: text
          version: 13.2.0-28156739792
          spec:
            options:
              code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
              content: >-
                ## k6 Observability — what this board shows & how to read it

                k6 runs the **same parametrized script**
                (`microservices-smoke.js`) from Jenkins, Tekton or GitHub
                Actions and exports metrics over **OpenTelemetry** (service
                `k6-microservices-smoke`). Counters are **per-run and
                ephemeral** — they only carry data for the window of an actual
                run, so **widen the time range** to cover one. See
                [`docs/302`](../docs/302-K6_LOAD_TESTING.md).


                **Filters (top variables):** **`deployment_environment`** =
                which tier was tested (stable | develop) · **`ci_runner`** =
                engine that ran it (`gha` / `jenkins` / `tekton`) ·
                **`k6_profile`** = workload shape · **`k6_preset`** = committed
                config (or `none` for ad-hoc). If a panel is empty, no run
                matches the current filters — broaden them or launch
                **`Day2.traffic.01-k6`**.


                ### Dashboard sections at a glance

                | Section | What it answers |

                |---|---|

                | **Run summary** | Single-number KPIs for the current run:
                iterations, RPS, pass rate, latency, VUs, data |

                | **Throughput, VUs & iterations** | Request rate over time, VU
                ramp shape, and iteration throughput |

                | **Latency & percentiles** | p50/p95/p99 trends and per-request
                latency breakdown |

                | **HTTP request timing breakdown** | Phase decomposition:
                blocked / connecting / TLS / waiting (TTFB) / receiving |

                | **Checks & errors** | Failed request rate, check pass/fail
                rate, per-check pass counts |

                | **Data transfer** | Bytes/s received and sent |

                | **Traces & logs** | Trace list for the test run and live pod
                logs from the target service |


                ### Workload profiles — *the shape of the load*
                (`K6SIM_PROFILE`)

                | Profile | Executor | Default shape | Use it to… |

                |---|---|---|---|

                | **smoke** *(default)* | shared-iterations | 4 VUs share 12
                iters | prove the pipes + feed Grafana. **Not** a load test |

                | **load** | ramping-vus | 0→20 (30s) · hold 2m · →0 | behaviour
                at **expected steady** traffic |

                | **stress** | ramping-vus | →50 (1m) →100 (2m) · hold 2m | push
                **past normal** to find where it degrades |

                | **soak** | constant-vus | 10 VUs for **1h** | catch **leaks /
                drift** over a long flat run |

                | **spike** | ramping-vus | 0→100 (10s) · hold 1m · →0 |
                **sudden burst** — autoscaling + recovery |

                | **breakpoint** | ramping-arrival-rate | 1→200 req/s over 5m,
                **aborts on breach** | find the **capacity knee** (stops when
                p95 budget breaks) |


                ### Committed presets — *ready-to-run configs* (`preset` input →
                `presets/*.yaml`)

                | Preset | Lvl | Profile | Shape (VUs/rate · dur) | p95 / err
                budget | Use case |

                |---|---|---|---|---|---|

                | **smoke** | 🟢 | smoke | 4 VUs × 12 iters | 3000ms / 5% |
                post-deploy "is it flowing?" (pipeline k6 stage) |

                | **load-baseline** | 🟢 | load | →20 VUs · 5m | 2000ms / 2% |
                steady expected-load SLO (nightly/pre-merge) |

                | **frontend-only** | 🟢 | load | 10 VUs · 3m (ui+proxy) |
                2500ms / 2% | focus the **edge/gateway** path |

                | **develop-smoke** | 🟢 | smoke | 4 VUs × 12 (develop ns) |
                3000ms / 5% | validate / drive the **develop** tier |

                | **stress-peak** | 🔵 | stress | 50→**100** VUs · hold 2m |
                5000ms / 10% | capacity at ~2× load; watch the tail |

                | **spike-recovery** | 🔵 | spike | →**100** VUs · 1m · sharp
                drop | 5000ms / 15% | flash-crowd **elasticity + recovery**
                (HPA) |

                | **soak-endurance** | 🔵 | soak | 10 VUs · **1h** | 3000ms / 5%
                | **leak/drift** hunting over time |

                | **rps-steady** | 🔵 | arrival-rate | **120 req/s** · 5m |
                2000ms / 2% | **throughput** sign-off (open model) |

                | **breakpoint-capacity** | 🔵 | breakpoint | →**400 req/s** ·
                8m · **aborts at knee** | 1500ms / 10% | find the **capacity
                ceiling** |


                ### How to read the results

                - 🟢 **Newcomer** — *Checks pass rate* + *HTTP req failed*: did
                it pass and stay within the error budget?

                - 🟡 **Operator** — *p95 latency* vs the preset budget, *failed
                rate* vs the err budget: which threshold breached?

                - 🔵 **Specialist** — **tail**: `p99`/`max` ≫ `p95` ⇒ bad
                outliers · **server vs network**: in *Request timing breakdown*,
                **waiting (TTFB) ≈ total** ⇒ server-bound, a large
                *blocked/connecting/tls* gap ⇒ network/connection-bound ·
                **throughput vs VUs** flattening ⇒ saturation · rising VUs with
                flat RPS ⇒ the system is the bottleneck.


                > All latency metrics are in **milliseconds**. `0`/empty = no
                run for the selected filters/time-range (not a fault).
              mode: markdown
            fieldConfig:
              defaults: {}
              overrides: []
