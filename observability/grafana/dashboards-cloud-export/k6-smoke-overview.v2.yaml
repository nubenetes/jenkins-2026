                        deployment_environment="$deployment_environment",
                        ci_runner=~"$ci_runner", k6_profile=~"$k6_profile",
                        k6_preset=~"$k6_preset",
                        condition="nonzero"}[$__range])) or vector(0)) /
                        clamp_min(sum(increase(checks_total{service_name="k6-microservices-smoke",
