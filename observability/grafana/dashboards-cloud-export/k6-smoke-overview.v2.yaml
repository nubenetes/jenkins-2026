  links: []
  liveNow: false
  preload: false
  tags:
    - jenkins-2026
    - k6
    - load-testing
    - otel
  timeSettings:
    timezone: browser
    from: now-3h
    to: now
    autoRefresh: 30s
    autoRefreshIntervals:
      - 5s
      - 10s
      - 30s
      - 1m
      - 5m
      - 15m
      - 30m
      - 1h
      - 2h
      - 1d
    hideTimepicker: false
    fiscalYearStartMonth: 0
  title: CI-CD / k6 Observability
  variables:
    - kind: DatasourceVariable
      spec:
        name: DS_PROMETHEUS
        pluginId: prometheus
        refresh: onDashboardLoad
        regex: ''
        current:
          text: ''
          value: ''
        options: []
        multi: false
        includeAll: false
        label: Prometheus / Mimir
        hide: dontHide
        skipUrlSync: false
        allowCustomValue: true
    - kind: CustomVariable
      spec:
        name: deployment_environment
        query: stable,develop
        current:
          text: stable
          value: stable
        options:
          - selected: true
            text: stable
            value: stable
          - selected: false
            text: develop
            value: develop
        multi: false
        includeAll: false
        label: Environment (tier)
        hide: dontHide
        skipUrlSync: false
        allowCustomValue: true
        valuesFormat: csv
    - kind: QueryVariable
      spec:
        name: ci_runner
        current:
          text: ''
          value: ''
        label: CI runner
        hide: dontHide
        refresh: onTimeRangeChanged
        skipUrlSync: false
        query:
          kind: DataQuery
          group: prometheus
          version: v0
          datasource:
            name: ${DS_PROMETHEUS}
          spec:
            query: >-
              label_values(iterations_total{service_name="k6-microservices-smoke"},
              ci_runner)
            refId: StandardVariableQuery
        regex: ''
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: true
        includeAll: true
        allValue: .*
        allowCustomValue: true
    - kind: QueryVariable
      spec:
        name: k6_profile
        current:
          text: ''
          value: ''
        label: Profile
        hide: dontHide
        refresh: onTimeRangeChanged
        skipUrlSync: false
        query:
          kind: DataQuery
          group: prometheus
          version: v0
          datasource:
            name: ${DS_PROMETHEUS}
          spec:
            query: >-
              label_values(iterations_total{service_name="k6-microservices-smoke"},
              k6_profile)
            refId: StandardVariableQuery
        regex: ''
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: true
        includeAll: true
        allValue: .*
        allowCustomValue: true
    - kind: QueryVariable
      spec:
        name: k6_preset
        current:
          text: ''
          value: ''
        label: Preset
        hide: dontHide
        refresh: onTimeRangeChanged
        skipUrlSync: false
        query:
          kind: DataQuery
          group: prometheus
          version: v0
          datasource:
            name: ${DS_PROMETHEUS}
          spec:
            query: >-
              label_values(iterations_total{service_name="k6-microservices-smoke"},
              k6_preset)
            refId: StandardVariableQuery
        regex: ''
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: true
        includeAll: true
        allValue: .*
        allowCustomValue: true
    - kind: QueryVariable
      spec:
        name: namespace
        current:
          text: ''
          value: ''
        label: Namespace (logs)
        hide: dontHide
        refresh: onTimeRangeChanged
        skipUrlSync: false
        query:
          kind: DataQuery
          group: prometheus
          version: v0
          datasource:
            name: ${DS_PROMETHEUS}
          spec:
            query: >-
              label_values(http_server_request_duration_seconds_count{deployment_environment="$deployment_environment"},
              k8s_namespace_name)
            refId: StandardVariableQuery
        regex: ''
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: false
        includeAll: false
        allowCustomValue: true
    - kind: CustomVariable
      spec:
        name: level
        query: error,warn,info,debug,trace,unknown
        current:
          text:
            - All
          value:
            - $__all
        options:
          - selected: true
            text: All
            value: $__all
          - selected: false
            text: error
            value: error
          - selected: false
            text: warn
            value: warn
          - selected: false
            text: info
            value: info
          - selected: false
            text: debug
            value: debug
          - selected: false
            text: trace
            value: trace
          - selected: false
            text: unknown
            value: unknown
        multi: true
        includeAll: true
        allValue: .+
        label: Log level
        hide: dontHide
        skipUrlSync: false
        allowCustomValue: true
        valuesFormat: csv
