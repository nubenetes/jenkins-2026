      kind: Panel
      spec:
        id: 146
        title: Microservices pod logs — $deployment_environment
        description: >-
          Filter by $level. trace_id in a line links to the trace (logs→traces
          via derived fields).
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: loki
                    version: v0
                    datasource:
                      name: grafanacloud-logs
                    spec:
                      expr: >-
                        {k8s_namespace_name="$namespace",
                        service_name=~"$service_name"} |
                        detected_level=~"$level" | json | line_format "{{ if
                        .message }}{{ .message }}{{ else if .msg }}{{ .msg }}{{
                        else }}{{ __line__ }}{{ end }}"
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
