  description: >-
    RED metrics (Rate, Errors, Duration) for all Java microservices, derived
    from OTel HTTP server metrics and trace span-metrics. Covers per-service and
    per-route HTTP traffic, service-to-service dependencies, JVM summary, and
    Kubernetes infra (paid tier only).
  editable: true
  elements:
    panel-101:
      kind: Panel
      spec:
        id: 101
        title: ''
        description: ''
        links: []
        data:
          kind: QueryGroup
          spec:
            queries: []
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: text
          version: 13.2.0-28156739792
          spec:
            options:
              code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
              content: >-
                ## CI-CD / Microservices Overview — read me first


                Pick the tier in **`deployment_environment`** (stable | develop)
                and narrow with **`service_name`**.


                | | **stable** | **develop** |

                |---|---|---|

                | Source | `main` branch → `microservices` ns | `develop` branch
                → `microservices-develop` ns |

                | Topology | full (HA DBs) | lean (single-instance DBs) |


                ### Signals on this board

                - **HTTP RED** (`http_server_*`) — **R**ate, **E**rrors
                (4xx/5xx), **D**uration (p50/p95/p99), per service & route.

                - **Span-metrics RED** (`traces_spanmetrics_*`) — RED derived
                from traces, per service / operation / span-kind.

                - **Service dependency graph** (`traces_service_graph_*`) —
                service→service edges (rate / failed / latency). ⚠️ This metric
                has **no `deployment_environment` label**, so its panels show
                **all tiers combined**.

                - **JVM & runtime** — heap / GC / threads / CPU summary; full
                depth in the **CI-CD JVM internals** dashboard.


                ### Dashboard sections at a glance


                | Section | What it answers |

                |---|---|

                | **Overview** | What are the headline throughput, error, and
                latency numbers right now? |

                | **HTTP traffic** | Which services and routes are busy, slow,
                or erroring? |

                | **Span metrics (OTel traces)** | What does trace-derived RED
                look like per service and span kind? |

                | **Service dependency graph** | Which service-to-service edges
                have failures or high latency? |

                | **JVM summary** | Is memory or CPU pressure emerging across
                the fleet? |

                | **Kubernetes pod & container infra** | Are pods restarting? Is
                capacity sufficient? (paid tier only) |

                | **Logs & traces** | Per-request drill-down via logs and
                distributed traces. |


                ### Why a panel may show no data

                - 🟢 **`0` = healthy** — error rates and GC pauses sit at 0 when
                nothing is wrong or the service is idle.

                - 📈 **Needs traffic** — every RED panel is rate-based; an idle
                service draws a flat 0 line. Generate load with the
                **`Day2.traffic.01-k6`** workflow.

                - 🌐 **Service graph = all tiers** — `traces_service_graph_*`
                has no `deployment_environment` label, so that section is
                **not** filtered by the tier picker.


                ### ⚠️ Free tier — the *Kubernetes pod & container infra*
                section is empty by design

                `config.yaml → observability.grafanaCloudTier` defaults to
                **`free`**, which enables **`leanMetrics`**: the collector drops
                cluster-infra metrics (kube-state-metrics + cAdvisor:
                `kube_pod_*`, `kube_deployment_*`, `container_cpu_*`,
                `container_memory_*`) to stay under the free-tier 15k
                active-series cap. Everything else — `http_server_*`,
                `traces_*`, `jvm_*` — is always shipped. To enable the infra
                section, set `grafanaCloudTier: paid` and re-run
                `Day1.cluster.01-gke`.
              mode: markdown
            fieldConfig:
              defaults: {}
              overrides: []
