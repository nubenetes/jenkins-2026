  description: >-
    Comprehensive observability for CloudNativePG-managed PostgreSQL clusters.
    Covers connection health, transaction throughput, cache efficiency, WAL
    activity, replication lag, vacuum/XID age, and WAL archiving — scoped by
    namespace and instance.
  editable: true
  elements:
    panel-101:
      kind: Panel
      spec:
        id: 101
        title: ''
        description: ''
        links: []
        data:
          kind: QueryGroup
          spec:
            queries: []
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: text
          version: 13.2.0-28156739792
          spec:
            options:
              code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
              content: >-
                ## PostgreSQL / CloudNativePG — read me first


                Pick the tier in the **`Tier (namespace)`** variable above. The
                two tiers differ **by design**, so which panels carry data
                depends on the tier:


                | | **`microservices`** (stable) | **`microservices-develop`**
                (develop) |

                |---|---|---|

                | Instances | **3** — HA (1 primary + 2 replicas) | **1** —
                single, no replicas |

                | Backups / WAL archive | **enabled** → GCS
                (`barmanObjectStore`, daily `ScheduledBackup`) | **none** (lean
                tier) |

                | Full dashboard? | **yes — every section populates** |
                Replication + Backups sections **empty by design** |


                ### Why a healthy dashboard shows many `0`s

                Most "empty"-looking panels are **health indicators where `0` is
                the *good* value** — they only go non-zero under a real problem
                (or under load). Breakdown:


                - **🟢 `0` = healthy on *any* tier** (not a fault, don't "fix"):
                *Switchover required* (No), *Fencing* (Off), *Collector errors*
                / *Last collection error* (OK), *Deadlocks & conflicts*,
                *Backends waiting*, *Rollback ratio*, *Block read/I·O time* (=
                100% cache hit), *WAL buffers full*, *MXID age*, and on stable
                *Replication lag / diff bytes* (= replicas keep up, 0 lag).

                - **➖ Empty on develop only — single-instance, no replicas:**
                *Streaming/Sync replicas*, *Replication lag*,
                *Write/flush/replay lag*, *Replication diff bytes*,
                *Retained-WAL slots*, *Replica WAL receivers up*, *Active
                slots*. (Populated on **stable**.)

                - **➖ Empty on develop only — no backups configured:** *Time
                since last backup*, *First recoverability point*, *WAL archived
                vs failed*, *Pending WAL to archive*. (Populated on **stable**.)

                - **📈 Need traffic to be non-zero** (idle DB → flat):
                *Commits/TPS*, *Tuple operations*, *Temp files & spill*, *WAL
                bytes/records*, *Checkpoints*, *Connections*. Generate load with
                the **`Day2.traffic.01-k6`** workflow (or any app traffic).


                > So on **stable** under load, essentially every data-bearing
                panel populates and the rest read `0` because the cluster is
                **healthy**. On **develop**, additionally the Replication and
                Backups sections stay empty — that is the lean tier, not a bug.
              mode: markdown
            fieldConfig:
              defaults: {}
              overrides: []
        transparent: true
