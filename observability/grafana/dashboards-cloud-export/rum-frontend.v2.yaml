  description: >-
    Angular SPA Real User Monitoring via Grafana Faro — monitor Core Web Vitals
    (LCP, INP, CLS, FCP, TTFB), session trends, and JavaScript exceptions.
    Filter by environment and app using the top variables.
  editable: true
  elements:
    panel-1:
      kind: Panel
      spec:
        id: 1
        title: About this dashboard
        description: ''
        links: []
        data:
          kind: QueryGroup
          spec:
            queries: []
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: text
          version: 13.2.0-28156739792
          spec:
            options:
              code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
              content: >-
                ## CI-CD Frontend RUM — Angular / Grafana Faro


                Real User Monitoring for the Angular SPA instrumented with
                Grafana Faro. Every event the SDK emits (page loads, Web Vitals
                measurements, exceptions, user sessions) is collected by the
                otel-collector, shipped to **Loki** as structured logs, and
                correlated with **Tempo** browser traces.


                ---


                ### How to use the variables


                | Variable | Type | How to use |

                |---|---|---|

                | **Environment** | Dropdown | Switch between `develop`,
                `staging`, `production` |

                | **App** | Dropdown | Select the Faro-instrumented app (e.g.
                `angular-gateway`) |

                | **App Version** | Text (regex) | Type `.*` for all versions
                (default). Type `0\.0\.1$` to pin a specific build, or
                `0\.0\.1\|0\.0\.2` to compare two deploys side by side. Trend
                panels split lines by version automatically. |

                | **Browser** | Dropdown | Filter all CWV and exception panels
                to a specific browser, or leave on **All** |

                | **Page URL filter** | Text (regex) | Scope page-level panels
                to a URL pattern, e.g. `/checkout` |


                ---


                ### Colour scale


                > All threshold colours follow **Google Core Web Vitals**
                standards throughout the dashboard.


                | Colour | Meaning | LCP | INP | CLS | FCP | TTFB |

                |---|---|---|---|---|---|---|

                | Green | Good | < 2.5 s | < 200 ms | < 0.10 | < 1.8 s | < 800
                ms |

                | Yellow | Needs improvement | 2.5 - 4 s | 200 - 500 ms | 0.10 -
                0.25 | 1.8 - 3 s | 800 ms - 1.8 s |

                | Red | Poor | > 4 s | > 500 ms | > 0.25 | > 3 s | > 1.8 s |


                ---


                ### Dashboard sections


                | Section | What it answers |

                |---|---|

                | **Overview** | High-level KPIs: active sessions, exception
                count, Web Vitals sample volume, total RUM events, unique
                browsers |

                | **Core Web Vitals (p75)** | Stat cards for current p75 of LCP,
                INP, CLS, FCP, TTFB. Trend lines split by `app_version` so you
                can see a CWV regression the moment a new build is deployed |

                | **Web Vitals Pass Rate** | % of real measurements that hit the
                Good threshold for LCP, INP, and FCP. A drop here after a deploy
                is the first sign of a regression |

                | **Errors & exceptions** | Exception volume over time, top
                browsers and pages by exception count, breakdown by error type,
                raw exception log stream |

                | **Sessions & audience** | Session trend, browser market share,
                OS and mobile breakdown |

                | **Page & Browser Performance** | LCP p75 split by browser
                (spot browser-specific regressions), slowest pages ranked by LCP
                p75, exception rate per 100 page loads |

                | **Live RUM logs & browser traces** | Full raw Faro event
                stream for ad-hoc debugging, plus Tempo browser trace list with
                span durations |


                ---


                *Pipeline: Faro SDK -> otel-collector -> Loki (measurements /
                exceptions / sessions) + Tempo (browser traces)*
              mode: markdown
            fieldConfig:
              defaults: {}
              overrides: []
    panel-10:
      kind: Panel
      spec:
        id: 10
        title: INP
        description: >-
          Interaction to Next Paint p75. Google thresholds: ≤200ms good / ≤500ms
          needs improvement / >500ms poor.
        links: []
        data:
          kind: QueryGroup
          spec:
            queries:
              - kind: PanelQuery
                spec:
                  query:
                    kind: DataQuery
                    group: loki
                    version: v0
                    datasource:
                      name: grafanacloud-logs
                    spec:
                      editorMode: code
                      expr: >-
                        avg by () (quantile_over_time(0.75,
                        {service_name="$app",
                        deployment_environment="$deployment_environment"} |
                        logfmt | kind=`measurement` |
                        app_version=~"$app_version" |
                        browser_name=~"$browser_name" | inp!="" | unwrap inp |
                        __error__="" [$__range]))
                      queryType: instant
                  refId: A
                  hidden: false
            transformations: []
            queryOptions: {}
