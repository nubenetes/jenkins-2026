          version: 13.2.0-28268912997
          spec:
            options:
              code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
              content: >-
                ## Argo Workflows CI Observability


                Real-time and historical view of the **Argo Workflows
                controller** (`workflow-controller`) running container-native CI
                pipelines in this cluster. Tracks every Workflow from submission
                through completion, with its pods scheduled on the **Spot
                `ci-spot`** capacity.


                **Five signals this dashboard tracks**

                - 🟢 **Health** — are workflows succeeding? → *Workflow Success
                Rate*, *Workflows by Phase*, *Outcome Distribution*

                - ⚡ **Speed** — how long do workflows take? → *Workflow
                Duration* (mean), *Mean Workflow Duration*

                - 📦 **Capacity** — is the controller keeping up? → *Running
                Workflows*, *Workflow Pods*

                - 📊 **Velocity** — how fast is CI delivering? → *CI
                Throughput*, *Total Workflows*

                - 📋 **Logs & Traces** — what happened in a specific run? →
                *Workflow Pod Logs*, *Traces*, *Log Error Rate*, *Log Volume by
                Level*


                > **Scope:** use **Status**, **Log Namespace**, and **Trace
                Namespace** filters to narrow every panel · Metrics come from
                the `workflow-controller` Prometheus endpoint
                (`argo_workflows_*`); pod-level signals from kube-state-metrics.
                Works in **all four** observability backends.
              mode: markdown
            fieldConfig:
              defaults: {}
              overrides: []
    panel-12:
      kind: Panel
      spec:
        id: 12
        title: 🟢 Basic Usage Guide
        description: ''
        links: []
        data:
          kind: QueryGroup
          spec:
            queries: []
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: text
          version: 13.2.0-28268912997
          spec:
            options:
              code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
              content: >-
                **Step 1 · Read the KPI cards (top row)**

                - **Running Workflows** — workflows executing *right now*
                (`argo_workflows_count{status="Running"}`)

                - **Workflows (range)** — total completions in the window

                - **Success Rate** — 🟢 ≥ 99 % · 🟡 ≥ 80 % · 🔴 below 80 %

                - **Workflow Pods** — `argo_workflows_pods_count` currently
                active


                **Step 2 · Read the trend charts**

                *Workflows by Phase* shows
                Running/Succeeded/Failed/Error/Pending over time. A rising
                `Failed`/`Error` stack means a step is erroring.


                **Step 3 · Narrow with the Log level filter**

                Set **Log level → error** so *Workflow Pod Logs* shows only
                failure events from the workflow pods.


                **Step 4 · Drill into a Trace**

                Click any **Trace ID** in *Workflow Traces* to open the span
                waterfall for that run.
              mode: markdown
            fieldConfig:
              defaults: {}
              overrides: []
    panel-13:
      kind: Panel
      spec:
        id: 13
        title: 🔴 Advanced Runbook
        description: ''
        links: []
        data:
          kind: QueryGroup
          spec:
            queries: []
            transformations: []
            queryOptions: {}
        vizConfig:
          kind: VizConfig
          group: text
          version: 13.2.0-28268912997
          spec:
            options:
              code:
                language: plaintext
                showLineNumbers: false
                showMiniMap: false
              content: >-
                **Duration regression**

                If *Mean Workflow Duration* climbs while throughput is flat → a
                step got slower or the cluster is resource-constrained; open
                *Traces* for the longest span and check node CPU/memory.


                **Workflows stuck Pending**

                *Workflow Pods* not rising while *Running Workflows* climbs →
                pods can't schedule (Spot node cold-start / preemption / quota).
                Cross-check the **Node Auto-Provisioning** board.


                **Queue build-up**

                *Running Workflows* climbing without matching completions →
                backlog. Check the controller: `kubectl top pod -n argo` and the
                `argo_workflows_workers_busy` / queue-depth metrics.


                **Key metric reference**


                | Metric | Type | What it tracks |

                |---|---|---|

                | `argo_workflows_count{status}` | Gauge | Workflows by phase
                (Running/Succeeded/Failed/Error/Pending) |

                | `argo_workflows_pods_count` | Gauge | Active workflow pods |

                | `argo_workflows_operation_duration_seconds` | Histogram |
                Controller operation (reconcile) duration |

                | `argo_workflows_workers_busy` | Gauge | Busy controller
                workers (queue pressure) |

                | `argo_workflows_queue_depth_count` | Gauge | Workqueue depth |
              mode: markdown
            fieldConfig:
              defaults: {}
              overrides: []
