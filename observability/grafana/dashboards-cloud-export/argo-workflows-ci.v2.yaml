  links: []
  liveNow: false
  preload: false
  tags:
    - jenkins-2026
    - argo-workflows
    - ci
  timeSettings:
    timezone: browser
    from: now-6h
    to: now
    autoRefresh: 30s
    autoRefreshIntervals:
      - 5s
      - 10s
      - 30s
      - 1m
      - 5m
      - 15m
      - 30m
      - 1h
      - 2h
      - 1d
    hideTimepicker: false
    fiscalYearStartMonth: 0
  title: CI-CD / Argo Workflows CI Observability
  variables:
    - kind: DatasourceVariable
      spec:
        name: DS_PROMETHEUS
        pluginId: prometheus
        refresh: onDashboardLoad
        regex: ''
        current:
          text: grafanacloud-jenkins2026obsy4pwj88m-prom
          value: grafanacloud-prom
        options: []
        multi: false
        includeAll: false
        label: Prometheus / Mimir
        hide: dontHide
        skipUrlSync: false
        allowCustomValue: true
    - kind: CustomVariable
      spec:
        name: level
        query: error,warn,info,debug,trace,unknown
        current:
          text:
            - All
          value:
            - $__all
        options: []
        multi: true
        includeAll: true
        allValue: .+
        label: Log level
        hide: dontHide
        skipUrlSync: false
        description: >-
          Filter log panels by severity (detected_level). All = everything incl.
          plain-text (unknown).
        allowCustomValue: true
        valuesFormat: csv
    - kind: CustomVariable
      spec:
        name: run_status
        query: Running,Succeeded,Failed,Error,Pending
        current:
          text:
            - All
          value:
            - $__all
        options: []
        multi: true
        includeAll: true
        label: Status
        hide: dontHide
        skipUrlSync: false
        allowCustomValue: true
        valuesFormat: csv
    - kind: QueryVariable
      spec:
        name: log_namespace
        current:
          text: All
          value:
            - $__all
        label: Log Namespace
        hide: hideVariable
        refresh: onDashboardLoad
        skipUrlSync: false
        query:
          kind: DataQuery
          group: loki
          version: v0
          datasource:
            name: grafanacloud-logs
          spec:
            label: k8s_namespace_name
            stream: ''
            type: 1
        regex: ''
        regexApplyTo: value
        sort: alphabeticalAsc
        options: []
        multi: true
        includeAll: true
        allowCustomValue: true
    - kind: CustomVariable
      spec:
        name: trace_namespace
        query: microservices
        current:
          text: microservices
          value: microservices
        options: []
        multi: false
        includeAll: false
        label: Trace Namespace
        hide: hideVariable
        skipUrlSync: false
        allowCustomValue: true
        valuesFormat: csv
