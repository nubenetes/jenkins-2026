# Values for grafana/loki - OSS observability mode (observability.mode: oss).
#
# Single-binary deployment with local filesystem storage - sufficient for a
# PoC. Exposes the native OTLP log-ingestion endpoint
# (http://loki-gateway.observability.svc.cluster.local/otlp) consumed by
# observability/otel-collector/values-oss.yaml and values-oss-logs.yaml.
#
# helm upgrade --install loki grafana/loki \
#   -n observability --create-namespace -f observability/grafana/values-oss-loki.yaml

deploymentMode: SingleBinary

loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  # Loki's default max_query_series (500) is far too low for the "CI-CD Frontend
  # RUM (Angular / Faro)" dashboard's Sessions / Sessions over time panels, whose
  # LogQL (count(count by (session_id)(count_over_time(... | logfmt | session_id!=""
  # [range])))) materialises one query-time series per distinct session_id (every
  # extracted logfmt field becomes part of the per-line label set feeding the
  # range-vector aggregation, not just session_id). Repeated synthetic RUM load
  # (Day2.traffic.01-k6 rum-faro preset / Day2.traffic.02-rum) easily accumulates
  # 500+ distinct sessions within a few hours, so the query errors with "maximum
  # number of series (500) reached" - which Grafana renders as "No data" - even
  # though the underlying log data is present and well-formed. See docs/902.
  limits_config:
    max_query_series: 10000

singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

gateway:
  enabled: true

# These components are part of the "simple scalable"/microservices
# deployment modes - disabled here in favor of SingleBinary.
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# The chart's memcached results/chunks caches are optional performance helpers
# not needed for a single-binary PoC. They also break under the observability
# namespace LimitRange (scripts/01-namespaces.sh): their default
# requests.cpu=500m exceeds the LimitRange default limit (200m), so the pods are
# rejected as invalid (requests > limits). Disable them.
chunksCache:
  enabled: false
resultsCache:
  enabled: false

test:
  enabled: false

# lokiCanary is a top-level key in current chart versions; the monitoring.*
# block below is retained for older charts but no longer turns it off on its
# own, so disable it here too (otherwise the canary DaemonSet deploys and adds
# load for no PoC value).
lokiCanary:
  enabled: false

monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false
