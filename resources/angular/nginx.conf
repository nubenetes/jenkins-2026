# nginx config for the PetClinic Angular UI container.
#
# - SPA fallback to index.html
# - sub_filter injects <script src="/otel-web.js"> into every HTML response
#   for browser-side OpenTelemetry tracing (see otel-web.js)
# - /otel/ proxies to the in-cluster OTel collector's OTLP/HTTP receiver so
#   the browser can export spans same-origin (no CORS configuration needed)
# - /api/ proxies to the api-gateway service so traceparent headers set by
#   otel-web.js propagate into the backend trace

server {
    # Listen on an unprivileged port so this image runs unmodified under
    # OpenShift's restricted SCC (arbitrary non-root UID) and any other
    # "run as non-root" PodSecurity policy.
    listen       8080;
    server_name  _;
    root   /usr/share/nginx/html;
    index  index.html;

    sub_filter '</head>' '<script src="/otel-web.js"></script></head>';
    sub_filter_once on;
    sub_filter_types text/html;

    location /otel/ {
        proxy_pass http://otel-collector-gateway.observability.svc.cluster.local:4318/;
        proxy_set_header Host $host;
    }

    location /api/ {
        # Unqualified name resolves via the pod's own-namespace DNS search
        # path, so this works unchanged in both petclinic and
        # petclinic-develop.
        proxy_pass http://api-gateway:8080/;
        proxy_set_header Host $host;
        proxy_set_header traceparent $http_traceparent;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
