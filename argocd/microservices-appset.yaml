apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: microservices
  namespace: argocd
spec:
  generators:
    - list:
        # The 'stable' element is always present. A second 'develop' element is
        # appended at apply time by scripts/08.5-argocd.sh (via yq) only when the
        # optional develop tier is enabled (config microservices.developTrackEnabled
        # / JENKINS2026_DEVELOP_TRACK_ENABLED). Keep this list to 'stable' only.
        elements:
          - env: stable
            namespace: microservices
            valuesFile: values-stable.yaml
            branch: '{{branchStable}}'
  template:
    metadata:
      name: 'microservices-{{env}}'
    spec:
      project: microservices
      source:
        repoURL: '{{repoUrl}}'
        targetRevision: '{{branch}}'
        path: helm/microservices
        helm:
          valueFiles:
            - '{{valuesFile}}'
          parameters:
            - name: global.platform
              value: '{{platform}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
