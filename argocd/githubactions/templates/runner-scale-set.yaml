apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arc-runner-scale-set
  namespace: argocd
  annotations:
    # Wave 1: the AutoscalingRunnerSet CRD (from wave 0) must exist first.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: ghcr.io/actions/actions-runner-controller-charts
    chart: gha-runner-scale-set
    targetRevision: '{{ .Values.versions.arc }}'
    helm:
      # Pin the release name to the scale-set name so the runner ServiceAccount/labels are
      # deterministic (and the AutoscalingRunnerSet CR is named jenkins-2026-runners).
      releaseName: '{{ .Values.runnerScaleSetName }}'
      valuesObject:
        githubConfigUrl: '{{ .Values.githubConfigUrl }}'
        githubConfigSecret: '{{ .Values.githubConfigSecret }}'
        runnerScaleSetName: '{{ .Values.runnerScaleSetName }}'
        minRunners: {{ .Values.minRunners }}
        maxRunners: {{ .Values.maxRunners }}
        # The gha-runner-scale-set chart auto-discovers the controller's ServiceAccount
        # via a Helm `lookup` (by the app.kubernetes.io/part-of=gha-rs-controller label) to
        # build the manager RoleBinding. ArgoCD renders with `helm template` — which has NO
        # live-cluster access for `lookup` — so the discovery returns nothing and the whole
        # render fails ("No gha-rs-controller deployment found ... Consider setting
        # controllerServiceAccount.name"), leaving the AutoscalingRunnerSet uncreated. Set it
        # explicitly so the render is hermetic. controller.yaml pins releaseName: arc, so the
        # controller SA is deterministically arc-gha-rs-controller in the controlPlane ns.
        controllerServiceAccount:
          namespace: '{{ .Values.namespace.controlPlane }}'
          name: arc-gha-rs-controller
        containerMode:
          type: '{{ .Values.containerMode }}'
        template:
          spec:
            imagePullSecrets:
              - name: '{{ .Values.registryCredentialsSecretName }}'
            {{- if and (eq .Values.runNodePool "ci-spot") .Values.nodeAutoProvisioningEnabled }}
            # ci-spot: NAP provisions a Spot node per ephemeral runner (scale-to-zero). GKE
            # auto-applies label+taint cloud.google.com/compute-class=ci-spot:NoSchedule.
            nodeSelector:
              cloud.google.com/compute-class: ci-spot
            tolerations:
              - { key: cloud.google.com/compute-class, operator: Equal, value: ci-spot, effect: NoSchedule }
              - { key: cloud.google.com/gke-spot, operator: Equal, value: "true", effect: NoSchedule }
            {{- else }}
            # static: the long-lived jenkins-2026-pool. (06-githubactions-pipelines.sh can
            # also patch this at runtime; that one field is in ignoreDifferences below.)
            nodeSelector:
              app: jenkins-2026
            {{- end }}
            containers:
              - name: runner
                # Pinned (was :latest) — tracks actions/runner releases; bump via versions.runnerImage.
                image: 'ghcr.io/actions/actions-runner:{{ .Values.versions.runnerImage }}'
                command: ["/home/runner/run.sh"]
                volumeMounts:
                  - name: arc-argocd
                    mountPath: /var/run/secrets/arc-argocd
                    readOnly: true
            # The ArgoCD deploy token: Secret `arc-argocd` (key `token`), created
            # imperatively by 08.5-argocd.sh in the runners namespace (before this app is
            # applied by 04-githubactions.sh). The rendered microservices-ci.yml "ArgoCD
            # sync + wait" step reads /var/run/secrets/arc-argocd/token — in-cluster only,
            # never a fork secret (docs/405 § Security). The chart appends these to the
            # dind volumes it injects for containerMode=dind. `optional` so runner pods
            # still schedule if the Secret is absent (engine switch, partial Day1) — the
            # workflow step is best-effort by design and tolerates an empty token.
            volumes:
              - name: arc-argocd
                secret:
                  secretName: arc-argocd
                  optional: true
  destination:
    server: https://kubernetes.default.svc
    namespace: '{{ .Values.namespace.runners }}'
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 8
      backoff:
        duration: 15s
        factor: 2
        maxDuration: 5m
  # The runner pod-template nodeSelector is the only field 06-githubactions-pipelines.sh may
  # patch at runtime (the static opt-out); ignore it so selfHeal doesn't fight that patch.
  ignoreDifferences:
    - group: actions.github.com
      kind: AutoscalingRunnerSet
      jqPathExpressions:
        - .spec.template.spec.nodeSelector
