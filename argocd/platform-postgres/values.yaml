# Defaults for the platform-postgres app-of-apps. repoURL/targetRevision are
# overridden by the parent Application's helm.parameters (set by
# scripts/08.5-argocd.sh from J2026_SELF_REPO_URL / J2026_SELF_REPO_BRANCH) and
# used by the pgAdmin child's git source (path: helm/pgadmin).
repoURL: https://github.com/nubenetes/jenkins-2026.git
targetRevision: main

namespace:
  cnpg: cnpg-system
  pgadmin: pgadmin

# Opt-in backend TLS (gateway.backendTls, docs/504). Overridden to "true" by the
# parent Application's helm.parameters (set by scripts/08.5-argocd.sh from
# j2026_backend_tls_active); when "true" the pgAdmin child layers
# helm/pgadmin/values-backend-tls.yaml so pgAdmin serves HTTPS on 8443. Passed as
# a STRING via helm.parameters, so the template compares eq (... | toString) "true".
backendTls: false

cnpg:
  repoURL: https://cloudnative-pg.github.io/charts
  # Chart version (NOT the operator version) — the `cloudnative-pg` chart lags:
  # chart 0.29.0 == operator v1.30.0. Bumped off 0.28.3/v1.29.1 for the
  # v1.30.0 security fix (CVE-2026-55765, operator-side SCRAM-SHA-256 password
  # encoding). See docs/602. Map chart->appVersion via the repo's index.yaml.
  version: "0.29.0"
