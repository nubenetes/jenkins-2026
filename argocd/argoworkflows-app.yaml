apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argoworkflows
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # App-of-apps: renders the local Helm chart argocd/argoworkflows/, which emits
  # the child Applications for the Argo Workflows controller+server, the Argo
  # Events controllers+EventBus, and the pipelines-as-code under argoworkflows/.
  # The {{repoUrl}}/{{branchStable}} placeholders are substituted by
  # scripts/04-argoworkflows.sh at apply time and passed down as helm parameters
  # so the children's git source tracks the active branch. Only applied when
  # ci.engine=argoworkflows. Mirrors argocd/tekton-app.yaml.
  source:
    repoURL: '{{repoUrl}}'
    targetRevision: '{{branchStable}}'
    path: argocd/argoworkflows
    helm:
      parameters:
        - name: repoURL
          value: '{{repoUrl}}'
        - name: targetRevision
          value: '{{branchStable}}'
        - name: backendTls
          value: '{{backendTlsEnabled}}'

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
