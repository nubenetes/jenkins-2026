# The Backstage chart itself - wave 1, created once the CNPG Cluster (wave 0)
# reports Healthy (ArgoCD's CNPG Lua health check in helm/argocd-values.yaml).
# Two-source pattern like argocd/headlamp-app.yaml: the OFFICIAL chart + the
# $values git ref into this repo's helm/backstage/ overlays.
# NAMED backstage-chart, NOT backstage: the parent app-of-apps already owns
# that name, and a child Application colliding with its parent kubectl-applies
# itself OVER the parent - the two specs then fight forever (permanent
# OutOfSync + a self-referential "waiting for deletion" sync deadlock on the
# resources-finalizer). Found live on the first Day1; same child-suffix
# convention as the other app-of-apps (gha-runner-scale-set-controller,
# argoworkflows-controller, oss-*).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: backstage-chart
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    - repoURL: {{ .Values.chart.repoURL | quote }}
      chart: {{ .Values.chart.name | quote }}
      targetRevision: {{ .Values.chart.version | quote }}
      helm:
        # The image coordinates ride helm.parameters (not a values file) so the
        # tag can auto-track the deploy branch per run - see the parent app.
        parameters:
          - name: backstage.image.registry
            value: {{ .Values.image.registry | quote }}
          - name: backstage.image.repository
            value: {{ .Values.image.repository | quote }}
          - name: backstage.image.tag
            value: {{ .Values.image.tag | quote }}
        valueFiles:
          - $values/helm/backstage/values.yaml
          {{- if eq (.Values.backendTls | toString) "true" }}
          # Backend TLS active (docs/504 stage 8): native Node HTTPS on 7007 +
          # HTTPS probes + the backstage-tls cert mount. Later valueFiles win.
          - $values/helm/backstage/values-backend-tls.yaml
          {{- end }}
          {{- if or (eq .Values.ciEngine "tekton") (eq .Values.ciEngine "argoworkflows") }}
          # This engine surfaces its runs through the Kubernetes plugin, so extend the
          # base customResources with its CRDs. Only these two get an overlay: jenkins
          # and githubactions query none, and the base list already suits them — which
          # is precisely what keeps their Kubernetes tab free of 404s for CRDs that are
          # not installed (see helm/backstage/values.yaml § appConfig).
          - $values/helm/backstage/values-ci-{{ .Values.ciEngine }}.yaml
          {{- end }}
          {{- if eq .Values.obsMode "oss" }}
          # oss Grafana has no Terraform-minted stack token, so the Monitoring-tab
          # proxy authenticates with the chart-owned admin Secret (durable across
          # pod rolls) instead of an ephemeral SA token. This overlay swaps the
          # proxy header to Basic ${GRAFANA_BASIC_AUTH}; 08.95 derives the value.
          # grafana-cloud/managed-* keep the baked Bearer default (docs/505).
          - $values/helm/backstage/values-obs-oss.yaml
          {{- end }}
    - repoURL: {{ .Values.repoURL | quote }}
      targetRevision: {{ .Values.targetRevision | quote }}
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
