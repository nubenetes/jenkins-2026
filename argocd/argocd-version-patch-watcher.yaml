apiVersion: v1
kind: ServiceAccount
metadata:
  name: argocd-version-patch-watcher
  namespace: argocd
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-version-patch-watcher-role
  namespace: argocd
rules:
- apiGroups: ["apps"]
  resources: ["deployments", "statefulsets"]
  verbs: ["get", "list", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-version-patch-watcher-rolebinding
  namespace: argocd
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-version-patch-watcher-role
subjects:
- kind: ServiceAccount
  name: argocd-version-patch-watcher
  namespace: argocd
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: argocd-version-patch-watcher
  namespace: argocd
spec:
  schedule: "0 0 * * *" # Daily at midnight
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          serviceAccountName: argocd-version-patch-watcher
          restartPolicy: OnFailure
          containers:
          - name: watcher
            image: alpine/k8s:1.31.3
            command: ["/bin/sh", "-c"]
            args:
            - |
              set -euo pipefail
              
              CONSTRAINT="3.5.x"
              echo "Starting ArgoCD version check for constraint: ${CONSTRAINT}"
              
              # Fetch latest stable version from GitHub API
              LATEST_VERSION=$(curl -s https://api.github.com/repos/argoproj/argo-cd/releases | jq -r --arg constraint "${CONSTRAINT}" '
                map(select(.prerelease == false and .draft == false and (.tag_name | test("^v3\\.5\\.[0-9]+$"))))
                | sort_by(.published_at) | last | .tag_name
              ')
              
              # Fallback to pre-releases if no stable release is found
              if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
                echo "No stable release found. Searching for pre-releases matching 3.5.x..."
                LATEST_VERSION=$(curl -s https://api.github.com/repos/argoproj/argo-cd/releases | jq -r '
                  map(select(.draft == false and (.tag_name | test("^v3\\.5\\.[0-9]+(-rc[0-9]+)?$"))))
                  | sort_by(.published_at) | last | .tag_name
                ')
              fi
              
              if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
                echo "Error: Could not resolve latest ArgoCD version from GitHub Releases API."
                exit 1
              fi
              
              echo "Latest v3.5.x release found: $LATEST_VERSION"
              
              # Fetch currently running version of argocd-server
              RUNNING_IMAGE=$(kubectl get deployment argocd-server -n argocd -o jsonpath='{.spec.template.spec.containers[0].image}')
              RUNNING_VERSION=$(echo "$RUNNING_IMAGE" | cut -d':' -f2)
              
              echo "Currently running version: $RUNNING_VERSION"
              
              if [ "$LATEST_VERSION" != "$RUNNING_VERSION" ]; then
                echo "[ALERT] [ArgoCD-Version-Watcher] New ArgoCD version available: $LATEST_VERSION (running: $RUNNING_VERSION)"
                
                # Upgrade Deployments in argocd namespace running the argocd image
                for deploy in $(kubectl get deployments -n argocd -o jsonpath='{.items[*].metadata.name}'); do
                  IMAGE=$(kubectl get deployment "$deploy" -n argocd -o jsonpath='{.spec.template.spec.containers[0].image}')
                  if [[ "$IMAGE" == *"/argocd:"* || "$IMAGE" == *"/argocd@"* ]]; then
                    REPO=$(echo "$IMAGE" | cut -d':' -f1)
                    echo "Upgrading deployment $deploy to $LATEST_VERSION..."
                    kubectl patch deployment "$deploy" -n argocd --type=json -p "[{\"op\":\"replace\",\"path\":\"/spec/template/spec/containers/0/image\",\"value\":\"$REPO:$LATEST_VERSION\"}]"
                  fi
                done

                # Upgrade StatefulSets in argocd namespace running the argocd image
                for sts in $(kubectl get statefulsets -n argocd -o jsonpath='{.items[*].metadata.name}'); do
                  IMAGE=$(kubectl get statefulset "$sts" -n argocd -o jsonpath='{.spec.template.spec.containers[0].image}')
                  if [[ "$IMAGE" == *"/argocd:"* || "$IMAGE" == *"/argocd@"* ]]; then
                    REPO=$(echo "$IMAGE" | cut -d':' -f1)
                    echo "Upgrading statefulset $sts to $LATEST_VERSION..."
                    kubectl patch statefulset "$sts" -n argocd --type=json -p "[{\"op\":\"replace\",\"path\":\"/spec/template/spec/containers/0/image\",\"value\":\"$REPO:$LATEST_VERSION\"}]"
                  fi
                done
                echo "Patch complete. Live upgrade to $LATEST_VERSION initiated."
              else
                echo "ArgoCD is up to date ($RUNNING_VERSION)."
              fi
            resources:
              requests:
                cpu: 10m
                memory: 32Mi
              limits:
                cpu: 100m
                memory: 64Mi
