apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets
  namespace: argocd
spec:
  project: default
  source:
    chart: external-secrets
    repoURL: https://charts.external-secrets.io
    targetRevision: 0.12.1
    helm:
      parameters:
        - name: installCRDs
          value: "true"
      # Workload Identity: annotate the controller's ServiceAccount with the GSA
      # it impersonates to read GCP Secret Manager (secrets.backend=eso). The
      # cluster runs GKE_METADATA WI so the node SA does NOT apply to pods. The
      # placeholder below is substituted by scripts/08.5-argocd.sh; the GSA + WI
      # binding live in terraform/gke (google_service_account.eso).
      # Harmless in imperative mode (ESO is installed but unused).
      values: |
        serviceAccount:
          annotations:
            iam.gke.io/gcp-service-account: {{esoGsaEmail}}
  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
