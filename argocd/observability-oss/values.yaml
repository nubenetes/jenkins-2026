# Defaults for the observability-oss app-of-apps. repoURL/targetRevision are
# overridden by the parent Application's helm.parameters (set by
# scripts/03-observability.sh from J2026_SELF_REPO_URL / J2026_SELF_REPO_BRANCH);
# they point at THIS repo for the $values source of each child chart.
repoURL: https://github.com/nubenetes/jenkins-2026.git
targetRevision: main

# Active CI engine (jenkins|tekton), passed down from scripts/03-observability.sh
# (J2026_CI_ENGINE) via the parent Application's helm parameters. Drives the
# oss-grafana-dashboards child app, which drops the off-engine CI overview
# (jenkins-overview when tekton, tekton-overview when jenkins).
ciEngine: jenkins

# Backend TLS (opt-in, docs/504): "true"/"false" from j2026_backend_tls_active,
# passed down from scripts/03-observability.sh via the parent Application's helm
# parameters. When "true", the oss-kube-prometheus-stack child app layers
# observability/grafana/values-oss-backend-tls.yaml so Grafana serves HTTPS on 3000
# from the cert-manager-minted grafana-tls Secret (08.7). Default false.
backendTls: false

namespace:
  # Loki + Tempo (and the OTel collectors, which stay script-managed).
  observability: observability
  # kube-prometheus-stack (Prometheus + Grafana). Defaults to the same ns; kept
  # separate so it can diverge if observability.grafana.ossNamespace is changed.
  grafana: observability

# Upstream chart versions, pinned for reproducibility (CLAUDE.md). These track
# the latest as of 2026-06-23 — i.e. what the previous unpinned
# `helm upgrade --install` in scripts/03-observability.sh would have pulled.
# Confirm/refresh against a fresh `Day1.cluster.01-gke` provision before merge.
charts:
  kubePrometheusStack:
    repoURL: https://prometheus-community.github.io/helm-charts
    version: "87.0.1"
  loki:
    repoURL: https://grafana.github.io/helm-charts
    version: "7.0.0"
  tempo:
    repoURL: https://grafana.github.io/helm-charts
    version: "1.24.4"
