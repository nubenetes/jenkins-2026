apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: oss-kube-prometheus-stack
  namespace: argocd
  annotations:
    # The prometheus-operator CRDs (prometheuses/alertmanagers/...) have huge
    # OpenAPI schemas. ArgoCD's default client-side diff writes the rendered
    # manifest into the kubectl.kubernetes.io/last-applied-configuration
    # annotation to compute drift, which blows the 256KB metadata.annotations
    # limit -> every sync fails on the dry-run ("metadata.annotations: Too long")
    # and downstream resources (Grafana datasources) never apply. ServerSideDiff
    # computes the diff server-side (no annotation), the companion to the
    # ServerSideApply syncOption below. Same fix as argocd/tekton (pipelines.yaml).
    argocd.argoproj.io/compare-options: ServerSideDiff=true
  # Cascade-prune the chart's resources when the parent app-of-apps is deleted
  # (observability.mode switch away from oss, or full teardown).
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  sources:
    # Upstream chart (Prometheus operator + Prometheus + Grafana).
    - repoURL: {{ .Values.charts.kubePrometheusStack.repoURL | quote }}
      chart: kube-prometheus-stack
      targetRevision: {{ .Values.charts.kubePrometheusStack.version | quote }}
      helm:
        valueFiles:
          - $values/observability/grafana/values-oss.yaml
          {{- if eq (.Values.backendTls | toString) "true" }}
          # Backend TLS active (docs/504): layer the Grafana TLS overlay so it serves
          # HTTPS on 3000 with the cert-manager-minted grafana-tls Secret (08.7). Later
          # valueFiles win, so this merges over values-oss.yaml.
          - $values/observability/grafana/values-oss-backend-tls.yaml
          {{- end }}
        {{- if eq (.Values.backendTls | toString) "true" }}
        parameters:
          - name: grafana.additionalDataSources[3].url
            value: "https://jenkins.jenkins.svc.cluster.local:8080"
          - name: grafana.additionalDataSources[3].jsonData.tlsSkipVerify
            value: "true"
        {{- end }}

    # This repo, for the values file above (referenced via $values).
    - repoURL: {{ .Values.repoURL | quote }}
      targetRevision: {{ .Values.targetRevision | quote }}
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace.grafana | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # kube-prometheus-stack ships large operator CRDs; client-side apply
      # 3-way-merges them into the last-applied-configuration annotation and can
      # blow the 256KB metadata.annotations limit. ServerSideApply avoids the
      # annotation entirely (same reason as the cnpg-operator child in
      # argocd/platform-postgres).
      - ServerSideApply=true
      # NOTE: Replace=true was added ONLY for ArgoCD v3.5.0-rc1, where ServerSideApply
      # was not honored for the oversized CRD apply ("metadata.annotations: Too long").
      # On the pinned STABLE 3.4.x, ServerSideApply works (verified: managed resources
      # carry no last-applied annotation), and Replace=true is actively HARMFUL: with
      # selfHeal it `kubectl replace`s all ~119 resources every cycle, the API server
      # re-defaults the fields replace strips → perpetual OutOfSync → endless re-sync
      # (the Grafana Deployment climbed to generation 15 and the sync hung for many
      # minutes "waiting for healthy state"). Removed — ServerSideApply alone handles the
      # large CRDs. Re-add only on a pre-release ArgoCD where SSA regresses. See docs/602.
  # The Grafana subchart (kube-prometheus-stack 87.x dropped the fixed "prom-operator"
  # admin password) renders admin-password as `randAlphaNum 40` on EVERY render when no
  # grafana.adminPassword / admin.existingSecret is pinned — so the rendered grafana
  # Secret differs from live on every sync → the Secret is perpetually OutOfSync, and the
  # Grafana Deployment follows via its checksum/secret pod-template annotation → the app
  # sits forever "Syncing"/OutOfSync (though Healthy; IAP is the real auth — the
  # admin/<pw> path is only a kubectl-port-forward fallback). Ignore just those two fields
  # so the app settles; the live admin password stays at whatever was first synced. (The
  # clean alternative — pin grafana.admin.existingSecret to a script-managed Secret —
  # would also work but needs a stable password source; ignoreDifferences is enough here.)
  ignoreDifferences:
    - group: ""
      kind: Secret
      name: oss-kube-prometheus-stack-grafana
      namespace: {{ .Values.namespace.grafana | quote }}
      jsonPointers:
        - /data/admin-password
    - group: apps
      kind: Deployment
      name: oss-kube-prometheus-stack-grafana
      namespace: {{ .Values.namespace.grafana | quote }}
      jqPathExpressions:
        - '.spec.template.metadata.annotations."checksum/secret"'
