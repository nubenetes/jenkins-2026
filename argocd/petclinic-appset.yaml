apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: petclinic
  namespace: argocd
spec:
  generators:
    - list:
        elements:
          - env: stable
            namespace: petclinic
            valuesFile: values-stable.yaml
            branch: '{{branchStable}}'
          - env: develop
            namespace: petclinic-develop
            valuesFile: values-develop.yaml
            branch: '{{branchDevelop}}'
  template:
    metadata:
      name: 'petclinic-{{env}}'
    spec:
      project: petclinic
      source:
        repoURL: '{{repoUrl}}'
        targetRevision: '{{branch}}'
        path: helm/petclinic
        helm:
          valueFiles:
            - '{{valuesFile}}'
          parameters:
            - name: global.platform
              value: '{{platform}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: '{{namespace}}'
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
