apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
spec:
  project: default
  source:
    chart: cloudnative-pg
    repoURL: https://cloudnative-pg.github.io/charts
    targetRevision: 0.28.3
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CNPG's CRDs (clusters/poolers) have huge OpenAPI schemas. Client-side
      # apply blows the 256KB metadata.annotations limit
      # (last-applied-configuration), and ServerSideApply alone still failed the
      # sync dry-run here, so Replace=true (kubectl replace, no annotation) is
      # what actually lets these CRDs reconcile.
      - ServerSideApply=true
      - Replace=true
