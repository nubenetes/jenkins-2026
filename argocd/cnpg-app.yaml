apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cnpg-operator
  namespace: argocd
  annotations:
    # CNPG's clusters/poolers CRDs have huge OpenAPI schemas. ServerSideApply
    # governs only the *apply*, not the diff/dry-run - so without this Argo still
    # computes a client-side 3-way-merge that writes the last-applied-configuration
    # annotation and blows the 256KB metadata.annotations limit ("failed to apply
    # (dry run)"). ServerSideDiff runs the dry-run via server-side apply on the API
    # server (no annotation), so the diff passes and Replace=true is unnecessary -
    # avoiding kubectl replace's recreate semantics on these CRDs entirely.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
spec:
  project: default
  source:
    chart: cloudnative-pg
    repoURL: https://cloudnative-pg.github.io/charts
    targetRevision: 0.28.3
  destination:
    server: https://kubernetes.default.svc
    namespace: cnpg-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ServerSideApply (apply via SSA, no last-applied-configuration annotation)
      # paired with the ServerSideDiff compare-option above (SSA dry-run). Both
      # are needed for these oversized CRDs: SSA alone still hit the 256KB
      # annotation limit on the *dry-run*, which is what ServerSideDiff fixes.
      - ServerSideApply=true
