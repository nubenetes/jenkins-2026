apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-events
  namespace: argocd
  annotations:
    argocd.argoproj.io/compare-options: ServerSideDiff=true
    # Wave 1: the Argo Events controllers + the EventBus CR come after the Argo
    # Workflows control plane (wave 0) and before the pipelines-as-code (wave 2),
    # whose Sensor submits Workflows.
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL | quote }}
    targetRevision: {{ .Values.targetRevision | quote }}
    path: argocd/argoworkflows/components/events
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace.events | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
