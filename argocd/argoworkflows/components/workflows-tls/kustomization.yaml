apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../workflows
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: argo-server
        namespace: argo
      spec:
        template:
          spec:
            containers:
              - name: argo-server
                # --tls-certificate-secret-name is the LOAD-BEARING flag: without it,
                # argo-server (even with --secure) GENERATES A SELF-SIGNED cert, so the
                # GKE LB's BackendTLSPolicy CA-validation rejects the handshake and the
                # browser gets "upstream connect error ... local connection failure".
                # With it, argo-server loads the cert-manager cert from the
                # argo-server-tls Secret BY NAME via the k8s API (GetServerTLSConfigFromSecret) —
                # so the volumeMount below is belt-and-suspenders, not how it reads the cert.
                args:
                  - server
                  - --auth-mode=server
                  - --tls-certificate-secret-name=argo-server-tls
                readinessProbe:
                  httpGet:
                    path: /
                    port: 2746
                    scheme: HTTPS
                volumeMounts:
                  - name: argo-server-tls
                    mountPath: /etc/argo/argo-server-tls
                    readOnly: true
            volumes:
              - name: argo-server-tls
                secret:
                  secretName: argo-server-tls
