apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-pipelines
  namespace: argocd
  annotations:
    # Tekton's CRDs (pipelineruns/taskruns) have large OpenAPI schemas - compute
    # the diff server-side so automated sync doesn't fire on phantom drift.
    argocd.argoproj.io/compare-options: ServerSideDiff=true
    # Wave 0: the CRDs + controller must exist before Triggers/Dashboard and the
    # pipelines-as-code that reference them.
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL | quote }}
    targetRevision: {{ .Values.targetRevision | quote }}
    path: argocd/tekton/components/pipelines
  destination:
    server: https://kubernetes.default.svc
    namespace: {{ .Values.namespace.controlPlane | quote }}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    # Self-heal the first-sync race on a fresh cluster: ArgoCD may sync the Tekton
    # config-* ConfigMaps before tekton-pipelines-webhook has issued its serving
    # cert, so config.webhook.pipeline.tekton.dev briefly fails (tls / not-ready).
    # Automated retry with backoff makes the sync converge on its own once the
    # webhook is up — no manual/script webhook restart needed. (Combined with the
    # removal of Replace=true below, manual Syncs also stop re-triggering it.)
    retry:
      limit: 8
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
    syncOptions:
      - CreateNamespace=true
      # The large Tekton CRDs blow the client-side last-applied annotation limit;
      # ServerSideApply (+ ServerSideDiff above) reconciles them without that
      # annotation — so Replace=true is NOT needed for the CRDs.
      #
      # Replace=true was REMOVED on purpose: `kubectl replace` re-replaces every
      # object on each sync (incl. the Tekton config-* ConfigMaps), which (a) fires
      # config.webhook.pipeline.tekton.dev on every sync and (b) blanks the webhook
      # caBundle that Tekton self-manages — so a manual Sync intermittently failed
      # with `tls: unrecognized name` / x509 even though the app was Synced/Healthy.
      # ServerSideApply only touches changed fields, so unchanged ConfigMaps don't
      # re-trigger the webhook and the caBundle is left alone (also kept out of
      # diffs via ignoreDifferences + RespectIgnoreDifferences below).
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
  ignoreDifferences:
    - group: admissionregistration.k8s.io
      kind: ValidatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
    - group: admissionregistration.k8s.io
      kind: MutatingWebhookConfiguration
      jqPathExpressions:
        - .webhooks[]?.clientConfig.caBundle
