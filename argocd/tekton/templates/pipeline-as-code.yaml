apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tekton-pipeline-as-code
  namespace: argocd
  annotations:
    # Wave 2: the Tasks/Pipeline (Pipelines CRDs, wave 0) and the EventListener
    # (Triggers CRDs, wave 1) must exist before these custom resources apply.
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: {{ .Values.repoURL | quote }}
    targetRevision: {{ .Values.targetRevision | quote }}
    # The Tekton pipelines-as-code (Tasks/Pipelines/Triggers/RBAC + pipeline
    # ServiceAccount) live at the repo-root tekton/ dir, the port of the Jenkins
    # shared library in vars/. README.md is ignored (ArgoCD reads only manifests).
    path: tekton
    directory:
      recurse: true
      # Exclude tekton/runs/ — those are ready-to-run PipelineRun manifests with
      # generateName, meant for manual `kubectl create` / Dashboard one-click (and
      # the opt-in tekton.seedRuns Day1 seeding). ArgoCD cannot manage generateName
      # objects (no stable name to diff), so syncing them leaves the app permanently
      # OutOfSync. (pac/ Repository CRs DO have stable names and stay ArgoCD-managed.)
      exclude: 'runs/*'
  destination:
    server: https://kubernetes.default.svc
    # Namespace-less resources (Tasks, Pipelines, EventListener, ServiceAccounts)
    # land here; the cross-namespace RoleBinding into the microservices namespace
    # and the cluster-scoped bindings carry their own metadata.namespace/scope.
    namespace: {{ .Values.namespace.pipeline | quote }}
  # The Workload-Identity annotation on the tekton-ci SA (Binary Authorization, docs/507)
  # is applied out-of-band by 04-tekton.sh ONLY when the flag is on, with the per-cluster
  # signer-GSA email — so it cannot live in the committed SA manifest. Without this, selfHeal
  # strips it the instant the seed adds it (observed live: `kubectl annotate` reported success
  # but the annotation was gone on the next read), and the sign step's WI token exchange
  # fails. ignoreDifferences lets the seed own that one annotation. Spec-level, NOT under
  # syncPolicy (see chains.yaml).
  ignoreDifferences:
    - group: ""
      kind: ServiceAccount
      name: tekton-ci
      namespace: {{ .Values.namespace.pipeline | quote }}
      jsonPointers:
        - /metadata/annotations/iam.gke.io~1gcp-service-account
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
