# Tekton Chains - supply-chain security: signs built images and generates SLSA
# provenance attestations for TaskRuns/PipelineRuns. VENDORED (release.yaml) -
# GitHub-only release. Source: https://github.com/tektoncd/chains/releases/download/v0.27.1/release.yaml
#
# The patch enables image signing (x509/cosign), in-toto SLSA provenance, OCI
# storage (signatures pushed alongside the image in ghcr.io) and the public Rekor
# transparency log. The signing key is NOT vendored - it is generated once into
# the `signing-secrets` Secret (see docs/404-TEKTON.md):
#   cosign generate-key-pair k8s://tekton-chains/signing-secrets
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - release.yaml
patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: chains-config
        namespace: tekton-chains
      data:
        artifacts.taskrun.format: in-toto
        artifacts.taskrun.storage: tekton
        artifacts.taskrun.signer: x509
        artifacts.pipelinerun.enabled: "true"
        artifacts.pipelinerun.format: in-toto
        artifacts.pipelinerun.storage: tekton
        artifacts.pipelinerun.signer: x509
        artifacts.oci.storage: oci
        artifacts.oci.format: simplesigning
        artifacts.oci.signer: x509
        transparency.enabled: "true"
        transparency.url: https://rekor.sigstore.dev
