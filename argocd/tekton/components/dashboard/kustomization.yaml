# Tekton Dashboard in read-write (full) mode, pulled as a pinned upstream
# release kustomize remote resource. Exposed on the internet behind Google IAP
# by scripts/09-gateway.sh (HTTPRoute tekton + GCPBackendPolicy tekton-iap).
#
# Pinned version - keep in sync with config/config.yaml ci.tekton.versions.dashboard.
# release-full.yaml = read-write; swap to release.yaml for read-only.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://storage.googleapis.com/tekton-releases/dashboard/previous/v0.52.0/release-full.yaml
