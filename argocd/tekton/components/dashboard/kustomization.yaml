# Tekton Dashboard in read-write (full) mode, VENDORED (release-full.yaml in
# this dir). Tekton publishes recent releases only as GitHub release assets (not
# on the GCS bucket), and a github.com URL is misclassified by kustomize as a
# git repo - so vendoring the file is the reliable, auditable approach. Exposed
# on the internet behind Google IAP by scripts/09-gateway.sh.
#
# Source: https://github.com/tektoncd/dashboard/releases/download/v0.69.0/release-full.yaml
# (v0.69.0 = latest; release-full = read-write). To bump: re-download from the
# matching tag and update config/config.yaml ci.tekton.versions.dashboard.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - release-full.yaml
