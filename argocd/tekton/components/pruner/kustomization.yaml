# Tekton Pruner - garbage-collects completed PipelineRuns/TaskRuns, the Tekton
# equivalent of the Jenkins pipelines' buildDiscarder.
# VENDORED (release.yaml) - GitHub-only release, vendored like the other
# components. Source: https://github.com/tektoncd/pruner/releases/download/v0.4.0/release.yaml
#
# The patch lowers the default global historyLimit 100 -> 5. Each microservices
# PipelineRun fans out into ~10 TaskRun pods, each pulling large build-tool
# images (kaniko, codeql, trivy, semgrep, k6). Keeping 20 runs (~200 pods + their
# referenced images) filled the 50 GiB node image filesystem to ~88%, so the
# kubelet's image GC could not reclaim space (FreeDiskSpaceFailed events). 5 runs
# is enough recent history for debugging while keeping disk usage bounded.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - release.yaml
patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: tekton-pruner-default-spec
        namespace: tekton-pipelines
      data:
        global-config: |-
          enforcedConfigLevel: global
          historyLimit: 5
