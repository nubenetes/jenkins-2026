apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../dashboard
patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: tekton-dashboard
        namespace: tekton-pipelines
      spec:
        template:
          spec:
            containers:
              - name: tekton-dashboard
                args:
                  - --default-namespace=
                  - --external-logs=
                  - --log-format=json
                  - --log-level=info
                  - --logout-url=
                  - --namespaces=
                  - --pipelines-namespace=tekton-pipelines
                  - --port=9097
                  - --read-only=false
                  - --stream-logs=true
                  - --triggers-namespace=tekton-pipelines
                  - --tls-cert=/etc/tekton-dashboard-tls/tls.crt
                  - --tls-key=/etc/tekton-dashboard-tls/tls.key
                readinessProbe:
                  httpGet:
                    path: /readiness
                    port: 9097
                    scheme: HTTPS
                livenessProbe:
                  httpGet:
                    path: /health
                    port: 9097
                    scheme: HTTPS
                volumeMounts:
                  - name: tekton-dashboard-tls
                    mountPath: /etc/tekton-dashboard-tls
                    readOnly: true
            volumes:
              - name: tekton-dashboard-tls
                secret:
                  secretName: tekton-dashboard-tls
