# Tekton Pipelines, installed via ArgoCD.
#
# The release manifest is VENDORED (release.yaml in this dir). Tekton publishes
# recent releases only as GitHub release assets (not on the GCS bucket), and a
# github.com URL is misclassified by kustomize as a git repo, so a remote
# resource isn't viable. Vendoring is reliable (local file) and auditable.
#
# Source: https://github.com/tektoncd/pipeline/releases/download/v1.13.1/release.yaml
# (v1.13.1 = latest). To bump: re-download release.yaml from the matching tag and
# update config/config.yaml ci.tekton.versions.pipelines.
#
# (Tekton controller OpenTelemetry tracing is a follow-up: release.yaml ships a
# config-tracing ConfigMap that could be patched here to point at the collector.)
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - release.yaml

# Set the cluster-wide default ServiceAccount for TaskRuns/PipelineRuns to
# tekton-ci (the SA that carries the clone/build/push/deploy RBAC). Upstream
# config-defaults only documents default-service-account inside its _example
# block (so the effective value is "default"); we ADD it to data. Effect: a
# PipelineRun created WITHOUT a serviceAccountName — e.g. from the Tekton
# Dashboard's "Create PipelineRun" form, which does not default the SA — now runs
# as tekton-ci instead of the powerless default SA. (Workspaces still must be
# bound at run time; Tekton has no default workspace binding — see docs/404.)
#
# `default-pod-template` (the run-pod nodeSelector) is NOT set here — it's driven by the
# tekton.runNodePool flag (static|ci-spot) and patched into config-defaults at run time by
# scripts/06-tekton-pipelines.sh, so ArgoCD ignores that one field (see ignoreDifferences in
# argocd/tekton/templates/pipelines.yaml + RespectIgnoreDifferences). Static by default —
# the affinity assistant pins a whole RWO-workspace PipelineRun to one node, so a small/Spot
# node would hang or lose the run; see docs/404.
patches:
  - patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: config-defaults
        namespace: tekton-pipelines
      data:
        default-service-account: tekton-ci
