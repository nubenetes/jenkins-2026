# Tekton Pipelines, installed via ArgoCD by pulling the pinned upstream release
# as a kustomize remote resource (Tekton has no official Helm chart). The
# config-tracing patch points Tekton's tracing at the in-cluster OTel collector,
# kept inside the kustomization so ArgoCD owns it (no out-of-band drift).
#
# Pinned version - keep in sync with config/config.yaml ci.tekton.versions.pipelines.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - https://storage.googleapis.com/tekton-releases/pipeline/previous/v1.13.1/release.yaml
patches:
  # OTel parity: emit PipelineRun/TaskRun traces to the in-cluster collector.
  # The endpoint uses the default observability namespace ("observability");
  # change it here if observability.namespace differs.
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: config-tracing
        namespace: tekton-pipelines
      data:
        enabled: "true"
        provider: "otel"
        endpoint: "http://otel-collector-gateway.observability.svc.cluster.local:4317"
