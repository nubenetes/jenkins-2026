apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-oss
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  # App-of-apps: this Application renders the local Helm chart at
  # argocd/observability-oss/, which emits the child Applications for
  # kube-prometheus-stack / Loki / Tempo. The
  # {{repoUrl}}/{{branchStable}}/{{ciEngine}}/{{backendTls}} placeholders are
  # substituted by scripts/03-observability.sh (oss mode) at apply time, and passed
  # down as helm parameters so the children's $values source points back at this
  # repo/branch and (when backend TLS is active) the kube-prometheus-stack child
  # layers the Grafana TLS values overlay.
  source:
    repoURL: '{{repoUrl}}'
    targetRevision: '{{branchStable}}'
    path: argocd/observability-oss
    helm:
      parameters:
        - name: repoURL
          value: '{{repoUrl}}'
        - name: targetRevision
          value: '{{branchStable}}'
        - name: ciEngine
          value: '{{ciEngine}}'
        # "true"/"false" from j2026_backend_tls_active (docs/504). Re-rendered every
        # run, so flipping the flag off re-emits the kube-prometheus-stack child
        # without the overlay and ArgoCD self-heals Grafana back to plain HTTP.
        - name: backendTls
          value: '{{backendTls}}'
        # "true"/"false" from J2026_OBS_LLM_ENABLED (observability.llm.enabled).
        # When true the kube-prometheus-stack child layers the grafana-llm-app
        # overlay (values-oss-llm.yaml); flipping it off self-heals the plugin away.
        - name: llmEnabled
          value: '{{llmEnabled}}'
        # "true"/"false" from J2026_OBS_GRAFT_ENABLED (observability.graft.enabled).
        # When true the kube-prometheus-stack child layers the Graft overlay
        # (values-oss-graft.yaml: fail-open plugin-installer init container +
        # allow_loading_unsigned_plugins); flipping it off self-heals it away.
        - name: graftEnabled
          value: '{{graftEnabled}}'
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
