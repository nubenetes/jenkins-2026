{{- /*
Tekton-engine RBAC (was scripts/01-namespaces.sh). The STABLE tekton-ci 'edit'
RoleBinding ships in tekton/rbac (GitOps, ns microservices); only the DEVELOP-tier
binding was imperative, because that namespace is provisioned out-of-band. gitops-deploy
does `kubectl -n <ns> rollout restart` (the OTel self-heal) against the target tier,
so the tekton-ci SA needs 'edit' there. Only when ci.engine=tekton AND the develop
tier is enabled.
*/ -}}
{{- if and (eq .Values.ciEngine "tekton") (eq (.Values.developTrackEnabled | toString) "true") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-ci-edit
  namespace: {{ .Values.namespaces.microservicesDevelop }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: tekton-ci
    namespace: {{ .Values.namespaces.tektonPipeline }}
{{- end }}
