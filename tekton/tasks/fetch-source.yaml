# Stage 1+2 of the Jenkins pipeline (vars/MicroservicesPipeline.groovy):
# "Checkout Microservices source" (+ gateway sed-patch) and "Checkout Infra
# configs". Clones the app source and this infra repo into the shared workspace
# and applies the gateway-specific PostgreSQL/cache patches when building gateway.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: fetch-source
spec:
  params:
    - name: git-repo-url
    - name: git-branch
    - name: service-name
    - name: self-repo-url
    - name: self-repo-branch
  workspaces:
    - name: source
  steps:
    - name: clone-microservices
      image: docker.io/alpine/git:2.54.0
      env:
        - name: HOME
          value: /tmp
      script: |
        #!/bin/sh
        set -eux
        git config --global --add safe.directory '*' || true
        cd "$(workspaces.source.path)"
        rm -rf microservices-src
        # Skip Git LFS smudge (avoid pulling large media); matches the Jenkins
        # checkout. -c filter.lfs.* bypasses the LFS filter without needing git-lfs
        # installed in the alpine/git image.
        GIT_LFS_SKIP_SMUDGE=1 git \
          -c filter.lfs.smudge= -c filter.lfs.process= -c filter.lfs.required=false \
          clone --depth 1 --branch "$(params.git-branch)" \
          "$(params.git-repo-url)" microservices-src
    - name: clone-infra
      image: docker.io/alpine/git:2.54.0
      env:
        - name: HOME
          value: /tmp
      script: |
        #!/bin/sh
        set -eux
        git config --global --add safe.directory '*' || true
        cd "$(workspaces.source.path)"
        rm -rf jenkins-2026-infra
        GIT_LFS_SKIP_SMUDGE=1 git \
          -c filter.lfs.smudge= -c filter.lfs.process= -c filter.lfs.required=false \
          clone --depth 1 --branch "$(params.self-repo-branch)" \
          "$(params.self-repo-url)" jenkins-2026-infra
    - name: gateway-patch
      image: docker.io/alpine/git:2.54.0
      env:
        - name: HOME
          value: /tmp
      script: |
        #!/bin/sh
        set -eu
        if [ "$(params.service-name)" != "gateway" ]; then
          echo "Not gateway - skipping JHipster gateway patches."
          exit 0
        fi
        # Single source of truth for the MySQL->PostgreSQL + NoOp-cache patch,
        # shared with the other CI engines (idempotent, no-op for non-gateway).
        # Run with `sh`, NOT `bash`: the alpine/git image is busybox-only (no bash);
        # patch-app-source.sh is POSIX-sh-compatible (same fix as the argoworkflows
        # engine's fetch-source, #525). Keep the script bash-ism-free so this holds.
        sh "$(workspaces.source.path)/jenkins-2026-infra/resources/patch-app-source.sh" "$(params.service-name)" "$(workspaces.source.path)/microservices-src"
