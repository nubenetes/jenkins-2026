# Stage "Trivy IaC Scan" of the Jenkins pipeline: clones the gitops-config repo
# and runs Trivy config scans over the app source and the microservices Helm
# chart (exit-code 0 = report only, never fails the build).
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: trivy-iac
spec:
  params:
    - name: env-name
    - name: gitops-repo-url
      default: https://github.com/nubenetes/jenkins-2026-gitops-config.git
  workspaces:
    - name: source
  steps:
    - name: clone-gitops
      image: alpine/git:2.54.0
      env:
        - name: HOME
          value: /tmp
        - name: GIT_USER
          valueFrom:
            secretKeyRef:
              name: tekton-git
              key: username
              optional: true
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef:
              name: tekton-git
              key: password
              optional: true
      script: |
        #!/bin/sh
        set -eu
        git config --global --add safe.directory '*' || true
        cd "$(workspaces.source.path)"
        rm -rf gitops-config-src
        BRANCH=main
        [ "$(params.env-name)" = "develop" ] && BRANCH=develop
        REPO_CLEAN=$(echo "$(params.gitops-repo-url)" | sed 's|https://||')
        GIT_LFS_SKIP_SMUDGE=1 git \
          -c filter.lfs.smudge= -c filter.lfs.process= -c filter.lfs.required=false \
          clone --depth 1 --branch "${BRANCH}" \
          "https://${GIT_USER:-git}:${GIT_TOKEN:-}@${REPO_CLEAN}" gitops-config-src
    - name: trivy-config
      image: aquasec/trivy:0.52.2
      env:
        - name: TRIVY_CACHE_DIR
          value: /tmp/trivy-cache
      script: |
        #!/bin/sh
        set -eu
        CFG="$(workspaces.source.path)/jenkins-2026-infra/trivy.yaml"
        trivy config --config "${CFG}" --exit-code 0 "$(workspaces.source.path)/microservices-src"
        trivy config --config "${CFG}" --exit-code 0 "$(workspaces.source.path)/gitops-config-src/helm/microservices"
