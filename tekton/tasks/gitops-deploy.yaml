# Stage "Deploy to Kubernetes" of the Jenkins pipeline (vars/microservicesDeploy.groovy):
# GitOps deploy - bump the image tag in the gitops-config repo, push, trigger an
# ArgoCD sync/wait, then self-heal the OTel auto-instrumentation injection race.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: gitops-deploy
spec:
  params:
    - name: service-name
    - name: env-name
    - name: target-namespace
    # The FULL built image (ghcr.io/.../<svc>:<tag>) — the bump-and-push step extracts
    # the tag portion (everything after the last ':') so the bumped gitops tag is
    # byte-identical to what build-push actually pushed. Single source of truth: no
    # separately-computed image tag that can drift from the built one.
    - name: image
    - name: gitops-repo-url
      default: https://github.com/nubenetes/jenkins-2026-gitops-config.git
    - name: argocd-server
      default: argocd-server.argocd.svc.cluster.local
    - name: argocd-version
      default: v2.11.0
  workspaces:
    - name: source
  steps:
    - name: bump-and-push
      image: alpine/k8s:1.31.3
      env:
        - name: HOME
          value: /tmp
        # Bind the full built image ref to a shell var so ${IMAGE##*:} can extract the
        # tag safely (the ref contains ':'); avoids inlining it into the shell text.
        - name: IMAGE
          value: $(params.image)
        - name: GIT_USER
          valueFrom:
            secretKeyRef: { name: tekton-git, key: username, optional: true }
        - name: GIT_TOKEN
          valueFrom:
            secretKeyRef: { name: tekton-git, key: password, optional: true }
      script: |
        #!/bin/bash
        set -eux
        case "$(params.env-name)" in
          stable|develop) ;;
          *) echo "unsupported env-name '$(params.env-name)'"; exit 1 ;;
        esac
        BRANCH=main; [ "$(params.env-name)" = "develop" ] && BRANCH=develop
        VALUES="helm/microservices/values-$(params.env-name).yaml"
        # Extract the tag from the FULL image the build actually pushed (strip the
        # registry/repo up to and including the last ':'). This is the single source of
        # truth for the deployed tag — exactly what build-push/trivy used — so the gitops
        # bump can never reference a tag that was not built. (Guards the invariant that
        # previously broke: a PaC push whose `image` base was the commit SHA must bump
        # ':<sha>-<run>', the tag that exists, not ':<branch>-<run>'.)
        IMAGE_TAG="${IMAGE##*:}"
        cd "$(workspaces.source.path)"
        rm -rf gitops-deploy-src
        git config --global --add safe.directory '*' || true
        git config --global user.email "tekton@nubenetes.com"
        git config --global user.name "Tekton CI"
        REPO_CLEAN=$(echo "$(params.gitops-repo-url)" | sed 's|https://||')
        GIT_LFS_SKIP_SMUDGE=1 git \
          -c filter.lfs.smudge= -c filter.lfs.process= -c filter.lfs.required=false \
          clone --depth 1 --branch "${BRANCH}" \
          "https://${GIT_USER:-git}:${GIT_TOKEN:-}@${REPO_CLEAN}" gitops-deploy-src
        cd gitops-deploy-src
        yq eval -i ".services.$(params.service-name).image.tag = \"${IMAGE_TAG}\"" "${VALUES}"
        git add "${VALUES}"
        git commit -m "chore(ops): update $(params.service-name) image tag to ${IMAGE_TAG} [$(params.env-name)]" || echo "No changes to commit"
        git push origin "${BRANCH}"
    - name: argocd-sync
      image: alpine/k8s:1.31.3
      env:
        - name: HOME
          value: /tmp
        - name: ARGOCD_SERVER
          value: $(params.argocd-server)
        - name: ARGOCD_AUTH_TOKEN
          valueFrom:
            secretKeyRef: { name: tekton-argocd, key: token, optional: true }
      script: |
        #!/bin/bash
        set -eux
        ARGOCD=/tmp/argocd-cli
        if [ ! -x "${ARGOCD}" ]; then
          curl -sSL -o "${ARGOCD}" "https://github.com/argoproj/argo-cd/releases/download/$(params.argocd-version)/argocd-linux-amd64"
          chmod +x "${ARGOCD}"
        fi
        server="${ARGOCD_SERVER}"; flags="--grpc-web --insecure"
        # Auto-detect if Backend TLS is active by checking the gateway-tls secret in target namespace
        if kubectl get secret gateway-tls -n "$(params.target-namespace)" >/dev/null 2>&1; then
          server="${server}:443"
        else
          server="${server}:80"
          flags="${flags} --plaintext"
        fi

        APP="microservices-$(params.env-name)"
        # The app has automated selfHeal: pushing the new image tag (the GitOps Update
        # step before this) makes ArgoCD auto-sync it, which can be MID-FLIGHT when this
        # explicit sync runs → "FailedPrecondition: another operation is already in
        # progress". That's benign (the auto-sync deploys the same commit), so retry the
        # explicit sync a few times and, if a concurrent op keeps winning, fall through —
        # the `app wait --sync` below confirms the app reaches the pushed revision either
        # way. Don't let -e abort on the retried sync.
        synced=0
        for attempt in 1 2 3 4 5 6; do
          if "${ARGOCD}" app sync "${APP}" --server "${server}" --auth-token "${ARGOCD_AUTH_TOKEN:-}" ${flags}; then
            synced=1; break
          fi
          echo "app sync attempt ${attempt} failed (likely a concurrent auto-sync); retrying in 10s..."
          sleep 10
        done
        [ "${synced}" = 1 ] || echo "Proceeding without an explicit sync — verifying convergence via 'app wait' (auto-sync handles the deploy)."
        "${ARGOCD}" app wait "${APP}" --sync --health --timeout 300 --server "${server}" --auth-token "${ARGOCD_AUTH_TOKEN:-}" ${flags}
    - name: otel-injection-selfheal
      image: alpine/k8s:1.31.3
      script: |
        #!/bin/bash
        set -eu
        NS="$(params.target-namespace)"; DEPLOY="$(params.service-name)"
        kubectl -n "${NS}" rollout status deploy/"${DEPLOY}" --timeout=120s || true
        POD=$(kubectl -n "${NS}" get pods -l "app.kubernetes.io/name=${DEPLOY}" \
              --field-selector=status.phase=Running -o name 2>/dev/null | head -1)
        if [ -z "${POD}" ]; then echo "No running pod for ${DEPLOY} - skipping OTel check"; exit 0; fi
        JTO=$(kubectl -n "${NS}" get "${POD}" -o jsonpath='{range .spec.containers[*]}{.env[?(@.name=="JAVA_TOOL_OPTIONS")].value}{end}' 2>/dev/null || true)
        if echo "${JTO}" | grep -q -- '-javaagent'; then
          echo "OTel agent already injected in ${DEPLOY}"
        else
          echo "OTel agent NOT injected (race) - rolling restart ${DEPLOY}"
          kubectl -n "${NS}" rollout restart deploy/"${DEPLOY}"
          kubectl -n "${NS}" rollout status deploy/"${DEPLOY}" --timeout=120s || true
        fi
