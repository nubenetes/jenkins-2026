# Stage "Smoke Test" of the Jenkins pipeline (vars/microservicesSmokeTest.groovy):
# curls the in-cluster Service health endpoint, retrying while endpoints settle.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: smoke-test
spec:
  params:
    - name: service-name
    - name: target-namespace
    - name: port
    - name: health-path
  steps:
    - name: curl-health
      image: docker.io/alpine/k8s:1.31.3
      script: |
        #!/bin/sh
        set -eux
        protocol="http"
        curl_opts=""
        if [ "$(params.service-name)" = "gateway" ] && kubectl -n "$(params.target-namespace)" get secret gateway-tls >/dev/null 2>&1; then
          protocol="https"
          curl_opts="-k"
        fi
        curl -sf --connect-timeout 5 --max-time 60 \
          --retry 5 --retry-delay 3 --retry-all-errors $curl_opts \
          "$protocol://$(params.service-name).$(params.target-namespace).svc.cluster.local:$(params.port)$(params.health-path)"
