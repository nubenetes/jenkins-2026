# Stage "Build & Push Image" of the Jenkins pipeline (vars/microservicesImage.groovy),
# made daemonless for Tekton (no privileged docker-in-docker):
# P3 immutable tags (parity with the Jenkins <branch>-<build#> tag): the pipeline
# (microservices-pipeline.yaml) appends $(context.pipelineRun.name) to the build/trivy
# `image` tag and passes that SAME full `image` to gitops-deploy, which extracts its tag
# for the bump — so build-push, scan and the gitops bump all reference the identical
# unique per-run image (<tag-base>-<pipelineRunName>). NOT yet validated — Tekton is
# inactive (ci.engine=jenkins); verify on first deploy.
#   - java   : Jib (mvnw jib:build) pushes straight to the registry
#   - angular: Kaniko builds resources/angular/Dockerfile and pushes
# Registry auth comes from the 'dockerconfig' workspace (the tekton-registry
# dockerconfigjson Secret) exposed via DOCKER_CONFIG, which both Jib and Kaniko read.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: build-push-image
spec:
  params:
    - name: service-type
    - name: module-path
      default: ""
    - name: image
  workspaces:
    - name: source
    - name: dockerconfig
  steps:
    - name: build-jib
      image: maven:3.9.9-eclipse-temurin-21
      env:
        - name: DOCKER_CONFIG
          value: $(workspaces.dockerconfig.path)
      computeResources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "4"
          memory: 4Gi
      # Node-local Maven cache (hostPath, like the Jenkins agents) so Jib reuses the
      # downloaded deps across PipelineRuns instead of re-fetching every build.
      volumeMounts:
        - { name: maven-cache, mountPath: /root/.m2 }
      script: |
        #!/bin/bash
        set -eux
        if [ "$(params.service-type)" != "java" ]; then
          echo "service-type != java - skipping Jib (handled by Kaniko)."; exit 0
        fi
        cd "$(workspaces.source.path)/microservices-src"
        MOD="$(params.module-path)"
        if [ -n "${MOD}" ] && [ -f "${MOD}/mvnw" ]; then cd "${MOD}"; fi
        unset MAVEN_CONFIG
        # G1 (not SerialGC — poor on the multi-core build pod) + fail-fast on OOM,
        # mirroring the Jenkins build/image steps and the runtime tuning (docs/303).
        export MAVEN_OPTS="-Xmx1024m -XX:+UseG1GC -XX:+ExitOnOutOfMemoryError"
        if grep -q "jib-maven-plugin" pom.xml; then
          ./mvnw -B -Pprod -DskipTests -Dmaven.compiler.maxmem=512m jib:build \
            -Djib.to.image="$(params.image)" -Djib.serialize=true
          # Hand Jib's OWN digest of what it just pushed to the sign step (same task,
          # shared workspace). Binary Authorization attests a DIGEST, and a :tag cannot
          # be resolved to one afterwards on GHCR (gcloud is GCR/AR-only, crane absent
          # from cloud-sdk:slim) — the gap fixed in the Jenkins path (docs/507). Jib
          # always writes target/jib-image.digest; copy it to a fixed workspace path
          # because the build cd's into the module dir.
          cp target/jib-image.digest "$(workspaces.source.path)/jib-image.digest"
        else
          echo "ERROR: $(params.service-type) service has no jib-maven-plugin; the Tekton path requires Jib for daemonless java image builds."
          exit 1
        fi
    - name: build-kaniko
      image: gcr.io/kaniko-project/executor:v1.23.2-debug
      env:
        - name: DOCKER_CONFIG
          value: $(workspaces.dockerconfig.path)
      script: |
        #!/busybox/sh
        set -eu
        if [ "$(params.service-type)" != "angular" ]; then
          echo "service-type != angular - skipping Kaniko (handled by Jib)."; exit 0
        fi
        # PLACEHOLDER: no 'angular' service is registered yet (both services in
        # jenkins/pipelines/seed/services.yaml are type=java -> Jib), so this branch
        # never runs. Before adding the first angular service, set --dockerfile to a
        # Dockerfile that the app (or infra) repo actually ships and scope --context
        # to that app's source dir (not the shared workspace root, which holds
        # several clones). Kept here for engine parity with the Jenkins path.
        /kaniko/executor \
          --context="$(workspaces.source.path)" \
          --dockerfile="$(workspaces.source.path)/jenkins-2026-infra/resources/angular/Dockerfile" \
          --destination="$(params.image)"
    # Binary Authorization (opt-in, docs/507 § Pipeline wiring): sign + attest the
    # pushed image DIGEST via the single-source resources/sign-and-attest-image.sh
    # (shared by all four engines, like patch-app-source.sh). Runs in google/cloud-sdk
    # so gcloud is present; auths via the pod's Workload Identity (the pipeline SA must
    # be bound to the signer GSA that terraform/gke grants). NO-OP unless
    # BINAUTHZ_ENABLED=true (the script checks the flag first) — safe by default; the
    # seed (06-tekton-pipelines.sh) flips the env when the flag is on. See docs/507.
    - name: sign-attest
      image: google/cloud-sdk:slim
      env:
        - name: BINAUTHZ_ENABLED
          value: "false"
      script: |
        #!/usr/bin/env bash
        set -eu
        # Self-gate BEFORE touching the script. sign-and-attest-image.sh no-ops internally
        # when BINAUTHZ_ENABLED != true — but the file must EXIST to run it, and the infra
        # repo cloned for the STABLE tier is `main`, which does not carry the script until
        # the binauthz work merges (it lives on develop). Without this gate a binauthz-off
        # stable build 127s here ("No such file or directory") on every run. Checking the
        # flag first makes the step a clean no-op when signing is off, whatever branch's
        # infra got cloned.
        if [ "${BINAUTHZ_ENABLED:-false}" != "true" ]; then
          echo "Binary Authorization off — skipping sign + attest."; exit 0
        fi
        # Pass the image BY DIGEST (image@sha256:… — the script attests it directly instead
        # of failing to resolve the :tag on GHCR). Digest file present for every Jib (java)
        # build; the kaniko/angular placeholder path leaves none and passes the tag.
        IMG="$(params.image)"
        DF="$(workspaces.source.path)/jib-image.digest"
        if [ -f "${DF}" ]; then IMG="${IMG%:*}@$(cat "${DF}")"; fi
        "$(workspaces.source.path)/jenkins-2026-infra/resources/sign-and-attest-image.sh" "${IMG}"
  volumes:
    - name: maven-cache
      hostPath: { path: /tmp/tekton-maven-cache, type: DirectoryOrCreate }
