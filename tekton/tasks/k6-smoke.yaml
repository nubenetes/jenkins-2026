# Stage "Integration k6 Smoke Test" of the Jenkins pipeline
# (vars/MicroservicesK6SmokePipeline.groovy / microservicesK6Smoke.groovy):
# runs the k6 script from the infra repo against the deployed microservices.
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: k6-smoke
spec:
  params:
    - name: target-namespace
    - name: env-name
      default: stable
    - name: self-repo-url
      default: https://github.com/nubenetes/jenkins-2026.git
    - name: self-repo-branch
      default: main
    - name: vus
      default: "5"
    - name: iterations
      default: "50"
    - name: otlp-endpoint
      default: ""
  workspaces:
    - name: source
  steps:
    - name: checkout-infra
      image: alpine/git:2.54.0
      env:
        - name: HOME
          value: /tmp
      script: |
        #!/bin/sh
        set -eu
        git config --global --add safe.directory '*' || true
        cd "$(workspaces.source.path)"
        rm -rf k6-infra
        GIT_LFS_SKIP_SMUDGE=1 git \
          -c filter.lfs.smudge= -c filter.lfs.process= -c filter.lfs.required=false \
          clone --depth 1 --branch "$(params.self-repo-branch)" \
          "$(params.self-repo-url)" k6-infra
    - name: run-k6
      image: grafana/k6:2.0.0
      env:
        - name: K6_VUS
          value: $(params.vus)
        - name: K6_ITERATIONS
          value: $(params.iterations)
        - name: TARGET_NAMESPACE
          value: $(params.target-namespace)
        # OTLP output (k6 2.x schema, same as the Jenkins job + the GitHub k6
        # workflow): gRPC to the in-cluster collector, which forwards to the backend.
        - name: K6_OTEL_SERVICE_NAME
          value: k6-microservices-smoke
        - name: K6_OTEL_GRPC_EXPORTER_INSECURE
          value: "true"
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.name=k6-microservices-smoke,service.namespace=jenkins-2026,deployment.environment=$(params.env-name)
        # Push every 2s so short tests (≈12s) get several export windows instead
        # of just one at t=10s (the 10s default), reducing the blast radius of a
        # transient memory_limiter rejection in the OTel gateway collector.
        - name: K6_OTEL_EXPORT_INTERVAL
          value: 2s
        - name: OTLP_ENDPOINT_RAW
          value: $(params.otlp-endpoint)
        # Optional Grafana Cloud k6 (the k6-app) streaming. All from the optional
        # 'k6-cloud' Secret (created by 01-namespaces.sh); empty -> cloud out skipped.
        - name: K6_CLOUD_TOKEN
          valueFrom:
            secretKeyRef:
              name: k6-cloud
              key: token
              optional: true
        - name: K6_CLOUD_PROJECT_ID
          valueFrom:
            secretKeyRef:
              name: k6-cloud
              key: project-id
              optional: true
        - name: K6_GRAFANA_BASE_URL
          valueFrom:
            secretKeyRef:
              name: k6-cloud
              key: grafana-base-url
              optional: true
      script: |
        #!/bin/sh
        set -eux
        cd "$(workspaces.source.path)/k6-infra"
        # Build outputs: OTLP (when an endpoint is configured) AND Grafana Cloud k6
        # (when a token + project id are set) - both can run at once.
        OTEL_OUT=""
        if [ -n "${OTLP_ENDPOINT_RAW:-}" ]; then
          export K6_OTEL_GRPC_EXPORTER_ENDPOINT="$(printf '%s' "${OTLP_ENDPOINT_RAW}" | sed -E 's#^[a-z]+://##')"
          OTEL_OUT="-o opentelemetry"
        fi
        CLOUD_OUT=""
        if [ -n "${K6_CLOUD_TOKEN:-}" ] && [ -n "${K6_CLOUD_PROJECT_ID:-}" ]; then
          CLOUD_OUT="--out cloud"
        fi
        k6 run ${OTEL_OUT} ${CLOUD_OUT} --vus "${K6_VUS}" --iterations "${K6_ITERATIONS}" \
          --summary-export="$(workspaces.source.path)/k6-summary.json" \
          jenkins/pipelines/k6/microservices-smoke.js
        if [ -n "${CLOUD_OUT}" ] && [ -n "${K6_GRAFANA_BASE_URL:-}" ]; then
          echo "k6 results streamed to Grafana Cloud k6: ${K6_GRAFANA_BASE_URL}/a/k6-app/projects/${K6_CLOUD_PROJECT_ID}"
        fi
