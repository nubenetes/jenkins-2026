# Ready-to-run PipelineRun for the `jhipstersamplemicroservice` service on the DEVELOP
# tier — the Tekton equivalent of the Jenkins `jhipstersamplemicroservice-develop` seed
# job. Mirrors jhipstersamplemicroservice.yaml but builds the app's `develop` branch into
# the `microservices-develop` namespace (env=develop).
#
# OPTIONAL / GATED: only seeded when the develop track is enabled (config.yaml
# microservices.developTrackEnabled=true, or JENKINS2026_DEVELOP_TRACK_ENABLED=true).
# scripts/06-tekton-pipelines.sh skips runs labelled jenkins2026.io/env=develop when the
# flag is off. Run by hand: kubectl create -f tekton/runs/jhipstersamplemicroservice-develop.yaml
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: jhipstersamplemicroservice-develop-
  namespace: tekton-ci
  labels:
    jenkins2026.io/service: jhipstersamplemicroservice
    jenkins2026.io/env: develop
    # Backstage's Kubernetes-backend fetch (docs/505) - see runs/gateway.yaml.
    app.kubernetes.io/name: jhipstersamplemicroservice
spec:
  taskRunTemplate:
    serviceAccountName: tekton-ci
  pipelineRef:
    name: microservices-pipeline
  params:
    - name: service-name
      value: jhipstersamplemicroservice
    - name: service-type
      value: java
    - name: git-repo-url
      value: https://github.com/nubenetes/jhipster-sample-app-microservice.git
    - name: git-branch
      value: develop
    - name: module-path
      value: ""
    - name: target-namespace
      value: microservices-develop
    - name: env-name
      value: develop
    - name: port
      value: "8081"
    - name: health-path
      value: /management/health
    - name: image
      value: ghcr.io/nubenetes/jenkins-2026-microservices/jhipstersamplemicroservice:develop
    - name: registry-host
      value: ghcr.io
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 4Gi
    - name: dockerconfig
      secret:
        secretName: tekton-registry
        items:
          - key: .dockerconfigjson
            path: config.json
