# Ready-to-run PipelineRun for the k6 smoke test (the `microservices-k6-smoke`
# pipeline). All params default (target-namespace=microservices, env=stable,
# vus=5, iterations=50), and it needs only the `source` workspace — no registry
# secret. Run: kubectl create -f tekton/runs/k6-smoke.yaml (or paste into the
# Tekton Dashboard once and "Rerun"). Requires the microservices to be deployed
# and reachable.
apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: microservices-k6-smoke-stable-
  namespace: tekton-ci
  labels:
    jenkins2026.io/service: microservices-k6-smoke
    jenkins2026.io/env: stable
spec:
  taskRunTemplate:
    serviceAccountName: tekton-ci
  pipelineRef:
    name: microservices-k6-smoke
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
