# RBAC for the Tekton Triggers EventListener. Binds the namespaced and
# cluster-scoped roles shipped by the Triggers install to a dedicated
# ServiceAccount so the EventListener can read Trigger resources and create
# PipelineRuns. GitOps-synced by the tekton-pipeline-as-code ArgoCD app (it
# recurses over tekton/). The namespaced objects pin namespace: tekton-ci
# explicitly rather than relying on the Application's default destination
# namespace (the ClusterRoleBinding is cluster-scoped; its subject carries the ns).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: tekton-triggers-sa
  namespace: tekton-ci
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tekton-triggers-eventlistener-binding
  namespace: tekton-ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
subjects:
  - kind: ServiceAccount
    name: tekton-triggers-sa
    namespace: tekton-ci
---
# Cluster-scoped role needed by the EventListener to access ClusterInterceptors
# and ClusterTriggerBindings. The subject namespace must match the pipeline
# namespace (06-tekton-pipelines.sh applies this with the pipeline ns), so it is
# set explicitly here to tekton-ci (the config default ci.tekton.pipelineNamespace).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: tekton-triggers-eventlistener-clusterbinding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
subjects:
  - kind: ServiceAccount
    name: tekton-triggers-sa
    namespace: tekton-ci
