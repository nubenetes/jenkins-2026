# Pre-pulls the Tekton task container images onto every node so TaskRun pods start
# fast (a TaskRun pod is only Running once all step images are present; the build
# pipeline pulls maven/kaniko/codeql/semgrep/trivy — codeql is multi-GB). The Tekton
# analogue of the Jenkins helm/jenkins/agent-image-prepull.yaml DaemonSet. Applied by
# scripts/04-tekton.sh (only when ci.engine=tekton). initContainers pull each image.
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: tekton-task-image-prepull
  namespace: tekton-pipelines
  labels: { app.kubernetes.io/name: tekton-task-image-prepull }
spec:
  selector:
    matchLabels: { app.kubernetes.io/name: tekton-task-image-prepull }
  template:
    metadata:
      labels: { app.kubernetes.io/name: tekton-task-image-prepull }
    spec:
      terminationGracePeriodSeconds: 0
      automountServiceAccountToken: false
      initContainers:
        - { name: git,    image: "alpine/git:2.54.0",            command: ["true"], imagePullPolicy: IfNotPresent }
        - { name: k8s,    image: "alpine/k8s:1.31.3",            command: ["true"], imagePullPolicy: IfNotPresent }
        - { name: maven,  image: "maven:3.9.9-eclipse-temurin-21", command: ["true"], imagePullPolicy: IfNotPresent }
        - { name: kaniko, image: "gcr.io/kaniko-project/executor:v1.23.2-debug", command: ["true"], imagePullPolicy: IfNotPresent }
        - { name: trivy,  image: "aquasec/trivy:0.52.2",          command: ["true"], imagePullPolicy: IfNotPresent }
        - { name: k6,     image: "grafana/k6:2.0.0",             command: ["true"], imagePullPolicy: IfNotPresent }
        - { name: yq,     image: "mikefarah/yq:4.53.3",          command: ["true"], imagePullPolicy: IfNotPresent }
        - { name: curl,   image: "curlimages/curl:8.10.1",       command: ["true"], imagePullPolicy: IfNotPresent }
        - { name: semgrep, image: "semgrep/semgrep:1.79.0",     command: ["true"], imagePullPolicy: IfNotPresent }
        - { name: codeql, image: "mcr.microsoft.com/cstsectools/codeql-container:c6f3f8cbd3e0ebc36d9ad6dfe6a4c166ba940166", command: ["true"], imagePullPolicy: IfNotPresent }
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.10
          resources:
            requests: { cpu: "1m", memory: "8Mi" }
            limits:   { cpu: "10m", memory: "16Mi" }
