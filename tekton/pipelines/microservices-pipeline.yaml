# Tekton port of vars/MicroservicesPipeline.groovy. Tasks run sequentially
# (runAfter), sharing one 'source' workspace (RWO PVC):
# checkout -> Semgrep -> CodeQL -> Trivy IaC -> build/test ->
# build & push image -> Trivy image -> GitOps deploy -> smoke -> k6.
# NOTE: Jenkins runs the three scanners (Semgrep/CodeQL/Trivy IaC) in PARALLEL
# inside its single multi-container agent pod ('Static Analysis' stage); here
# the RWO workspace serialises tasks, so the scan order stays sequential by
# design - same logical ~11-stage contract, different intra-engine scheduling.
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: microservices-pipeline
spec:
  # Every param has a valid default (the 'gateway' service happy-path) so the
  # Pipeline runs end-to-end with ZERO params from the Tekton Dashboard / a minimal
  # PipelineRun (you only bind the workspaces). Override service-name + its related
  # params together to build a different service (see jenkins/pipelines/seed/
  # services.yaml). 06-tekton-pipelines.sh / PaC pass the full per-service set.
  params:
    - name: service-name
      default: gateway
    - name: service-type
      default: java
    - name: git-repo-url
      default: https://github.com/nubenetes/jhipster-sample-app-gateway.git
    - name: git-branch
      default: main
    - name: module-path
      default: ""
    - name: target-namespace
      default: microservices
    - name: env-name
      default: stable
    - name: port
      default: "8080"
    - name: health-path
      default: /management/health
    - name: image
      default: ghcr.io/nubenetes/jenkins-2026-microservices/gateway:main
    - name: registry-host
      default: ghcr.io
    - name: self-repo-url
      default: https://github.com/nubenetes/jenkins-2026.git
    - name: self-repo-branch
      default: main
    - name: otlp-endpoint
      default: "http://otel-collector-gateway.observability.svc.cluster.local:4317"
  workspaces:
    - name: source
    - name: dockerconfig
  tasks:
    - name: fetch-source
      taskRef: { name: fetch-source }
      workspaces:
        - { name: source, workspace: source }
      params:
        - { name: git-repo-url, value: $(params.git-repo-url) }
        - { name: git-branch, value: $(params.git-branch) }
        - { name: service-name, value: $(params.service-name) }
        - { name: self-repo-url, value: $(params.self-repo-url) }
        - { name: self-repo-branch, value: $(params.self-repo-branch) }
    - name: semgrep-scan
      runAfter: [fetch-source]
      taskRef: { name: semgrep-scan }
      workspaces:
        - { name: source, workspace: source }
      params:
        # The app's own repo, not the infra self-repo (docs/601, found 2026-07-13).
        - { name: git-repo-url, value: $(params.git-repo-url) }
        - { name: git-branch, value: $(params.git-branch) }
    - name: codeql-analyze
      runAfter: [semgrep-scan]
      taskRef: { name: codeql-analyze }
      workspaces:
        - { name: source, workspace: source }
      params:
        - { name: git-repo-url, value: $(params.git-repo-url) }
        - { name: git-branch, value: $(params.git-branch) }
    - name: trivy-iac
      runAfter: [codeql-analyze]
      taskRef: { name: trivy-iac }
      workspaces:
        - { name: source, workspace: source }
      params:
        - { name: env-name, value: $(params.env-name) }
    - name: build-test
      runAfter: [trivy-iac]
      taskRef: { name: maven-build-test }
      workspaces:
        - { name: source, workspace: source }
      params:
        - { name: service-type, value: $(params.service-type) }
        - { name: module-path, value: $(params.module-path) }
    - name: build-push-image
      runAfter: [build-test]
      taskRef: { name: build-push-image }
      workspaces:
        - { name: source, workspace: source }
        - { name: dockerconfig, workspace: dockerconfig }
      params:
        - { name: service-type, value: $(params.service-type) }
        - { name: module-path, value: $(params.module-path) }
        - { name: image, value: "$(params.image)-$(context.pipelineRun.name)" }
    - name: trivy-image
      runAfter: [build-push-image]
      taskRef: { name: trivy-image }
      workspaces:
        - { name: source, workspace: source }
        - { name: dockerconfig, workspace: dockerconfig }
      params:
        - { name: image, value: "$(params.image)-$(context.pipelineRun.name)" }
    - name: gitops-deploy
      runAfter: [trivy-image]
      taskRef: { name: gitops-deploy }
      workspaces:
        - { name: source, workspace: source }
      params:
        - { name: service-name, value: $(params.service-name) }
        - { name: env-name, value: $(params.env-name) }
        - { name: target-namespace, value: $(params.target-namespace) }
        # Stable's gitops branch follows the deploy branch (AppSet auto-track).
        - { name: self-repo-branch, value: $(params.self-repo-branch) }
        # P3 immutable tag: pass the SAME full built `image` that build-push-image and
        # trivy-image use ("$(params.image)-$(context.pipelineRun.name)"); gitops-deploy
        # extracts its tag (everything after the last ':') for the bump, so build-push,
        # scans and the gitops bump ALWAYS reference the identical immutable image — even
        # when a trigger sets git-branch to something the `image` tag base doesn't match
        # (e.g. a PaC push whose `image` base is the commit SHA while git-branch is the
        # branch name). Single source of truth: no separately-computed tag that can drift.
        # Mirrors the Jenkins <branch>-<build#> tag.
        - { name: image, value: "$(params.image)-$(context.pipelineRun.name)" }
    - name: smoke-test
      runAfter: [gitops-deploy]
      taskRef: { name: smoke-test }
      params:
        - { name: service-name, value: $(params.service-name) }
        - { name: target-namespace, value: $(params.target-namespace) }
        - { name: port, value: $(params.port) }
        - { name: health-path, value: $(params.health-path) }
    - name: k6-smoke
      runAfter: [smoke-test]
      taskRef: { name: k6-smoke }
      workspaces:
        - { name: source, workspace: source }
      params:
        - { name: target-namespace, value: $(params.target-namespace) }
        - { name: env-name, value: $(params.env-name) }
        - { name: self-repo-url, value: $(params.self-repo-url) }
        - { name: self-repo-branch, value: $(params.self-repo-branch) }
        - { name: otlp-endpoint, value: $(params.otlp-endpoint) }
