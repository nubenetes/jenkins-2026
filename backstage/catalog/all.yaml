# Catalog root - registered by backstage/app-config.yaml catalog.locations
# (tracked from the DEPLOY branch via ${CATALOG_BRANCH}). One Location pulls in
# the org, the platform model and the microservices. See docs/505 § The catalog.
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: jenkins-2026-catalog
  description: Root location for the jenkins-2026 platform catalog
spec:
  targets:
    - ./org.yaml
    - ./platform.yaml
    - ./services.yaml
    - ./apis.yaml
    # Scaffolder golden paths (docs/505 § Scaffolder). Registered here rather than
    # discovered, exactly like everything else above: the catalog is read from git by
    # URL, so a merged PR publishes a template with no image rebuild.
    - ./templates/onboard-service/template.yaml
