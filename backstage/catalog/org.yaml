# Org model. NOTE: IAP admins sign in WITHOUT needing a User entity here (the
# gcpIap resolver's dangerouslyAllowSignInWithoutUserInCatalog fallback - IAP's
# allow-list is the real gate). platform-admin is a placeholder owner identity;
# add real User entities (spec.profile.email = the Google account) if you want
# resolved catalog identities instead of the fallback.
apiVersion: backstage.io/v1alpha1
kind: Group
metadata:
  name: platform-team
  description: Owners of the jenkins-2026 platform and its microservices
spec:
  type: team
  children: []
---
apiVersion: backstage.io/v1alpha1
kind: User
metadata:
  name: platform-admin
  description: Placeholder admin identity (IAP admins use the sign-in fallback)
spec:
  profile:
    displayName: Platform Admin
  memberOf: [platform-team]
