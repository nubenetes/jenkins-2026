# =============================================================================
# backstage/app-config.yaml - the ONE config file baked into the image
# =============================================================================
# Every environment-specific value arrives as an env var at RUNTIME:
#   - ConfigMap backstage-runtime-config (scripts/08.95-backstage.sh writes it;
#     scripts/09-gateway.sh owns IAP_AUDIENCE): APP_BASE_URL, CI_ENGINE,
#     CATALOG_BRANCH, JENKINS_BASE_URL, ARGOCD_BASE_URL, IAP_AUDIENCE,
#     BASE_DOMAIN, OBS_MODE, GRAFANA_DOMAIN, GRAFANA_PROXY_TARGET
#   - Secret backstage-secrets (scripts/01-namespaces.sh; ARGOCD_* and the oss
#     GRAFANA_TOKEN patched by 08.95): BACKEND_SECRET, GITHUB_TOKEN,
#     JENKINS_API_USER, JENKINS_API_KEY, AUTH_GITHUB_CLIENT_ID,
#     AUTH_GITHUB_CLIENT_SECRET, ARGOCD_USERNAME, ARGOCD_PASSWORD,
#     GRAFANA_TOKEN
#   - Secret backstage-db-app (CNPG-generated): POSTGRES_HOST/PORT/USER/PASSWORD
# The wiring lives in helm/backstage/values.yaml (extraEnvVars/-Secrets). Under
# backend TLS the chart layers an EXTRA config file over this one (see
# helm/backstage/values-backend-tls.yaml). See docs/505-BACKSTAGE.md.
# =============================================================================

app:
  title: jenkins-2026 · Developer Portal
  baseUrl: ${APP_BASE_URL}

organization:
  name: nubenetes

backend:
  baseUrl: ${APP_BASE_URL}
  listen:
    port: 7007
    host: 0.0.0.0
  cors:
    origin: ${APP_BASE_URL}
    methods: [GET, HEAD, PATCH, POST, PUT, DELETE]
    credentials: true
  # CSP: helmet's default connect-src is 'self', which BLOCKS the one plugin
  # that calls out from the BROWSER: GitHub Actions (Octokit + the signed-in
  # user's OAuth token, straight to api.github.com) - the tab renders
  # "Error: Failed to fetch" right after a successful OAuth popup (found live
  # 2026-07-12). Everything else (Jenkins/Tekton/ArgoCD/Kubernetes/TechDocs)
  # proxies through the backend, so a tight allowlist beats the upstream
  # scaffold's blanket http:/https: pair.
  csp:
    connect-src: ["'self'", 'https://api.github.com']
  database:
    client: pg
    connection:
      host: ${POSTGRES_HOST}
      port: ${POSTGRES_PORT}
      user: ${POSTGRES_USER}
      password: ${POSTGRES_PASSWORD}
    # One database per plugin (backstage_plugin_*) - the CNPG bootstrap grants
    # the app role CREATEDB for exactly this (argocd/backstage/templates/db.yaml).
  auth:
    keys:
      - secret: ${BACKEND_SECRET}

integrations:
  github:
    - host: github.com
      # Classic PAT (= the platform's GIT_TOKEN): catalog locations + the
      # GitHub entity annotations. The GitHub ACTIONS tab does NOT use this -
      # it calls the GitHub API with the signed-in user's OAuth token (below).
      token: ${GITHUB_TOKEN}

auth:
  environment: production
  providers:
    # Sign-in = Google IAP (the same OAuth client + admin allow-list as Jenkins/
    # Headlamp/Grafana/pgAdmin). This provider VERIFIES the x-goog-iap-jwt-
    # assertion JWT against the LB backend-service audience (resolved and
    # patched by 09-gateway.sh) - stronger than header-trusting proxies. The
    # resolver falls back to sign-in without a catalog User entity: IAP is the
    # real gate, the catalog identity is presentation.
    gcpIap:
      audience: ${IAP_AUDIENCE}
      signIn:
        resolvers:
          - resolver: emailMatchingUserEntityProfileEmail
            dangerouslyAllowSignInWithoutUserInCatalog: true
    # Secondary provider, ONLY consumed by the GitHub Actions CI/CD tab's
    # one-time per-user popup (the plugin calls api.github.com as the USER).
    # 'unset' placeholders (01-namespaces.sh) keep startup valid until the
    # optional BACKSTAGE_GITHUB_OAUTH_* GitHub secrets are provided; the OAuth
    # App's callback must be ${APP_BASE_URL}/api/auth/github/handler/frame.
    github:
      production:
        clientId: ${AUTH_GITHUB_CLIENT_ID}
        clientSecret: ${AUTH_GITHUB_CLIENT_SECRET}

# Jenkins plugin (rendered on the CI/CD tab when jenkins2026.ciEngine=jenkins).
# Basic-auth REST creds: the admin user + admin password from jenkins-credentials
# (empty for the other engines - the tab isn't rendered then).
jenkins:
  instances:
    - name: default
      baseUrl: ${JENKINS_BASE_URL}
      username: ${JENKINS_API_USER}
      apiKey: ${JENKINS_API_KEY}
      projectCountLimit: 100

# ArgoCD plugin (engine-independent Deployments tab). Session auth with the
# in-cluster admin credentials 08.95 patches in; URL flips to https + the
# internal CA (NODE_EXTRA_CA_CERTS) when backend TLS is active.
#
# The instance url MUST stay INTERNAL: the plugin backend calls it for every
# API read, and the public https://argocd.<domain> sits behind IAP, which
# 302s any request without a Google identity - a public url here renders the
# whole tab dataless. Trade-off (upstream gap, plugin 2.9.0): the frontend
# builds its "open in ArgoCD" deep links from metadata.instance.url (this
# same value), falling back to argocd.baseUrl ONLY when instance metadata is
# absent - which the backend always injects, so deep links currently point
# in-cluster and don't resolve from a browser. baseUrl stays configured (the
# public UI) so links start working the moment upstream honours it; the
# argocd-baseline NetworkPolicy allowlists the backstage namespace for the
# internal call (infrastructure/networkpolicies.yaml).
argocd:
  baseUrl: https://argocd.${BASE_DOMAIN}
  username: ${ARGOCD_USERNAME}
  password: ${ARGOCD_PASSWORD}
  appLocatorMethods:
    - type: config
      instances:
        - name: in-cluster
          url: ${ARGOCD_BASE_URL}

# Kubernetes plugin: in-cluster access as the `backstage` KSA (no
# serviceAccountToken -> the mounted token + CA are used). Read-only RBAC in
# argocd/platform-config/templates/rbac-backstage.yaml - keep customResources
# and that ClusterRole in sync.
kubernetes:
  serviceLocatorMethod:
    type: multiTenant
  clusterLocatorMethods:
    - type: config
      clusters:
        - url: https://kubernetes.default.svc
          name: gke
          authProvider: serviceAccount
  customResources:
    # Tekton CI/CD tab (ci.engine=tekton) rides this plugin.
    - group: tekton.dev
      apiVersion: v1
      plural: pipelineruns
    - group: tekton.dev
      apiVersion: v1
      plural: taskruns
    # Argo Workflows (ci.engine=argoworkflows): surfaced on the Kubernetes tab
    # until the community plugin lands (backstage/community-plugins#9192).
    - group: argoproj.io
      apiVersion: v1alpha1
      plural: workflows
    # Argo Rollouts (the microservices' progressive delivery, docs/501).
    - group: argoproj.io
      apiVersion: v1alpha1
      plural: rollouts

# Grafana plugin (the Monitoring tab, docs/505 § Grafana integration). Live
# cards ONLY for observability.mode oss / grafana-cloud - the two Grafanas
# that accept the static service-account Bearer token this proxy endpoint
# sends; managed-azure/aws issue short-lived Entra/SigV4 credentials a fixed
# header cannot carry, so their tab is a deep-link InfoCard instead (decision
# record in docs/505). All three env vars are ALWAYS non-empty in every mode
# (08.95 writes real values or inert placeholders - the proxy-backend
# validates the target URL at startup, and this app has already been bitten
# by the empty-string config class, see docs/505 § Troubleshooting):
#   - GRAFANA_PROXY_TARGET: oss -> the in-cluster Grafana Service URL;
#     grafana-cloud -> the stack URL; managed-* -> https://grafana.invalid
#     (parseable, never called - the cards don't mount in those modes).
#   - GRAFANA_DOMAIN: the user-facing Grafana origin the cards link to
#     (oss -> https://grafana.<baseDomain>, IAP; cloud -> the stack URL;
#     managed-* -> workspace endpoint or 'unset').
#   - GRAFANA_TOKEN (Secret): oss -> Viewer service-account token minted by
#     08.95 against the Grafana API; grafana-cloud -> Terraform-minted stack
#     SA token threaded through Day1; managed-* -> 'unset' (never sent).
proxy:
  endpoints:
    '/grafana/api':
      target: ${GRAFANA_PROXY_TARGET}
      headers:
        Authorization: Bearer ${GRAFANA_TOKEN}

grafana:
  # A full origin despite the name (upstream key): deep links + the frontend
  # cards build dashboard/alert URLs from it.
  domain: ${GRAFANA_DOMAIN}
  # Both wired Grafanas (kube-prometheus-stack's and Grafana Cloud's) run
  # unified alerting - the alerts card queries /api/v1/provisioning rules by
  # label selector instead of legacy dashboard-tag alerts.
  unifiedAlerting: true

# TechDocs: the image ships mkdocs + mkdocs-techdocs-core (see
# packages/backend/Dockerfile); this repo's docs/ tree renders via the
# repo-root mkdocs.yml. Mermaid diagrams render client-side (the
# backstage-plugin-techdocs-addon-mermaid addon in packages/app).
techdocs:
  builder: local
  generator:
    runIn: local
  publisher:
    type: local

catalog:
  rules:
    # Template = the Scaffolder golden paths (docs/505 § Scaffolder). Without it the
    # catalog REJECTS backstage/catalog/templates/**, and the Create page just sits
    # empty with the rejection buried in the backend log.
    - allow:
        [Component, System, Domain, Resource, API, Group, User, Location, Template]
  # The catalog tracks the DEPLOY branch (CATALOG_BRANCH = main|develop, the
  # J2026_SELF_REPO_BRANCH auto-track) - a Day1 from develop reads develop's
  # catalog before the promotion PR, like the Jenkins shared library.
  locations:
    - type: url
      target: https://github.com/nubenetes/jenkins-2026/blob/${CATALOG_BRANCH}/backstage/catalog/all.yaml

# Custom keys surfaced to the FRONTEND (schema + visibility in
# packages/app/config.d.ts): the EntityPage CI/CD tab switches on ciEngine, so
# ONE image serves whichever engine the platform runs.
jenkins2026:
  ciEngine: ${CI_ENGINE}
  baseDomain: ${BASE_DOMAIN}
  # The Monitoring tab switches on this exactly like the CI/CD tab does on
  # ciEngine (oss | grafana-cloud | managed-azure | managed-aws).
  obsMode: ${OBS_MODE}
