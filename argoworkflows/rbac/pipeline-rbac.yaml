# Workflow-execution ServiceAccount + RBAC, GitOps-managed by the
# argoworkflows-pipeline-as-code ArgoCD Application (destination namespace = the
# run namespace, argo-ci). The credential Secrets it references (argoworkflows-git
# basic-auth, argoworkflows-registry dockerconfigjson) hold values sourced from env
# and are created imperatively by scripts/01-namespaces.sh - an SA may reference
# Secrets that don't exist yet, so ordering is not a concern.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: argoworkflows-ci
secrets:
  - name: argoworkflows-git
imagePullSecrets:
  - name: argoworkflows-registry
---
# Deploy permissions in the microservices namespace (kubectl rollout/restart for
# the OTel-injection self-heal in gitops-deploy, and the smoke-test pod) - same
# scope as the Jenkins controller's jenkins-edit binding. Explicit namespace so
# the binding lands in the microservices namespace regardless of the
# Application's destination namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argoworkflows-ci-edit
  namespace: microservices
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit
subjects:
  - kind: ServiceAccount
    name: argoworkflows-ci
    namespace: argo-ci
---
# Argo Workflows executor RBAC, in the run namespace (argo-ci). The Argo Workflows
# executor (the wait/init sidecar the controller injects into every step pod) runs
# as the Workflow's serviceAccountName and needs to read step pods, fetch their
# logs, exec into them, and create/patch the workflowtaskresults the controller
# reads back. The upstream install.yaml ships these as the `argo-role` /
# `executor` Roles bound to the `argo`/`default` SAs in the control-plane namespace;
# here we bind the same scope to argoworkflows-ci in the run namespace so Workflows
# submitted with serviceAccountName: argoworkflows-ci execute correctly.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argoworkflows-ci-executor
  namespace: argo-ci
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
  - apiGroups: ["argoproj.io"]
    resources: ["workflowtaskresults"]
    verbs: ["create", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argoworkflows-ci-executor
  namespace: argo-ci
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argoworkflows-ci-executor
subjects:
  - kind: ServiceAccount
    name: argoworkflows-ci
    namespace: argo-ci
