# =============================================================================
# JCasC fragment: bootstraps the "seed-jobs" + "pac-dev/seed-jobs-dev"
# pipelines via Job DSL.
# Injected via --set-file controller.JCasC.configScripts.seed-job=<this file>
#
# Both jobs are Pipeline-script-from-SCM jobs pointing at
# jenkins/pipelines/seed/Jenkinsfile.seed in this repo, which checks out the
# repo and runs the jobDsl step against
# jenkins/pipelines/seed/seed_jobs.groovy (reads services.yaml):
#
#   - "seed-jobs" tracks JENKINS2026_REPO_BRANCH (normally "main") and
#     creates the 9 stable Microservices pipeline jobs at the root.
#   - "pac-dev/seed-jobs-dev" tracks JENKINS2026_DEV_REPO_BRANCH (normally
#     "develop") and creates the 9 pac-dev/*-develop pipeline jobs - a sandbox
#     for devops/platform engineers to iterate on this repo's pipelines-as-code
#     (seed_jobs.groovy, Jenkinsfile.microservices, shared library) before
#     merging to "main", without affecting the stable jobs above. The pac-dev
#     folder + everything inside it is hidden from the "developer" role and
#     only readable/runnable by the "platform-engineer" role - see
#     jenkins/casc/jcasc-base.yaml and README.md "Pipelines-as-code dev
#     sandbox".
#
# ${VAR:-default} placeholders are resolved by JCasC itself before the Job
# DSL script is handed to the job-dsl plugin.
# =============================================================================

jobs:
  - script: |
      pipelineJob('seed-jobs') {
        description('Seed job (Job DSL) - regenerates all Microservices pipeline jobs from jenkins/pipelines/seed/seed_jobs.groovy. Safe to re-run; idempotent.')
        keepDependencies(false)
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${JENKINS2026_REPO_URL:-https://github.com/nubenetes/jenkins-2026.git}')
                }
                branches('*/${JENKINS2026_REPO_BRANCH:-main}')
              }
            }
            scriptPath('jenkins/pipelines/seed/Jenkinsfile.seed')
            lightweight(true)
          }
        }
        triggers {
          cron('H/30 * * * *')
        }
      }
  - script: |
      folder('pac-dev') {
        description('Pipelines-as-code DEV sandbox, regenerated by pac-dev/seed-jobs-dev from the "${JENKINS2026_DEV_REPO_BRANCH:-develop}" branch of this repo. Visible only to the platform-engineer role.')
      }
      pipelineJob('pac-dev/seed-jobs-dev') {
        description('DEV seed job (Job DSL) - regenerates the pac-dev/*-develop pipelines-as-code sandbox from jenkins/pipelines/seed/seed_jobs.groovy on the "${JENKINS2026_DEV_REPO_BRANCH:-develop}" branch of this repo. Safe to re-run; idempotent. Visible only to the platform-engineer role.')
        keepDependencies(false)
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${JENKINS2026_REPO_URL:-https://github.com/nubenetes/jenkins-2026.git}')
                }
                branches('*/${JENKINS2026_DEV_REPO_BRANCH:-develop}')
              }
            }
            scriptPath('jenkins/pipelines/seed/Jenkinsfile.seed')
            lightweight(true)
          }
        }
        triggers {
          cron('H/30 * * * *')
        }
      }
