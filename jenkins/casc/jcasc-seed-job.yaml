# =============================================================================
# JCasC fragment: bootstraps the "seed-jobs" pipeline via Job DSL.
# Injected via --set-file controller.JCasC.configScripts.seed-job=<this file>
#
# "seed-jobs" is itself a Pipeline-script-from-SCM job pointing at
# jenkins/pipelines/seed/Jenkinsfile.seed in this repo. That Jenkinsfile
# checks out this repo and runs the jobDsl step against
# jenkins/pipelines/seed/seed_jobs.groovy, which reads services.yaml and
# creates the 18 PetClinic pipeline jobs (9 services x stable/-develop).
# ${VAR:-default} placeholders are resolved by JCasC itself before the Job
# DSL script is handed to the job-dsl plugin.
# =============================================================================

jobs:
  - script: |
      pipelineJob('seed-jobs') {
        description('Seed job (Job DSL) - regenerates all PetClinic pipeline jobs from jenkins/pipelines/seed/seed_jobs.groovy. Safe to re-run; idempotent.')
        keepDependencies(false)
        definition {
          cpsScm {
            scm {
              git {
                remote {
                  url('${JENKINS2026_REPO_URL:-https://github.com/nubenetes/jenkins-2026.git}')
                }
                branches('*/${JENKINS2026_REPO_BRANCH:-main}')
              }
            }
            scriptPath('jenkins/pipelines/seed/Jenkinsfile.seed')
            lightweight(true)
          }
        }
        triggers {
          cron('H/30 * * * *')
        }
      }
