# ⚠️ NOT WIRED — REFERENCE / EXPERIMENT ONLY. DO NOT ASSUME THIS IS ACTIVE.
# ---------------------------------------------------------------------------------------------
# This file is NOT loaded by anything. scripts/04-jenkins.sh only mounts jcasc-base / jcasc-otel
# / jcasc-seed-job (see helm/jenkins/values-common.yaml). The REAL build agents are defined
# inline in the pipelines that use them:
#   - Microservices build/deploy → vars/MicroservicesPipeline.groovy (declarative shared lib;
#     maven container req 2/4Gi · lim 6/8Gi + resizePolicy In-Place + idleMinutes 5).
#   - Seed job                   → jenkins/pipelines/seed/Jenkinsfile.seed
#   - DevSecOps demo             → ./Jenkinsfile
# The k8s CLOUD itself (name/namespace/containerCap/websocket + a minimal `default` jnlp
# template) lives in jcasc-base.yaml; pipelines run their inline pods ON that cloud.
# Kept only as a worked example of the In-Place Pod Vertical Scaling (resizePolicy) idea, which
# is already applied where it matters (the MicroservicesPipeline maven container). If you ever
# consolidate many pipelines onto one shared heavy agent, promote that template here and have the
# pipelines `inheritFrom` it — until then, edit the pipeline pod specs above, not this file.
#
# Jenkins Configuration as Code (JCasC) Snippet for In-Place Pod Vertical Scaling (Kubernetes v1.35+)
# Ephemeral build agents dynamically scale up their limits under peak build stress without restarts.
jenkins:
  clouds:
    - kubernetes:
        name: "kubernetes"
        serverUrl: "https://kubernetes.default.svc.cluster.local"
        namespace: "${JENKINS_NAMESPACE:-jenkins}"
        jenkinsUrl: "http://jenkins.${JENKINS_NAMESPACE:-jenkins}.svc.cluster.local:8080"
        jenkinsTunnel: "jenkins-agent.${JENKINS_NAMESPACE:-jenkins}.svc.cluster.local:50000"
        containerCapStr: "20"
        templates:
          - name: "dynamic-agent"
            label: "maven-node-builder"
            nodeUsageMode: "EXCLUSIVE"
            workspaceVolume:
              emptyDirWorkspaceVolume:
                memory: true
            # Target the GKE Node Auto-Provisioning Custom ComputeClass (ci-spot) so the
            # agent lands on a Spot, scale-to-zero auto-provisioned node, tolerating the
            # taints GKE applies to those pools. (The wired pipelines in vars/ do this
            # dynamically from env.GKE_COMPUTE_CLASS — see infrastructure/compute-classes/.)
            nodeSelector:
              cloud.google.com/compute-class: "ci-spot"
            tolerations:
              - key: "cloud.google.com/compute-class"
                operator: "Equal"
                value: "ci-spot"
                effect: "NoSchedule"
              - key: "cloud.google.com/gke-spot"
                operator: "Equal"
                value: "true"
                effect: "NoSchedule"
            # Declare the raw Pod Spec template to access K8s v1.35+ In-Place Pod Scaling fields directly
            yaml: |
              apiVersion: v1
              kind: Pod
              metadata:
                labels:
                  role: jenkins-agent
                  scheduling.x-k8s.io/pod-group: parallel-smoke-tests # Enforces v1.36 PodGroup Gang Scheduling
              spec:
                containers:
                  - name: jnlp
                    image: jenkins/inbound-agent:3355.v388858a_47b_33-22
                    resources:
                      requests:
                        cpu: "500m"
                        memory: "512Mi"
                      limits:
                        cpu: "2000m"
                        memory: "2048Mi"
                    # GA in Kubernetes v1.35: In-Place pod vertical scaling policies
                    resizePolicy:
                      - resourceName: cpu
                        restartPolicy: NotRequired
                      - resourceName: memory
                        restartPolicy: NotRequired
                  - name: builder
                    image: docker.io/library/maven:3.9.6-eclipse-temurin-17
                    command:
                      - cat
                    tty: true
                    resources:
                      requests:
                        cpu: "1000m"
                        memory: "2048Mi"
                      limits:
                        cpu: "4000m"
                        memory: "8192Mi"
                    resizePolicy:
                      - resourceName: cpu
                        restartPolicy: NotRequired
                      - resourceName: memory
                        restartPolicy: NotRequired
