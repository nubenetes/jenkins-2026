# =============================================================================
# JCasC fragment: core Jenkins configuration (security, libraries, creds).
# Injected via --set-file controller.JCasC.configScripts.base=<this file>
# by scripts/04-jenkins.sh. ${VAR:-default} placeholders are resolved by
# JCasC from environment variables defined in controller.containerEnv
# (helm/jenkins/values-common.yaml) and the "jenkins-credentials" Secret
# created by scripts/01-namespaces.sh.
# =============================================================================
jenkins:
  systemMessage: |
    <div style="font-weight: bold; border: 1px solid #45475a; padding: 10px; border-radius: 5px; background: #1e1e2e;">
      Welcome to the Jenkins 2026 PoC!<br/>
      This instance is fully automated and managed via Configuration as Code (JCasC).<br/>
      Source: <a href="https://github.com/nubenetes/jenkins-2026">nubenetes/jenkins-2026</a><br/><br/>

      <b>Deployed Environments:</b>
      <ul>
        <li>ArgoCD: <a href="https://argocd.${J2026_GATEWAY_BASE_DOMAIN:-jenkins2026.nubenetes.com}">https://argocd.${J2026_GATEWAY_BASE_DOMAIN:-jenkins2026.nubenetes.com}</a></li>
        <li>PetClinic (Stable): <a href="${PETCLINIC_URL:-#}">${PETCLINIC_URL:-not publicly exposed}</a></li>
        <li>PetClinic (Develop): <a href="${PETCLINIC_DEVELOP_URL:-#}">${PETCLINIC_DEVELOP_URL:-not publicly exposed}</a></li>
      </ul>

      <b>Observability:</b>
      <ul>
        <li>Grafana: <a href="${GRAFANA_BASE_URL:-#}">${GRAFANA_BASE_URL:-not configured}</a>
          <ul>
            <li><a href="${GRAFANA_BASE_URL:-#}/d/jenkins2026-jenkins-overview">Jenkins Overview</a></li>
            <li><a href="${GRAFANA_BASE_URL:-#}/d/jenkins2026-petclinic-overview">PetClinic Services</a></li>
            <li><a href="${GRAFANA_BASE_URL:-#}/d/jenkins2026-k6-smoke-overview">K6 Smoke Test</a></li>
          </ul>
        </li>
      </ul>
    </div>

  globalNodeProperties:
    - envVars:
        env:
          - key: "GRAFANA_BASE_URL"
            value: "${GRAFANA_BASE_URL:-}"
          - key: "JENKINS2026_REPO_URL"
            value: "${JENKINS2026_REPO_URL:-https://github.com/nubenetes/jenkins-2026.git}"

  securityRealm:
    oic:
      clientId: "${JENKINS_OIDC_CLIENT_ID:-}"
      clientSecret: "${JENKINS_OIDC_CLIENT_SECRET:-}"
      serverConfiguration:
        wellKnown:
          wellKnownOpenIDConfigurationUrl: "https://accounts.google.com/.well-known/openid-configuration"
          scopesOverride: "openid email profile"
      userNameField: "email"
      emailFieldName: "email"
      fullNameFieldName: "name"
      logoutFromOpenidProvider: true
      properties:
        - escapeHatch:
            username: "${JENKINS_ADMIN_ID:-admin}"
            secret: "${JENKINS_ADMIN_PASSWORD}"
            group: "escape-hatch-admin"

  # Role-Strategy roles come in two flavours:
  #   - "global" roles apply to every item unconditionally (no pattern).
  #   - "items"  roles apply only to items whose full path matches "pattern",
  #              ADDING permissions on top of any global role - they cannot
  #              revoke a permission a global role already grants.
  # To keep pac-dev/* hidden from "authenticated" users, Job/* permissions
  # must therefore live in an ITEM role scoped to everything EXCEPT pac-dev/*
  # ("developer" below), not a global role.
  #
  # NOTE: the local "platform-engineer" account (and its item role below) can
  # no longer log in now that securityRealm is "oic" instead of "local" - the
  # role definition is left in place (Overall/Administer via "admin" already
  # covers pac-dev/* anyway) in case it's mapped to another OIDC
  # user/group later. See README.md "Pipelines-as-code dev sandbox".
  authorizationStrategy:
    roleBased:
      roles:
        global:
          - name: "admin"
            description: "Full administrative access"
            permissions:
              - "Overall/Administer"
            # "assignments" (flat string list) is deprecated in favour of
            # "entries", which disambiguates users vs. groups.
            # - "escape-hatch-admin" is the group the oic-auth escape hatch
            #   above assigns to JENKINS_ADMIN_ID logins.
            # - JENKINS_OIDC_ADMIN_EMAIL (empty until configured) is the
            #   Google account that should have full admin access - the
            #   oic-auth userNameField above is "email", so OIDC usernames
            #   are email addresses.
            entries:
              - group: "escape-hatch-admin"
              - user: "${JENKINS_OIDC_ADMIN_EMAIL:-}"
          - name: "authenticated-base"
            description: "Baseline UI access for any logged-in user (no Job/* - granted per-item below)"
            permissions:
              - "Overall/Read"
              - "View/Read"
            entries:
              - group: "authenticated"
        items:
          - name: "developer"
            description: "Run and inspect the stable PetClinic pipelines (everything outside pac-dev/)"
            # Matches every item EXCEPT "pac-dev" and "petclinic-develop" (the sandbox view) -
            # i.e. the 9 root PetClinic jobs + seed-jobs.
            pattern: "^(?!pac-dev(/.*)?$|petclinic-develop$).*$"
            permissions:
              - "Job/Read"
              - "Job/Build"
              - "Job/Cancel"
              - "Job/Workspace"
              - "Job/Discover"
              - "Run/Replay"
            entries:
              - group: "authenticated"
          - name: "platform-engineer"
            description: "Run, inspect and re-seed the pac-dev/*-develop pipelines-as-code dev sandbox"
            # Matches the "pac-dev" folder itself, everything under it, AND the
            # root-level "petclinic-develop" sandbox view.
            pattern: "^(pac-dev(/.*)?|petclinic-develop)$"
            permissions:
              - "Job/Read"
              - "Job/Build"
              - "Job/Cancel"
              - "Job/Workspace"
              - "Job/Discover"
              - "Run/Replay"
              - "Job/Configure"
            entries:
              - user: "${JENKINS_PLATFORM_ENGINEER_ID:-platform-engineer}"

# Allows the "seed-jobs" pipeline's jobDsl step (sandbox: false, see
# jenkins/pipelines/seed/Jenkinsfile.seed) to run unsandboxed without
# requiring an administrator to manually approve the script via
# Manage Jenkins > In-process Script Approval on every change. This repo
# IS the controller's source of truth, so its Job DSL scripts are trusted.
security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false

# Default to the dark-theme plugin's "darkSystem" theme (follows the
# browser/OS preference). disableUserThemes: false leaves the per-user
# theme picker (user profile -> Appearance) enabled, so this is just the
# default for anyone who hasn't chosen one.
appearance:
  themeManager:
    disableUserThemes: false
    theme: "darkSystem"

unclassified:
  # unclassified.location.url is intentionally NOT set here - the chart's
  # generated jcasc-default-config.yaml always sets it (to the in-cluster
  # service URL, http://jenkins.<namespace>.svc.cluster.local:8080, unless
  # controller.jenkinsUrl is set), and a second definition here would hit the
  # same JCasC ErrorOnConflictMergeStrategy failure as jenkins.mode (see
  # helm/jenkins/values-common.yaml). scripts/04-jenkins.sh sets
  # controller.jenkinsUrl from J2026_JENKINS_URL (the public gateway URL when
  # enabled, else the kubectl port-forward default) - oic-auth's Google OAuth
  # redirect_uri is derived from this location.url, see README.md "Google
  # login (OpenID Connect)".
  location:
    adminAddress: "address not configured yet <nobody@nowhere>"

  globalLibraries:
    libraries:
      - name: "petclinic-shared-library"
        defaultVersion: "${JENKINS2026_REPO_BRANCH:-main}"
        implicit: true
        allowVersionOverride: true
        includeInChangesets: false
        retriever:
          modernSCM:
            scm:
              git:
                id: "jenkins-2026-shared-lib"
                remote: "${JENKINS2026_REPO_URL:-https://github.com/nubenetes/jenkins-2026.git}"
                traits:
                  - gitBranchDiscovery: {}

credentials:
  system:
    domainCredentials:
      - credentials:
          # Used by the "Build & Push Image" stage (petclinicImage.groovy) to
          # push to PETCLINIC_REGISTRY (default ghcr.io/nubenetes/...).
          - usernamePassword:
              scope: GLOBAL
              id: "container-registry"
              username: "${REGISTRY_USERNAME:-nubenetes}"
              password: "${REGISTRY_PASSWORD:-}"
              description: "Container registry push credentials"
          # Read-only checkout creds for the upstream spring-petclinic repos
          # (only needed if you fork them privately; public repos work
          # without credentials).
          - usernamePassword:
              scope: GLOBAL
              id: "petclinic-git"
              username: "${GIT_USERNAME:-}"
              password: "${GIT_TOKEN:-}"
              description: "Git credentials for spring-petclinic source repos"
