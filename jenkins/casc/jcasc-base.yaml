# =============================================================================
# JCasC fragment: core Jenkins configuration (security, libraries, creds).
# Injected via --set-file controller.JCasC.configScripts.base=<this file>
# by scripts/04-jenkins.sh. ${VAR:-default} placeholders are resolved by
# JCasC from environment variables defined in controller.containerEnv
# (helm/jenkins/values-common.yaml) and the "jenkins-credentials" Secret
# created by scripts/01-namespaces.sh.
# =============================================================================
jenkins:
  numExecutors: 0
  projectNamingStrategy:
    roleBased: {}
  systemMessage: |
    <div style="font-weight: bold; border: 2px solid #0052cc; padding: 15px; border-radius: 8px; background: #f4f7f9; color: #172b4d; font-family: sans-serif;">
      <h2 style="margin-top: 0; color: #0052cc;">Welcome to the Jenkins 2026 PoC!</h2>
      This instance is fully automated and managed via <a href="https://jenkins.io/projects/jcasc/" style="color: #0052cc; text-decoration: underline;">Configuration as Code (JCasC)</a>.<br/>
      Source Repository: <a href="https://github.com/nubenetes/jenkins-2026" style="color: #0052cc; text-decoration: underline;">nubenetes/jenkins-2026</a><br/><br/>

      <b style="color: #0052cc;">Deployed Environments:</b>
      <ul style="margin-bottom: 10px;">
        <li>ArgoCD: <a href="https://argocd.${J2026_GATEWAY_BASE_DOMAIN:-jenkins2026.nubenetes.com}" style="color: #0052cc; text-decoration: underline;">https://argocd.${J2026_GATEWAY_BASE_DOMAIN:-jenkins2026.nubenetes.com}</a></li>
        <li>pgAdmin: <a href="https://pgadmin.${J2026_GATEWAY_BASE_DOMAIN:-jenkins2026.nubenetes.com}" style="color: #0052cc; text-decoration: underline;">https://pgadmin.${J2026_GATEWAY_BASE_DOMAIN:-jenkins2026.nubenetes.com}</a></li>
        <li>Headlamp: <a href="https://headlamp.${J2026_GATEWAY_BASE_DOMAIN:-jenkins2026.nubenetes.com}" style="color: #0052cc; text-decoration: underline;">https://headlamp.${J2026_GATEWAY_BASE_DOMAIN:-jenkins2026.nubenetes.com}</a></li>

        <li>Microservices: <a href="${MICROSERVICES_URL:-#}" style="color: #0052cc; text-decoration: underline;">${MICROSERVICES_URL:-not publicly exposed}</a></li>
      </ul>

      <b style="color: #0052cc;">Observability:</b>
      <ul>
        <li>Grafana: <a href="${GRAFANA_BASE_URL:-#}" style="color: #0052cc; text-decoration: underline;">${GRAFANA_BASE_URL:-not configured}</a>
          <ul style="margin-top: 5px;">
            <li><a href="${GRAFANA_BASE_URL:-#}/d/jenkins2026-jenkins-overview" style="color: #0052cc; text-decoration: underline;">Jenkins Overview</a></li>
            <li><a href="${GRAFANA_BASE_URL:-#}/d/jenkins2026-microservices-overview" style="color: #0052cc; text-decoration: underline;">Microservices Services</a></li>
            <li><a href="${GRAFANA_BASE_URL:-#}/d/jenkins2026-k6-smoke-overview" style="color: #0052cc; text-decoration: underline;">K6 Smoke Test</a></li>
            <li><a href="${GRAFANA_BASE_URL:-#}/alerting/list" style="color: #0052cc; text-decoration: underline;">Alert Rules</a></li>
            ${GRAFANA_K8S_APP_LINK:-}
          </ul>
        </li>
      </ul>
    </div>

  markupFormatter:
    rawHtml:
      disableSyntaxHighlighting: true

  clouds:
    - kubernetes:
        name: "kubernetes"
        serverUrl: "https://kubernetes.default.svc.cluster.local"
        namespace: "${JENKINS_NAMESPACE:-jenkins}"
        jenkinsUrl: "http://jenkins.${JENKINS_NAMESPACE:-jenkins}.svc.cluster.local:8080"
        # Inbound agents connect over the HTTP port (jenkinsUrl, 8080) via a WebSocket
        # upgrade. The cluster encrypts INTER-NODE pod traffic with WireGuard
        # (in_transit_encryption_config), which lowers the effective MTU; the raw JNLP4
        # TLS handshake on the TCP agent port (:50000) then black-holes whenever a
        # build agent lands on a DIFFERENT node from the controller — the connection is
        # accepted but the channel never establishes, surfacing as the seed build
        # failing (GitException "Could not checkout <sha>" / ABORTED). WebSocket rides
        # the proven 8080 HTTP path (the same one the UI/API use), so agents connect
        # regardless of node placement.
        #
        # NOTE: jenkinsTunnel is deliberately OMITTED. Leaving it set exports
        # JENKINS_TUNNEL to the agent, and the inbound-agent entrypoint then builds the
        # connection with BOTH -tunnel and -webSocket — which are mutually exclusive,
        # so the agent prints its usage text and exits 0 ("jnlp terminated (0)" →
        # build ABORTED). See docs/902 / docs/401.
        websocket: true
        containerCapStr: "10"
        connectTimeout: 5
        readTimeout: 15
        retentionTimeout: 5
        waitForPodSec: 600
        maxRequestsPerHostStr: "32"
        templates:
          - name: "default"
            namespace: "${JENKINS_NAMESPACE:-jenkins}"
            containers:
              - name: "jnlp"
                alwaysPullImage: false
                # Pass the agent secret + name positionally. The inbound-agent
                # entrypoint builds the connection command from these, adding
                # -webSocket (from JENKINS_WEB_SOCKET, set by websocket: true above)
                # and NO -tunnel (jenkinsTunnel is omitted). The plugin does NOT inject
                # the secret/name as env for a custom jnlp container, so WITHOUT these
                # args the agent has no credentials and prints its usage text then
                # exits 0 → build ABORTED.
                args: "^${computer.jnlpmac} ^${computer.name}"
                image: "jenkins/inbound-agent:3355.v388858a_47b_33-22"
                privileged: "false"
                resourceLimitCpu: "500m"
                resourceLimitMemory: "512Mi"
                resourceRequestCpu: "100m"
                resourceRequestMemory: "256Mi"

  globalNodeProperties:
    - envVars:
        env:
          # Skip the Git LFS smudge filter on every agent checkout. This repo tracks
          # a few documentation images (docs/notebooklm/*.jpg) in Git LFS, and when
          # the GitHub account's LFS bandwidth budget is exhausted the smudge download
          # 403s ("This repository exceeded its LFS budget"), which fails `git checkout`
          # (exit 128) and aborts the build at SCM checkout. Builds never need those
          # images, so leave the LFS pointer files in place instead of downloading the
          # content. (Permanent alternatives: raise the LFS budget, or migrate the
          # images out of LFS.) See docs/902.
          - key: "GIT_LFS_SKIP_SMUDGE"
            value: "1"
          - key: "GRAFANA_BASE_URL"
            value: "${GRAFANA_BASE_URL:-}"
          - key: "JENKINS2026_REPO_URL"
            value: "${JENKINS2026_REPO_URL:-https://github.com/nubenetes/jenkins-2026.git}"
          - key: "JENKINS2026_REPO_BRANCH"
            value: "${JENKINS2026_REPO_BRANCH:-main}"
          - key: "JENKINS2026_GITOPS_REPO_URL"
            value: "${JENKINS2026_GITOPS_REPO_URL:-https://github.com/nubenetes/jenkins-2026-gitops-config.git}"

  securityRealm:
    oic:
      clientId: "${JENKINS_OIDC_CLIENT_ID:-}"
      clientSecret: "${JENKINS_OIDC_CLIENT_SECRET:-}"
      serverConfiguration:
        wellKnown:
          wellKnownOpenIDConfigurationUrl: "https://accounts.google.com/.well-known/openid-configuration"
          scopesOverride: "openid email profile"
      userNameField: "email"
      emailFieldName: "email"
      fullNameFieldName: "name"
      logoutFromOpenidProvider: true
      userIdStrategy:
        caseSensitive: {}
      groupIdStrategy:
        caseSensitive: {}
      properties:
        - escapeHatch:
            username: "${JENKINS_ADMIN_ID:-admin}"
            secret: "${JENKINS_ADMIN_PASSWORD}"
            group: "escape-hatch-admin"

  # Role-Strategy global roles:
  #   - "admin": Full administrative access.
  #   - "developer": Run and inspect the Microservices pipelines.
  authorizationStrategy:
    roleBased:
      roles:
        global:
          - name: "admin"
            description: "Full administrative access"
            permissions:
              - "Overall/Administer"
            # "assignments" (flat string list) is deprecated in favour of
            # "entries", which disambiguates users vs. groups.
            # - "escape-hatch-admin" is the group the oic-auth escape hatch
            #   above assigns to JENKINS_ADMIN_ID logins.
            # - JENKINS_OIDC_ADMIN_EMAIL (empty until configured) is the
            #   Google account that should have full admin access - the
            #   oic-auth userNameField above is "email", so OIDC usernames
            #   are email addresses.
            entries:
              - group: "escape-hatch-admin"
              - user: "${JENKINS_OIDC_ADMIN_EMAIL:-}"
          - name: "developer"
            description: "Run and inspect the Microservices pipelines"
            permissions:
              - "Overall/Read"
              - "View/Read"
              - "Job/Read"
              - "Job/Build"
              - "Job/Cancel"
              - "Job/Workspace"
              - "Job/Discover"
              - "Run/Replay"
            entries:
              - group: "authenticated"

# Allows the "seed-jobs" pipeline's jobDsl step (sandbox: false, see
# jenkins/pipelines/seed/Jenkinsfile.seed) to run unsandboxed without
# requiring an administrator to manually approve the script via
# Manage Jenkins > In-process Script Approval on every change. This repo
# IS the controller's source of truth, so its Job DSL scripts are trusted.
security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false
  contentSecurityPolicy:
    enforce: true

# Default to the dark-theme plugin's "darkSystem" theme (follows the
# browser/OS preference). disableUserThemes: false leaves the per-user
# theme picker (user profile -> Appearance) enabled, so this is just the
# default for anyone who hasn't chosen one.
appearance:
  themeManager:
    disableUserThemes: false
    theme: "darkSystem"

unclassified:
  # unclassified.location.url is intentionally NOT set here - the chart's
  # generated jcasc-default-config.yaml always sets it (to the in-cluster
  # service URL, http://jenkins.<namespace>.svc.cluster.local:8080, unless
  # controller.jenkinsUrl is set), and a second definition here would hit the
  # same JCasC ErrorOnConflictMergeStrategy failure as jenkins.mode (see
  # helm/jenkins/values-common.yaml). scripts/04-jenkins.sh sets
  # controller.jenkinsUrl from J2026_JENKINS_URL (the public gateway URL when
  # enabled, else the kubectl port-forward default) - oic-auth's Google OAuth
  # redirect_uri is derived from this location.url, see README.md "Google
  # login (OpenID Connect)".
  location:
    adminAddress: "address not configured yet <nobody@nowhere>"
    url: "${JENKINS_PUBLIC_URL:-http://localhost:8080/}"

  globalLibraries:
    libraries:
      - name: "microservices-shared-library"
        defaultVersion: "${JENKINS2026_REPO_BRANCH:-main}"
        implicit: true
        allowVersionOverride: true
        includeInChangesets: false
        retriever:
          modernSCM:
            scm:
              gitSource:
                id: "jenkins-2026-shared-lib"
                remote: "${JENKINS2026_REPO_URL:-https://github.com/nubenetes/jenkins-2026.git}"
                traits:
                  - gitBranchDiscovery: {}

credentials:
  system:
    domainCredentials:
      - credentials:
          # Used by the "Build & Push Image" stage (microservicesImage.groovy) to
          # push to MICROSERVICES_REGISTRY (default ghcr.io/nubenetes/...).
          - usernamePassword:
              scope: GLOBAL
              id: "container-registry"
              username: "${REGISTRY_USERNAME:-nubenetes}"
              password: "${REGISTRY_PASSWORD:-}"
              description: "Container registry push credentials"
          # Read-only checkout creds for the upstream spring-microservices repos
          # (only needed if you fork them privately; public repos work
          # without credentials).
          - usernamePassword:
              scope: GLOBAL
              id: "microservices-git"
              username: "${GIT_USERNAME:-}"
              password: "${GIT_TOKEN:-}"
              description: "Git credentials for spring-microservices source repos"
