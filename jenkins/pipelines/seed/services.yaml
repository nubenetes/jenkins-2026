# services.yaml - Modernized Microservices Registry (JHipster 2026)
# Updated to track the official JHipster sample applications.

namespaces:
  stable: microservices

branches:
  stable: main

services:
  - name: gateway
    type: java # JHipster Gateway (Spring Boot + Angular UI)
    repoUrl: https://github.com/jhipster/jhipster-sample-app-gateway.git
    module: ""
    port: 8080
    healthPath: /management/health

  - name: jhipstersamplemicroservice
    type: java # JHipster Microservice backend
    repoUrl: https://github.com/jhipster/jhipster-sample-app-microservice.git
    module: ""
    port: 8081
    healthPath: /management/health
