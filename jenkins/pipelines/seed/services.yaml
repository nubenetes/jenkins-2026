# services.yaml - Modernized Microservices Registry (JHipster 2026)
# Updated to track the official JHipster sample applications.

namespaces:
  stable: microservices
  develop: microservices-develop

# App SOURCE branch the pipeline checks out and builds. The nubenetes forks now
# carry a real 'develop' branch (created off main), so the develop tier builds
# from the app's 'develop' branch — true branch-based promotion (develop code →
# develop env, promote to main → stable env), not just a different deploy of the
# same main image. The develop tier still also differs in deploy namespace +
# gitops values-develop.yaml. (The gitops-config branch the develop ArgoCD app
# tracks is set separately via config.yaml microservices.branches.develop=develop.)
branches:
  stable: main
  develop: develop

services:
  # Forked into the nubenetes org so we own them (PaC needs webhook/App access).
  # Single source of truth for BOTH CI engines (Jenkins clones these too).
  - name: gateway
    type: java # JHipster Gateway (Spring Boot + Angular UI)
    repoUrl: https://github.com/nubenetes/jhipster-sample-app-gateway.git
    module: ""
    port: 8080
    healthPath: /management/health

  - name: jhipstersamplemicroservice
    type: java # JHipster Microservice backend
    repoUrl: https://github.com/nubenetes/jhipster-sample-app-microservice.git
    module: ""
    port: 8081
    healthPath: /management/health
