# services.yaml - Modernized Microservices Registry (JHipster 2026)
# Updated to track the new microservices architecture.

backendRepoUrl: &backendRepoUrl https://github.com/nubenetes/jenkins-2026.git

namespaces:
  stable: microservices
  develop: microservices-develop

branches:
  stable: main
  develop: main

services:
  - name: gateway
    type: java # JHipster Gateway (Spring Boot + Angular 18)
    repoUrl: *backendRepoUrl
    module: apps/gateway
    port: 8080
    healthPath: /actuator/health

  - name: customers
    type: java # Microservice for Customer/Pet management
    repoUrl: *backendRepoUrl
    module: apps/customers
    port: 8081
    healthPath: /actuator/health

  - name: billing
    type: java # Microservice for Invoices/Payments
    repoUrl: *backendRepoUrl
    module: apps/billing
    port: 8082
    healthPath: /actuator/health
