apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: gateway-vpa
  namespace: microservices
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: gateway
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: gateway
        minAllowed:
          cpu: "100m"
          memory: "512Mi" # Safeguard floor: prevents JVM memory downscaling OOMs
        maxAllowed:
          cpu: "4"
          memory: "6Gi"
        controlledResources: ["cpu", "memory"]
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: microservice-vpa
  namespace: microservices
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: jhipstersamplemicroservice
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
      - containerName: jhipstersamplemicroservice
        minAllowed:
          cpu: "100m"
          memory: "512Mi" # Safeguard floor: prevents JVM memory downscaling OOMs
        maxAllowed:
          cpu: "4"
          memory: "6Gi"
        controlledResources: ["cpu", "memory"]
