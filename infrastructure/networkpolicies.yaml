# Engine-neutral platform NetworkPolicies (applied always by 01-namespaces.sh).
# The Jenkins namespace policies live in networkpolicies-jenkins.yaml and are
# applied only when ci.engine=jenkins (no jenkins namespace exists otherwise).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: pgadmin
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgadmin-policy
  namespace: pgadmin
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - protocol: TCP
      port: 80
  egress:
  - ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: microservices
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: observability-policy
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # OTLP (4317/4318) from whichever CI engine is active (jenkins OR the tekton
  # pipeline namespaces) plus the microservices auto-instrumentation. A
  # namespaceSelector for an absent namespace just matches nothing, so listing
  # both engines here is safe regardless of ci.engine.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: jenkins
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: microservices
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tekton-ci
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tekton-pipelines
    ports:
    - protocol: TCP
      port: 4317
    - protocol: TCP
      port: 4318
  egress:
  - {}
