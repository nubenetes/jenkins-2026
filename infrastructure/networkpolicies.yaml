# Engine-neutral platform NetworkPolicies (applied always by 01-namespaces.sh).
# The Jenkins namespace policies live in networkpolicies-jenkins.yaml and are
# applied only when ci.engine=jenkins (no jenkins namespace exists otherwise).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: pgadmin
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgadmin-policy
  namespace: pgadmin
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pgadmin4
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Plain HTTP (default posture) on 80, and the TLS pod port 8443 when the opt-in
  # backend-TLS feature is active (gateway.backendTls, docs/504) — pgAdmin then
  # serves HTTPS on 8443 (targetPort). Both listed unconditionally: this policy is
  # static (applied always by 01-namespaces.sh, not flag-aware) and NetworkPolicy
  # ingress ports are additive, so the unused port is harmless in either mode. The
  # LB/health-check ranges reach the serving port from Google's fabric (no `from`
  # selector = all sources), like the headlamp-baseline pod-port allow.
  - ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 8443
  egress:
  - ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: microservices
    # Optional 'develop' tier — harmless when absent (matches nothing).
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: microservices-develop
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: observability-policy
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Intra-namespace mesh. The OSS stack components query each other heavily:
  # Grafana -> Prometheus/Loki/Tempo, Prometheus scraping kube-state-metrics /
  # node-exporter, the OTel collector -> Loki/Tempo, remote-write -> Prometheus.
  # Without this, Dataplane V2 enforcement (NetworkPolicies are no-ops until then)
  # would break every internal query and scrape — and the OTLP ingress below only
  # covers traffic FROM the CI namespaces, not within observability itself.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability
  # OTLP (4317/4318) from whichever CI engine is active (jenkins, the tekton
  # pipeline namespaces, the ARC runner namespace, or the Argo Workflows execution
  # namespace) plus the microservices auto-instrumentation. A namespaceSelector for
  # an absent namespace just matches nothing, so listing every engine here is safe
  # regardless of ci.engine — the CI build/k6 steps push their spans/metrics to the
  # collector from the engine's run namespace, so each must be allowed in.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: jenkins
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: microservices
    # Optional 'develop' deploy tier (microservices.developTrackEnabled). A
    # namespaceSelector for an absent namespace matches nothing, so this is harmless
    # when the tier is off and lets develop's apps push OTLP when it is on.
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: microservices-develop
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tekton-ci
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tekton-pipelines
    # ci.engine=argoworkflows: the Workflow/k6 pods push OTLP from the run namespace.
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: argo-ci
    # ci.engine=githubactions: the ARC runner pods (incl. the k6 step) push OTLP.
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: arc-runners
    ports:
    - protocol: TCP
      port: 4317
    - protocol: TCP
      port: 4318
  # GKE global external L7 Gateway: health checks + proxied user traffic to the
  # in-cluster Grafana (exposed via the Gateway in observability.mode=oss). The
  # managed load balancer sends from Google's ranges, NOT from a pod, so they
  # must be allowed by CIDR or the Grafana backend goes UNHEALTHY under
  # enforcement. https://cloud.google.com/load-balancing/docs/health-check-concepts
  - from:
    - ipBlock:
        cidr: 130.211.0.0/22
    - ipBlock:
        cidr: 35.191.0.0/16
  # Admission webhooks served from this namespace that the API SERVER calls — the
  # OTel Operator's mutating webhooks on 9443 (minstrumentation.kb.io /
  # mopentelemetrycollectorbeta.kb.io with failurePolicy=Fail, and mpod.kb.io
  # which injects the OTel Java agent). The caller is the control plane, not a pod
  # or the LB ranges, so it isn't covered above; without this the Fail-policy
  # webhooks block applying the Instrumentation/Collector CRs (microservices-stable
  # stuck OutOfSync) and mpod silently skips agent injection under enforcement.
  # Only the operator pod listens on 9443, so allowing it from any source is safe.
  - ports:
    - protocol: TCP
      port: 9443
  egress:
  - {}
---
# Baseline ingress-hardening for the ArgoCD UI namespace (zero-trust): deny
# inbound to the internal components (repo-server, redis, dex, controllers) from
# OTHER namespaces, while keeping argocd-server's API/UI ports reachable. Egress
# stays open (ArgoCD reaches the API server of every namespace, git, and OCI
# registries). No admission webhooks here, so this is safe under Dataplane V2.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: argocd-baseline
  namespace: argocd
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Intra-namespace mesh (server <-> repo-server <-> redis <-> dex <-> the
  # application/applicationset controllers).
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: argocd
  # argocd-server pod port 8080 (the containerPort both Service ports 80/443 target;
  # the GKE container-native LB/NEG sends to the pod's targetPort, so this MUST be
  # 8080, not 80/443, or the backend goes UNHEALTHY). RESTRICTED (was "from ANY"):
  # once ArgoCD is IAP-fronted with the Dex authproxy connector, argocd-server trusts
  # the X-Goog-Authenticated-User-Email header WITHOUT verifying IAP's signed JWT — so
  # any pod that can reach :8080 could forge that header and take over ArgoCD as admin
  # (docs/501 § header-spoof). Allow ONLY: the GKE global-LB + health-check IP ranges
  # (browser-via-IAP data path + NEG probes both originate here) and the CI
  # deploy-caller namespaces (they token-auth `argocd app sync`; token auth is
  # independent of the header). Non-existent namespaces simply don't match. Human
  # break-glass uses `argocd login --core` (talks to the k8s API, no network hop to
  # the pod), so tightening this does NOT remove the recovery path.
  - from:
    - ipBlock:
        cidr: 130.211.0.0/22
    - ipBlock:
        cidr: 35.191.0.0/16
    - namespaceSelector:
        matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values: [jenkins, tekton-pipelines, argo, argo-ci, arc-runners]
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - {}
---
# Baseline ingress-hardening for Headlamp (zero-trust): the only inbound is the
# GKE Gateway to the UI (port 80); Headlamp reaches the Kubernetes API via
# egress. No admission webhooks, so safe under Dataplane V2.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: headlamp-baseline
  namespace: headlamp
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: headlamp
  # Headlamp UI from any source — GKE Gateway + health checks. POD port 4466
  # (the headlamp containerPort that Service port 80 targets) — the container-
  # native LB sends to the pod's targetPort, not the Service port.
  - ports:
    - protocol: TCP
      port: 4466
  egress:
  - {}
---
# Platform-level allows for the microservices namespace that the app chart's own
# NetworkPolicies (managed in the microservices GitOps repo) don't cover correctly
# under enforcement:
#   - gateway/microservice apps -> their CloudNativePG Postgres (pooler + instances)
#     on 5432. The chart's gateway-policy/microservice-policy egress targets
#     app.kubernetes.io/name: postgres-*[-pooler], which NO CNPG pod carries (CNPG
#     labels pods app.kubernetes.io/name=postgresql + cnpg.io/cluster=<name>), so
#     under enforcement liquibase times out and the apps CrashLoop. This selects by
#     cnpg.io/cluster, which they do carry.
#   - Prometheus (observability) -> CNPG metrics on 9187 (the postgres-policy
#     ingress only allows 5432).
#   - the CNPG operator (cnpg-system) -> each instance's status web server on 8000,
#     so it can extract instance status (else the Cluster's Ready condition stays
#     False under enforcement — see the inline note on that ingress rule).
# Additive: a SEPARATE policy the ArgoCD microservices app does not own, so it is
# not reverted on sync, and (being in git) it survives cluster recreates. The
# durable app-side fix still belongs in the GitOps chart's egress selectors.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: microservices-cnpg-platform
  namespace: microservices
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  egress:
  - to:
    - podSelector:
        matchExpressions:
        - key: cnpg.io/cluster
          operator: Exists
    ports:
    - protocol: TCP
      port: 5432
  # Kubernetes API server (443). The jhipstersamplemicroservice uses Hazelcast
  # with Kubernetes member discovery, which queries the API server; without this
  # egress it logs "Couldn't connect to the service" and never becomes Ready under
  # enforcement. The API server is the control plane (not a pod/namespace), so it
  # is allowed by port with no selector. The chart's microservice-policy egress
  # omits this.
  - ports:
    - protocol: TCP
      port: 443
  # GKE Workload Identity: the CNPG postgres pods authenticate to GCS (barman WAL
  # backups) as their bound GSA (terraform/gke pg_backups) via the node-local
  # metadata server. Under this namespace's default-deny egress that link-local
  # endpoint is blocked, so the WI token fetch fails and barman reports "Project
  # was not passed and could not be auto-detected" (Cluster ContinuousArchiving=
  # False). 169.254.169.254: :80 is the GCE metadata proxied by the
  # gke-metadata-server DaemonSet, :988 its own listener. The apps don't use WI,
  # but this policy is namespace-wide (podSelector: {}) and the allow is harmless.
  - to:
    - ipBlock:
        cidr: 169.254.169.254/32
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 988
  ingress:
  # Prometheus (observability) -> CNPG metrics on 9187.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability
    ports:
    - protocol: TCP
      port: 9187
  # The CNPG operator (cnpg-system) -> each instance's status web server on 8000.
  # The operator polls this to extract instance status; under enforcement the
  # microservices default-deny blocks it, so the operator logs "Cannot extract Pod
  # status" / "HTTP communication issue", the Cluster's Ready condition stays False
  # ("Instance Status Extraction Error"), and microservices-stable rolls up to
  # Degraded — even though postgres is actually serving on 5432 and the apps work.
  # (cnpg-system has no NetworkPolicies, so its egress is already open; only this
  # ingress allow is needed.)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cnpg-system
    ports:
    - protocol: TCP
      port: 8000
