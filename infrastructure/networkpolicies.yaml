# Engine-neutral platform NetworkPolicies (applied always by 01-namespaces.sh).
# The Jenkins namespace policies live in networkpolicies-jenkins.yaml and are
# applied only when ci.engine=jenkins (no jenkins namespace exists otherwise).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: pgadmin
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgadmin-policy
  namespace: pgadmin
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pgadmin
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - protocol: TCP
      port: 80
  egress:
  - ports:
    - protocol: TCP
      port: 443
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: microservices
    ports:
    - protocol: TCP
      port: 5432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: observability-policy
  namespace: observability
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Intra-namespace mesh. The OSS stack components query each other heavily:
  # Grafana -> Prometheus/Loki/Tempo, Prometheus scraping kube-state-metrics /
  # node-exporter, the OTel collector -> Loki/Tempo, remote-write -> Prometheus.
  # Without this, Dataplane V2 enforcement (NetworkPolicies are no-ops until then)
  # would break every internal query and scrape — and the OTLP ingress below only
  # covers traffic FROM the CI namespaces, not within observability itself.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability
  # OTLP (4317/4318) from whichever CI engine is active (jenkins OR the tekton
  # pipeline namespaces) plus the microservices auto-instrumentation. A
  # namespaceSelector for an absent namespace just matches nothing, so listing
  # both engines here is safe regardless of ci.engine.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: jenkins
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: microservices
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tekton-ci
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: tekton-pipelines
    ports:
    - protocol: TCP
      port: 4317
    - protocol: TCP
      port: 4318
  # GKE global external L7 Gateway: health checks + proxied user traffic to the
  # in-cluster Grafana (exposed via the Gateway in observability.mode=oss). The
  # managed load balancer sends from Google's ranges, NOT from a pod, so they
  # must be allowed by CIDR or the Grafana backend goes UNHEALTHY under
  # enforcement. https://cloud.google.com/load-balancing/docs/health-check-concepts
  - from:
    - ipBlock:
        cidr: 130.211.0.0/22
    - ipBlock:
        cidr: 35.191.0.0/16
  egress:
  - {}
