# Jenkins namespace NetworkPolicies - applied by 01-namespaces.sh ONLY when
# ci.engine=jenkins (the jenkins namespace doesn't exist in tekton mode).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: jenkins
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jenkins-policy
  namespace: jenkins
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: jenkins
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # 8080: the controller HTTP port — serves the GKE Gateway/LB + health checks AND
  # the build agents' WebSocket connection (websocket: true in jcasc-base.yaml).
  # Open (no `from`) so both the LB and any in-cluster agent pod can reach it.
  - ports:
    - protocol: TCP
      port: 8080
  # 50000: the legacy direct-JNLP tcpSlaveAgentListener. Unused while agents connect
  # over WebSocket (above), but kept as a harmless fallback for intra-ns agents.
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 50000
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability
    ports:
    - protocol: TCP
      port: 8080
  egress:
  - {}
---
# Jenkins build agents (Kubernetes-plugin pods, label jenkins=slave) are
# OUTBOUND-ONLY: they connect to the controller over WebSocket on its HTTP port
# (8080; websocket: true in jcasc-base.yaml — chosen because WireGuard inter-node
# encryption black-holes the raw JNLP4 TCP channel cross-node) and reach
# git/registry/ArgoCD/the microservices for builds. The
# default-deny above caps EVERY pod's egress at DNS, and jenkins-policy's open
# egress only covers the controller (app.kubernetes.io/name=jenkins) — so without
# this the agents can't even reach the controller and every build (starting with
# the seed job) hangs at "Waiting for agent to connect" until it times out. Open
# egress (they need no ingress); mirrors the tekton-ci-baseline for pipeline pods.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: jenkins-agent-policy
  namespace: jenkins
spec:
  podSelector:
    matchLabels:
      jenkins: slave
  policyTypes:
  - Egress
  egress:
  - {}
