apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-store
spec:
  provider:
    gcpsm:
      # Omit projectID to default to the hosting GKE node's GCP project
      auth:
        # Authenticate via Workload Identity using default credentials
        secretRef: ~
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jenkins-credentials
  namespace: jenkins
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-store
    kind: ClusterSecretStore
  target:
    name: jenkins-credentials
    creationPolicy: Owner
  dataFrom:
  - extract:
      key: jenkins-credentials
---
