# =============================================================================
# External Secrets Operator (ESO) — reference manifests
# =============================================================================
# This file documents the SHAPE of the ESO wiring. The LIVE objects are applied
# by scripts/08.6-eso-sync.sh when secrets.backend=eso, which generates the
# ExternalSecrets for the *actual* active namespaces (jenkins XOR tekton-ci, +
# grafana when observability.mode=oss) — namespaces a static file can't know.
#
# Flow: 01-namespaces.sh pushes the value to GCP Secret Manager (via
# scripts/lib/secrets.sh) → the ClusterSecretStore below authenticates to Secret
# Manager with Workload Identity (keyless) → each ExternalSecret projects it into
# a namespace as a normal k8s Secret. See docs/201-ARCHITECTURE.md § Secrets
# Management.
# -----------------------------------------------------------------------------
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: gcp-store
spec:
  provider:
    gcpsm:
      # projectID omitted → defaults to the hosting GKE node's GCP project.
      # auth omitted → Workload Identity: the node SA needs
      # roles/secretmanager.secretAccessor (granted in terraform/gke).
      auth: {}
---
# Stage 1 (active): the gateway IAP OAuth secret, projected into every namespace
# whose GCPBackendPolicy needs it. 08.6-eso-sync.sh emits one of these per active
# namespace; this is the canonical example.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: gateway-iap-oauth
  namespace: headlamp
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-store
    kind: ClusterSecretStore
  target:
    name: gateway-iap-oauth
    creationPolicy: Owner
  dataFrom:
    - extract:
        key: gateway-iap-oauth
# -----------------------------------------------------------------------------
# Stage 2 (NOW wired — generated live by 08.6-eso-sync.sh es_* emitters): the
# values are pushed to Secret Manager by 01-namespaces.sh (provision_secret) and
# projected by these ExternalSecret shapes:
#   - gateway-iap-oauth-client-secret  — single-property projection (client_secret)
#   - tekton-github-webhook-secret     — plain extract                (tekton-ci)
#   - k6-cloud                         — plain extract     (tekton-ci OR arc-runners)
#   - <tekton registry>                — dockerconfigjson template    (tekton-ci)
#   - <tekton git>                     — basic-auth template + tekton.dev/git-0
#   - arc-github-app                   — plain extract                (arc-runners)
#   - arc-registry                     — dockerconfigjson template    (arc-runners)
#   - ghcr-credentials                 — dockerconfigjson template    (microservices)
#
# Reference shapes for the templated kinds (08.6 emits these inline):
#   target.template.type: kubernetes.io/dockerconfigjson  (engineVersion: v2)
#     data: .dockerconfigjson rebuilt from username/password/registry properties
#   target.template.type: kubernetes.io/basic-auth        (engineVersion: v2)
#     metadata.annotations.tekton.dev/git-0; data: username/password properties
#
# Group 3 (NOW wired — generated / multi-writer, via seed-then-project):
#   - jenkins-credentials   admin-password seeded STABLE into SM (sm_keep_or_generate);
#                           projected with creationPolicy: Merge so the URL keys (01) +
#                           argocd-token (08.5) patched onto the Secret survive
#   - headlamp-credentials  all 6 keys deterministic + single-writer → plain extract (Owner)
#   - pac-webhook           HMAC seeded generated-if-absent (stable) → extract (Owner)
#   - backstage-secrets     BACKEND_SECRET seeded STABLE (sm_keep_or_generate); projected
#                           with creationPolicy: Merge so the ARGOCD_USERNAME/PASSWORD
#                           keys 08.95-backstage.sh patches onto the Secret survive
#                           (backstage.enabled; the gateway-iap-oauth + ghcr-credentials
#                           projections also gain the backstage namespace)
#
# STILL imperative (Group 4 — no upstream value to push to Secret Manager):
#   - tekton-argocd         (token minted in-cluster by ArgoCD at deploy time)
#   - grafana-cloud-credentials / azure-monitor-credentials / aws-managed-credentials
#                           (per-mode observability creds from Terraform outputs)
# See docs/201 § Secrets Management for the rationale + the staged rollout.
# =============================================================================
