# Overlay for Google Kubernetes Engine (GKE), latest stable channel.
# Layered on top of values-common.yaml.

controller:
  serviceType: ClusterIP

  # Disabled by default (PoC has no real DNS record). Flip to true and set
  # hostName to expose Jenkins through GKE's GCE ingress controller.
  ingress:
    enabled: false
    ingressClassName: gce
    annotations:
      kubernetes.io/ingress.class: "gce"
    hostName: ""
    tls: []

persistence:
  enabled: true
  storageClass: standard-rwo
  accessMode: ReadWriteOnce
  size: 8Gi

agent:
  # GKE node pools commonly use containerd; no special agent tweaks required.
  workingDir: "/home/jenkins/agent"
