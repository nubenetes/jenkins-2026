agent:
  containerCap: 2
  # Per-pipeline pod templates (maven/node/dind/kubectl/helm containers) are
  # defined inline in jenkins/pipelines/Jenkinsfile.microservices via the
  # `agent { kubernetes { yaml ... } }` directive, so we keep the chart-level
  # default agent minimal. Only the limits differ from the chart default
  # (512m/512Mi requests/limits) - requests are left at that default.
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"

rbac:
  readSecrets: true
