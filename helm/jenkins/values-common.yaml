# =============================================================================
# Base values for the jenkinsci/helm-charts "jenkins" chart, shared by every
# platform. The GKE overlay (values-gke.yaml) is layered on top by
# scripts/04-jenkins.sh:
#
#   helm upgrade --install jenkins jenkins/jenkins \
#     -f helm/jenkins/values-common.yaml \
#     -f helm/jenkins/values-<platform>.yaml \
#     --set-file controller.JCasC.configScripts.base=jenkins/casc/jcasc-base.yaml \
#     --set-file controller.JCasC.configScripts.otel=jenkins/casc/jcasc-otel.yaml \
#     --set-file controller.JCasC.configScripts.seed-job=jenkins/casc/jcasc-seed-job.yaml \
#     ...
#
# Chart origin: https://github.com/jenkinsci/helm-charts (charts/jenkins),
# published at https://charts.jenkins.io as jenkins/jenkins.
# config/config.yaml jenkins.chart.version is "" (always installs latest) -
# chart 5.9.25 / appVersion 2.555.3 as of 2026-06-13. Default values.yaml for
# comparison:
# https://github.com/jenkinsci/helm-charts/blob/main/charts/jenkins/values.yaml
#
# This file and the platform overlays set ONLY the values that differ from
# that chart default. Notably already at their chart default and NOT
# repeated here: controller.image.registry/repository,
# controller.serviceType/servicePort/targetPort, controller.JCasC
# (defaultConfig/configScripts - populated at install time via --set-file
# above instead), controller.csrf.defaultCrumbIssuer,
# controller.containerSecurityContext, controller.numExecutors,
# controller.ingress.enabled, controller.additionalPlugins,
# persistence.enabled/size, agent.enabled, rbac.create,
# serviceAccount.create/name (fullname defaults to "jenkins" for release
# name "jenkins"), networkPolicy.enabled.
# =============================================================================

controller:
  image:
    # jdk17 controller images stopped being published after the 2.479.x
    # line - current LTS ships as <version>-lts-jdk21. 2.555.3 is the
    # latest LTS as of 2026-06-13 (https://www.jenkins.io/changelog-stable/).
    # installPlugins below is pinned against this exact tag - bump both
    # together (see the regeneration recipe in the installPlugins comment).
    tag: "2.555.3-lts-jdk21"
    # Chart default is "Always" (controller.image.pullPolicy, NOT the
    # similarly-named top-level controller.imagePullPolicy, which this chart
    # doesn't read) - pin to IfNotPresent since our tag is a fixed version,
    # not "latest".
    pullPolicy: IfNotPresent

  # Enable the Raw HTML Markup Formatter (requires antisamy-markup-formatter plugin)
  enableRawHtmlMarkupFormatter: true

  # Disable the Helm chart's default JCasC configuration to prevent conflicts
  # with our custom scripts in jenkins/casc/*.yaml. The real JCasC is delivered
  # as labeled ConfigMaps the config sidecar auto-reloads, created by
  # scripts/04-jenkins.sh from jenkins/casc/* (the single source of truth) -
  # ArgoCD installs the chart from git and can't `--set-file` those in. The no-op
  # configScripts entry below guarantees the chart wires up JCasC
  # (CASC_JENKINS_CONFIG) + the config-reload sidecar so those external
  # ConfigMaps are discovered and merged.
  JCasC:
    defaultConfig: false
    configScripts:
      zzz-external-configmaps: |
        # Intentionally empty. Real JCasC lives in jenkins/casc/* and is applied
        # as labeled ConfigMaps (jenkins-jenkins-config=true) by 04-jenkins.sh;
        # the sidecar auto-reloads them. See docs/401-JENKINS.md "GitOps".

  # We drive everything through pipeline agents; no executors on controller
  # (numExecutors: 0 is also the chart default, so left unset here).
  # executorMode feeds the chart's generated jcasc-default-config.yaml
  # (jenkins.mode). Set here rather than in jenkins/casc/jcasc-base.yaml so
  # JCasC doesn't see the same key from two YAML sources - the
  # configuration-as-code plugin's ErrorOnConflictMergeStrategy fails the
  # whole controller startup ("Found conflicting configuration ...
  # jenkins.mode") on any duplicate, even with equal values.
  executorMode: EXCLUSIVE

  resources:
    requests:
      cpu: "500m"
      memory: "1536Mi"
    limits:
      cpu: "1.5"
      memory: "3072Mi"

  # Environment variables consumed by the ${VAR:-default} placeholders in
  # jenkins/casc/*.yaml. This list is COMPLETE and committed (ArgoCD installs the
  # chart from git, so there is no runtime --set/--set-file overlay anymore — see
  # docs/401-JENKINS.md "GitOps"). Two kinds of value:
  #   - static `value:` — project constants (platform=gke, the self/gitops repo
  #     URLs, the registry, the in-cluster OTel/ArgoCD service DNS).
  #   - `valueFrom secretKeyRef` on "jenkins-credentials" — the values that vary
  #     per deployment or are secret. scripts/04-jenkins.sh patches the dynamic,
  #     non-secret ones (public URL, repo branch, Grafana links, feature flags)
  #     into that Secret before applying the ArgoCD Application; 01-namespaces.sh
  #     creates the secret ones. All secret-backed entries are optional except
  #     the admin password.
  # controller.jenkinsUrl (location) is passed as a helm parameter by
  # scripts/04-jenkins.sh (it varies with gateway.baseDomain), as is the
  # banner-links checksum pod annotation that rolls the controller when the
  # Secret-backed banner values change (ArgoCD won't roll on out-of-band Secret
  # edits otherwise).
  containerEnv:
    - name: JENKINS_ADMIN_ID
      value: "admin"
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: admin-password
    - name: JENKINS_URL
      value: "http://localhost:8080/"
    # The controller's own namespace (downward API) - was injected by the script.
    - name: JENKINS_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    # Public root URL (https://jenkins.<gateway.baseDomain>); patched into the
    # Secret by scripts/04-jenkins.sh. Empty when the gateway is disabled.
    - name: JENKINS_PUBLIC_URL
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: jenkins-public-url
          optional: true
    # Project constants (single supported platform / fixed repos+registry+DNS).
    - name: JENKINS2026_REPO_URL
      value: "https://github.com/nubenetes/jenkins-2026.git"
    - name: JENKINS2026_GITOPS_REPO_URL
      value: "https://github.com/nubenetes/jenkins-2026-gitops-config.git"
    - name: JENKINS2026_PLATFORM
      value: "gke"
    - name: MICROSERVICES_REGISTRY
      value: "ghcr.io/nubenetes/jenkins-2026-microservices"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://otel-collector-gateway.observability.svc.cluster.local:4317"
    - name: ARGOCD_SERVER
      value: "argocd-server.argocd.svc.cluster.local"
    # Active branch (main|develop) - patched into the Secret by scripts/04-jenkins.sh.
    - name: JENKINS2026_REPO_BRANCH
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: repo-branch
          optional: true
    - name: JENKINS2026_GENAI_SERVICE_ENABLED
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: genai-enabled
          optional: true
    - name: JENKINS2026_DEVELOP_TRACK_ENABLED
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: develop-enabled
          optional: true
    - name: GRAFANA_BASE_URL
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: grafana-base-url
          optional: true
    # Per-observability-mode "Kubernetes Infrastructure" banner links, computed
    # and patched into the Secret by scripts/04-jenkins.sh.
    - name: GRAFANA_K8S_APP_LINK
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: grafana-k8s-app-link
          optional: true
    # Public URL of the stable Microservices (https://microservices.<gateway.baseDomain>),
    # empty if the Gateway feature (config/config.yaml gateway.baseDomain) is
    # disabled - refreshed on every scripts/01-namespaces.sh run. Surfaced in
    # the systemMessage banner by jcasc-base.yaml.
    - name: MICROSERVICES_URL
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: microservices-url
          optional: true

    - name: REGISTRY_USERNAME
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: registry-username
          optional: true
    - name: REGISTRY_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: registry-password
          optional: true
    - name: GIT_USERNAME
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: git-username
          optional: true
    - name: GIT_TOKEN
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: git-token
          optional: true
    # Google login (OpenID Connect) - see securityRealm.oic in
    # jenkins/casc/jcasc-base.yaml. Empty until JENKINS_OIDC_CLIENT_ID/SECRET
    # are set (see README.md "Jenkins" Google login section) - the escape
    # hatch (JENKINS_ADMIN_ID/PASSWORD) still works for login/API access in
    # the meantime.
    - name: JENKINS_OIDC_CLIENT_ID
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: oidc-client-id
          optional: true
    - name: JENKINS_OIDC_CLIENT_SECRET
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: oidc-client-secret
          optional: true
    - name: JENKINS_OIDC_ADMIN_EMAIL
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: oidc-admin-email
          optional: true
    # ArgoCD API token (account "jenkins"), minted by scripts/08.5-argocd.sh into
    # the Secret. The pipeline's Deploy stage uses it to `argocd app sync`.
    - name: ARGOCD_AUTH_TOKEN
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: argocd-token
          optional: true

  # Chart default (podSecurityContextOverride: ~) falls back to the
  # deprecated controller.runAsUser/fsGroup/fsGroupChangePolicy keys, which
  # also produce fsGroup: 1000 but additionally set runAsUser and
  # fsGroupChangePolicy on the pod securityContext. Override with just
  # fsGroup so the pod-level securityContext is minimal (runAsUser/
  # runAsGroup are set at the container level instead, via the chart's
  # default controller.containerSecurityContext).
  podSecurityContextOverride:
    fsGroup: 1000

  # Curated plugin set for: kubernetes agents, git/github multibranch,
  # JCasC, Job DSL seed jobs, OpenTelemetry tracing, pipeline UX, MCP.
  #
  # Pinned for reproducibility: every plugin below - including transitive
  # dependencies - is pinned to the exact version the
  # plugin-installation-manager-tool resolves as compatible with
  # controller.image.tag's Jenkins core (2.555.3, as of 2026-06-13). This
  # makes every controller pod start install an identical plugin set, so a
  # routine pod restart can't silently pick up a newer (possibly breaking)
  # plugin or dependency version - a previous unversioned list caused
  # exactly that kind of drift.
  #
  # To regenerate after bumping controller.image.tag or the top-level list
  # below (the first 20 entries), run from the repo root:
  #
  #   printf '%s\n' kubernetes workflow-aggregator git github-branch-source \
  #     configuration-as-code job-dsl cloudbees-folder pipeline-utility-steps \
  #     pipeline-stage-view pipeline-graph-view opentelemetry \
  #     credentials-binding role-strategy matrix-auth \
  #     antisamy-markup-formatter timestamper ws-cleanup durable-task \
  #     dark-theme mcp-server oic-auth > /tmp/plugins.txt
  #   docker run --rm --user root \
  #     -v /tmp/plugins.txt:/plugins.txt -v /tmp/resolved:/ref \
  #     jenkins/jenkins:<new-tag> \
  #     jenkins-plugin-cli --plugin-file /plugins.txt \
  #       --plugin-download-directory /ref --verbose \
  #   | grep -oP 'Downloaded \S+ from \S+/plugins/\K[^/]+/[^/]+(?=/[^/]+\.(hpi|jpi))' \
  #   | sort -u
  #
  # ... then replace the full list below (top-level entries keep their
  # comments; everything else is "transitive dependencies", sorted).
  installPlugins:
    # --- top-level (curated) ---
    - kubernetes:4423.vb_59f230b_ce53
    - workflow-aggregator:608.v67378e9d3db_1
    - git:5.10.1
    - github-branch-source:1967.1969.v205fd594c821
    - configuration-as-code:2088.ve3b_42c663c80
    - job-dsl:3654.vdf58f53e2d15
    # Provides folder support.
    - cloudbees-folder:6.1100.ve9eed61d16c4
    - pipeline-utility-steps:3.810.va_7672d206740
    - pipeline-stage-view:2.41
    # Modern, lightweight pipeline visualization (pan/zoom stage graph) -
    # the maintained successor to the discontinued Blue Ocean. Adds a
    # "Pipeline Graph" tab to every build page, no extra config needed.
    - pipeline-graph-view:940.v790e7a_c51722
    - opentelemetry:3.1589.ve81b_b_fa_927d5
    - credentials-binding:725.ve52b_2328a_fde
    - role-strategy:867.vd09254229f9b_
    - matrix-auth:3.2.10
    - antisamy-markup-formatter:173.v680e3a_b_69ff3
    - timestamper:1.30
    - ws-cleanup:0.49
    - durable-task:671.v340ff7959010
    # Native dark mode - see appearance.themeManager in
    # jenkins/casc/jcasc-base.yaml.
    - dark-theme:652.vea_da_dfea_e769
    # Exposes Jenkins (jobs, builds, logs, SCM) as an MCP server for
    # LLM/agent clients - see README.md "Headlamp" sibling section on MCP
    # tooling for how to point an MCP client at it.
    - mcp-server:0.177.v629fdb_2557fe
    # Google login (OpenID Connect) - see securityRealm.oic in
    # jenkins/casc/jcasc-base.yaml and README.md "Jenkins" Google login section.
    - oic-auth:4.690.v5821cf665e43
    # Static analysis reporting plugin
    - warnings-ng:13.10097.v277a_958a_b_c09
    # --- transitive dependencies (pinned for reproducibility) ---
    - apache-httpcomponents-client-4-api:4.5.14-269.vfa_2321039a_83
    - apache-httpcomponents-client-5-api:5.6.1-195.v65ffe15189a_d
    - asm-api:9.10.1-216.va_9256d3b_844b_
    - authentication-tokens:1.144.v5ff4a_5ec5c33
    - bootstrap5-api:5.3.8-1048.va_c299057e35c
