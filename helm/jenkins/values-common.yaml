# =============================================================================
# Base values for the jenkinsci/helm-charts "jenkins" chart, shared by every
# platform. A platform-specific overlay (values-gke.yaml, values-eks.yaml,
# values-aks.yaml or values-openshift.yaml) is layered on top by
# scripts/04-jenkins.sh:
#
#   helm upgrade --install jenkins jenkins/jenkins \
#     -f helm/jenkins/values-common.yaml \
#     -f helm/jenkins/values-<platform>.yaml \
#     --set-file controller.JCasC.configScripts.base=jenkins/casc/jcasc-base.yaml \
#     --set-file controller.JCasC.configScripts.otel=jenkins/casc/jcasc-otel.yaml \
#     --set-file controller.JCasC.configScripts.seed-job=jenkins/casc/jcasc-seed-job.yaml \
#     ...
# =============================================================================

controller:
  image:
    registry: docker.io
    repository: jenkins/jenkins
    # jdk17 controller images stopped being published after the 2.479.x
    # line - current LTS ships as <version>-lts-jdk21. Pin to a recent LTS
    # so installPlugins (unversioned, see below) has a core new enough for
    # whatever the update center currently considers "latest".
    tag: "2.555.3-lts-jdk21"
  imagePullPolicy: IfNotPresent

  # We drive everything through pipeline agents; no executors on controller.
  numExecutors: 0
  # Both feed the chart's generated jcasc-default-config.yaml (jenkins.mode /
  # jenkins.numExecutors). Set here rather than in jenkins/casc/jcasc-base.yaml
  # so JCasC doesn't see the same key from two YAML sources - the
  # configuration-as-code plugin's ErrorOnConflictMergeStrategy fails the
  # whole controller startup ("Found conflicting configuration ... jenkins.mode")
  # on any duplicate, even with equal values.
  executorMode: EXCLUSIVE

  resources:
    requests:
      cpu: "200m"
      memory: "1024Mi"
    limits:
      cpu: "2"
      memory: "4096Mi"

  serviceType: ClusterIP
  servicePort: 8080
  targetPort: 8080

  # JEPL pipelines created by the seed job + JCasC base/otel fragments are
  # supplied at install time via --set-file (see scripts/04-jenkins.sh). Each
  # key below becomes a section under controller.JCasC.configScripts.
  JCasC:
    defaultConfig: true
    configScripts: {}

  # Environment variables consumed by the ${VAR:-default} placeholders in
  # jenkins/casc/*.yaml. scripts/04-jenkins.sh overrides JENKINS2026_*,
  # PETCLINIC_*, OTEL_* and JENKINS_URL via --set from config/config.yaml;
  # the remaining secret-backed values come from the "jenkins-credentials"
  # Secret created by scripts/01-namespaces.sh (all optional except the
  # admin password, which the script generates if absent).
  containerEnv:
    - name: JENKINS_ADMIN_ID
      value: "admin"
    - name: JENKINS_ADMIN_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: admin-password
    - name: JENKINS_PLATFORM_ENGINEER_ID
      value: "platform-engineer"
    - name: JENKINS_PLATFORM_ENGINEER_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: platform-engineer-password
    - name: JENKINS_URL
      value: "http://localhost:8080/"
    - name: JENKINS2026_REPO_URL
      value: "https://github.com/nubenetes/jenkins-2026.git"
    - name: JENKINS2026_REPO_BRANCH
      value: "main"
    # Branch the "pac-dev/seed-jobs-dev" job (and the pac-dev/* jobs it
    # generates) track instead of JENKINS2026_REPO_BRANCH - see
    # jenkins/casc/jcasc-seed-job.yaml and README.md "Pipelines-as-code dev
    # sandbox".
    - name: JENKINS2026_DEV_REPO_BRANCH
      value: "develop"
    - name: JENKINS2026_PLATFORM
      value: "gke"
    - name: PETCLINIC_REGISTRY
      value: "ghcr.io/nubenetes/jenkins-2026-petclinic"
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: "http://otel-collector-gateway.observability.svc.cluster.local:4317"
    - name: OTEL_LOGS_BACKEND_URL
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: otel-logs-backend-url
          optional: true
    - name: GRAFANA_BASE_URL
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: grafana-base-url
          optional: true
    - name: GRAFANA_TRACES_DASHBOARD_UID
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: grafana-traces-dashboard-uid
          optional: true
    - name: REGISTRY_USERNAME
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: registry-username
          optional: true
    - name: REGISTRY_PASSWORD
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: registry-password
          optional: true
    - name: GIT_USERNAME
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: git-username
          optional: true
    - name: GIT_TOKEN
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: git-token
          optional: true

  # csrf protection on, but proxy-compatible (we sit behind an Ingress/Route)
  csrf:
    defaultCrumbIssuer:
      enabled: true
      proxyCompatability: true

  # Default container security context. Overridden to {} on OpenShift so the
  # SCC can assign UID/fsGroup.
  containerSecurityContext:
    runAsUser: 1000
    runAsGroup: 1000
    allowPrivilegeEscalation: false

  podSecurityContextOverride:
    fsGroup: 1000

  # Curated plugin set for: kubernetes agents, git/github multibranch,
  # JCasC, Job DSL seed jobs, OpenTelemetry tracing, pipeline UX.
  #
  # Intentionally unversioned: the plugin-installation-manager-tool resolves
  # the latest version of each plugin compatible with controller.image.tag's
  # Jenkins core. Pinning specific plugin versions here previously caused
  # "requires a greater version of Jenkins" install failures once the pinned
  # core fell behind those plugins' minimum-core requirements.
  installPlugins:
    - kubernetes
    - workflow-aggregator
    - git
    - github-branch-source
    - configuration-as-code
    - job-dsl
    # Provides the folder() Job DSL primitive used to create the pac-dev/
    # pipelines-as-code dev sandbox (jenkins/pipelines/seed/seed_jobs.groovy).
    - cloudbees-folder
    - pipeline-utility-steps
    - pipeline-stage-view
    - opentelemetry
    - credentials-binding
    - role-strategy
    - matrix-auth
    - antisamy-markup-formatter
    - timestamper
    - ws-cleanup
    - durable-task

  ingress:
    enabled: false

  additionalPlugins: []

persistence:
  enabled: true
  size: 8Gi

agent:
  enabled: true
  # Per-pipeline pod templates (maven/node/dind/kubectl/helm containers) are
  # defined inline in jenkins/pipelines/Jenkinsfile.petclinic via the
  # `agent { kubernetes { yaml ... } }` directive, so we keep the chart-level
  # default agent minimal.
  resources:
    requests:
      cpu: "512m"
      memory: "512Mi"
    limits:
      cpu: "1"
      memory: "1024Mi"

rbac:
  create: true
  readSecrets: true

serviceAccount:
  create: true
  name: jenkins

networkPolicy:
  enabled: false
