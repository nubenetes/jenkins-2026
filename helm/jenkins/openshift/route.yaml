# OpenShift Route exposing the Jenkins controller service.
# Applied only when platform.target == openshift (scripts/04-jenkins.sh).
# The router assigns a hostname under the cluster's default *.apps domain,
# so no DNS record is required for the PoC.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app.kubernetes.io/name: jenkins
    app.kubernetes.io/part-of: jenkins-2026
spec:
  to:
    kind: Service
    name: jenkins
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
