# Overlay for Azure AKS, latest supported Kubernetes version.
# Layered on top of values-common.yaml - see that file's header for the
# jenkinsci/helm-charts chart origin/default-values link and the
# diff-only convention this overlay also follows (e.g.
# controller.serviceType and persistence.accessMode/size below already
# match the chart default and are intentionally not repeated).

controller:
  # Disabled by default (PoC has no real DNS record). Flip to true and set
  # hostName to expose Jenkins through the AKS "App Routing" add-on
  # (managed NGINX ingress class webapprouting.kubernetes.azure.com).
  ingress:
    enabled: false
    ingressClassName: webapprouting.kubernetes.azure.com
    annotations: {}
    hostName: ""
    tls: []

persistence:
  storageClass: managed-csi

agent:
  workingDir: "/home/jenkins/agent"
