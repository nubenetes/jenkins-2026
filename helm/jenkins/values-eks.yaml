# Overlay for Amazon EKS, latest supported Kubernetes version.
# Layered on top of values-common.yaml - see that file's header for the
# jenkinsci/helm-charts chart origin/default-values link and the
# diff-only convention this overlay also follows (e.g.
# controller.serviceType and persistence.accessMode/size below already
# match the chart default and are intentionally not repeated).

controller:
  # Disabled by default (PoC has no real DNS record / ACM cert). Flip to true
  # and set hostName to expose Jenkins through the AWS Load Balancer
  # Controller (ALB ingress class).
  ingress:
    enabled: false
    ingressClassName: alb
    annotations:
      alb.ingress.kubernetes.io/scheme: "internet-facing"
      alb.ingress.kubernetes.io/target-type: "ip"
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    hostName: ""
    tls: []

persistence:
  storageClass: gp3

agent:
  workingDir: "/home/jenkins/agent"
