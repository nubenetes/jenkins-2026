# =============================================================================
# "develop" environment - separate namespace/track for testing pipeline
# changes (petclinic.branches.develop in config/config.yaml). Builds from the
# same `main` branch as "stable" (upstream spring-petclinic repos only have
# `main`) but deploys independently into petclinic-develop.
# Installed as: helm upgrade --install petclinic-develop ./helm/petclinic \
#                 -f values-develop.yaml --namespace petclinic-develop --create-namespace
#
# Mirrors values-stable.yaml exactly except namespace/env. Keep service
# definitions in sync between the two files when adding/removing services.
# =============================================================================

global:
  platform: gke

namespace: petclinic-develop
env: develop
registry: ghcr.io/nubenetes/jenkins-2026-petclinic
imagePullSecret: ghcr-credentials

otel:
  collectorEndpoint: http://otel-collector-gateway.observability.svc.cluster.local:4317

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""

services:
  config-server:
    type: java
    image:
      repository: config-server
      tag: main
    port: 8888
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker

  discovery-server:
    type: java
    image:
      repository: discovery-server
      tag: main
    port: 8761
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888

  customers-service:
    type: java
    image:
      repository: customers-service
      tag: main
    port: 8081
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  visits-service:
    type: java
    image:
      repository: visits-service
      tag: main
    port: 8082
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  vets-service:
    type: java
    image:
      repository: vets-service
      tag: main
    port: 8083
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  genai-service:
    type: java
    image:
      repository: genai-service
      tag: main
    port: 8084
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/
      # Placeholder: Spring AI's OpenAiEmbeddingAutoConfiguration throws
      # "OpenAI API key must be set" at startup if this is blank, which
      # crashes the pod before it ever opens its health port. A non-blank
      # placeholder lets the app start and become Ready; the chat/embedding
      # endpoints themselves will 401 against the real OpenAI API until a
      # real key is supplied via a Secret + envFrom.
      - name: OPENAI_API_KEY
        value: "sk-placeholder-not-a-real-key"

  api-gateway:
    type: java
    image:
      repository: api-gateway
      tag: main
    port: 8080
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  admin-server:
    type: java
    image:
      repository: admin-server
      tag: main
    port: 9090
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  petclinic-angular:
    type: angular
    image:
      repository: petclinic-angular
      # spring-petclinic-angular has no `main` branch, only `master` (see
      # jenkins/pipelines/seed/services.yaml) - this must match the tag
      # Jenkins actually builds and pushes.
      tag: master
    port: 8080
    healthPath: /
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 500m, memory: 256Mi }
    env: []
