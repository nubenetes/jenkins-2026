# =============================================================================
# "develop" environment - tracks the `develop` branch (GitFlow integration
# line; in practice also fed by feature/* branches merged into develop).
# Installed as: helm upgrade --install petclinic-develop ./helm/petclinic \
#                 -f values-develop.yaml --namespace petclinic-develop --create-namespace
#
# Mirrors values-stable.yaml exactly except namespace/env and the "develop"
# floating image tags. Keep service definitions in sync between the two
# files when adding/removing services.
# =============================================================================

global:
  platform: gke

namespace: petclinic-develop
env: develop
registry: ghcr.io/nubenetes/jenkins-2026-petclinic
imagePullSecret: ""

otel:
  collectorEndpoint: http://otel-collector-gateway.observability.svc.cluster.local:4317

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""

services:
  config-server:
    type: java
    image:
      repository: config-server
      tag: develop
    port: 8888
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker

  discovery-server:
    type: java
    image:
      repository: discovery-server
      tag: develop
    port: 8761
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888

  customers-service:
    type: java
    image:
      repository: customers-service
      tag: develop
    port: 8081
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  visits-service:
    type: java
    image:
      repository: visits-service
      tag: develop
    port: 8082
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  vets-service:
    type: java
    image:
      repository: vets-service
      tag: develop
    port: 8083
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  genai-service:
    type: java
    image:
      repository: genai-service
      tag: develop
    port: 8084
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/
      - name: OPENAI_API_KEY
        value: ""

  api-gateway:
    type: java
    image:
      repository: api-gateway
      tag: develop
    port: 8080
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  admin-server:
    type: java
    image:
      repository: admin-server
      tag: develop
    port: 9090
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  petclinic-angular:
    type: angular
    image:
      repository: petclinic-angular
      tag: develop
    port: 8080
    healthPath: /
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 500m, memory: 256Mi }
    env: []
