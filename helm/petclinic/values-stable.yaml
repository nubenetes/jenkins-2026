# =============================================================================
# "stable" environment - tracks the `main` branch (petclinic.branches.stable
# in config/config.yaml; upstream spring-petclinic repos only have `main`).
# Installed as: helm upgrade --install petclinic-stable ./helm/petclinic \
#                 -f values-stable.yaml --namespace petclinic --create-namespace
#
# Image tags default to "main" (the floating tag pushed by every successful
# stable pipeline run). Individual pipeline runs override only their own
# service's tag with --set services.<name>.image.tag=main.
# =============================================================================

global:
  platform: gke

namespace: petclinic
env: stable
registry: ghcr.io/nubenetes/jenkins-2026-petclinic
imagePullSecret: ghcr-credentials

otel:
  collectorEndpoint: http://otel-collector-gateway.observability.svc.cluster.local:4317

ingress:
  enabled: false
  className: ""
  annotations: {}
  host: ""

services:
  config-server:
    type: java
    image:
      repository: config-server
      tag: main
    port: 8888
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker

  discovery-server:
    type: java
    image:
      repository: discovery-server
      tag: main
    port: 8761
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888

  customers-service:
    type: java
    image:
      repository: customers-service
      tag: main
    port: 8081
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  visits-service:
    type: java
    image:
      repository: visits-service
      tag: main
    port: 8082
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  vets-service:
    type: java
    image:
      repository: vets-service
      tag: main
    port: 8083
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  genai-service:
    type: java
    image:
      repository: genai-service
      tag: main
    port: 8084
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/
      # Placeholder: see values-develop.yaml for why this can't be blank -
      # Spring AI's OpenAiEmbeddingAutoConfiguration throws "OpenAI API key
      # must be set" at startup if blank, crashing the pod before it opens
      # its health port. Set a real key via a Secret + envFrom for working
      # chat/embedding endpoints.
      - name: OPENAI_API_KEY
        value: "sk-placeholder-not-a-real-key"

  api-gateway:
    type: java
    image:
      repository: api-gateway
      tag: main
    port: 8080
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  admin-server:
    type: java
    image:
      repository: admin-server
      tag: main
    port: 9090
    healthPath: /actuator/health
    resources:
      requests: { cpu: 250m, memory: 512Mi }
      limits: { cpu: "1", memory: 1Gi }
    env:
      - name: SPRING_PROFILES_ACTIVE
        value: docker
      - name: SPRING_CLOUD_CONFIG_URI
        value: http://config-server:8888
      - name: EUREKA_CLIENT_SERVICEURL_DEFAULTZONE
        value: http://discovery-server:8761/eureka/

  petclinic-angular:
    type: angular
    image:
      repository: petclinic-angular
      # spring-petclinic-angular has no `main` branch, only `master` (see
      # jenkins/pipelines/seed/services.yaml) - this must match the tag
      # Jenkins actually builds and pushes.
      tag: master
    port: 8080
    healthPath: /
    resources:
      requests: { cpu: 100m, memory: 128Mi }
      limits: { cpu: 500m, memory: 256Mi }
    env: []
