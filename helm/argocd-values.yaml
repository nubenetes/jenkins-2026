# =============================================================================
# ArgoCD resource optimization values.
# Enforces low resource requests/limits on all ArgoCD components.
# =============================================================================

controller:
  resources:
    requests:
      cpu: 100m
      # The application-controller holds the live-state cache of every managed
      # object. The heaviest combo - OSS observability (kube-prometheus-stack +
      # Loki + Tempo, hundreds of objects) AND the full Tekton app-of-apps
      # (pipelines/triggers/dashboard/chains/pruner/pac + CRDs) - OOM-killed it at
      # 1Gi (exit 137), which stalled syncing tekton-pipelines and hung up.sh.
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

dex:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

notifications:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

redis:
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

repoServer:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

server:
  extraArgs:
    - --insecure
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
