# Values overlay for kubernetes-sigs/headlamp, applied by
# scripts/08-headlamp.sh on top of the chart defaults.
#
# Chart origin: https://github.com/kubernetes-sigs/headlamp (charts/headlamp),
# published at https://kubernetes-sigs.github.io/headlamp/ as
# headlamp/headlamp. config/config.yaml headlamp.chart.version is "" (always
# installs latest) - chart/appVersion 0.42.0 as of 2026-06-13.
#
# This overlay is intentionally empty: Headlamp's own in-app "Sign in with
# Google" (config.oidc, for K8s API auth to the "main" in-cluster context) is
# NOT used - see README.md "Headlamp" for why and what's used instead
# (the chart's default ServiceAccount + cluster-admin ClusterRoleBinding for
# "main", with Google-identity access control enforced one layer up by IAP at
# the Gateway). config.oidc was tried (chart 0.42.0 does fix
# kubernetes-sigs/headlamp#3954/PR#4122, the externalSecret + useAccessToken
# Helm templating bug) but hits a second, deeper backend bug: with
# useAccessToken: true, the /oidc-callback handler calls
# oauthConfig.Verifier.Verify() - a JWT/OIDC-ID-token verifier - on Google's
# OAuth2 access_token, which is an opaque "ya29." bearer token, not a
# verifiable OIDC ID token. This fails immediately with "Failed to verify ID
# Token: oidc: failed to unmarshal claims: invalid character 'k' looking for
# beginning of value", before the access token is ever sent to the K8s API.
# This matches kubernetes-sigs/headlamp#2643 ("OIDC with GKE... only
# ServiceAccount token works") and upstream's own recent move toward an
# `unsafe-use-service-account-token` flag for in-cluster deployments - i.e.
# per-user OIDC tokens forwarded to a managed GKE control plane is not a
# supported path today.
config:
  oidc:
    externalSecret:
      enabled: true
      name: headlamp-credentials
    callbackURL: "https://headlamp.jenkins2026.nubenetes.com/oidc-callback"
    useAccessToken: true

