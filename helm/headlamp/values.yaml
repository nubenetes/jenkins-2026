# Values overlay for kubernetes-sigs/headlamp, applied by
# scripts/08-headlamp.sh on top of the chart defaults.
#
# Chart origin: https://github.com/kubernetes-sigs/headlamp (charts/headlamp),
# published at https://kubernetes-sigs.github.io/headlamp/ as
# headlamp/headlamp. config/config.yaml headlamp.chart.version is "" (always
# installs latest) - chart/appVersion 0.42.0 as of 2026-06-13. Default
# values.yaml for comparison:
# https://github.com/kubernetes-sigs/headlamp/blob/main/charts/headlamp/values.yaml
#
# Only the values below differ from that chart default - everything else
# (clusterRoleBinding, serviceAccount, etc., see below) is left unset.
#
# OIDC client ID/secret + issuer/scopes/callback are supplied via the
# "headlamp-credentials" Secret (created by scripts/01-namespaces.sh) and
# injected as envFrom, since its keys already match the OIDC_* env vars the
# chart looks for - see config.oidc.externalSecret below. Never put real
# client ID/secret values in this file.
#
# clusterRoleBinding (chart default: create=true, clusterRoleName=cluster-admin)
# and serviceAccount (chart default: create=true) are left at their defaults -
# this is the ServiceAccount-token login fallback documented in README.md
# "Headlamp" if the experimental OIDC access-token passthrough to the GKE API
# (config.oidc.useAccessToken, set via OIDC_USE_ACCESS_TOKEN in the secret)
# doesn't work.
config:
  oidc:
    secret:
      create: false
    externalSecret:
      enabled: true
      name: headlamp-credentials
