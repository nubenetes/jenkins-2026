pgadmin4:
  env:
    email: "admin@jenkins2026.nubenetes.com"
    password: "SuperSecretPassword"
  envVarsExtra:
    - name: PGADMIN_REPLACE_SERVERS_ON_STARTUP
      value: "True"
    - name: PGPASSFILE
      value: "/var/lib/pgadmin/pgpass"
     
  # Enable dedicated ServiceAccount for pgAdmin pod to query K8s API for database secrets
  serviceAccount:
    create: true
    name: "pgadmin"
    automountServiceAccountToken: true

  # Custom init container to fetch PostgreSQL user secrets and write the .pgpass file
  extraInitContainers: |
    - name: setup-pgpass
      image: alpine:3.20
      securityContext:
        runAsUser: 0
      command:
        - sh
        - -c
        - |
          apk add --no-cache kubectl
          # Wait up to 60s for Postgres secrets to exist
          for i in {1..30}; do
            if kubectl get secret postgres-gateway-pguser-gateway -n microservices >/dev/null 2>&1 && \
               kubectl get secret postgres-jhipstersamplemicroservice-pguser-jhipstersamplemicroservice -n microservices >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for PostgreSQL user secrets to be ready... (attempt $i/30)"
            sleep 2
          done

          # Fetch passwords dynamically
          RAW_GATEWAY_PASSWORD=$(kubectl get secret postgres-gateway-pguser-gateway -n microservices -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "")
          RAW_MICROSERVICE_PASSWORD=$(kubectl get secret postgres-jhipstersamplemicroservice-pguser-jhipstersamplemicroservice -n microservices -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "")

          if [ -n "$RAW_GATEWAY_PASSWORD" ] && [ -n "$RAW_MICROSERVICE_PASSWORD" ]; then
            # Escape backslashes first, then colons for the .pgpass file format
            GATEWAY_PASSWORD=$(echo -n "$RAW_GATEWAY_PASSWORD" | sed -e 's/\\/\\\\/g' -e 's/:/\\:/g')
            MICROSERVICE_PASSWORD=$(echo -n "$RAW_MICROSERVICE_PASSWORD" | sed -e 's/\\/\\\\/g' -e 's/:/\\:/g')

            cat <<EOF > /var/lib/pgadmin/pgpass
          postgres-gateway-primary.microservices.svc:5432:gateway:gateway:${GATEWAY_PASSWORD}
          postgres-jhipstersamplemicroservice-primary.microservices.svc:5432:jhipstersamplemicroservice:jhipstersamplemicroservice:${MICROSERVICE_PASSWORD}
          EOF
            chmod 600 /var/lib/pgadmin/pgpass
            chown 5050:5050 /var/lib/pgadmin/pgpass
            echo "pgpass file successfully generated with proper escaping."
          else
            echo "PostgreSQL user secrets not ready. Starting pgAdmin without pre-populated pgpass."
          fi
      volumeMounts:
        - name: pgadmin-data
          mountPath: /var/lib/pgadmin

  # Mount our custom config_local.py
  extraVolumes:
    - name: config-local-volume
      configMap:
        name: pgadmin-config-local
         
  extraVolumeMounts:
    - name: config-local-volume
      mountPath: /pgadmin4/config_local.py
      subPath: config_local.py
      readOnly: true
       
  # Server definitions to pre-populate the 2 databases
  serverDefinitions:
    enabled: true
    servers:
      "1":
        Name: "Stable - Gateway DB"
        Group: "Stable"
        Host: "postgres-gateway-primary.microservices.svc"
        Port: 5432
        Username: "gateway"
        SharedUsername: "gateway"
        MaintenanceDB: "gateway"
        SSLMode: "require"
        Shared: true
        PassFile: "../../pgpass"
        SavePassword: true
        ConnectionParameters:
          passfile: "../../pgpass"
      "2":
        Name: "Stable - JHipster Microservice DB"
        Group: "Stable"
        Host: "postgres-jhipstersamplemicroservice-primary.microservices.svc"
        Port: 5432
        Username: "jhipstersamplemicroservice"
        SharedUsername: "jhipstersamplemicroservice"
        MaintenanceDB: "jhipstersamplemicroservice"
        SSLMode: "require"
        Shared: true
        PassFile: "../../pgpass"
        SavePassword: true
        ConnectionParameters:
          passfile: "../../pgpass"

  # Resource requests/limits for safety (preventing auto-scaling)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

