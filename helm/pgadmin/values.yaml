pgadmin4:
  image:
    tag: "9.16"
  env:
    email: "admin@jenkins2026.nubenetes.com"
    password: "SuperSecretPassword"
  envVarsExtra:
    - name: PGADMIN_REPLACE_SERVERS_ON_STARTUP
      value: "True"
    - name: PGPASSFILE
      value: "/var/lib/pgadmin/pgpass"
     
  # Enable dedicated ServiceAccount for pgAdmin pod to query K8s API for database secrets
  serviceAccount:
    create: true
    name: "pgadmin"
    automountServiceAccountToken: true

  # The pgadmin-data PVC is ReadWriteOnce: a RollingUpdate would spawn the new
  # pod before the old one releases the volume, deadlocking on Multi-Attach
  # ("Volume is already used by pod(s)..."). Recreate tears the old pod down
  # first so the single replica can always remount. Restarts are cheap here.
  strategy:
    type: Recreate

  # Custom init container to fetch PostgreSQL user secrets and write the .pgpass file
  extraInitContainers: |
    - name: setup-pgpass
      image: docker.io/library/alpine:3.20
      securityContext:
        runAsUser: 0
      command:
        - sh
        - -c
        - |
          apk add --no-cache kubectl
          # Wait up to 600s for the CNPG app secrets to exist AND be readable.
          # On a cluster rebuild CNPG can take minutes to reconcile the cluster
          # and mint these; the old 150s cap let pgAdmin start degraded (no
          # pgpass). This gate also depends on egress :443 to the API server
          # reaching kubectl — if the NetworkPolicy selector is wrong, every
          # attempt fails here, which is the symptom to look for.
          i=1
          while [ $i -le 150 ]; do
            if kubectl get secret postgres-gateway-app -n microservices >/dev/null 2>&1 && \
               kubectl get secret postgres-jhipstersamplemicroservice-app -n microservices >/dev/null 2>&1; then
              break
            fi
            echo "Waiting for PostgreSQL user secrets to be ready/readable... (attempt $i/150)"
            sleep 4
            i=$((i + 1))
          done

          # Fetch passwords dynamically
          RAW_GATEWAY_PASSWORD=$(kubectl get secret postgres-gateway-app -n microservices -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "")
          RAW_MICROSERVICE_PASSWORD=$(kubectl get secret postgres-jhipstersamplemicroservice-app -n microservices -o jsonpath='{.data.password}' 2>/dev/null | base64 -d || echo "")

          if [ -n "$RAW_GATEWAY_PASSWORD" ] && [ -n "$RAW_MICROSERVICE_PASSWORD" ]; then
            # Escape backslashes first, then colons for the .pgpass file format
            GATEWAY_PASSWORD=$(echo -n "$RAW_GATEWAY_PASSWORD" | sed -e 's/\\/\\\\/g' -e 's/:/\\:/g')
            MICROSERVICE_PASSWORD=$(echo -n "$RAW_MICROSERVICE_PASSWORD" | sed -e 's/\\/\\\\/g' -e 's/:/\\:/g')

            cat <<EOF > /var/lib/pgadmin/pgpass
          postgres-gateway-rw.microservices.svc:5432:*:gateway:${GATEWAY_PASSWORD}
          postgres-jhipstersamplemicroservice-rw.microservices.svc:5432:*:jhipstersamplemicroservice:${MICROSERVICE_PASSWORD}
          EOF
            chmod 600 /var/lib/pgadmin/pgpass
            chown 5050:5050 /var/lib/pgadmin/pgpass
            echo "pgpass file successfully generated with proper escaping."
          else
            # Fail closed: exit non-zero so Kubernetes restarts this init
            # container (back-off) until the secrets are reachable, rather than
            # starting pgAdmin with no pgpass (silent zero-password-login break).
            echo "ERROR: CNPG app secrets not ready/readable after wait window — failing init so it retries." >&2
            exit 1
          fi
      volumeMounts:
        - name: pgadmin-data
          mountPath: /var/lib/pgadmin

  # Mount our custom config_local.py
  extraVolumes:
    - name: config-local-volume
      configMap:
        name: pgadmin-config-local
         
  extraVolumeMounts:
    - name: config-local-volume
      mountPath: /pgadmin4/config_local.py
      subPath: config_local.py
      readOnly: true
       
  # Server definitions to pre-populate the 2 databases
  serverDefinitions:
    enabled: true
    servers:
      "1":
        Name: "Stable - Gateway DB"
        Group: "Stable"
        Host: "postgres-gateway-rw.microservices.svc"
        Port: 5432
        Username: "gateway"
        SharedUsername: "gateway"
        MaintenanceDB: "gateway"
        SSLMode: "require"
        Shared: true
        PassFile: "/var/lib/pgadmin/pgpass"
        SavePassword: true
        DBRestriction: "gateway"
        ConnectionParameters:
          passfile: "/var/lib/pgadmin/pgpass"
      "2":
        Name: "Stable - JHipster Microservice DB"
        Group: "Stable"
        Host: "postgres-jhipstersamplemicroservice-rw.microservices.svc"
        Port: 5432
        Username: "jhipstersamplemicroservice"
        SharedUsername: "jhipstersamplemicroservice"
        MaintenanceDB: "jhipstersamplemicroservice"
        SSLMode: "require"
        Shared: true
        PassFile: "/var/lib/pgadmin/pgpass"
        SavePassword: true
        DBRestriction: "jhipstersamplemicroservice"
        ConnectionParameters:
          passfile: "/var/lib/pgadmin/pgpass"

  # Resource requests/limits for safety (preventing auto-scaling)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

