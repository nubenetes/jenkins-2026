pgadmin4:
  env:
    email: "admin@jenkins2026.nubenetes.com"
    password: "SuperSecretPassword"
    
  # Mount our custom config_local.py
  extraVolumes:
    - name: config-local-volume
      configMap:
        name: pgadmin-config-local
        
  extraVolumeMounts:
    - name: config-local-volume
      mountPath: /pgadmin4/config_local.py
      subPath: config_local.py
      readOnly: true
      
  # Server definitions to pre-populate the 6 databases
  serverDefinitions:
    enabled: true
    servers:
      stable-gateway:
        Name: "Stable - Gateway DB"
        Group: "Stable"
        Host: "postgres-gateway-primary.microservices.svc"
        Port: 5432
        Username: "gateway"
        MaintenanceDB: "gateway"
        SSLMode: "prefer"
        Shared: true
      stable-jhipstersamplemicroservice:
        Name: "Stable - JHipster Microservice DB"
        Group: "Stable"
        Host: "postgres-jhipstersamplemicroservice-primary.microservices.svc"
        Port: 5432
        Username: "jhipstersamplemicroservice"
        MaintenanceDB: "jhipstersamplemicroservice"
        SSLMode: "prefer"
        Shared: true
      develop-gateway:
        Name: "Develop - Gateway DB"
        Group: "Develop"
        Host: "postgres-gateway-primary.microservices-develop.svc"
        Port: 5432
        Username: "gateway"
        MaintenanceDB: "gateway"
        SSLMode: "prefer"
        Shared: true
      develop-jhipstersamplemicroservice:
        Name: "Develop - JHipster Microservice DB"
        Group: "Develop"
        Host: "postgres-jhipstersamplemicroservice-primary.microservices-develop.svc"
        Port: 5432
        Username: "jhipstersamplemicroservice"
        MaintenanceDB: "jhipstersamplemicroservice"
        SSLMode: "prefer"
        Shared: true

  # Resource requests/limits for safety (preventing auto-scaling)
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

