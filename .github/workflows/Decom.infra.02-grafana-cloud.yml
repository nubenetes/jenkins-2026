name: "Decom.infra.02 Grafana Cloud"

# Rebuild-safety: serialize the paired Day0/Decom.infra.02 grafana-cloud runs on the ONE shared
# grafana-cloud-stack Terraform state prefix so two same-module runs never contend for
# its state lock. cancel-in-progress:false -> never cancel an in-flight
# apply/destroy (a cancelled run would strand the lock).
concurrency:
  group: jenkins-2026-tfstate-grafana-cloud-stack
  cancel-in-progress: false


# Manually-triggered teardown: destroys terraform/grafana-cloud-stack to remove
# the Grafana Cloud stack (the org/free tier is untouched). The slug is read from
# state. The provider defaults delete_protection to true, so a stack must have
# protection disabled before it can be destroyed: this job applies first (to
# reconcile delete_protection=false onto the live stack) and then destroys. The
# next Day0.infra.02 run creates a fresh stack with a new generated slug.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm this teardown (IRREVERSIBLE)'
        required: true
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
  workflow_call: # reused by Day1.cluster.01 when destroy_unused_backends=true
    inputs:
      confirm:
        description: "Set to 'destroy' when the caller already gated this destructive action (e.g. Day1's destroy_unused_backends checkbox); left empty by the Decom.infra.00 umbrella, whose own guard already validated"
        required: false
        default: ""
        type: string
      log_level:
        required: false
        default: "info"
        type: string
      skip_token_check:
        description: "Skip the token-state guard check (useful for parallel execution in the Everything umbrella)"
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"

jobs:
  # Only enforced on a direct dispatch: when reused via `workflow_call` (the
  # Decom.infra.00 "Everything" umbrella, or Day1.cluster.01's
  # destroy_unused_backends preflight), `confirm` is not part of the caller's
  # input schema, so this is a no-op — the caller already validated its own
  # confirmation before invoking this workflow.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ -n "${{ inputs.confirm }}" ] && [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' in the confirm box to proceed."; exit 1
          fi

  decommission:
    needs: guard
    runs-on: ubuntu-latest
    # Dedicated grafana-cloud-bootstrap identity, so destroying Grafana Cloud is
    # not conflated with the cluster's gke-production identity. No
    # required-reviewer protection — the `confirm` guard above is the
    # deliberate-action gate instead.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/grafana-cloud-stack)
        run: |
          cat > terraform/grafana-cloud-stack/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-stack"
            }
          }
          EOF

      - name: Clear stale Terraform state lock
        uses: ./.github/actions/tf-remove-stale-lock
        with:
          bucket: ${{ secrets.TF_STATE_BUCKET }}
          prefix: jenkins-2026/grafana-cloud-stack

      - name: Terraform init
        working-directory: terraform/grafana-cloud-stack
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Guard — grafana-cloud-token must be destroyed first
        if: ${{ !inputs.skip_token_check }}
        run: |
          # Ordering / rebuild-safety guard for the STANDALONE dispatch. The separate
          # terraform/grafana-cloud-token state holds cluster-scoped resources whose
          # state embeds THIS stack's numeric ID (looked up by slug). It is destroyed by
          # Decom.cluster.01-gke, which MUST run before this stack. Destroying the stack
          # while that token state still references it leaves a dangling policy; a later
          # Day0.infra.02 then mints a fresh stack (new slug) and Day1's token apply
          # reconciles against the deleted stack's IDs → collision. The umbrella
          # Decom.infra.00-all enforces this via `needs: cluster`; this guards a manual run.
          TOKEN_STATE="gs://${{ secrets.TF_STATE_BUCKET }}/jenkins-2026/grafana-cloud-token/default.tfstate"
          if gsutil cat "${TOKEN_STATE}" 2>/dev/null | jq -e '(.resources // []) | length > 0' >/dev/null 2>&1; then
            echo "::error::grafana-cloud-token state still holds resources — it references THIS stack. Run Decom.cluster.01-gke first (it destroys the token), then re-run Decom.infra.02. Aborting to avoid a dangling-token / stale-stack-ID collision."
            exit 1
          fi
          echo "grafana-cloud-token state is empty or absent — safe to destroy the stack."

      - name: Terraform destroy (disable delete protection, then destroy)
        working-directory: terraform/grafana-cloud-stack
        env:
          TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
        run: |
          # The provider defaults delete_protection=true; a stack created before
          # this module forced it off keeps protection enabled in the cloud, and
          # `terraform destroy` does not push config updates before deleting, so
          # it fails with "409 Conflict ... has deletion protection enabled".
          # Apply first to reconcile delete_protection=false onto the live stack,
          # then destroy. Guarded so an already-empty state is not re-created.
          if terraform state list | grep -q '^grafana_cloud_stack\.this$'; then
            terraform apply -auto-approve -input=false
          fi
          terraform destroy -auto-approve -input=false

      - name: Summary
        if: always()
        run: |
          echo "### Grafana Cloud stack decommissioned" >> "${GITHUB_STEP_SUMMARY}"
