name: "Day2.publish.05 Grafana alerts"

# Manually-triggered: (re)provisions Grafana alert rules, contact point, and
# notification policy from observability/grafana/alerting/ via the Grafana
# HTTP provisioning API — WITHOUT re-running the full Day1.cluster.01 lifecycle.
#
# Requires a running GKE cluster (credentials are read from k8s Secrets).
# Mode-specific auth:
#   grafana-cloud  — GRAFANA_BASE_URL + GRAFANA_API_KEY from grafana-cloud-credentials Secret
#   oss            — admin password from kube-prometheus-stack-grafana Secret (port-forwarded)
#   managed-azure  — Azure AD token via GitHub OIDC → 'az account get-access-token'
#   managed-aws    — AMG service-account token minted via 'aws grafana create-workspace-api-key'
#                    (GitHub OIDC → AWS_DASHBOARD_PUBLISH_ROLE_ARN)
#
# Alert email resolution (highest → lowest priority):
#   1. GRAFANA_ALERT_EMAIL_<MODE>  per-mode secret (e.g. GRAFANA_ALERT_EMAIL_GRAFANA_CLOUD)
#   2. GRAFANA_ALERT_EMAIL         generic fallback for all modes
#   3. jenkins-credentials.oidc-admin-email  cluster default
# Grafana Cloud rejects contact points addressed to non-org-members, so set
# GRAFANA_ALERT_EMAIL_GRAFANA_CLOUD when that email differs from your OIDC admin email.
#
# See docs/301-OBSERVABILITY.md § "Grafana Alerting" for rule details.
on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

# Shares the GKE lifecycle group so it can't race a provision/decommission.
concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  TF_VERSION: "1.15.6"
  # Surfaced as env so conditional steps can test presence without secrets context.
  AWS_DASHBOARD_PUBLISH_ROLE_ARN: ${{ secrets.AWS_DASHBOARD_PUBLISH_ROLE_ARN }}
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
  AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

jobs:
  publish-alerts:
    runs-on: ubuntu-latest
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      # Always read the mode from config/config.yaml — single source of truth.
      # JENKINS2026_OBS_MODE env var (set in the job env block) can still
      # override for one-off runs without changing the file.
      - name: Detect observability mode from config/config.yaml
        id: detect-mode
        run: |
          MODE="$(yq '.observability.mode' config/config.yaml)"
          echo "mode=${MODE}" >> "${GITHUB_OUTPUT}"
          echo "Observability mode: ${MODE}"

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      # Read the Grafana URL from the cluster Secret BEFORE any cloud login step.
      # configure-aws-credentials (and az login) register secrets as masked values,
      # which would replace the region/token in any URL printed afterwards with ***.
      # We surface the URL via GITHUB_ENV so Summary can print it unmasked.
      - name: Read Grafana URL from cluster Secret
        id: read-grafana-url
        run: |
          MODE="${{ steps.detect-mode.outputs.mode }}"
          NS="observability"
          url=""
          case "${MODE}" in
            managed-aws)
              url="$(kubectl get secret aws-managed-credentials -n "${NS}" \
                -o jsonpath='{.data.GRAFANA_BASE_URL}' 2>/dev/null | base64 -d || true)" ;;
            managed-azure)
              url="$(kubectl get secret azure-monitor-credentials -n "${NS}" \
                -o jsonpath='{.data.GRAFANA_BASE_URL}' 2>/dev/null | base64 -d || true)" ;;
            grafana-cloud)
              url="$(kubectl get secret grafana-cloud-credentials -n "${NS}" \
                -o jsonpath='{.data.GRAFANA_BASE_URL}' 2>/dev/null | base64 -d || true)" ;;
            oss)
              domain="$(yq '.platform.baseDomain' config/config.yaml 2>/dev/null || true)"
              [[ -n "${domain}" ]] && url="https://grafana.${domain}" ;;
          esac
          [[ -n "${url}" ]] && echo "GRAFANA_BASE_URL=${url}" >> "${GITHUB_ENV}"
          [[ -n "${url}" ]] && echo "Grafana: ${url}"

      # Summary runs BEFORE cloud login steps so configure-aws-credentials /
      # az login have not yet registered secrets as masked values — the Grafana
      # URL (which contains the AWS region) would otherwise print as ***.
      - name: Summary
        if: always()
        run: |
          {
            echo "### Grafana alerts published"
            echo
            echo "Provisioned contact point, notification policy, and alert rules"
            echo "from \`observability/grafana/alerting/\` via the Grafana provisioning API."
            echo
            echo "- Observability mode: \`$(yq '.observability.mode' config/config.yaml)\` (from config/config.yaml)"
            echo "- Cluster: \`${{ secrets.GCP_PROJECT_ID }}\`"
            if [[ -n "${GRAFANA_BASE_URL:-}" ]]; then
              echo
              echo "**Grafana:** ${GRAFANA_BASE_URL}"
            fi
            echo
            echo "To add rules: drop a JSON file into \`observability/grafana/alerting/rules/\`"
            echo "following the existing format, then re-run this workflow."
            echo
            echo "**Alert email resolution** (highest → lowest priority):"
            echo "1. \`GRAFANA_ALERT_EMAIL_<MODE>\` — per-mode secret, e.g. \`GRAFANA_ALERT_EMAIL_GRAFANA_CLOUD\`"
            echo "2. \`GRAFANA_ALERT_EMAIL\` — generic override for all modes"
            echo "3. \`jenkins-credentials.oidc-admin-email\` — cluster default (JENKINS_OIDC_ADMIN_EMAIL)"
            echo
            echo "Grafana Cloud requires the address to be an org member — set"
            echo "\`GRAFANA_ALERT_EMAIL_GRAFANA_CLOUD\` when that differs from your OIDC admin email."
          } >> "${GITHUB_STEP_SUMMARY}"
          [[ -n "${GRAFANA_BASE_URL:-}" ]] && echo "Grafana: ${GRAFANA_BASE_URL}"

      # managed-aws: authenticate via GitHub OIDC before calling
      # 'aws grafana create-workspace-api-key' inside the script.
      # Only runs when managed-aws is explicitly selected — avoids spurious
      # AWS auth when mode is blank (config.yaml default) and the role secret
      # happens to be set from a previous managed-aws bootstrap.
      - name: AWS login (managed-aws)
        if: ${{ steps.detect-mode.outputs.mode == 'managed-aws' && env.AWS_DASHBOARD_PUBLISH_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ env.AWS_DASHBOARD_PUBLISH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}

      - name: Azure login (managed-azure)
        if: ${{ steps.detect-mode.outputs.mode == 'managed-azure' && env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision Grafana alerts (scripts/07.5-grafana-alerts.sh)
        env:
          GRAFANA_ALERT_EMAIL: ${{ secrets.GRAFANA_ALERT_EMAIL }}
          GRAFANA_ALERT_EMAIL_GRAFANA_CLOUD: ${{ secrets.GRAFANA_ALERT_EMAIL_GRAFANA_CLOUD }}
          GRAFANA_ALERT_EMAIL_OSS: ${{ secrets.GRAFANA_ALERT_EMAIL_OSS }}
          GRAFANA_ALERT_EMAIL_MANAGED_AZURE: ${{ secrets.GRAFANA_ALERT_EMAIL_MANAGED_AZURE }}
          GRAFANA_ALERT_EMAIL_MANAGED_AWS: ${{ secrets.GRAFANA_ALERT_EMAIL_MANAGED_AWS }}
        run: ./scripts/07.5-grafana-alerts.sh
