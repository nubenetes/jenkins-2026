name: "01.01 Grafana Cloud bootstrap"

# Manually-triggered, one-time setup step: applies terraform/grafana-cloud-stack
# to create (or, on re-runs, confirm) the persistent Grafana Cloud stack that
# observability_mode: grafana-cloud sends OpenTelemetry data to. State is
# remote (GCS, prefix "jenkins-2026/grafana-cloud-stack", same bucket as
# terraform/gke), so this is safe to re-run - it's a no-op once the stack
# exists.
#
# Requires the GRAFANA_CLOUD_API_TOKEN and GRAFANA_CLOUD_STACK_SLUG secrets -
# see README.md "GitHub Actions automation" for how to create them.
#
# 02.01-gke-provision.yml / 02.99-gke-decommission.yml do NOT run this
# workflow - they only manage terraform/grafana-cloud-token, which looks this
# stack up by slug via a data source.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.15.6"

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/grafana-cloud-stack)
        run: |
          cat > terraform/grafana-cloud-stack/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-stack"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/grafana-cloud-stack
        run: terraform init -input=false

      - name: Terraform apply (create/confirm persistent Grafana Cloud stack)
        working-directory: terraform/grafana-cloud-stack
        env:
          TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
          TF_VAR_stack_slug: ${{ secrets.GRAFANA_CLOUD_STACK_SLUG }}
        run: terraform apply -auto-approve -input=false

      - name: Summary
        if: always()
        working-directory: terraform/grafana-cloud-stack
        run: |
          {
            echo "### Grafana Cloud stack"
            echo
            echo "- Slug: \`${{ secrets.GRAFANA_CLOUD_STACK_SLUG }}\`"
            echo "- Grafana URL: \`$(terraform output -raw grafana_url 2>/dev/null || echo 'n/a')\`"
            echo
            echo "02.01 GKE provision (observability_mode: grafana-cloud) can now mint scoped tokens against this stack via terraform/grafana-cloud-token."
          } >> "${GITHUB_STEP_SUMMARY}"
