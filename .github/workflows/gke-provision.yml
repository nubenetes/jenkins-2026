name: GKE provision

# Manually-triggered: provisions the throwaway GKE cluster (terraform/gke,
# with state in the GCS bucket from terraform/bootstrap) and deploys the full
# jenkins-2026 stack (scripts/up.sh) + smoke tests. See README.md
# "GitHub Actions automation" for one-time setup.
#
# Pair this with the "GKE decommission" workflow - it shares the same
# Terraform state, so it can find and tear down what this workflow created.
on:
  workflow_dispatch:
    inputs:
      observability_mode:
        description: "observability.mode override"
        required: true
        default: "oss"
        type: choice
        options:
          - oss
          - grafana-cloud
          - managed

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  TF_VERSION: "1.15.6"

jobs:
  provision:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: terraform init -input=false

      - name: Terraform apply (provision GKE cluster, ~10 min)
        working-directory: terraform/gke
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
        run: terraform apply -auto-approve -input=false

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Namespaces & prereqs
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
        run: |
          ./scripts/00-check-prereqs.sh
          ./scripts/01-namespaces.sh

      - name: Apply Grafana Cloud credentials secret
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        run: |
          kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic grafana-cloud-credentials -n observability \
            --from-literal=GRAFANA_CLOUD_OTLP_ENDPOINT="${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}" \
            --from-literal=GRAFANA_CLOUD_OTLP_AUTH="${{ secrets.GRAFANA_CLOUD_OTLP_AUTH }}" \
            --from-literal=GRAFANA_BASE_URL="${{ secrets.GRAFANA_BASE_URL }}" \
            --from-literal=GRAFANA_API_KEY="${{ secrets.GRAFANA_API_KEY }}" \
            --from-literal=GRAFANA_TRACES_DASHBOARD_UID="${{ secrets.GRAFANA_TRACES_DASHBOARD_UID }}" \
            --from-literal=OTEL_LOGS_BACKEND_URL="${{ secrets.OTEL_LOGS_BACKEND_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy the stack (scripts/up.sh)
        env:
          JENKINS2026_OBS_MODE: ${{ inputs.observability_mode }}
        run: ./scripts/up.sh

      - name: Smoke test
        run: ./test/smoke-test.sh

      - name: Summary
        if: always()
        working-directory: terraform/gke
        run: |
          {
            echo "### jenkins-2026 GKE cluster"
            echo
            echo "- Project: \`${{ secrets.GCP_PROJECT_ID }}\`"
            echo "- Cluster: \`$(terraform output -raw cluster_name)\`"
            echo "- Zone: \`$(terraform output -raw location)\`"
            echo "- Observability mode: \`${{ inputs.observability_mode }}\`"
            echo
            echo "Run the **GKE decommission** workflow when you're done to avoid ongoing charges."
          } >> "${GITHUB_STEP_SUMMARY}"
