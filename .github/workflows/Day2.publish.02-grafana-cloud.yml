name: "Day2.publish.02 Grafana Cloud dashboards/alerts"

# Manually-triggered: republishes the Grafana dashboards (and alert rules) to the
# Grafana Cloud stack WITHOUT a full reprovision — the grafana-cloud peer of
# "Day2.publish.01 OSS Grafana" / ".03 Azure" / ".04 AWS" (filling the ZZ=02
# grafana-cloud slot so the per-backend publish set is complete & homogeneous).
#
# Unlike oss (where the stack is an in-cluster ArgoCD app), Grafana Cloud is an
# external managed stack: scripts/07-grafana-dashboards.sh reads GRAFANA_BASE_URL +
# GRAFANA_API_KEY from the in-cluster `grafana-cloud-credentials` Secret (created at
# Day1 from the Terraform-minted token) and imports observability/grafana/dashboards/
# via the Grafana HTTP API (gcx). So this still needs the live cluster — to read that
# Secret — but touches no workloads. scripts/07.5-grafana-alerts.sh refreshes the
# alert rules (its grafana-cloud path uses the same Secret).
#
# Only meaningful when the live cluster runs observability.mode=grafana-cloud.
# Requires the cluster from the last "Day1.cluster.01 GKE" run to still exist.
on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  TF_VERSION: "1.15.6"
  # Force the grafana-cloud code path in scripts/07 + scripts/07.5 regardless of
  # config.yaml's default observability.mode (env-override pattern).
  JENKINS2026_OBS_MODE: grafana-cloud

jobs:
  publish-grafana-cloud:
    runs-on: ubuntu-latest
    # Manual approval gate (GitHub Environment required reviewers) - reads from a real
    # billed cluster + writes to the Grafana Cloud stack, same posture as the other
    # Day2.* workflows.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      # Reads GRAFANA_BASE_URL + GRAFANA_API_KEY from the in-cluster
      # grafana-cloud-credentials Secret and imports observability/grafana/dashboards/
      # into the "CI-CD Observability" folder via the Grafana HTTP API (gcx).
      - name: Republish Grafana Cloud dashboards (scripts/07-grafana-dashboards.sh)
        run: ./scripts/07-grafana-dashboards.sh

      - name: Republish Grafana Cloud alerts (scripts/07.5-grafana-alerts.sh)
        run: ./scripts/07.5-grafana-alerts.sh || echo "::warning::alert provisioning reported an issue (non-fatal)"

      - name: Summary
        if: always()
        run: |
          url="$(kubectl get secret grafana-cloud-credentials -n observability \
            -o jsonpath='{.data.GRAFANA_BASE_URL}' 2>/dev/null | base64 -d 2>/dev/null || true)"
          {
            echo "### Grafana Cloud dashboards/alerts republished"
            echo
            echo "- Re-imported \`observability/grafana/dashboards/\` via the Grafana API (gcx)"
            echo "- Republished the Grafana alert rules (scripts/07.5)"
            echo
            echo "Source of truth is git; the Grafana Cloud stack itself is Terraform-managed"
            echo "(\`terraform/grafana-cloud-stack\`). Only meaningful on an"
            echo "observability.mode=grafana-cloud cluster."
            [[ -n "${url}" ]] && { echo; echo "**Grafana:** ${url}"; }
          } >> "${GITHUB_STEP_SUMMARY}"
          [[ -n "${url}" ]] && echo "Grafana: ${url}"
