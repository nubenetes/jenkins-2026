name: "Day2.redeploy.01 ArgoCD"

# Manually-triggered: re-applies only scripts/08.5-argocd.sh against the cluster
# from the last "Day1.cluster.01 GKE" run — reinstalls/upgrades ArgoCD
# (Helm), re-applies its OIDC/RBAC + the Jenkins API account/token, and re-applies
# the GitOps Applications it owns (platform-postgres = CNPG + pgAdmin,
# External Secrets, Headlamp, the microservices ApplicationSet). Use this to apply
# an ArgoCD-only change (helm/argocd-values.yaml, an Application manifest) without
# rerunning the whole provision lifecycle.
#
# ArgoCD is the CD engine the rest of the platform deploys through and is installed
# BEFORE observability/Jenkins in scripts/up.sh — hence ZZ=01 in the deploy tier
# (lowest = first / depended-upon). Requires the namespaces/secrets created by
# scripts/01-namespaces.sh during that provision run to still exist.
#
# NOTE: in observability.mode=oss the in-cluster OSS stack is owned by the
# observability-oss app-of-apps applied by scripts/03-observability.sh, not here;
# use "Day2.publish.01 OSS Grafana dashboards/alerts" for that.
on:
  workflow_dispatch:
    inputs:
      ci_engine:
        description: "CI engine the cluster runs (must match the live cluster): jenkins | tekton | githubactions | argoworkflows"
        required: true
        default: "jenkins"
        type: choice
        options:
          - jenkins
          - tekton
          - githubactions
          - argoworkflows
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
      grafana_cloud_tier:
        description: "Grafana Cloud tier profile (grafana-cloud mode). free (default) = leanMetrics on + logMinSeverity=warn (fits free-tier); paid = full metrics + all logs. Traces are NOT sampled on either tier (100% shipped) — they fit the free tier here and sampling would break trace↔log/metric correlation. This run re-applies 03-observability."
        required: false
        default: "free"
        type: choice
        options:
          - free
          - paid
      log_min_severity:
        description: "Override the min log severity sent to Grafana (re-applies 03-observability — light way to change it without a full Day1). auto (default) = derive from grafana_cloud_tier; or force a level."
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - trace
          - debug
          - info
          - warn
          - error
      develop_track:
        description: "Optional lean 'develop' microservices tier (docs/402). MUST MATCH how the cluster was provisioned: 08.5 regenerates the microservices ApplicationSet, and develop_track=false against a develop-enabled cluster strips its 'develop' generator element — ArgoCD then PRUNES the microservices-develop Application. Tier provisioning (namespace/netpol/RBAC + CI runs) is owned by Day1.cluster.01."
        required: false
        default: false
        type: boolean
      intra_cluster_tls:
        description: "Intra-cluster TLS — the single MUTUALLY-EXCLUSIVE choice, matching Day1 (docs/504 backend-tls · docs/506 mesh). MUST MATCH how the cluster was provisioned: 08.5 re-renders the Headlamp Application, and the wrong value strips/adds the TLS overlay the LB's BackendTLSPolicy expects → 502 at headlamp. 'cloud-service-mesh' is honored for exclusivity/consistency (keeps backend-tls off) but the mesh is (re)applied by Day1.cluster.01 (08.85), not this redeploy. Flag FLIPS need Day1 (only it runs 08.5 + 08.7 + 09 together)."
        required: false
        default: "none"
        type: choice
        options:
          - none
          - backend-tls
          - cloud-service-mesh
      binary_authorization:
        description: "Opt-in Binary Authorization (docs/507) — MUST MATCH the live cluster. ORTHOGONAL to intra_cluster_tls (composes with any); enforce-vs-dryrun is set in config.yaml. In parity with Day1 so a redeploy never silently resets it (the image-signing hooks live in the per-engine 04-*.sh / the Jenkins agent — docs/507 § Pipeline wiring)."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  JENKINS2026_GRAFANA_CLOUD_TIER: ${{ inputs.grafana_cloud_tier || 'free' }}
  JENKINS2026_LOG_MIN_SEVERITY: ${{ inputs.log_min_severity || 'auto' }}
  TF_VERSION: "1.15.6"
  # Selects the jenkins vs tekton path in scripts/lib/config.sh + 08.5-argocd.sh -
  # notably WHERE the ArgoCD API token is stored: jenkins-credentials (jenkins ns)
  # vs the tekton-argocd Secret (tekton-ci ns). Must match the live cluster, else
  # 08.5 fails on the absent jenkins namespace in tekton mode.
  JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
  # Develop tier (docs/402) — must match the live cluster: 08.5 appends the AppSet's
  # 'develop' generator only when true, so false against a develop-enabled cluster
  # prunes the microservices-develop Application (see the input).
  JENKINS2026_DEVELOP_TRACK_ENABLED: ${{ inputs.develop_track }}
  # Intra-cluster TLS axis (backend-tls XOR mesh — ONE dropdown, matches Day1; docs/504·506)
  # + orthogonal Binary Authorization (docs/507), DERIVED from the two inputs exactly as
  # Day1.cluster.01 does — so this redeploy PRESERVES the live cluster's flags instead of
  # silently resetting them (the workflow-input-parity rule).
  JENKINS2026_GATEWAY_BACKEND_TLS_ENABLED: ${{ inputs.intra_cluster_tls == 'backend-tls' }}
  JENKINS2026_SERVICE_MESH_MODE: ${{ inputs.intra_cluster_tls == 'cloud-service-mesh' && 'cloud-service-mesh' || 'none' }}
  JENKINS2026_BINARY_AUTHORIZATION_ENABLED: ${{ inputs.binary_authorization }}

jobs:
  redeploy-argocd:
    runs-on: ubuntu-latest
    # Manual approval gate (GitHub Environment required reviewers) - modifies a real
    # billed cluster, same posture as Day1/Decom and the other Day2.* workflows.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Check prereqs & add Helm repos (scripts/00-check-prereqs.sh)
        run: ./scripts/00-check-prereqs.sh

      - name: Redeploy ArgoCD + GitOps apps (scripts/08.5-argocd.sh)
        # JENKINS_OIDC_ADMIN_EMAIL grants that Google account ArgoCD admin via the
        # email claim (scopes include 'email'); without it SSO users see an empty
        # app list. Same secret Day1 passes.
        env:
          JENKINS_OIDC_ADMIN_EMAIL: ${{ secrets.JENKINS_OIDC_ADMIN_EMAIL }}
        run: ./scripts/08.5-argocd.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "### ArgoCD redeployed"
            echo
            echo "Re-applied \`scripts/08.5-argocd.sh\`: ArgoCD Helm upgrade, OIDC/RBAC,"
            echo "the CI engine's ArgoCD API token (jenkins-credentials or tekton-argocd"
            echo "per ci_engine=\`${{ inputs.ci_engine }}\`), and the GitOps Applications it owns"
            echo "(platform-postgres, External Secrets, Headlamp, microservices AppSet)"
            echo "against the cluster from the last **Day1.cluster.01 GKE** run."
          } >> "${GITHUB_STEP_SUMMARY}"
