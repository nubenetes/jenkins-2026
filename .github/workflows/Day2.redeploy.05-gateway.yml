name: "Day2.redeploy.05 Gateway"

# Manually-triggered: re-applies the public-ingress layer ONLY - the shared GKE
# Gateway (in the platform-ingress namespace) + every app HTTPRoute + the IAP
# GCPBackendPolicies (scripts/01-namespaces.sh for the namespaces/IAP Secrets +
# scripts/08.7-backend-tls.sh for the opt-in backend-TLS certs (docs/504) +
# scripts/09-gateway.sh for the Gateway/routes/policies). Use it to apply a
# gateway/route/IAP change (e.g. a new host, an IAP tweak, or recovering a deleted
# Gateway) WITHOUT rerunning the whole Day1.cluster.01 provision. Idempotent;
# requires the cluster from a previous Day1.cluster.01 run to still exist.
#
# Pick ci_engine + observability_mode to match how the cluster was provisioned, so
# the engine-specific routes (jenkins XOR tekton dashboard/pac) and the oss Grafana
# route are generated correctly.
on:
  workflow_dispatch:
    inputs:
      ci_engine:
        description: "CI engine the cluster runs (must match the live cluster): jenkins | tekton | githubactions | argoworkflows"
        required: true
        default: "jenkins"
        type: choice
        options:
          - jenkins
          - tekton
          - githubactions
          - argoworkflows
      observability_mode:
        description: "observability.mode of the cluster (only affects the oss Grafana route/IAP)"
        required: true
        default: "oss"
        type: choice
        options:
          - grafana-cloud
          - oss
          - managed-azure
          - managed-aws
      secrets_backend:
        description: "Secrets backend the cluster runs (must match the live cluster): imperative | eso"
        required: true
        default: "imperative"
        type: choice
        options:
          - imperative
          - eso
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty for the selected branch)"
        required: false
        default: ""
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
      develop_track:
        description: "Optional lean 'develop' microservices tier (docs/402). MUST MATCH how the cluster was provisioned: 09 generates the develop host's HTTPRoute + HealthCheckPolicy when true and RETIRES them when false (the deliberate disable-cleanup path) — so develop_track=false against a develop-enabled cluster tears down the develop host's route; 01-namespaces likewise blanks the develop URL in jenkins-credentials. Tier provisioning is owned by Day1.cluster.01."
        required: false
        default: false
        type: boolean
      intra_cluster_tls:
        description: "Intra-cluster TLS — the single MUTUALLY-EXCLUSIVE choice, matching Day1 (docs/504 backend-tls · docs/506 mesh). MUST MATCH how the cluster was provisioned: with 'backend-tls' 08.7 re-asserts cert-manager/CA/certs and 09 the BackendTLSPolicy + HTTPS HealthCheckPolicy, 'none'/'cloud-service-mesh' retire (or half-apply) them while Headlamp still serves the other protocol → 502. 'cloud-service-mesh' is honored for exclusivity/consistency but the mesh is (re)applied by Day1.cluster.01 (08.85), not this redeploy. Flag FLIPS need Day1 (only it also re-renders the Headlamp overlay via 08.5)."
        required: false
        default: "none"
        type: choice
        options:
          - none
          - backend-tls
          - cloud-service-mesh
      binary_authorization:
        description: "Opt-in Binary Authorization (docs/507) — MUST MATCH the live cluster. ORTHOGONAL to intra_cluster_tls (composes with any); enforce-vs-dryrun is set in config.yaml. In parity with Day1 so a redeploy never silently resets it (the image-signing hooks live in the per-engine 04-*.sh / the Jenkins agent — docs/507 § Pipeline wiring)."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"
  JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
  JENKINS2026_OBS_MODE: ${{ inputs.observability_mode }}
  JENKINS2026_SECRETS_BACKEND: ${{ inputs.secrets_backend }}
  # Develop tier (docs/402) — must match the live cluster: 09 retires the develop
  # HTTPRoute/HealthCheckPolicy when false (see the input).
  JENKINS2026_DEVELOP_TRACK_ENABLED: ${{ inputs.develop_track }}
  # Intra-cluster TLS axis (backend-tls XOR mesh — ONE dropdown, matches Day1; docs/504·506)
  # + orthogonal Binary Authorization (docs/507), DERIVED from the two inputs exactly as
  # Day1.cluster.01 does — so this redeploy PRESERVES the live cluster's flags instead of
  # silently resetting them (the workflow-input-parity rule).
  JENKINS2026_GATEWAY_BACKEND_TLS_ENABLED: ${{ inputs.intra_cluster_tls == 'backend-tls' }}
  JENKINS2026_SERVICE_MESH_MODE: ${{ inputs.intra_cluster_tls == 'cloud-service-mesh' && 'cloud-service-mesh' || 'none' }}
  JENKINS2026_BINARY_AUTHORIZATION_ENABLED: ${{ inputs.binary_authorization }}

jobs:
  redeploy-gateway:
    runs-on: ubuntu-latest
    # Manual approval gate (GitHub Environment required reviewers) - modifies a real
    # billed cluster, same posture as Day1/Decom and the other Day2.* workflows.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: terraform init -input=false

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Check prereqs (scripts/00-check-prereqs.sh)
        run: ./scripts/00-check-prereqs.sh

      - name: Namespaces & IAP Secrets (scripts/01-namespaces.sh)
        # Idempotent: ensures platform-ingress + per-app namespaces and replicates
        # the gateway-iap-oauth Secret into each IAP backend namespace.
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          HEADLAMP_OIDC_CLIENT_ID: ${{ secrets.HEADLAMP_OIDC_CLIENT_ID }}
          HEADLAMP_OIDC_CLIENT_SECRET: ${{ secrets.HEADLAMP_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_CLIENT_ID: ${{ secrets.JENKINS_OIDC_CLIENT_ID }}
          JENKINS_OIDC_CLIENT_SECRET: ${{ secrets.JENKINS_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_ADMIN_EMAIL: ${{ secrets.JENKINS_OIDC_ADMIN_EMAIL }}
          IAP_OAUTH_CLIENT_ID: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
          IAP_OAUTH_CLIENT_SECRET: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
          # Optional Backstage GitHub-Actions-tab OAuth App (docs/505); 01 keeps
          # the existing values when these are empty (keep-if-present guard).
          BACKSTAGE_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.BACKSTAGE_GITHUB_OAUTH_CLIENT_ID }}
          BACKSTAGE_GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.BACKSTAGE_GITHUB_OAUTH_CLIENT_SECRET }}
        run: ./scripts/01-namespaces.sh

      - name: Sync External Secrets (scripts/08.6-eso-sync.sh, eso mode only)
        # No-op when secrets.backend=imperative. In eso mode, re-applies the
        # ClusterSecretStore + ExternalSecrets and waits for the IAP Secret to
        # materialise before 09-gateway wires the GCPBackendPolicy to it.
        run: ./scripts/08.6-eso-sync.sh

      - name: Backend TLS (scripts/08.7-backend-tls.sh, opt-in)
        # No-op (with deterministic retire) when gateway.backendTls.enabled=false,
        # the default. When on, re-asserts cert-manager + the cluster-internal CA
        # + the per-backend certs/trust bundles BEFORE 09 re-attaches the
        # BackendTLSPolicies. NOTE: FLIPPING the flag still needs a full Day1 —
        # the Headlamp TLS values overlay is rendered by 08.5-argocd.sh, which
        # this workflow deliberately does not run. See docs/504 § Lifecycle.
        run: ./scripts/08.7-backend-tls.sh

      - name: Re-apply Gateway + HTTPRoutes + IAP (scripts/09-gateway.sh)
        run: ./scripts/09-gateway.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "### Gateway / public ingress re-applied"
            echo
            echo "- Gateway namespace: \`platform-ingress\`"
            echo "- CI engine: \`${{ inputs.ci_engine }}\` · observability: \`${{ inputs.observability_mode }}\`"
            echo
            echo "The external LB may take a few minutes to re-program. See the"
            echo "step log above for the per-app URLs."
          } >> "${GITHUB_STEP_SUMMARY}"
