name: "Day2.publish.01 OSS Grafana dashboards/alerts"

# Manually-triggered: refreshes the in-cluster OSS Grafana (kube-prometheus-stack)
# WITHOUT a full reprovision. The stack itself is GitOps-managed by the
# observability-oss ArgoCD app-of-apps (argocd/observability-oss), so chart/value
# changes land via ArgoCD auto-sync on commit. This workflow handles the two
# inputs that live OUTSIDE that app:
#   - the dashboards ConfigMap (jenkins-2026-grafana-dashboards), rebuilt from
#     observability/grafana/dashboards/ and reloaded by the Grafana sidecar;
#   - the Grafana alert rules (scripts/07.5-grafana-alerts.sh).
# It also nudges ArgoCD to re-sync the app so committed value changes apply now.
#
# Only meaningful when the live cluster runs observability.mode=oss. Requires the
# cluster from the last "Day1.cluster.01 GKE" run to still exist.
on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
      log_min_severity:
        description: "Override the min log severity sent to the backend (otel-collector-logs filter; re-applied by this run). auto (default) keeps the config/tier setting (info in OSS mode); or force trace/debug/info/warn/error."
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - trace
          - debug
          - info
          - warn
          - error

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  JENKINS2026_LOG_MIN_SEVERITY: ${{ inputs.log_min_severity || 'auto' }}
  TF_VERSION: "1.15.6"
  # Force the oss code path in scripts/lib/config.sh + scripts/07.5 regardless of
  # config.yaml's default observability.mode (env-override pattern).
  JENKINS2026_OBS_MODE: oss

jobs:
  publish-oss-grafana:
    runs-on: ubuntu-latest
    # Manual approval gate (GitHub Environment required reviewers) - modifies a real
    # billed cluster, same posture as Day1/Decom and the other Day2.* workflows.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      # The dashboards ConfigMap is no longer rebuilt here — it is GitOps-managed
      # by the oss-grafana-dashboards child app of the observability-oss
      # app-of-apps (rendered from observability/grafana/dashboards/, CI-engine
      # gated). Re-apply the parent app with the DEPLOYED engine so the dashboards
      # child drops the right off-engine CI overview: config.yaml's ci.engine is
      # the repo default (jenkins) and the parent app may predate this feature
      # (no ciEngine param -> the chart default jenkins would publish
      # jenkins-overview on a tekton cluster). Detect the engine from the cluster
      # (the Jenkins StatefulSet only exists in jenkins mode) and re-apply, same
      # substitution scripts/03-observability.sh does at Day1.
      - name: Reconcile observability-oss app-of-apps (deployed CI engine)
        run: |
          source scripts/lib/common.sh
          source scripts/lib/config.sh
          # 4-way detection (honors an explicit JENKINS2026_CI_ENGINE, else probes all
          # four engine controllers) — a binary jenkins/tekton probe mis-resolved
          # githubactions/argoworkflows OSS clusters to tekton and kept the wrong CI dashboard.
          ENGINE="$(j2026_active_ci_engine)"
          echo "Detected CI engine: ${ENGINE}"
          REPO_URL="${J2026_SELF_REPO_URL:-https://github.com/nubenetes/jenkins-2026.git}"
          # Substitute ALL of the app file's placeholders, exactly as
          # 03-observability.sh does at Day1 — leaving a literal '{{backendTls}}'
          # or '{{llmEnabled}}' in the applied Application resolves those helm
          # parameters to a non-"true" string, which drops the backend-TLS / LLM
          # values overlays from the kube-prometheus-stack child, and ArgoCD
          # (selfHeal) then strips those features from a LIVE cluster on a
          # routine dashboard republish. Both derive the same way 03 derives
          # them (j2026_backend_tls_active = flag AND CRD; J2026_OBS_LLM_ENABLED
          # from config.sh, already sourced above).
          BACKEND_TLS="$(j2026_backend_tls_active)"
          echo "backendTls=${BACKEND_TLS} llmEnabled=${J2026_OBS_LLM_ENABLED}"
          OSS_APP_FILE="$(mktemp)"
          sed "s@{{repoUrl}}@${REPO_URL}@g;
               s@{{branchStable}}@${J2026_SELF_REPO_BRANCH}@g;
               s@{{ciEngine}}@${ENGINE}@g;
               s@{{backendTls}}@${BACKEND_TLS}@g;
               s@{{llmEnabled}}@${J2026_OBS_LLM_ENABLED}@g" \
              argocd/observability-oss-app.yaml > "${OSS_APP_FILE}"
          kubectl apply -f "${OSS_APP_FILE}"
          rm -f "${OSS_APP_FILE}"

      - name: Nudge ArgoCD to re-sync observability-oss (best-effort)
        run: |
          kubectl -n argocd annotate application observability-oss \
            argocd.argoproj.io/refresh=hard --overwrite || \
            echo "::warning::observability-oss Application not found — is the live cluster running observability.mode=oss?"

      - name: Republish Grafana alerts (scripts/07.5-grafana-alerts.sh)
        run: ./scripts/07.5-grafana-alerts.sh || echo "::warning::alert provisioning reported an issue (non-fatal)"

      - name: Summary
        if: always()
        run: |
          # NOTE: the correct key is .gateway.baseDomain — a .platform.baseDomain
          # typo here made yq print the literal string "null" (a missing key, not
          # empty), which passed the `-n` check and produced a broken
          # https://grafana.null link.
          domain="$(yq '.gateway.baseDomain' config/config.yaml 2>/dev/null || true)"
          grafana_url=""
          [[ -n "${domain}" && "${domain}" != "null" ]] && grafana_url="https://grafana.${domain}"
          {
            echo "### OSS Grafana refreshed"
            echo
            echo "- Re-synced \`jenkins-2026-grafana-dashboards\` (GitOps: oss-grafana-dashboards child app)"
            echo "- Nudged ArgoCD \`observability-oss\` to re-sync (chart/value changes)"
            echo "- Republished Grafana alert rules"
            echo
            echo "The in-cluster OSS stack itself is GitOps-managed by ArgoCD"
            echo "(\`argocd/observability-oss\`); commits auto-sync."
            if [[ -n "${grafana_url}" ]]; then
              echo
              echo "**Grafana:** ${grafana_url}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
          [[ -n "${grafana_url}" ]] && echo "Grafana: ${grafana_url}"
