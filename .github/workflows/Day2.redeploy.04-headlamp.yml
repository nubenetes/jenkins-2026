name: "Day2.redeploy.04 Headlamp"

# Manually-triggered: re-applies scripts/01-namespaces.sh (refreshes the
# non-sensitive OIDC config keys on the headlamp-credentials Secret) and
# scripts/08-headlamp.sh (Helm upgrade --install of headlamp + its
# ClusterRoleBindings) against the cluster from the last "Day1.cluster.01 GKE
# provision" run, without touching terraform/gke or any other component of
# the stack.
#
# Use this to apply a Headlamp-only change (Helm values, OIDC config) without
# rerunning the whole provision/decommission lifecycle. Requires the
# namespaces/secrets created by scripts/01-namespaces.sh during that "Day1.cluster.01
# GKE provision" run to still exist on the cluster.
on:
  workflow_dispatch:
    inputs:
      ci_engine:
        description: "CI engine the cluster runs (must match the live cluster): jenkins | tekton | githubactions | argoworkflows"
        required: true
        default: "jenkins"
        type: choice
        options:
          - jenkins
          - tekton
          - githubactions
          - argoworkflows
      develop_track:
        description: "Optional lean 'develop' microservices tier (docs/402). MUST MATCH how the cluster was provisioned: 01-namespaces refreshes the Microservices URLs in jenkins-credentials on every run, and develop_track=false against a develop-enabled cluster blanks microservices-develop-url (the Jenkins banner link + the -develop k6 job's target). Tier provisioning is owned by Day1.cluster.01."
        required: false
        default: false
        type: boolean
      secrets_backend:
        description: "Secrets backend the cluster runs (must match the live cluster): imperative | eso"
        required: true
        default: "imperative"
        type: choice
        options:
          - imperative
          - eso
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
      observability_mode:
        description: "observability.mode of the cluster (MUST MATCH how it was provisioned): 01-namespaces gates the grafana IAP secret + the observability ResourceQuota on it — the wrong value provisions an IAP secret for a non-existent grafana namespace or an oversized obs quota. Flag CHANGES need Day1."
        required: true
        default: "oss"
        type: choice
        options:
          - grafana-cloud
          - oss
          - managed-azure
          - managed-aws
      backend_tls:
        description: "Opt-in backend TLS (gateway.backendTls — docs/504). MUST MATCH how the cluster was provisioned: 08-headlamp applies (true) or omits (false) Headlamp's BackendTLSPolicy + HTTPS HealthCheckPolicy — the wrong value makes the LB and the Headlamp pod disagree on the protocol → 502. Flag FLIPS need Day1 (only it re-renders the Headlamp HTTPS values overlay via 08.5)."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"
  # Selects which engine's namespaces/secrets 01-namespaces refreshes — must match
  # the live cluster, else it provisions the config-default engine's (jenkins)
  # namespace + credentials on a cluster running another engine.
  JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
  # Develop tier (docs/402) — must match the live cluster: 01-namespaces blanks the
  # microservices-develop-url credential when false (see the input).
  JENKINS2026_DEVELOP_TRACK_ENABLED: ${{ inputs.develop_track }}
  JENKINS2026_SECRETS_BACKEND: ${{ inputs.secrets_backend }}
  # observability.mode (docs/504/301) — must match the live cluster: 01-namespaces
  # gates the grafana IAP secret + the obs ResourceQuota on it (see the input).
  JENKINS2026_OBS_MODE: ${{ inputs.observability_mode }}
  # Opt-in backend TLS (docs/504) — must match the live cluster: 08-headlamp applies
  # Headlamp's BackendTLSPolicy when true (see the input).
  JENKINS2026_GATEWAY_BACKEND_TLS_ENABLED: ${{ inputs.backend_tls }}

jobs:
  redeploy-headlamp:
    runs-on: ubuntu-latest
    # Manual approval gate (GitHub Environment required reviewers) - modifies a real
    # billed cluster, same posture as Day1/Decom and the other Day2.* workflows.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Check prereqs & add Helm repos (scripts/00-check-prereqs.sh)
        run: ./scripts/00-check-prereqs.sh

      - name: Refresh namespaces/secrets (scripts/01-namespaces.sh)
        run: ./scripts/01-namespaces.sh
        env:
          # REGISTRY_USERNAME/PASSWORD and GIT_USERNAME/TOKEN are required
          # here even though jenkins-credentials already exists, because the
          # ghcr-credentials imagePullSecret further down is unconditionally
          # `kubectl apply`'d on every run - omitting them would overwrite it
          # with an empty-auths secret.
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          HEADLAMP_OIDC_CLIENT_ID: ${{ secrets.HEADLAMP_OIDC_CLIENT_ID }}
          HEADLAMP_OIDC_CLIENT_SECRET: ${{ secrets.HEADLAMP_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_CLIENT_ID: ${{ secrets.JENKINS_OIDC_CLIENT_ID }}
          JENKINS_OIDC_CLIENT_SECRET: ${{ secrets.JENKINS_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_ADMIN_EMAIL: ${{ secrets.JENKINS_OIDC_ADMIN_EMAIL }}
          IAP_OAUTH_CLIENT_ID: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
          IAP_OAUTH_CLIENT_SECRET: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
          # Optional Backstage GitHub-Actions-tab OAuth App (docs/505); 01 keeps
          # the existing values when these are empty (keep-if-present guard).
          BACKSTAGE_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.BACKSTAGE_GITHUB_OAUTH_CLIENT_ID }}
          BACKSTAGE_GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.BACKSTAGE_GITHUB_OAUTH_CLIENT_SECRET }}

      - name: Sync External Secrets (scripts/08.6-eso-sync.sh, eso mode only)
        # No-op when secrets.backend=imperative. In eso mode, ensures the
        # ESO-managed Secrets (e.g. gateway-iap-oauth in the headlamp ns) stay
        # synced from Secret Manager after 01 pushed any updates.
        run: ./scripts/08.6-eso-sync.sh

      - name: Redeploy Headlamp (scripts/08-headlamp.sh)
        run: ./scripts/08-headlamp.sh
        env:
          JENKINS2026_HEADLAMP_ADMIN_EMAILS: ${{ secrets.HEADLAMP_ADMIN_EMAILS }}

      - name: Summary
        if: always()
        run: |
          {
            echo "### Headlamp redeployed"
            echo
            echo "Refreshed headlamp-credentials OIDC config and re-applied"
            echo "helm/headlamp/values.yaml against the cluster from the last"
            echo "**Day1.cluster.01 GKE** run."
          } >> "${GITHUB_STEP_SUMMARY}"
