name: "0.1.01 Grafana Cloud bootstrap"

# Applies terraform/grafana-cloud-stack to create the Grafana Cloud stack that
# observability_mode: grafana-cloud sends OpenTelemetry data to. The stack slug
# is GENERATED (random suffix, persisted in state), so re-applying is a no-op and
# a destroy+recreate (9.2.01 -> 0.1.01) never collides with Grafana Cloud's
# reserved-slug cooldown. State is remote (GCS, prefix
# "jenkins-2026/grafana-cloud-stack", same bucket as terraform/gke). The stack is
# ephemeral (torn down by 9.2.01); only the Grafana Cloud org/free tier persists.
#
# Requires only the GRAFANA_CLOUD_API_TOKEN secret (the slug is no longer an
# input - it is an output read by 0.2.01). See README.md "GitHub Actions
# automation".
#
# 0.2.01-gke-provision.yml calls this via workflow_call when
# observability_mode=grafana-cloud so the persistent stack is always confirmed
# before 0.2.01 mints scoped tokens against it.
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.15.6"

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    # Approval gate (creates a persistent, billed Grafana Cloud resource) -
    # same required-reviewer protection as the GKE/decommission workflows.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/grafana-cloud-stack)
        run: |
          cat > terraform/grafana-cloud-stack/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-stack"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/grafana-cloud-stack
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform apply (create/confirm Grafana Cloud stack)
        working-directory: terraform/grafana-cloud-stack
        env:
          TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
        run: terraform apply -auto-approve -input=false

      - name: Summary
        if: always()
        working-directory: terraform/grafana-cloud-stack
        run: |
          {
            echo "### Grafana Cloud stack"
            echo
            echo "- Slug: \`$(terraform output -raw stack_slug 2>/dev/null || echo 'n/a')\` (generated)"
            echo "- Grafana URL: \`$(terraform output -raw grafana_url 2>/dev/null || echo 'n/a')\`"
            echo
            echo "0.2.01 GKE provision (observability_mode: grafana-cloud) reads this slug from the module's state and mints scoped tokens against the stack via terraform/grafana-cloud-token."
          } >> "${GITHUB_STEP_SUMMARY}"
