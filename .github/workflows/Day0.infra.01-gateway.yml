name: "Day0.infra.01 Gateway"

# Rebuild-safety: serialize the paired Day0/Decom.infra.01 gateway runs on the ONE shared
# gateway-bootstrap Terraform state prefix so two same-module runs never contend for
# its state lock. cancel-in-progress:false -> never cancel an in-flight
# apply/destroy (a cancelled run would strand the lock).
concurrency:
  group: jenkins-2026-tfstate-gateway-bootstrap
  cancel-in-progress: false


# Manually-triggered, one-time setup step: applies terraform/gateway-bootstrap
# to create (or, on re-runs, confirm) the persistent GCP resources that public
# access to Jenkins/Microservices/Headlamp depends on - a global static IP and a
# Google-managed wildcard certificate (Certificate Manager, DNS-authorized).
# State is remote (GCS, prefix "jenkins-2026/gateway-bootstrap", same bucket
# as terraform/gke), so this is safe to re-run - it's a no-op once the
# resources exist.
#
# After the first successful run, follow the job summary's instructions to:
#   1. Create the printed DNS records (wildcard A record + DNS authorization
#      CNAME) with your DNS provider.
#   2. Create the IAP OAuth client by hand in the Console and set the
#      IAP_OAUTH_CLIENT_ID / IAP_OAUTH_CLIENT_SECRET secrets.
# See README.md "Public access (GKE Gateway API + IAP)" for details.
#
# Day1.cluster.01-gke.yml / Decom.cluster.01-gke.yml do NOT run this
# workflow - they only reference these resources by their fixed names
# (config/config.yaml's gateway.staticIPName / gateway.certMapName).
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "apply" to confirm provisioning this persistent, billed resource'
        required: true
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
  # Reusable: invoked by the "Day1.cluster.00 Everything up" umbrella so a full
  # from-scratch provision can bootstrap the persistent Gateway in one click.
  workflow_call:
    inputs:
      log_level:
        required: false
        default: "info"
        type: string

permissions:
  contents: read
  id-token: write

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"

jobs:
  # Only enforced on a direct dispatch: when reused via `workflow_call` (the
  # Day1.cluster.00 "Everything up" umbrella), `confirm` is not part of the
  # caller's input schema, so this is a no-op — selecting a mode/dispatching
  # Day1 is itself the deliberate action for routine, idempotent provisioning.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ -n "${{ inputs.confirm }}" ] && [ "${{ inputs.confirm }}" != "apply" ]; then
            echo "::error::You must type 'apply' in the confirm box to proceed."; exit 1
          fi

  bootstrap:
    needs: guard
    runs-on: ubuntu-latest
    # Creates persistent, billed networking resources (static IP + managed
    # cert) - dedicated gateway-bootstrap identity, one per persistent Day0
    # resource like the grafana-cloud/azure/aws bootstraps, independent of the
    # cluster gate. No required-reviewer protection — the `confirm` guard
    # above is the deliberate-action gate instead.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/gateway-bootstrap)
        run: |
          cat > terraform/gateway-bootstrap/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gateway-bootstrap"
            }
          }
          EOF

      - name: Clear stale Terraform state lock
        uses: ./.github/actions/tf-remove-stale-lock
        with:
          bucket: ${{ secrets.TF_STATE_BUCKET }}
          prefix: jenkins-2026/gateway-bootstrap

      - name: Terraform init
        working-directory: terraform/gateway-bootstrap
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform apply (create/confirm persistent gateway resources)
        working-directory: terraform/gateway-bootstrap
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
        run: terraform apply -auto-approve -input=false

      - name: Summary
        if: always()
        working-directory: terraform/gateway-bootstrap
        run: |
          {
            echo "### jenkins-2026 Gateway bootstrap"
            echo
            echo "- Static IP: \`$(terraform output -raw static_ip_address 2>/dev/null || echo 'n/a')\`"
            echo "- DNS authorization record:"
            echo '```'
            terraform output -json dns_authorization_record 2>/dev/null || echo 'n/a'
            echo '```'
            echo
            echo "**One-time manual steps (see README.md \"Public access (GKE Gateway API + IAP)\"):**"
            echo
            echo "1. With your DNS provider, create:"
            echo "   - A wildcard A record \`*.<base_domain>\` -> the static IP above."
            echo "   - The DNS authorization record above (proves domain ownership for the managed certificate; can take up to ~1h to be issued after this verifies)."
            echo "2. Create the IAP OAuth client by hand in the GCP Console (APIs & Services > Credentials > Create OAuth client ID > Web application), then run:"
            echo '   \`gh secret set IAP_OAUTH_CLIENT_ID\` and \`gh secret set IAP_OAUTH_CLIENT_SECRET\`'
          } >> "${GITHUB_STEP_SUMMARY}"
