name: "Decom.infra.03 Azure managed-grafana"

# Rebuild-safety: serialize the paired Day0/Decom.infra.03 azure runs on the ONE shared
# azure-managed-grafana Terraform state prefix so two same-module runs never contend for
# its state lock. cancel-in-progress:false -> never cancel an in-flight
# apply/destroy (a cancelled run would strand the lock).
concurrency:
  group: jenkins-2026-tfstate-azure-managed-grafana
  cancel-in-progress: false


# Manually-triggered setup teardown: destroys terraform/azure-managed-grafana,
# removing the persistent Azure backend (Azure Managed Grafana, Azure Monitor
# workspace + DCE/DCR, Application Insights + Log Analytics, the collector's
# Entra service principal, and the role assignments) that
# observability_mode: managed-azure uses. Run only when tearing down the Azure
# integration permanently.
#
# Same auth as Day0.infra.03-azure-grafana.yml: GitHub OIDC -> Azure (no stored
# client secret) + GitHub WIF -> GCP for the GCS state backend. Gated behind a
# typed "destroy" confirmation on a direct dispatch (skipped when reused via
# workflow_call, e.g. the Decom.infra.00 "Everything" umbrella).
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm this teardown (IRREVERSIBLE)'
        required: true
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
  workflow_call: # reused by Day1.cluster.01 when destroy_unused_backends=true
    inputs:
      confirm:
        description: "Set to 'destroy' when the caller already gated this destructive action (e.g. Day1's destroy_unused_backends checkbox); left empty by the Decom.infra.00 umbrella, whose own guard already validated"
        required: false
        default: ""
        type: string
      log_level:
        required: false
        default: "info"
        type: string

permissions:
  contents: read
  id-token: write

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"

jobs:
  # Only enforced on a direct dispatch: when reused via `workflow_call` (the
  # Decom.infra.00 "Everything" umbrella, or Day1.cluster.01's
  # destroy_unused_backends preflight), `confirm` is not part of the caller's
  # input schema, so this is a no-op — the caller already validated its own
  # confirmation before invoking this workflow.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ -n "${{ inputs.confirm }}" ] && [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' in the confirm box to proceed."; exit 1
          fi

  decommission:
    needs: guard
    runs-on: ubuntu-latest
    # Bootstrap app (App A — Contributor + UAA) on its dedicated environment,
    # which isolates its OIDC trust from gke-production (docs/102 § Why the
    # per-cloud asymmetry). Matches App A's federated credential subject
    # repo:<owner>/<repo>:environment:azure-bootstrap.
    environment: azure-bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Azure login (OIDC, for the pre-destroy cleanup)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Authenticate to GCP (Terraform state backend)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/azure-managed-grafana)
        run: |
          cat > terraform/azure-managed-grafana/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/azure-managed-grafana"
            }
          }
          EOF

      - name: Build TF_VAR_grafana_admin_object_ids (JSON list)
        id: admins
        env:
          ADMIN_OBJECT_IDS: ${{ secrets.AZURE_GRAFANA_ADMIN_OBJECT_IDS }}
        run: |
          json="$(jq -nc --arg ids "${ADMIN_OBJECT_IDS}" '$ids | split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0))')"
          echo "json=${json}" >> "${GITHUB_OUTPUT}"

      - name: Clear stale Terraform state lock
        uses: ./.github/actions/tf-remove-stale-lock
        with:
          bucket: ${{ secrets.TF_STATE_BUCKET }}
          prefix: jenkins-2026/azure-managed-grafana

      - name: Terraform init
        working-directory: terraform/azure-managed-grafana
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Delete App Insights auto-created resources (unblock RG deletion)
        run: |
          # Application Insights auto-creates a "Failure Anomalies" smart
          # detector alert rule + a "Smart Detection" action group that Terraform
          # doesn't manage; they linger in the resource group and make
          # azurerm_resource_group deletion fail ("still contains Resources").
          # Delete them first. Idempotent - no-op if the RG/resources are gone.
          rg="jenkins-2026-observability"
          if az group exists -n "${rg}" | grep -q true; then
            for t in microsoft.alertsmanagement/smartDetectorAlertRules microsoft.insights/actiongroups; do
              az resource list -g "${rg}" --resource-type "${t}" --query "[].id" -o tsv \
                | while read -r id; do [ -n "$id" ] && az resource delete --ids "$id" --only-show-errors || true; done
            done
          fi

      - name: Terraform destroy (destroy persistent Azure backend)
        working-directory: terraform/azure-managed-grafana
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_grafana_admin_object_ids: ${{ steps.admins.outputs.json }}
          # Must match the apply so destroy plans App B (the publish app) too.
          TF_VAR_github_repo: ${{ github.repository }}
        run: terraform destroy -auto-approve -input=false

      - name: Summary
        if: always()
        run: |
          echo "### Azure managed-grafana backend decommissioned" >> "${GITHUB_STEP_SUMMARY}"
