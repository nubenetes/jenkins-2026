name: "Day2.publish.03 Azure dashboards"

# Manually-triggered: (re)publishes the managed-azure Grafana dashboard variants
# (observability/grafana/dashboards-azure/) to Azure Managed Grafana WITHOUT
# re-provisioning the GKE cluster or touching the rest of the stack.
#
# Use this to propagate a dashboard JSON change to Azure Managed Grafana on its
# own - far lighter than "Day1.cluster.01 GKE". Azure Managed Grafana is
# PERSISTENT (one-time bootstrap by "Day0.infra.03 Azure managed-grafana"), so this workflow
# needs NO running cluster: it authenticates to Azure via GitHub OIDC (the OIDC
# SP holds Grafana Admin on the instance via terraform/azure-managed-grafana)
# and discovers the Grafana instance via az grafana list - no terraform state
# read required, unlike the managed-aws equivalent (Day2.publish.04).
on:
  workflow_dispatch:
    inputs:
      ci_engine:
        description: "Fallback CI engine if the GCS active-ci-engine record is missing (Day1 records it). jenkins | tekton"
        required: true
        default: "jenkins"
        type: choice
        options:
          - jenkins
          - tekton
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

# Shares the GKE lifecycle group so it can't race a provision/decommission.
concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  # Surfaced as env so steps can skip cleanly (secrets can't be used in `if:`)
  # when the OIDC SP hasn't been set up yet (re-run Day0.infra.03 + set the secrets).
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

jobs:
  publish-azure-dashboards:
    runs-on: ubuntu-latest
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      # GitHub OIDC -> Azure: the OIDC SP was granted Grafana Admin on the
      # Azure Managed Grafana instance by terraform/azure-managed-grafana (Day0.infra.03).
      # No access keys stored anywhere.
      - name: Azure login
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # GCP auth (read-only) to read the durable active-CI-engine record Day1
      # wrote to GCS. This workflow has no cluster access by design (it publishes
      # from the repo to Azure Managed Grafana), so it can't detect the engine via
      # kubectl; the GCS record decouples it. Falls back to the manual ci_engine
      # input if the record is absent.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2

      - name: Resolve active CI engine (durable GCS record from Day1)
        id: ci-engine
        run: |
          engine="$(gcloud storage cat "gs://${{ secrets.TF_STATE_BUCKET }}/jenkins-2026/active-ci-engine" 2>/dev/null || true)"
          [ -z "${engine}" ] && engine="${{ inputs.ci_engine }}"
          echo "engine=${engine}" >> "${GITHUB_OUTPUT}"
          echo "Active CI engine: ${engine}"

      - name: Publish dashboards to Azure Managed Grafana
        id: publish_azure
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        run: |
          az extension add -n amg --only-show-errors || true
          az extension add -n resource-graph --only-show-errors || true
          # Get the AMG endpoint straight from `az grafana list` output
          # (.properties.endpoint) — do NOT call `az grafana show -g <rg>` /
          # `az grafana dashboard create`: an empty/changed resourceGroup field
          # sends those down an ARM path that fails with InvalidApiVersionParameter
          # (stale amg-extension api-version). Publish via the data-plane API
          # (endpoint + Azure AD token, AMG audience 6f2d169c) instead.
          obj="$(az grafana list --query "[?starts_with(name,'jenkins-2026')] | [0]" -o json 2>/dev/null || echo '{}')"
          ep="$(jq -r '.properties.endpoint // empty' <<<"${obj}")"
          if [[ -z "${ep}" ]]; then
            echo "::warning::no Azure Managed Grafana found - skipping dashboard publish"
            exit 0
          fi
          echo "grafana_url=${ep%/}" >> "${GITHUB_OUTPUT}"
          tok="$(az account get-access-token --resource 6f2d169c-08f3-4a4c-a982-bcaf2d038c45 --query accessToken -o tsv)"
          gapi() { local m="$1" p="$2"; shift 2; curl -fsS -X "${m}" "${ep%/}${p}" \
            -H "Authorization: Bearer ${tok}" -H "Content-Type: application/json" "$@"; }
          # App Insights resource for the ${appinsights} placeholder (non-fatal).
          appinsights="$(az graph query -q "resources | where type =~ 'microsoft.insights/components' | project id" --query 'data[0].id' -o tsv 2>/dev/null || true)"
          echo "Publishing dashboards (App Insights: ${appinsights##*/}) to: ${ep}"
          # Shared "CI-CD Observability" folder (uid jenkins-2026), like Day1.
          gapi POST /api/folders -d '{"uid":"jenkins-2026","title":"CI-CD Observability"}' >/dev/null 2>&1 || true
          gapi PUT /api/folders/jenkins-2026 -d '{"title":"CI-CD Observability","overwrite":true}' >/dev/null 2>&1 || true
          # Publish only the active CI engine's overview (jenkins XOR tekton).
          if [ "${{ steps.ci-engine.outputs.engine }}" = "tekton" ]; then
            skip_ci="jenkins-overview-azure"
            delete_uid="jenkins2026-jenkins-overview"
          else
            skip_ci="tekton-overview-azure"
            delete_uid="jenkins2026-tekton-overview"
          fi
          for f in observability/grafana/dashboards-azure/*-azure.json; do
            [ "$(basename "${f}" .json)" = "${skip_ci}" ] && { echo "skipping ${skip_ci} (ci_engine=${{ steps.ci-engine.outputs.engine }})"; continue; }
            sed "s|\${appinsights}|${appinsights}|g" "${f}" > /tmp/dash.json
            payload="$(jq -n --slurpfile db /tmp/dash.json '{dashboard: ($db[0] + {id: null}), folderUid: "jenkins-2026", overwrite: true}')"
            if printf '%s' "${payload}" | gapi POST /api/dashboards/db --data-binary @- >/dev/null 2>&1; then
              echo "published $(basename "${f}")"
            else
              echo "::warning::failed to publish $(basename "${f}")"
            fi
          done
          # Delete the off-engine CI overview if present (data-plane, by uid; no-op if absent).
          gapi DELETE "/api/dashboards/uid/${delete_uid}" >/dev/null 2>&1 \
            && echo "deleted off-engine dashboard ${delete_uid}" || true

      - name: Skipped (no AZURE_CLIENT_ID)
        if: ${{ env.AZURE_CLIENT_ID == '' }}
        run: |
          echo "::warning::AZURE_CLIENT_ID not set - skipping. Re-run 'Day0.infra.03 Azure managed-grafana' and set the AZURE_CLIENT_ID/AZURE_TENANT_ID/AZURE_SUBSCRIPTION_ID secrets first (see README \"GitHub Actions automation\")."

      - name: Summary
        if: always()
        run: |
          {
            echo "### managed-azure dashboards published"
            echo
            echo "Re-published \`observability/grafana/dashboards-azure/\` to Azure"
            echo "Managed Grafana (no cluster touched). Instance discovered via"
            echo "**az grafana list**; auth via GitHub OIDC (no access keys)."
            if [[ -n "${{ steps.publish_azure.outputs.grafana_url }}" ]]; then
              echo
              echo "**Grafana:** ${{ steps.publish_azure.outputs.grafana_url }}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
          # Also print to the normal log for easy click-through.
          [[ -n "${{ steps.publish_azure.outputs.grafana_url }}" ]] && echo "Grafana: ${{ steps.publish_azure.outputs.grafana_url }}"
