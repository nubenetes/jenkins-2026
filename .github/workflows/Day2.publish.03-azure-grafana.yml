name: "Day2.publish.03 Azure dashboards"

# Manually-triggered: (re)publishes the managed-azure Grafana dashboard variants
# (observability/grafana/dashboards-azure/) to Azure Managed Grafana WITHOUT
# re-provisioning the GKE cluster or touching the rest of the stack.
#
# Use this to propagate a dashboard JSON change to Azure Managed Grafana on its
# own - far lighter than "Day1.cluster.01 GKE". Azure Managed Grafana is
# PERSISTENT (one-time bootstrap by "Day0.infra.03 Azure managed-grafana"), so this workflow
# needs NO running cluster: it authenticates to Azure via GitHub OIDC (the OIDC
# SP holds Grafana Admin on the instance via terraform/azure-managed-grafana)
# and discovers the Grafana instance via az grafana list - no terraform state
# read required, unlike the managed-aws equivalent (Day2.publish.04).
on:
  workflow_dispatch:
    inputs:
      ci_engine:
        description: "Fallback CI engine if the GCS active-ci-engine record is missing (Day1 records it). jenkins | tekton | githubactions | argoworkflows"
        required: true
        default: "jenkins"
        type: choice
        options:
          - jenkins
          - tekton
          - githubactions
          - argoworkflows
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug

permissions:
  contents: read
  id-token: write

# Shares the GKE lifecycle group so it can't race a provision/decommission.
concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  # Surfaced as env so steps can skip cleanly (secrets can't be used in `if:`)
  # when the OIDC SP hasn't been set up yet (re-run Day0.infra.03 + set the secrets).
  AZURE_PUBLISH_CLIENT_ID: ${{ secrets.AZURE_PUBLISH_CLIENT_ID }}

jobs:
  publish-azure-dashboards:
    runs-on: ubuntu-latest
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      # GCP auth (read-only) to read the durable active-CI-engine record Day1
      # wrote to GCS. This workflow has no cluster access by design (it publishes
      # from the repo to Azure Managed Grafana), so it can't detect the engine via
      # kubectl; the GCS record decouples it. Falls back to the manual ci_engine
      # input if the record is absent.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.15.6"

      # DURABLE-AUTH FIX (docs/D drift): resolve App B's CURRENT client id from the
      # azure-managed-grafana module state instead of the manually-set AZURE_PUBLISH_CLIENT_ID
      # secret, which drifts whenever the Azure backend is re-bootstrapped (App B is recreated
      # with a new client id) and then fails the login with AADSTS700016. Non-secret identifier.
      - name: Resolve App B (publish) client id from state
        if: ${{ env.AZURE_PUBLISH_CLIENT_ID != '' }}
        run: |
          cat > terraform/azure-managed-grafana/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/azure-managed-grafana"
            }
          }
          EOF
          terraform -chdir=terraform/azure-managed-grafana init -input=false >/dev/null
          pub="$(terraform -chdir=terraform/azure-managed-grafana output -raw publish_app_client_id 2>/dev/null || echo '')"
          if [[ -n "${pub}" ]]; then
            echo "AZURE_PUBLISH_CLIENT_ID_RESOLVED=${pub}" >> "${GITHUB_ENV}"
            echo "Resolved App B client id from state (drift-proof)."
          else
            echo "::warning::publish_app_client_id output absent - azure/login falls back to the AZURE_PUBLISH_CLIENT_ID secret."
          fi

      # GitHub OIDC -> Azure: the OIDC SP holds Grafana Admin on the AMG instance
      # (terraform/azure-managed-grafana, Day0.infra.03). No access keys stored. Uses App B's
      # client id resolved from state above (drift-proof); falls back to the secret.
      - name: Azure login
        if: ${{ env.AZURE_PUBLISH_CLIENT_ID != '' }}
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ env.AZURE_PUBLISH_CLIENT_ID_RESOLVED || secrets.AZURE_PUBLISH_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve active CI engine (durable GCS record from Day1)
        id: ci-engine
        run: |
          engine="$(gcloud storage cat "gs://${{ secrets.TF_STATE_BUCKET }}/jenkins-2026/active-ci-engine" 2>/dev/null || true)"
          [ -z "${engine}" ] && engine="${{ inputs.ci_engine }}"
          echo "engine=${engine}" >> "${GITHUB_OUTPUT}"
          echo "Active CI engine: ${engine}"

      - name: Publish dashboards to Azure Managed Grafana
        id: publish_azure
        if: ${{ env.AZURE_PUBLISH_CLIENT_ID != '' }}
        run: |
          az extension add -n amg --only-show-errors || true
          az extension add -n resource-graph --only-show-errors || true
          # Get the AMG endpoint straight from `az grafana list` output
          # (.properties.endpoint) — do NOT call `az grafana show -g <rg>` /
          # `az grafana dashboard create`: an empty/changed resourceGroup field
          # sends those down an ARM path that fails with InvalidApiVersionParameter
          # (stale amg-extension api-version). Publish via the data-plane API
          # (endpoint + Azure AD token, AMG audience 6f2d169c) instead.
          obj="$(az grafana list --query "[?starts_with(name,'jenkins-2026')] | [0]" -o json 2>/dev/null || echo '{}')"
          ep="$(jq -r '.properties.endpoint // empty' <<<"${obj}")"
          if [[ -z "${ep}" ]]; then
            echo "::warning::no Azure Managed Grafana found - skipping dashboard publish"
            exit 0
          fi
          echo "grafana_url=${ep%/}" >> "${GITHUB_OUTPUT}"
          tok="$(az account get-access-token --resource 6f2d169c-08f3-4a4c-a982-bcaf2d038c45 --query accessToken -o tsv)"
          gapi() { local m="$1" p="$2"; shift 2; curl -fsS -X "${m}" "${ep%/}${p}" \
            -H "Authorization: Bearer ${tok}" -H "Content-Type: application/json" "$@"; }
          # App Insights resource for the ${appinsights} placeholder (non-fatal).
          appinsights="$(az graph query -q "resources | where type =~ 'microsoft.insights/components' | project id" --query 'data[0].id' -o tsv 2>/dev/null || true)"
          echo "Publishing dashboards (App Insights: ${appinsights##*/}) to: ${ep}"
          # Shared "CI-CD Observability" folder (uid jenkins-2026), like Day1.
          gapi POST /api/folders -d '{"uid":"jenkins-2026","title":"CI-CD Observability"}' >/dev/null 2>&1 || true
          gapi PUT /api/folders/jenkins-2026 -d '{"title":"CI-CD Observability","overwrite":true}' >/dev/null 2>&1 || true
          # Keep only the ACTIVE engine's CI overview; skip + delete the other three
          # (jenkins/tekton/githubactions/argoworkflows are mutually exclusive). Mirrors
          # Day1.cluster.01-gke.yml + the KEEP_CI_DASHBOARD/ALL_CI_DASHBOARDS gating in
          # 07-grafana-dashboards.sh (this step previously handled only jenkins XOR tekton,
          # so it kept re-publishing github-actions-ci / argo-workflows-ci off-engine).
          engine="${{ steps.ci-engine.outputs.engine }}"
          case "${engine}" in
            tekton)        keep_dash="tekton-overview" ;;
            githubactions) keep_dash="github-actions-ci" ;;
            argoworkflows) keep_dash="argo-workflows-ci" ;;
            *)             keep_dash="jenkins-overview" ;;
          esac
          all_ci_dash="jenkins-overview tekton-overview github-actions-ci argo-workflows-ci"
          for f in observability/grafana/dashboards-azure/*-azure.json; do
            name="$(basename "${f}" -azure.json)"
            skip=""
            for d in ${all_ci_dash}; do
              [ "${name}" = "${d}" ] && [ "${name}" != "${keep_dash}" ] && skip="yes"
            done
            if [ -n "${skip}" ]; then
              echo "skipping ${name}-azure (ci_engine=${engine})"
              continue
            fi
            sed "s|\${appinsights}|${appinsights}|g" "${f}" > /tmp/dash.json
            payload="$(jq -n --slurpfile db /tmp/dash.json '{dashboard: ($db[0] + {id: null}), folderUid: "jenkins-2026", overwrite: true}')"
            if printf '%s' "${payload}" | gapi POST /api/dashboards/db --data-binary @- >/dev/null 2>&1; then
              echo "published $(basename "${f}")"
            else
              echo "::warning::failed to publish $(basename "${f}")"
            fi
          done
          # Delete the inactive engines' overview dashboards by uid (data-plane; no-op if
          # absent). The published uid is whatever the canonical JSON carries — NOT always
          # jenkins2026-<name> (jenkins-overview has a Grafana-generated uid; the -azure
          # variants preserve the canonical uid) — so derive it with jq. Also try the
          # legacy jenkins2026-<name> uid: a persistent stack may still hold a copy
          # published under it.
          for d in ${all_ci_dash}; do
            [ "${d}" = "${keep_dash}" ] && continue
            canon_uid="$(jq -r '.uid // empty' "observability/grafana/dashboards/${d}.json" 2>/dev/null || true)"
            [ "${canon_uid}" = "jenkins2026-${d}" ] && canon_uid=""
            for off_uid in ${canon_uid} "jenkins2026-${d}"; do
              gapi DELETE "/api/dashboards/uid/${off_uid}" >/dev/null 2>&1 \
                && echo "deleted off-engine dashboard ${d} (uid ${off_uid})" || true
            done
          done

      - name: Skipped (no AZURE_PUBLISH_CLIENT_ID)
        if: ${{ env.AZURE_PUBLISH_CLIENT_ID == '' }}
        run: |
          echo "::warning::AZURE_PUBLISH_CLIENT_ID not set - skipping. Create the low-privilege publish app (App B) and set AZURE_PUBLISH_CLIENT_ID (see docs/102 § Environment Protection → Setting up Environment Rules)."

      - name: Summary
        if: always()
        run: |
          {
            echo "### managed-azure dashboards published"
            echo
            echo "Re-published \`observability/grafana/dashboards-azure/\` to Azure"
            echo "Managed Grafana (no cluster touched). Instance discovered via"
            echo "**az grafana list**; auth via GitHub OIDC (no access keys)."
            if [[ -n "${{ steps.publish_azure.outputs.grafana_url }}" ]]; then
              echo
              echo "**Grafana:** ${{ steps.publish_azure.outputs.grafana_url }}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
          # Also print to the normal log for easy click-through.
          [[ -n "${{ steps.publish_azure.outputs.grafana_url }}" ]] && echo "Grafana: ${{ steps.publish_azure.outputs.grafana_url }}"
