name: "Day2.publish.03 Azure dashboards"

# Manually-triggered: (re)publishes the managed-azure Grafana dashboard variants
# (observability/grafana/dashboards-azure/) to Azure Managed Grafana WITHOUT
# re-provisioning the GKE cluster or touching the rest of the stack.
#
# Use this to propagate a dashboard JSON change to Azure Managed Grafana on its
# own - far lighter than "Day1.cluster.01 GKE". Azure Managed Grafana is
# PERSISTENT (one-time bootstrap by "Day0.infra.03 Azure managed-grafana"), so this workflow
# needs NO running cluster: it authenticates to Azure via GitHub OIDC (the OIDC
# SP holds Grafana Admin on the instance via terraform/azure-managed-grafana)
# and discovers the Grafana instance via az grafana list - no terraform state
# read required, unlike the managed-aws equivalent (Day2.publish.04).
on:
  workflow_dispatch:
    inputs:
      ci_engine:
        description: "CI engine the cluster runs (publishes that engine's overview): jenkins | tekton"
        required: true
        default: "jenkins"
        type: choice
        options:
          - jenkins
          - tekton
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

# Shares the GKE lifecycle group so it can't race a provision/decommission.
concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  # Surfaced as env so steps can skip cleanly (secrets can't be used in `if:`)
  # when the OIDC SP hasn't been set up yet (re-run Day0.infra.03 + set the secrets).
  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}

jobs:
  publish-azure-dashboards:
    runs-on: ubuntu-latest
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      # GitHub OIDC -> Azure: the OIDC SP was granted Grafana Admin on the
      # Azure Managed Grafana instance by terraform/azure-managed-grafana (Day0.infra.03).
      # No access keys stored anywhere.
      - name: Azure login
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish dashboards to Azure Managed Grafana
        id: publish_azure
        if: ${{ env.AZURE_CLIENT_ID != '' }}
        run: |
          az extension add -n amg --only-show-errors || true
          az extension add -n resource-graph --only-show-errors || true
          # Discover the Azure Managed Grafana instance (the one the OIDC SP has
          # Grafana Admin on) without depending on terraform state outputs.
          read -r grafana rg < <(az grafana list \
            --query "[?starts_with(name,'jenkins-2026')].[name,resourceGroup] | [0]" -o tsv)
          if [[ -z "${grafana}" ]]; then
            echo "::warning::no Azure Managed Grafana found - skipping dashboard publish"
            exit 0
          fi
          grafana_url="$(az grafana show -n "${grafana}" -g "${rg}" --query properties.endpoint -o tsv | tr -d '/')"
          echo "grafana_url=https://${grafana_url#https://}" >> "${GITHUB_OUTPUT}"
          # Resolve the App Insights resource and substitute it for the
          # ${appinsights} placeholder so the log/trace panels bind to a
          # concrete resource (a dashboard template variable wouldn't reliably
          # auto-select at view time). Kept out of the repo - resolved here.
          appinsights="$(az graph query -q "resources | where type =~ 'microsoft.insights/components' | project id" --query 'data[0].id' -o tsv)"
          echo "Publishing to ${grafana} (${rg}); App Insights: ${appinsights##*/}"
          # Publish only the active CI engine's overview (jenkins XOR tekton).
          if [ "${{ inputs.ci_engine }}" = "tekton" ]; then
            skip_ci="jenkins-overview-azure"
            delete_uid="jenkins2026-jenkins-overview"
          else
            skip_ci="tekton-overview-azure"
            delete_uid="jenkins2026-tekton-overview"
          fi
          for f in observability/grafana/dashboards-azure/*-azure.json; do
            [ "$(basename "${f}" .json)" = "${skip_ci}" ] && { echo "skipping ${skip_ci} (ci_engine=${{ inputs.ci_engine }})"; continue; }
            sed "s|\${appinsights}|${appinsights}|g" "${f}" > /tmp/dash.json
            if az grafana dashboard create -n "${grafana}" -g "${rg}" \
                 --definition @/tmp/dash.json --overwrite --only-show-errors >/dev/null; then
              echo "published $(basename "${f}")"
            else
              echo "::warning::failed to publish $(basename "${f}")"
            fi
          done
          # Delete the off-engine CI overview if it still exists from a previous run.
          if az grafana dashboard show -n "${grafana}" -g "${rg}" \
               --definition "${delete_uid}" --only-show-errors >/dev/null 2>&1; then
            if az grafana dashboard delete -n "${grafana}" -g "${rg}" \
                 --definition "${delete_uid}" --only-show-errors; then
              echo "deleted off-engine dashboard ${delete_uid}"
            else
              echo "::warning::could not delete off-engine dashboard ${delete_uid}"
            fi
          fi

      - name: Skipped (no AZURE_CLIENT_ID)
        if: ${{ env.AZURE_CLIENT_ID == '' }}
        run: |
          echo "::warning::AZURE_CLIENT_ID not set - skipping. Re-run 'Day0.infra.03 Azure managed-grafana' and set the AZURE_CLIENT_ID/AZURE_TENANT_ID/AZURE_SUBSCRIPTION_ID secrets first (see README \"GitHub Actions automation\")."

      - name: Summary
        if: always()
        run: |
          {
            echo "### managed-azure dashboards published"
            echo
            echo "Re-published \`observability/grafana/dashboards-azure/\` to Azure"
            echo "Managed Grafana (no cluster touched). Instance discovered via"
            echo "**az grafana list**; auth via GitHub OIDC (no access keys)."
            if [[ -n "${{ steps.publish_azure.outputs.grafana_url }}" ]]; then
              echo
              echo "**Grafana:** ${{ steps.publish_azure.outputs.grafana_url }}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
          # Also print to the normal log for easy click-through.
          [[ -n "${{ steps.publish_azure.outputs.grafana_url }}" ]] && echo "Grafana: ${{ steps.publish_azure.outputs.grafana_url }}"
