name: "99.01 Continuous Traffic Simulation"

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration of the simulation (e.g. 10m, 1h)"
        default: "15m"
        required: true
  # Optional: Run on a schedule to keep the dashboards alive
  # schedule:
  #   - cron: '0 * * * *' # Every hour

jobs:
  simulate-traffic:
    name: k6 Traffic Simulation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Run k6 Simulation
        env:
          K6_OTEL_EXPORTER_PROTOCOL: http/protobuf
          K6_OTEL_HTTP_EXPORTER_ENDPOINT: ${{ secrets.GRAFANA_CLOUD_OTLP_ENDPOINT }}
          K6_OTEL_HEADERS: Authorization=Basic ${{ secrets.GRAFANA_CLOUD_OTLP_AUTH }}
          OTEL_RESOURCE_ATTRIBUTES: service.name=k6-traffic-simulation,service.namespace=jenkins-2026,deployment.environment=stable
        run: |
          # Record start time in milliseconds
          START_TIME_MS=$(date +%s%3N)
          
          # Use the existing smoke test script but with more iterations/duration
          # Pointing to the stable environment
          export TARGET_URL="https://microservices.jenkins2026.nubenetes.com"
          
          set +e
          k6 run jenkins/pipelines/k6/microservices-smoke.js \
            -o opentelemetry \
            --vus 2 \
            --duration ${{ github.event.inputs.duration || '15m' }} \
            --env TARGET_URL=$TARGET_URL \
            --env ENV_NAME=stable \
            --summary-export=k6-summary.json
          
          EXIT_CODE=$?
          
          # Record end time in milliseconds
          END_TIME_MS=$(date +%s%3N)
          
          # Pad +/- 5m (300000 ms)
          FROM_TIME=$((START_TIME_MS - 300000))
          TO_TIME=$((END_TIME_MS + 300000))
          echo "GRAFANA_FROM=$FROM_TIME" >> $GITHUB_ENV
          echo "GRAFANA_TO=$TO_TIME" >> $GITHUB_ENV
          
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 99 ]; then
            exit 0
          else
            exit $EXIT_CODE
          fi

      - name: Upload k6 Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-summary-report
          path: k6-summary.json
          retention-days: 7

      - name: Show Results Summary
        if: always()
        run: |
          echo "=============================================================================="
          echo "📊 K6 TRAFFIC SIMULATION SUMMARY"
          echo "=============================================================================="
          if [ -f k6-summary.json ]; then
            cat k6-summary.json | jq '.metrics'
          else
            echo "❌ k6-summary.json not found. Check the simulation logs for errors."
          fi
          echo ""
          echo "🔗 VIEW IN GRAFANA"
          echo "------------------------------------------------------------------------------"
          echo "The metrics from this run have been streamed to your Grafana Cloud instance."
          echo "You can analyze real-time latency, error rates, and traces here:"
          echo ""
          if [ ! -z "$GRAFANA_FROM" ] && [ ! -z "$GRAFANA_TO" ]; then
            echo "https://${{ secrets.GRAFANA_CLOUD_STACK_SLUG }}.grafana.net/d/jenkins2026-k6-smoke-overview/jenkins-2026-k6-observability-smoke-test?orgId=1&from=${GRAFANA_FROM}&to=${GRAFANA_TO}&var-DS_PROMETHEUS=grafanacloud-prom&var-DS_LOKI=grafanacloud-logs&var-DS_TEMPO=grafanacloud-traces&var-deployment_environment=stable"
          else
            echo "https://${{ secrets.GRAFANA_CLOUD_STACK_SLUG }}.grafana.net/d/jenkins2026-k6-smoke-overview/jenkins-2026-k6-observability-smoke-test?var-DS_PROMETHEUS=grafanacloud-prom&var-DS_LOKI=grafanacloud-logs&var-DS_TEMPO=grafanacloud-traces&var-deployment_environment=stable"
          fi
          echo ""
          echo "This dashboard correlates k6 client-side metrics with your Microservices"
          echo "backend telemetry (traces, logs, and metrics) for full observability."
          echo "=============================================================================="
