name: "Day2.publish.04 AWS dashboards"

# Manually-triggered: (re)publishes the managed-aws Grafana dashboard variants
# (observability/grafana/dashboards-aws/) to Amazon Managed Grafana (AMG)
# WITHOUT re-provisioning the GKE cluster or touching the rest of the stack.
#
# Use this to propagate a dashboard JSON change to AMG on its own - far lighter
# than "Day1.cluster.01 GKE". AMG and Amazon Managed Service for Prometheus are
# PERSISTENT (one-time bootstrap by "Day0.infra.04 AWS managed-grafana"), so this workflow
# needs NO running cluster: it reads the AMG connection params straight from the
# terraform/aws-managed-grafana GCS state (read-only) and authenticates to AWS
# via GitHub OIDC (the least-privilege dashboard-publisher role), exactly like
# the managed-aws publish step inside Day1.cluster.01. scripts/07-grafana-dashboards.sh
# then mints a short-lived AMG service-account token to import the dashboards.
on:
  workflow_dispatch:
    inputs:
      ci_engine:
        description: "Fallback CI engine if the GCS active-ci-engine record is missing (Day1 records it). jenkins | tekton"
        required: true
        default: "jenkins"
        type: choice
        options:
          - jenkins
          - tekton
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

# Shares the GKE lifecycle group so it can't race a provision/decommission.
concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  TF_VERSION: "1.15.6"
  # Surfaced as env so the AWS steps can skip cleanly (secrets can't be used in
  # `if:`) when the publisher role hasn't been set up yet (re-run Day0.infra.04 + set the
  # AWS_DASHBOARD_PUBLISH_ROLE_ARN secret).
  AWS_DASHBOARD_PUBLISH_ROLE_ARN: ${{ secrets.AWS_DASHBOARD_PUBLISH_ROLE_ARN }}

jobs:
  publish-aws-dashboards:
    runs-on: ubuntu-latest
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      # GCP auth is only needed to read the terraform GCS state + the active-CI-engine
      # record (read-only); no cluster is touched.
      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Resolve active CI engine (durable GCS record from Day1)
        id: ci-engine
        run: |
          # Read the engine Day1 recorded to GCS (cluster-decoupled — no kubectl).
          # Fall back to the manual ci_engine input if the record is absent (e.g.
          # a cluster provisioned before this record existed).
          engine="$(gcloud storage cat "gs://${{ secrets.TF_STATE_BUCKET }}/jenkins-2026/active-ci-engine" 2>/dev/null || true)"
          [ -z "${engine}" ] && engine="${{ inputs.ci_engine }}"
          echo "engine=${engine}" >> "${GITHUB_OUTPUT}"
          echo "Active CI engine: ${engine}"

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Read AMG connection params from terraform state
        if: ${{ env.AWS_DASHBOARD_PUBLISH_ROLE_ARN != '' }}
        run: |
          # The persistent terraform/aws-managed-grafana module (provisioned once
          # by "Day0.infra.04 AWS managed-grafana") holds the AMG endpoint/workspace id, AMP
          # query URL and region in its GCS state. No AWS auth needed here -
          # terraform output just reads state (GCS already authed above). Export
          # them so scripts/07-grafana-dashboards.sh picks them up from the env
          # (no in-cluster Secret required).
          cat > terraform/aws-managed-grafana/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/aws-managed-grafana"
            }
          }
          EOF
          terraform -chdir=terraform/aws-managed-grafana init -input=false
          tf() { terraform -chdir=terraform/aws-managed-grafana output -raw "$1"; }
          {
            echo "GRAFANA_BASE_URL=$(tf grafana_endpoint)"
            echo "GRAFANA_WORKSPACE_ID=$(tf grafana_workspace_id)"
            echo "AMP_QUERY_URL=$(tf amp_query_url)"
            echo "AWS_REGION=$(tf aws_region)"
          } >> "${GITHUB_ENV}"

      # Summary runs BEFORE AWS login so configure-aws-credentials has not yet
      # registered the region as a masked secret — otherwise the region string
      # is replaced with *** in all subsequent log output, including the URL.
      - name: Summary
        if: always()
        run: |
          {
            echo "### managed-aws dashboards published"
            echo
            echo "Re-published \`observability/grafana/dashboards-aws/\` to Amazon"
            echo "Managed Grafana (no cluster touched). AMG params read from the"
            echo "**terraform/aws-managed-grafana** GCS state; auth via GitHub OIDC."
            if [[ -n "${GRAFANA_BASE_URL:-}" ]]; then
              echo
              echo "**Grafana:** ${GRAFANA_BASE_URL}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
          # Also print to the normal log for easy click-through.
          [[ -n "${GRAFANA_BASE_URL:-}" ]] && echo "Grafana: ${GRAFANA_BASE_URL}"

      # Least-privilege dashboard-publisher role (terraform/aws-managed-grafana),
      # assumed via GitHub OIDC - no access keys. scripts/07 mints a short-lived
      # AMG service-account token with it.
      - name: AWS login
        if: ${{ env.AWS_DASHBOARD_PUBLISH_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: ${{ env.AWS_DASHBOARD_PUBLISH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}

      - name: Publish dashboards to Amazon Managed Grafana
        if: ${{ env.AWS_DASHBOARD_PUBLISH_ROLE_ARN != '' }}
        env:
          JENKINS2026_OBS_MODE: managed-aws
          JENKINS2026_CI_ENGINE: ${{ steps.ci-engine.outputs.engine }}
        run: ./scripts/07-grafana-dashboards.sh

      - name: Skipped (no publisher role)
        if: ${{ env.AWS_DASHBOARD_PUBLISH_ROLE_ARN == '' }}
        run: |
          echo "::warning::AWS_DASHBOARD_PUBLISH_ROLE_ARN not set - skipping. Re-run 'Day0.infra.04 AWS managed-grafana' and set the secret first (see README \"GitHub Actions automation\")."
