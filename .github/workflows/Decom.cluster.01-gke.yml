name: "Decom.cluster.01 GKE"

# Manually-triggered: tears down everything created by the "Day1.cluster.01 GKE
# provision" workflow - scripts/down.sh (Helm releases, namespaces) then
# `terraform destroy` (GKE cluster, node pool, VPC). Uses the same GCS
# Terraform state as that workflow, so it finds the cluster without any
# extra inputs. See README.md "GitHub Actions automation".
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm this teardown (IRREVERSIBLE)'
        required: true
        type: string
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
      purge_secrets:
        description: "Also delete the eso-mode GCP Secret Manager secrets (labelled managed-by=jenkins-2026). Default OFF: keeping them lets a future Day1 rebuild reuse stable generated passwords (e.g. the Jenkins admin password). The Decom.infra.00 'Everything' umbrella turns this ON."
        required: false
        default: false
        type: boolean
  # Reused by the Decom.infra.00 "Everything" umbrella so the full teardown
  # (cluster + all persistent backends) runs from one dispatch without duplicating
  # the decommission logic here.
  workflow_call:
    inputs:
      git_ref:
        description: "Git ref to check out (empty = caller's ref)"
        required: false
        default: ""
        type: string
      log_level:
        required: false
        default: "info"
        type: string
      purge_secrets:
        description: "Delete the eso-mode Secret Manager secrets too (the umbrella sets this)."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"
  J2026_DELETE_NAMESPACES: "true"
  # Passed to down.sh: purge the eso-mode Secret Manager secrets only when asked
  # (standalone default OFF; the Everything umbrella sets it ON).
  J2026_PURGE_SECRETS: ${{ inputs.purge_secrets && 'true' || 'false' }}

jobs:
  # Only enforced on a direct dispatch: when reused via `workflow_call` (the
  # Decom.infra.00 "Everything" umbrella), `confirm` is not part of the caller's
  # input schema, so this is a no-op — the caller already validated its own
  # confirmation before invoking this workflow.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ -n "${{ inputs.confirm }}" ] && [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' in the confirm box to proceed."; exit 1
          fi

  decommission:
    needs: guard
    runs-on: ubuntu-latest
    environment: gke-production
    env:
      HAS_GRAFANA_CLOUD_TOKEN: ${{ secrets.GRAFANA_CLOUD_API_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        continue-on-error: true
        run: |
          CLUSTER_NAME="$(terraform output -raw cluster_name || true)"
          LOCATION="$(terraform output -raw location || true)"
          # Surface the cluster name to later steps (the orphaned-PV-disk sweep runs
          # after `terraform destroy`, when `terraform output` no longer resolves it).
          echo "CLUSTER_NAME=${CLUSTER_NAME}" >> "$GITHUB_ENV"
          # LOCATION too: the destroy step waits on THIS location's in-flight GKE
          # operations before it starts (the Fleet membership can only be deleted while
          # the cluster is idle — see that step).
          echo "LOCATION=${LOCATION}" >> "$GITHUB_ENV"
          if [[ -n "$CLUSTER_NAME" && -n "$LOCATION" ]]; then
            gcloud container clusters get-credentials \
              "$CLUSTER_NAME" \
              --zone "$LOCATION" \
              --project "${{ secrets.GCP_PROJECT_ID }}"
          else
            echo "No cluster name or location found in Terraform outputs. Skipping kubeconfig fetch."
          fi

      - name: Tear down the stack (scripts/down.sh)
        env:
          JENKINS2026_HEADLAMP_ADMIN_EMAILS: ${{ secrets.HEADLAMP_ADMIN_EMAILS }}
        run: ./scripts/down.sh || true

      - name: Terraform destroy (remove GKE cluster, VPC, node pool)
        working-directory: terraform/gke
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
        run: |
          # Remove any stale GCS state lock left by a previously cancelled run.
          # gsutil rm is idempotent (-f ignores "not found"). This is safe:
          # it only deletes the lock object, never the state file itself.
          gsutil rm -f "gs://${{ secrets.TF_STATE_BUCKET }}/jenkins-2026/gke/default.tflock" \
            2>/dev/null || true

          # WAIT FOR THE CLUSTER TO GO IDLE FIRST. The CSM Fleet membership
          # (google_gke_hub_membership, terraform/gke/security.tf) can only be deleted
          # while the cluster has NO operation in flight — the Fleet API otherwise rejects
          # it outright: `Error waiting for Deleting Membership: Error code 9 ... cluster is
          # currently running another operation. Please retry after the operation is done`
          # (seen live: run 29381924836). down.sh above has just been deleting namespaces +
          # NEGs, so an operation is very likely still settling. Same wait Day2.scale.01-pause
          # does before resizing, for the same reason. Non-fatal: on timeout we still try the
          # destroy (the retry below is the backstop).
          if [[ -n "${LOCATION:-}" ]]; then
            for i in $(seq 1 40); do
              RUNNING="$(gcloud container operations list --location "${LOCATION}" \
                           --filter='status=RUNNING' --format='value(name,operationType)' \
                           2>/dev/null || true)"
              [[ -z "${RUNNING}" ]] && break
              [[ "${i}" -eq 1 ]] && echo "Waiting for in-flight GKE operations to finish before destroy:"
              echo "${RUNNING}" | sed 's/^/  - /'
              sleep 15
              [[ "${i}" -eq 40 ]] && echo "::warning::Timed out waiting for GKE operations — attempting destroy anyway."
            done
          fi

          # Run destroy, capturing the output so we can react to WHY it failed rather than
          # re-running it blind. (The previous shape ran a SECOND destroy just to grep the
          # error for a lock ID, then `exit 1` when there wasn't one — so a retry that had
          # actually made progress still reported failure. That is what run 29381924836 hit.)
          set +e
          out="$(terraform destroy -auto-approve -input=false 2>&1)"
          rc=$?
          set -e
          echo "${out}"
          if [[ "${rc}" -ne 0 ]]; then
            # A stale state lock from a cancelled run: extract its ID and force-unlock.
            LOCK_ID="$(echo "${out}" | grep -oP '(?<=ID:\s{8})[0-9]+' | head -1 || true)"
            if [[ -n "${LOCK_ID}" ]]; then
              echo "Detected lock ${LOCK_ID} — force-unlocking..."
              terraform force-unlock -force "${LOCK_ID}" || true
            fi
            # ORPHANED CLOUD SERVICE MESH FIREWALL RULE. CSM creates its own health-check
            # rule (`gke-csm-thc-*`) on the VPC. GKE does NOT remove it along with the
            # cluster and Terraform never owned it, so the VPC delete fails with
            # `The network resource '...' is already being used by ... firewalls/gke-csm-thc-…`
            # (seen live: run 29392065023). It only becomes an ORPHAN once the cluster is
            # gone — i.e. mid-destroy, long after down.sh's cluster-alive NEG/forwarding-rule
            # sweep has finished — so the destroy failure path is the only place that can
            # catch it. Scoped to THIS VPC + the `gke-csm-` prefix so it can never touch the
            # project's `default` network or an unrelated rule.
            VPC_NAME="$(terraform output -raw network_name 2>/dev/null || true)"
            if [[ -n "${VPC_NAME}" ]]; then
              for fw in $(gcloud compute firewall-rules list \
                            --filter="network:${VPC_NAME} AND name~^gke-csm-" \
                            --format='value(name)' 2>/dev/null || true); do
                echo "Deleting orphaned Cloud Service Mesh firewall rule '${fw}' — it pins ${VPC_NAME}"
                gcloud compute firewall-rules delete "${fw}" --quiet 2>/dev/null || true
              done
            fi

            # Retry once. Covers the unlocked case + the swept firewall rules above, AND any
            # transient the wait missed (the Fleet `code 9` message literally says to retry
            # once the operation is done).
            echo "::warning::terraform destroy failed — retrying once."
            terraform destroy -auto-approve -input=false
          fi

      # Run ALWAYS, not only when THIS run's `terraform output cluster_name` resolved.
      # Disks orphaned by a PRIOR teardown (whose cluster is already out of tf state, so
      # the output is empty) would otherwise never be swept — the exact gap that left 31
      # orphaned PDs (~58 GB) billing after a re-run. The filter is label-scoped, so this
      # is a cheap no-op when there is nothing to reclaim.
      - name: Sweep orphaned PersistentVolume disks (CSI PDs terraform leaves behind)
        if: always()
        run: |
          # Dynamically-provisioned PV disks (pd.csi.storage.gke.io — e.g. the CNPG
          # Postgres volumes) are created by the in-cluster CSI driver, NOT terraform,
          # so `terraform destroy` cannot delete them. A clean teardown lets the CSI
          # driver reclaim them when down.sh deletes the PVCs; but a forced / non-
          # graceful teardown (stuck pods, force-deleted cluster) can orphan them,
          # leaving small pd-ssd disks billing indefinitely. They keep the cluster's
          # GKE labels, so any disk still tagged with our cluster name is a safe orphan
          # to remove. Best-effort; never fail the teardown on it.
          #
          # Disks DETACH ASYNCHRONOUSLY after terraform destroy removes the nodes, so a
          # single pass right after destroy RACES the detachment (the -users:* filter
          # matches nothing while the PDs still list the just-deleted nodes as users) and
          # leaves them billing. Retry until every labeled disk is unattached + deleted,
          # or a 5-min cap.
          PROJECT="${{ secrets.GCP_PROJECT_ID }}"
          # Fall back to the terraform/gke var.cluster_name DEFAULT when the output was
          # empty (cluster already gone), so a prior run's orphans are still matched.
          CLUSTER_NAME="${CLUSTER_NAME:-jenkins-2026}"
          deadline=$(( SECONDS + 300 ))
          while :; do
            gcloud compute disks list --project "${PROJECT}" \
              --filter="labels.goog-k8s-cluster-name=${CLUSTER_NAME} AND -users:*" \
              --format="value(name,zone.basename())" 2>/dev/null \
            | while read -r DISK ZONE; do
                [[ -z "${DISK}" ]] && continue
                echo "Deleting orphaned PV disk ${DISK} (${ZONE})..."
                gcloud compute disks delete "${DISK}" --zone "${ZONE}" --project "${PROJECT}" --quiet || true
              done
            remaining=$(gcloud compute disks list --project "${PROJECT}" \
              --filter="labels.goog-k8s-cluster-name=${CLUSTER_NAME}" --format="value(name)" 2>/dev/null | wc -l)
            [[ "${remaining}" -eq 0 ]] && { echo "All orphaned PV disks reclaimed."; break; }
            [[ ${SECONDS} -ge ${deadline} ]] && { echo "::warning::${remaining} labeled disk(s) still present after 5m (may still be detaching) — re-run this workflow or delete by hand."; break; }
            echo "${remaining} labeled disk(s) still attached/detaching — waiting 20s..."
            sleep 20
          done

      # The stack slug (generated, no longer a GitHub variable) is needed for the
      # grafana_cloud_stack data-source lookup during the token destroy. Read it
      # from terraform/grafana-cloud-stack's GCS state.
      - name: Read Grafana Cloud stack slug (from terraform/grafana-cloud-stack state)
        if: ${{ env.HAS_GRAFANA_CLOUD_TOKEN == 'true' }}
        id: gc_stack
        run: |
          cat > terraform/grafana-cloud-stack/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-stack"
            }
          }
          EOF
          for i in {1..3}; do
            terraform -chdir=terraform/grafana-cloud-stack init -input=false && break || {
              [ $i -lt 3 ] && { echo "init failed, retrying in 10s..."; sleep 10; } || exit 1
            }
          done
          echo "slug=$(terraform -chdir=terraform/grafana-cloud-stack output -raw stack_slug 2>/dev/null || true)" >> "${GITHUB_OUTPUT}"

      # Guard the token destroy on a non-empty slug: when terraform/grafana-cloud-stack
      # has already been torn down (its state has no stack_slug output), there is no
      # stack to look up and nothing to revoke - the grafana_cloud_stack data source
      # would otherwise read an empty slug and fail (409 Conflict), failing the whole run.
      - name: Configure GCS backend (terraform/grafana-cloud-token)
        if: ${{ env.HAS_GRAFANA_CLOUD_TOKEN == 'true' && steps.gc_stack.outputs.slug != '' }}
        run: |
          cat > terraform/grafana-cloud-token/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-token"
            }
          }
          EOF

      - name: Terraform init (grafana-cloud-token)
        if: ${{ env.HAS_GRAFANA_CLOUD_TOKEN == 'true' && steps.gc_stack.outputs.slug != '' }}
        working-directory: terraform/grafana-cloud-token
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform destroy (revoke Grafana Cloud access policy + tokens)
        if: ${{ env.HAS_GRAFANA_CLOUD_TOKEN == 'true' && steps.gc_stack.outputs.slug != '' }}
        continue-on-error: true
        working-directory: terraform/grafana-cloud-token
        env:
          TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
          TF_VAR_stack_slug: ${{ steps.gc_stack.outputs.slug }}
          TF_VAR_jenkins_admin_password: "destroy-placeholder"
        run: terraform destroy -auto-approve -input=false

      - name: Summary
        if: always()
        run: |
          echo "### jenkins-2026 GKE cluster decommissioned" >> "${GITHUB_STEP_SUMMARY}"
          echo "Project \`${{ secrets.GCP_PROJECT_ID }}\` should now have no jenkins-2026* GCP resources left." >> "${GITHUB_STEP_SUMMARY}"
