name: "Decom.infra.04 AWS managed-grafana"

# Rebuild-safety: serialize the paired Day0/Decom.infra.04 aws runs on the ONE shared
# aws-managed-grafana Terraform state prefix so two same-module runs never contend for
# its state lock. cancel-in-progress:false -> never cancel an in-flight
# apply/destroy (a cancelled run would strand the lock).
concurrency:
  group: jenkins-2026-tfstate-aws-managed-grafana
  cancel-in-progress: false


# Manually-triggered setup teardown: destroys terraform/aws-managed-grafana,
# removing the persistent AWS backend (Amazon Managed Grafana, Amazon Managed
# Service for Prometheus, the CloudWatch log group, the GKE->AWS OIDC provider
# and the collector IAM role) that observability_mode: managed-aws uses. Run
# only when tearing down the AWS integration permanently.
#
# Same auth as Day0.infra.04-aws-grafana.yml: GitHub OIDC -> AWS + GitHub WIF -> GCP
# for the GCS state backend. Gated behind a typed "destroy" confirmation on a
# direct dispatch (skipped when reused via workflow_call, e.g. the
# Decom.infra.00 "Everything" umbrella).
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm this teardown (IRREVERSIBLE)'
        required: true
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
  workflow_call: # reused by Day1.cluster.01 when destroy_unused_backends=true
    inputs:
      confirm:
        description: "Set to 'destroy' when the caller already gated this destructive action (e.g. Day1's destroy_unused_backends checkbox); left empty by the Decom.infra.00 umbrella, whose own guard already validated"
        required: false
        default: ""
        type: string
      log_level:
        required: false
        default: "info"
        type: string

permissions:
  contents: read
  id-token: write

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"

jobs:
  # Only enforced on a direct dispatch: when reused via `workflow_call` (the
  # Decom.infra.00 "Everything" umbrella, or Day1.cluster.01's
  # destroy_unused_backends preflight), `confirm` is not part of the caller's
  # input schema, so this is a no-op — the caller already validated its own
  # confirmation before invoking this workflow.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ -n "${{ inputs.confirm }}" ] && [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' in the confirm box to proceed."; exit 1
          fi

  decommission:
    needs: guard
    runs-on: ubuntu-latest
    # Matches the aws-bootstrap role's manually-configured trust condition
    # (auth only — no required-reviewer protection; the `confirm` guard above
    # replaces it).
    environment: aws-bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
          role-session-name: jenkins-2026-aws-decommission

      - name: Authenticate to GCP (Terraform state backend)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/aws-managed-grafana)
        run: |
          cat > terraform/aws-managed-grafana/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/aws-managed-grafana"
            }
          }
          EOF

      - name: Clear stale Terraform state lock
        uses: ./.github/actions/tf-remove-stale-lock
        with:
          bucket: ${{ secrets.TF_STATE_BUCKET }}
          prefix: jenkins-2026/aws-managed-grafana

      - name: Terraform init
        working-directory: terraform/aws-managed-grafana
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform destroy (destroy persistent AWS backend)
        working-directory: terraform/aws-managed-grafana
        env:
          TF_VAR_region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
          TF_VAR_gke_oidc_issuer_url: ${{ secrets.GKE_OIDC_ISSUER_URL }}
        run: terraform destroy -auto-approve -input=false

      - name: Summary
        if: always()
        run: |
          echo "### AWS managed-grafana backend decommissioned" >> "${GITHUB_STEP_SUMMARY}"
