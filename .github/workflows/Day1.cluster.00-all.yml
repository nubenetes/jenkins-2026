name: "Day1.cluster.00 Everything up"

# One-click, from-scratch provision umbrella - the symmetric counterpart of the
# "Decom.infra.00 Everything" teardown. It chains the only two pieces a totally
# clean account needs, in order:
#
#   1. Day0.infra.01 Gateway bootstrap  - the persistent, DNS-coupled static IP +
#      wildcard cert map (idempotent: a no-op when they already exist).
#   2. Day1.cluster.01 GKE provision    - the cluster + full stack; this already
#      bootstraps the chosen observability backend (Day0.infra.0{2,3,4}) as its
#      own preflight, so the umbrella does NOT need to call those.
#
# Everything below is idempotent and re-runnable, so this is safe whether you are
# starting from absolute zero or from the usual "decommissioned" state (where the
# Decom.infra.00 umbrella left the Gateway in place by default).
# Approval note: the gke-production reviewer gates this run, but it is NOT yet a
# single prompt end-to-end. `gateway-bootstrap` (Day0.infra.01) runs first, then
# `provision` (Day1.cluster.01) `needs` it, so their gates land in separate waves
# → typically TWO prompts (gateway, then the cluster), or three in managed modes
# (the persistent-backend bootstrap adds one). Collapsing the umbrella to a single
# prompt is a follow-up: thread a `preapproved` bypass through Day0.infra.01 +
# Day1.cluster.01 plus one top-level `approve` job. (The AWS backend's
# Day0.infra.04 runs on the dedicated aws-bootstrap environment — same reviewer,
# separate only to isolate the admin OIDC trust.)
#
# NOTE: from ABSOLUTE zero (Gateway never bootstrapped), step 1 allocates a NEW
# static IP - follow its job summary to point your DNS A-records at it. On a
# rebuild where the Gateway persisted, the IP is unchanged (no DNS change needed).
on:
  workflow_dispatch:
    inputs:
      observability_mode:
        description: "Observability backend (Day1 auto-bootstraps the matching Day0.infra.0{2,3,4})."
        required: true
        default: "oss"
        type: choice
        options:
          - oss
          - grafana-cloud
          - managed-azure
          - managed-aws
      ci_engine:
        description: "CI engine to deploy (jenkins default | tekton | githubactions | argoworkflows). Passed straight to Day1.cluster.01 — see its input for the full per-engine details."
        required: true
        default: "jenkins"
        type: choice
        options:
          - jenkins
          - tekton
          - githubactions
          - argoworkflows
      secrets_backend:
        description: "Secrets backend: imperative (default) | eso (GCP Secret Manager + External Secrets Operator)."
        required: true
        default: "imperative"
        type: choice
        options:
          - imperative
          - eso
      bootstrap_gateway:
        description: "Allow auto-bootstrap of the Day0.infra.01 persistent Gateway (static IP + cert map). An ungated pre-check runs it ONLY if the static IP doesn't exist yet, so a rebuild where the Gateway persisted skips it automatically (no extra approval). Uncheck to never bootstrap the Gateway."
        required: true
        default: true
        type: boolean
      destroy_unused_backends:
        description: "DESTRUCTIVE / opt-in. Terraform-destroy the persistent backend of every mode you did NOT select (passed straight to Day1.cluster.01)."
        required: false
        default: false
        type: boolean
      develop_track:
        description: "Deploy the optional lean 'develop' microservices tier alongside 'stable' (OFF by default). Passed straight to Day1.cluster.01."
        required: false
        default: false
        type: boolean
      intra_cluster_tls:
        description: "Intra-cluster TLS posture (pick ONE — MUTUALLY EXCLUSIVE, single dropdown). none (default) = plain HTTP in-VPC. backend-tls = cert-manager LB→pod re-encryption (docs/504). cloud-service-mesh = managed Cloud Service Mesh, identity mTLS everywhere (docs/506, standalone per-client SKU). Passed straight to Day1.cluster.01 (where it converges)."
        required: false
        default: "none"
        type: choice
        options:
          - none
          - backend-tls
          - cloud-service-mesh
      binary_authorization:
        description: "Opt-in Binary Authorization supply-chain admission control (docs/507): GKE only admits KMS-attested images. ORTHOGONAL to intra_cluster_tls (composes with any). OFF by default. Passed straight to Day1.cluster.01."
        required: false
        default: false
        type: boolean
      backstage_enabled:
        description: "Backstage developer portal (backstage.enabled — docs/505): software catalog + engine-aware CI/CD views at backstage.<domain> (IAP). ON by default; needs the one-time Day2.publish.06 image bootstrap per branch. Passed straight to Day1.cluster.01 (disabling RETIRES the app-of-apps incl. its CNPG db)."
        required: false
        default: true
        type: boolean
      force_backstage_rebuild:
        description: "Force a fresh Backstage image build even if ghcr.io/…-backstage:<branch> already exists (docs/505 § Umbrella auto-bootstrap). The probe below normally skips the ~15 min build whenever ANY image exists for this branch, regardless of whether it's current — this validates the full source→build→push path end-to-end instead of trusting a possibly-stale cached image. OFF by default (the fast path). No effect if backstage_enabled=false."
        required: false
        default: false
        type: boolean
      llm_enabled:
        description: "Opt-in keyless Grafana LLM app (observability.llm.enabled — docs/301): grafana-llm-app plugin wired to Vertex AI via an in-cluster LiteLLM gateway + Workload Identity. oss mode ONLY (no-op on grafana-cloud/managed-*). OFF by default. Passed straight to Day1.cluster.01 (where enabling/disabling converges)."
        required: false
        default: false
        type: boolean
      assistant_enabled:
        description: "Opt-in official Grafana Assistant chat (observability.assistant.enabled — docs/301): signed grafana-assistant-app. Data stays in GKE (free); only the FREE-tier Grafana Cloud Assistant AI is used (SaaS-hybrid, NOT keyless). oss mode ONLY. For a durable connection set the GRAFANA_CLOUD_ASSISTANT_* secrets; without them it installs but stays PENDING (reminder logged). OFF by default. Passed straight to Day1.cluster.01."
        required: false
        default: false
        type: boolean
      git_ref:
        description: "Git branch, tag, or SHA to check out (empty = the ref selected in 'Use workflow from')."
        required: false
        default: ""
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
      grafana_cloud_tier:
        description: "Grafana Cloud tier profile (grafana-cloud mode). free (default) = leanMetrics on + logMinSeverity=warn (fits free-tier); paid = full metrics + all logs. Traces are NOT sampled on either tier (100% shipped) — they fit the free tier here and sampling would break trace↔log/metric correlation. Passed to Day1.cluster.01."
        required: false
        default: "free"
        type: choice
        options:
          - free
          - paid
      log_min_severity:
        description: "Override the min log severity sent to Grafana. auto (default) = derive from grafana_cloud_tier; or force a level. Passed straight to Day1.cluster.01."
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - trace
          - debug
          - info
          - warn
          - error

permissions:
  contents: read
  id-token: write

# NOTE: deliberately NO `concurrency` here. This umbrella only orchestrates; the
# real GKE work runs inside the called Day1.cluster.01, which already owns the
# `jenkins-2026-gke` concurrency group. If the umbrella also declared that group it
# would hold it while waiting for the `provision` job — which needs the same group —
# deadlocking the reusable call (GitHub then fails the run before `provision` even
# starts). The Decom.infra.00 teardown umbrella follows the same no-concurrency rule.

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}

jobs:
  # 0. Persistent-Gateway existence probe (UNGATED — no environment, adds no
  #    approval prompt; GCP WIF reads the gateway-bootstrap GCS state). Lets
  #    gateway-bootstrap auto-run ONLY when the static IP doesn't exist yet, so a
  #    rebuild where the Gateway persisted skips it → one fewer approval prompt.
  precheck:
    runs-on: ubuntu-latest
    outputs:
      gateway_missing: ${{ steps.probe.outputs.gateway_missing }}
      backstage_image_missing: ${{ steps.backstage_probe.outputs.backstage_image_missing }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.15.6"
      - name: Probe gateway state (does the static IP already exist?)
        id: probe
        run: |
          set -uo pipefail
          printf 'terraform {\n  backend "gcs" {\n    bucket = "%s"\n    prefix = "jenkins-2026/gateway-bootstrap"\n  }\n}\n' \
            "${{ secrets.TF_STATE_BUCKET }}" > terraform/gateway-bootstrap/backend_override.tf
          for i in 1 2 3; do
            terraform -chdir=terraform/gateway-bootstrap init -input=false >/dev/null 2>&1 && break \
              || { [ "$i" -lt 3 ] && sleep 10 || true; }
          done
          ip="$(terraform -chdir=terraform/gateway-bootstrap output -raw static_ip_address 2>/dev/null || true)"
          gw=false; [[ -z "${ip}" ]] && gw=true
          echo "gateway_missing=${gw}" >> "${GITHUB_OUTPUT}"
          echo "Gateway probe: static_ip_address=${ip:-<empty>} -> gateway_missing=${gw} (bootstrap runs only if missing)."

      # Same ungated-probe pattern for the Backstage app image (docs/505): the
      # ghcr image is one-time-per-branch persistent state (like the gateway
      # IP), so probe it and auto-publish ONLY when missing - a first-ever
      # provision on a fresh org/branch is then truly one click, and every
      # rebuild where the image persisted skips the ~15 min build entirely.
      # force_backstage_rebuild short-circuits this to "missing" regardless of
      # ghcr state, forcing the same fresh source->build->push path a brand
      # new org/branch would take - validates the build itself isn't silently
      # broken behind a cached image nobody's rebuilt in a while.
      - name: Probe Backstage image (does ghcr.io/…-backstage:<branch> exist?)
        id: backstage_probe
        if: ${{ inputs.backstage_enabled }}
        run: |
          set -uo pipefail
          if [[ "${{ inputs.force_backstage_rebuild }}" == "true" ]]; then
            echo "backstage_image_missing=true" >> "${GITHUB_OUTPUT}"
            echo "force_backstage_rebuild=true - treating the image as missing regardless of ghcr state."
            exit 0
          fi
          image="ghcr.io/${{ github.repository_owner }}/jenkins-2026-backstage:${GITHUB_REF_NAME}"
          # Login enables private-package reads; anonymous still works for
          # public packages if the registry creds aren't set.
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ghcr.io \
            -u "${{ secrets.REGISTRY_USERNAME }}" --password-stdin >/dev/null 2>&1 || true
          missing=false
          docker manifest inspect "${image}" >/dev/null 2>&1 || missing=true
          echo "backstage_image_missing=${missing}" >> "${GITHUB_OUTPUT}"
          echo "Backstage image probe: ${image} -> missing=${missing} (publish runs only if missing)."

  # 1. Persistent Gateway (static IP + cert map). Auto-runs ONLY when the probe
  #    above found no static IP (first-ever setup); skipped on a rebuild where the
  #    Gateway persisted, and skippable entirely via bootstrap_gateway=false.
  gateway-bootstrap:
    needs: precheck
    if: ${{ inputs.bootstrap_gateway && needs.precheck.outputs.gateway_missing == 'true' }}
    uses: ./.github/workflows/Day0.infra.01-gateway.yml
    with:
      log_level: ${{ inputs.log_level || 'info' }}
    secrets: inherit

  # 1b. Backstage app image (one-time per branch; persists across rebuilds in
  #     ghcr like the microservices images — docs/505). Auto-publishes ONLY when
  #     the probe found no image for this branch, so a fresh-org/first-branch
  #     provision needs no manual Day2.publish.06 run; a failed build here
  #     blocks provision (a default-on portal must not silently deploy broken).
  backstage-image-bootstrap:
    needs: precheck
    if: ${{ inputs.backstage_enabled && needs.precheck.outputs.backstage_image_missing == 'true' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/Day2.publish.06-backstage.yml
    secrets: inherit

  # 2. Cluster + full stack (also bootstraps the chosen observability backend as
  #    its own preflight). always() && !failure() so a *skipped* gateway/image
  #    step does not skip provision, while a real bootstrap failure still blocks it.
  provision:
    needs: [precheck, gateway-bootstrap, backstage-image-bootstrap]
    if: ${{ always() && !failure() && !cancelled() }}
    uses: ./.github/workflows/Day1.cluster.01-gke.yml
    with:
      log_level: ${{ inputs.log_level || 'info' }}
      grafana_cloud_tier: ${{ inputs.grafana_cloud_tier || 'free' }}
      log_min_severity: ${{ inputs.log_min_severity || 'auto' }}
      observability_mode: ${{ inputs.observability_mode }}
      ci_engine: ${{ inputs.ci_engine }}
      secrets_backend: ${{ inputs.secrets_backend }}
      destroy_unused_backends: ${{ inputs.destroy_unused_backends }}
      enable_gateway: true
      develop_track: ${{ inputs.develop_track }}
      intra_cluster_tls: ${{ inputs.intra_cluster_tls }}
      binary_authorization: ${{ inputs.binary_authorization }}
      backstage_enabled: ${{ inputs.backstage_enabled }}
      llm_enabled: ${{ inputs.llm_enabled }}
      assistant_enabled: ${{ inputs.assistant_enabled }}
      git_ref: ${{ inputs.git_ref }}
    secrets: inherit
