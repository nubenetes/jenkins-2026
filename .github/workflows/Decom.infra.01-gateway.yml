name: "Decom.infra.01 Gateway"

# Rebuild-safety: serialize the paired Day0/Decom.infra.01 gateway runs on the ONE shared
# gateway-bootstrap Terraform state prefix so two same-module runs never contend for
# its state lock. cancel-in-progress:false -> never cancel an in-flight
# apply/destroy (a cancelled run would strand the lock).
concurrency:
  group: jenkins-2026-tfstate-gateway-bootstrap
  cancel-in-progress: false


# Manually-triggered setup teardown: destroys terraform/gateway-bootstrap
# to completely remove the persistent gateway resources (static IP, cert mapping).
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm this teardown (IRREVERSIBLE — loses the static IP)'
        required: true
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
  # Reused by the Decom.infra.00 "Everything" umbrella (opt-in gateway teardown).
  workflow_call:
    inputs:
      log_level:
        required: false
        default: "info"
        type: string

permissions:
  contents: read
  id-token: write

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"

jobs:
  # Only enforced on a direct dispatch: when reused via `workflow_call` (the
  # Decom.infra.00 "Everything" umbrella), `confirm` is not part of the caller's
  # input schema, so this is a no-op — the caller already validated its own
  # confirmation before invoking this workflow.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ -n "${{ inputs.confirm }}" ] && [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' in the confirm box to proceed."; exit 1
          fi

  decommission:
    needs: guard
    runs-on: ubuntu-latest
    # Dedicated gateway-bootstrap identity (needed for the GCP OIDC subject),
    # independent of the cluster gate. No required-reviewer protection — the
    # `confirm` guard above is the deliberate-action gate instead.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/gateway-bootstrap)
        run: |
          cat > terraform/gateway-bootstrap/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gateway-bootstrap"
            }
          }
          EOF

      - name: Clear stale Terraform state lock
        uses: ./.github/actions/tf-remove-stale-lock
        with:
          bucket: ${{ secrets.TF_STATE_BUCKET }}
          prefix: jenkins-2026/gateway-bootstrap

      - name: Terraform init
        working-directory: terraform/gateway-bootstrap
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform destroy (destroy persistent gateway resources)
        working-directory: terraform/gateway-bootstrap
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
        run: terraform destroy -auto-approve -input=false

      - name: Summary
        if: always()
        run: |
          echo "### Gateway bootstrap resources decommissioned" >> "${GITHUB_STEP_SUMMARY}"
