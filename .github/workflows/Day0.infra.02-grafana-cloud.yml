name: "Day0.infra.02 Grafana Cloud"

# Rebuild-safety: serialize the paired Day0/Decom.infra.02 grafana-cloud runs on the ONE shared
# grafana-cloud-stack Terraform state prefix so two same-module runs never contend for
# its state lock. cancel-in-progress:false -> never cancel an in-flight
# apply/destroy (a cancelled run would strand the lock).
concurrency:
  group: jenkins-2026-tfstate-grafana-cloud-stack
  cancel-in-progress: false


# Applies terraform/grafana-cloud-stack to create the Grafana Cloud stack that
# observability_mode: grafana-cloud sends OpenTelemetry data to. The stack slug
# is GENERATED (random suffix, persisted in state), so re-applying is a no-op and
# a destroy+recreate (Decom.infra.02 -> Day0.infra.02) never collides with Grafana Cloud's
# reserved-slug cooldown. State is remote (GCS, prefix
# "jenkins-2026/grafana-cloud-stack", same bucket as terraform/gke). The stack is
# ephemeral (torn down by Decom.infra.02); only the Grafana Cloud org/free tier persists.
#
# Requires only the GRAFANA_CLOUD_API_TOKEN secret (the slug is no longer an
# input - it is an output read by Day1.cluster.01). See README.md "GitHub Actions
# automation".
#
# Day1.cluster.01-gke.yml calls this via workflow_call when
# observability_mode=grafana-cloud so the persistent stack is always confirmed
# before Day1.cluster.01 mints scoped tokens against it.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "apply" to confirm provisioning this persistent, billed resource'
        required: true
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
  workflow_call:
    inputs:
      log_level:
        required: false
        default: "info"
        type: string

permissions:
  contents: read
  id-token: write

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"

jobs:
  # Only enforced on a direct dispatch: when reused via `workflow_call`
  # (Day1.cluster.01's observability_mode=grafana-cloud preflight), `confirm` is
  # not part of the caller's input schema, so this is a no-op — selecting the
  # mode is itself the deliberate action for routine, idempotent provisioning.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ -n "${{ inputs.confirm }}" ] && [ "${{ inputs.confirm }}" != "apply" ]; then
            echo "::error::You must type 'apply' in the confirm box to proceed."; exit 1
          fi

  bootstrap:
    needs: guard
    runs-on: ubuntu-latest
    # Creates a persistent, billed Grafana Cloud resource. Consolidated under
    # the cluster's gke-production identity.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/grafana-cloud-stack)
        run: |
          cat > terraform/grafana-cloud-stack/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-stack"
            }
          }
          EOF

      - name: Clear stale Terraform state lock
        uses: ./.github/actions/tf-remove-stale-lock
        with:
          bucket: ${{ secrets.TF_STATE_BUCKET }}
          prefix: jenkins-2026/grafana-cloud-stack

      - name: Terraform init
        working-directory: terraform/grafana-cloud-stack
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform apply (create/confirm Grafana Cloud stack)
        working-directory: terraform/grafana-cloud-stack
        env:
          TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
        run: terraform apply -auto-approve -input=false

      - name: Summary
        if: always()
        working-directory: terraform/grafana-cloud-stack
        run: |
          {
            echo "### Grafana Cloud stack"
            echo
            echo "- Slug: \`$(terraform output -raw stack_slug 2>/dev/null || echo 'n/a')\` (generated)"
            echo "- Grafana URL: \`$(terraform output -raw grafana_url 2>/dev/null || echo 'n/a')\`"
            echo
            echo "Day1.cluster.01 GKE (observability_mode: grafana-cloud) reads this slug from the module's state and mints scoped tokens against the stack via terraform/grafana-cloud-token."
          } >> "${GITHUB_STEP_SUMMARY}"
