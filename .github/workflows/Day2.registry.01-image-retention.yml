name: "Day2.registry.01 Image retention (ghcr prune)"

# Prunes old microservices container image versions from GitHub Container Registry.
# Immutable per-build tags (<branch>-<build#>-<app-sha8> in Jenkins, <branch>-<pipelineRunName>
# in Tekton — see vars/MicroservicesPipeline.groovy + tekton/pipelines) never get
# overwritten, so the packages grow one tag per build. REBUILD-SAFETY (#488): this only
# deletes UNTAGGED/dangling manifests (delete-only-untagged-versions below) — tagged
# versions never expire, since a fresh Day1 redeploys the tag pinned in the persistent
# gitops-config repo without rebuilding, and an age/count prune could delete a still-pinned
# tag out from under it. Layer dedup means the real saving is the old dangling app layers.
# Runs weekly + on demand. Pure GitHub Packages op — no cluster/GKE access.
#
# Note: ghcr storage is FREE for PUBLIC packages; this matters mainly if the packages
# are private. Keeps a generous floor so an older-but-still-deployed tag is never cut.
on:
  schedule:
    - cron: "17 4 * * 0" # Sundays 04:17 UTC
  workflow_dispatch:
    inputs:
      keep:
        description: "How many most-recent versions to KEEP per service (the rest are deleted). Keep it well above your deploy cadence so a deployed tag is never pruned."
        required: false
        default: "30"
        type: string
      dry_run:
        description: "List what would be deleted without deleting."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: jenkins-2026-image-retention
  cancel-in-progress: false

jobs:
  prune:
    name: "Prune ${{ matrix.service }}"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [gateway, jhipstersamplemicroservice]
    steps:
      - name: Prune old versions
        uses: actions/delete-package-versions@e5bc658cc4c965c472efe991f8beea3981499c55 # v5.0.0
        with:
          owner: nubenetes
          package-name: "jenkins-2026-microservices/${{ matrix.service }}"
          package-type: container
          # REBUILD-SAFETY: only prune UNTAGGED (dangling) manifests — NEVER a tagged
          # version. A fresh Day1 deploys the image tag pinned in the persistent
          # jenkins-2026-gitops-config repo WITHOUT rebuilding (the seed only creates
          # jobs), so that tag must still exist in ghcr; an age/count prune of a
          # still-pinned tag → ImagePullBackOff on rebuild. Tags therefore never expire
          # here (ghcr is free for public packages). If bounded growth is ever needed,
          # replace this with a deployment-aware allowlist of the pins in
          # values-{stable,develop}.yaml rather than an age/count sweep of tags.
          delete-only-untagged-versions: true
          # Bounds how many untagged/dangling manifests (left by overwrites/retags) survive.
          min-versions-to-keep: ${{ inputs.keep || '30' }}
          dry-run: ${{ inputs.dry_run || false }}
