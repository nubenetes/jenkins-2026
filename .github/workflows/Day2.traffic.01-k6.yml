name: "Day2.traffic.01 Continuous k6 simulation"

on:
  workflow_dispatch:
    inputs:
      duration:
        description: "Duration of the simulation (e.g. 10m, 1h)"
        default: "15m"
        required: true
  # Optional: Run on a schedule to keep the dashboards alive
  # schedule:
  #   - cron: '0 * * * *' # Every hour

jobs:
  simulate-traffic:
    name: k6 Traffic Simulation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup k6
        uses: grafana/setup-k6-action@v1
        with:
          # Pin to the same k6 as the Jenkins microservices-k6-smoke job
          # (grafana/k6:2.0.0) so both emit the same OpenTelemetry metric schema.
          # k6's OTel output changed the Rate-metric schema between versions: 2.x
          # emits checks_total{condition="nonzero"} / http_req_failed_total{condition=...}
          # (what the k6 dashboards query); 0.54 emitted *_occurred_total. Keep this
          # pinned and in lockstep with the Jenkins image - leaving it unpinned
          # installs whatever is latest and can silently change the schema again.
          k6-version: '2.0.0'

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        continue-on-error: true
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
        continue-on-error: true

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet
        continue-on-error: true

      - name: Fetch GKE credentials
        run: |
          gcloud container clusters get-credentials jenkins-2026 \
            --zone europe-southwest1-a \
            --project ${{ secrets.GCP_PROJECT_ID }}
        continue-on-error: true

      - name: Run k6 Simulation
        env:
          K6_OTEL_EXPORTER_PROTOCOL: http/protobuf
          K6_OTEL_SERVICE_NAME: k6-microservices-smoke
          OTEL_RESOURCE_ATTRIBUTES: service.name=k6-microservices-smoke,service.namespace=jenkins-2026,deployment.environment=stable
          # Optional Grafana Cloud k6 (the k6-app) streaming; empty -> skipped.
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}
        run: |
          # Record start time in milliseconds
          START_TIME_MS=$(date +%s%3N)
          
          # OTLP credentials + Grafana URL come from the in-cluster
          # grafana-cloud-credentials Secret (provisioned by Day1.cluster.01). The stack
          # slug/endpoint are generated per deploy, so there is no static fallback -
          # the cluster must be reachable.
          if ! kubectl get secret grafana-cloud-credentials -n observability >/dev/null 2>&1; then
            echo "::error::grafana-cloud-credentials Secret not found - deploy the cluster (Day1.cluster.01, observability_mode=grafana-cloud) first."
            exit 1
          fi
          export K6_OTEL_HTTP_EXPORTER_ENDPOINT=$(kubectl get secret grafana-cloud-credentials -n observability -o jsonpath='{.data.GRAFANA_CLOUD_OTLP_ENDPOINT}' | base64 -d)
          export K6_OTEL_HEADERS="Authorization=Basic $(kubectl get secret grafana-cloud-credentials -n observability -o jsonpath='{.data.GRAFANA_CLOUD_OTLP_AUTH}' | base64 -d)"
          echo "GRAFANA_BASE_URL=$(kubectl get secret grafana-cloud-credentials -n observability -o jsonpath='{.data.GRAFANA_BASE_URL}' | base64 -d)" >> "$GITHUB_ENV"
          
          # k6's HTTP exporter expects the endpoint as host:port without scheme and path
          export K6_OTEL_HTTP_EXPORTER_ENDPOINT=$(echo $K6_OTEL_HTTP_EXPORTER_ENDPOINT | sed -E 's|^https://||; s|/otlp$||')":443"
          export K6_OTEL_HTTP_EXPORTER_URL_PATH="/otlp/v1/metrics"
          
          # Use the existing smoke test script but with more iterations/duration
          # Pointing to the stable environment
          export TARGET_URL="https://microservices.jenkins2026.nubenetes.com"
          
          # Also stream to Grafana Cloud k6 (the k6-app) when a token + project are set.
          CLOUD_OUT=""
          if [ -n "${K6_CLOUD_TOKEN:-}" ] && [ -n "${K6_CLOUD_PROJECT_ID:-}" ]; then
            CLOUD_OUT="--out cloud"
          fi

          set +e
          k6 run jenkins/pipelines/k6/microservices-smoke.js \
            -o opentelemetry ${CLOUD_OUT} \
            --vus 2 \
            --duration ${{ github.event.inputs.duration || '15m' }} \
            --env TARGET_URL=$TARGET_URL \
            --env ENV_NAME=stable \
            --summary-export=k6-summary.json
          
          EXIT_CODE=$?
          
          # Record end time in milliseconds
          END_TIME_MS=$(date +%s%3N)
          
          # Pad +/- 5m (300000 ms)
          FROM_TIME=$((START_TIME_MS - 300000))
          TO_TIME=$((END_TIME_MS + 300000))
          echo "GRAFANA_FROM=$FROM_TIME" >> $GITHUB_ENV
          echo "GRAFANA_TO=$TO_TIME" >> $GITHUB_ENV
          
          if [ $EXIT_CODE -eq 0 ] || [ $EXIT_CODE -eq 99 ]; then
            exit 0
          else
            exit $EXIT_CODE
          fi

      - name: Upload k6 Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: k6-summary-report
          path: k6-summary.json
          retention-days: 7

      - name: Show Results Summary
        if: always()
        env:
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}
        run: |
          echo "=============================================================================="
          echo "📊 K6 TRAFFIC SIMULATION SUMMARY"
          echo "=============================================================================="
          if [ -f k6-summary.json ]; then
            cat k6-summary.json | jq '.metrics'
          else
            echo "❌ k6-summary.json not found. Check the simulation logs for errors."
          fi
          echo ""
          echo "🔗 VIEW IN GRAFANA"
          echo "------------------------------------------------------------------------------"
          echo "The metrics from this run have been streamed to your Grafana Cloud instance."
          echo "You can analyze real-time latency, error rates, and traces here:"
          echo ""
          if [ ! -z "$GRAFANA_FROM" ] && [ ! -z "$GRAFANA_TO" ]; then
            echo "${GRAFANA_BASE_URL}/d/jenkins2026-k6-smoke-overview/jenkins-2026-k6-observability-smoke-test?orgId=1&from=${GRAFANA_FROM}&to=${GRAFANA_TO}&var-DS_PROMETHEUS=grafanacloud-prom&var-DS_LOKI=grafanacloud-logs&var-DS_TEMPO=grafanacloud-traces&var-deployment_environment=stable"
          else
            echo "${GRAFANA_BASE_URL}/d/jenkins2026-k6-smoke-overview/jenkins-2026-k6-observability-smoke-test?var-DS_PROMETHEUS=grafanacloud-prom&var-DS_LOKI=grafanacloud-logs&var-DS_TEMPO=grafanacloud-traces&var-deployment_environment=stable"
          fi
          echo ""
          echo "This dashboard correlates k6 client-side metrics with your Microservices"
          echo "backend telemetry (traces, logs, and metrics) for full observability."
          if [ -n "${K6_CLOUD_PROJECT_ID:-}" ] && [ -n "${GRAFANA_BASE_URL:-}" ]; then
            echo ""
            echo "🏎️  VIEW IN GRAFANA CLOUD k6 (the k6-app)"
            echo "------------------------------------------------------------------------------"
            echo "${GRAFANA_BASE_URL}/a/k6-app/projects/${K6_CLOUD_PROJECT_ID}"
          fi
          echo "=============================================================================="
