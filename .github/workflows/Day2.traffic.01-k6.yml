name: "Day2.traffic.01 Continuous k6 simulation"

on:
  workflow_dispatch:
    inputs:
      preset:
        description: "Load a committed config from jenkins/pipelines/k6/presets/<name>.yaml (fields below override it). KEEP options in sync with presets/index.yaml. NOTE: 'rum-faro' is a SPECIAL test type — it does NOT load-test the microservices; it emits synthetic Grafana Faro RUM beacons (Web Vitals + JS errors) to populate the Frontend RUM dashboard, and is only supported on observability.mode=oss / grafana-cloud (skipped on managed-azure/aws — Faro degrades there). See docs/302."
        type: choice
        default: none
        options:
          - none
          - smoke
          - load-baseline
          - frontend-only
          - develop-smoke
          - stress-peak
          - spike-recovery
          - soak-endurance
          - rps-steady
          - breakpoint-capacity
          - rum-faro
      run_all_presets:
        description: "Run ALL presets from presets/index.yaml IN PARALLEL (one job each), each with its file's own values. One click → every use case lands in the dashboard, filterable by Runner/Profile. Ignores the single preset/profile/override fields below."
        type: boolean
        default: false
      run_all_duration:
        description: "run_all only: cap EVERY preset to this short duration (e.g. 30s, 1m) for a quick comprehensive pass — overrides each preset's stages/rps/duration. Empty = use each file's own (possibly long, e.g. 1h soak) values."
        required: false
        default: ""
      profile:
        description: "Workload profile (used when preset=none; otherwise the preset's profile wins). 'rum' is the special Faro RUM-beacon test type (oss / grafana-cloud only — see the 'rum-faro' preset / docs/302), not a microservices load profile."
        type: choice
        default: smoke
        options: [smoke, load, stress, soak, spike, breakpoint, rum]
      env_name:
        description: "Target tier — selects the public URL: stable → microservices.<baseDomain>, develop → microservices-develop.<baseDomain>. Both are external internet endpoints; also tags the telemetry deployment.environment=<tier>."
        type: choice
        default: stable
        options: [stable, develop]
      duration:
        description: "Hold duration (e.g. 30s, 10m, 1h). Overrides the iteration budget / profile hold. Empty + no preset/stages/rps → defaults to 15m (this is the continuous-simulation workflow)."
        default: ""
        required: false
      vus:
        description: "Virtual users (empty → profile default)"
        default: ""
        required: false
      stages:
        description: 'Custom ramping stages "dur:target,..." e.g. 30s:10,2m:50,30s:0 (overrides profile)'
        default: ""
        required: false
      rps:
        description: "Constant arrival rate (req/s; overrides profile — except breakpoint, which uses it as the ramp target)"
        default: ""
        required: false
      scenarios:
        description: 'Request flows: "all" or comma list of gateway-ui,gateway-health,microservice-health,gateway-proxy'
        default: "all"
        required: false
      p95_ms:
        description: "p(95) latency budget in ms (empty → 3000)"
        default: ""
        required: false
      error_rate:
        description: "Max error rate 0..1 (empty → 0.05)"
        default: ""
        required: false
      target_url:
        description: "Override target base URL (empty → derived from env_name)"
        default: ""
        required: false
      debug:
        description: "Per-iteration k6 debug logging"
        type: boolean
        default: false
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
  # Optional: Run on a schedule to keep the dashboards alive
  # schedule:
  #   - cron: '0 * * * *' # Every hour

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}

jobs:
  # Build the preset matrix: run_all_presets=true → every preset in index.yaml
  # (one parallel job each); otherwise a single entry (the chosen preset, or
  # 'none' = manual inputs / script defaults). fromJson() feeds it to the matrix.
  prepare:
    name: Resolve preset matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - id: m
        run: |
          set -euo pipefail
          if [ "${{ inputs.run_all_presets }}" = "true" ]; then
            # run_all iterates presets/index.yaml (the shared, engine-neutral list). rum-faro
            # is deliberately EXCLUDED from that index (it runs faro-rum.js, GitHub-Actions-only,
            # so Jenkins/Tekton must not pick it up) — but for THIS GitHub Actions run_all we do
            # want it, so append it here only. The k6 job's own backend guard skips rum-faro
            # cleanly (exit 0) on observability.mode=managed-azure/managed-aws (Faro is oss /
            # grafana-cloud only), so it self-skips where unsupported. See docs/302.
            names=$(awk '/^[[:space:]]*-[[:space:]]*name:/{print $3}' \
                      jenkins/pipelines/k6/presets/index.yaml | jq -R . | jq -cs '. + ["rum-faro"]')
          else
            names=$(printf '%s' '${{ inputs.preset || 'none' }}' | jq -R . | jq -cs .)
          fi
          echo "matrix=${names}" >> "$GITHUB_OUTPUT"
          echo "Preset matrix: ${names}"

  simulate-traffic:
    name: "k6: ${{ matrix.preset }}"
    needs: prepare
    strategy:
      fail-fast: false
      # Cap concurrency so a full run_all doesn't crush the lean app with 9
      # simultaneous profiles (incl. stress/breakpoint); each run's k6 metrics are
      # tagged + isolated regardless, so they stay filterable in the dashboard.
      max-parallel: 4
      matrix:
        preset: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest
    # No environment gate on purpose: this workflow only drives read-only HTTP
    # traffic against the already-running public endpoints — it provisions and
    # destroys nothing — so the gke-production "required reviewers" approval (kept
    # on Day1/Decom and the heavier Day2.* workflows) would only block
    # automation/scheduling here. All secrets it uses are repo-level, so dropping
    # the environment loses no access.
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Setup k6
        uses: grafana/setup-k6-action@db07bd9765aac508ef18982e52ab937fe633a065 # v1
        with:
          # Pin to the same k6 as the Jenkins microservices-k6-smoke job
          # (grafana/k6:2.0.0) so both emit the same OpenTelemetry metric schema.
          # k6's OTel output changed the Rate-metric schema between versions: 2.x
          # emits checks_total{condition="nonzero"} / http_req_failed_total{condition=...}
          # (what the k6 dashboards query); 0.54 emitted *_occurred_total. Keep this
          # pinned and in lockstep with the Jenkins image - leaving it unpinned
          # installs whatever is latest and can silently change the schema again.
          k6-version: '2.0.0'

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Resolve k6 parameters (preset + manual overrides)
        env:
          IN_PRESET: ${{ matrix.preset }}
          IN_RUN_ALL: ${{ inputs.run_all_presets }}
          IN_RUN_ALL_DURATION: ${{ inputs.run_all_duration }}
          IN_PROFILE: ${{ github.event.inputs.profile || 'smoke' }}
          IN_ENV_NAME: ${{ github.event.inputs.env_name || 'stable' }}
          IN_DURATION: ${{ github.event.inputs.duration }}
          IN_VUS: ${{ github.event.inputs.vus }}
          IN_STAGES: ${{ github.event.inputs.stages }}
          IN_RPS: ${{ github.event.inputs.rps }}
          IN_SCENARIOS: ${{ github.event.inputs.scenarios }}
          IN_P95_MS: ${{ github.event.inputs.p95_ms }}
          IN_ERROR_RATE: ${{ github.event.inputs.error_rate }}
          IN_TARGET_URL: ${{ github.event.inputs.target_url }}
          IN_DEBUG: ${{ github.event.inputs.debug }}
        run: |
          set -euo pipefail
          PF="jenkins/pipelines/k6/presets/${IN_PRESET}.yaml"
          USING_PRESET=false
          if [ "${IN_PRESET}" != "none" ] && [ -f "${PF}" ]; then
            USING_PRESET=true
            echo "Loading k6 preset '${IN_PRESET}' from ${PF}"
          elif [ "${IN_PRESET}" != "none" ]; then
            echo "::warning::preset ${PF} not found — using manual inputs only"
          fi
          # Read a key from the preset's .params (empty if no preset / key absent).
          getp() { if [ "${USING_PRESET}" = true ]; then yq ".params.$1 // \"\"" "${PF}"; else echo ""; fi; }
          # precedence: manual (non-empty) > preset > "" (script default)
          resolve() { if [ -n "$1" ]; then printf '%s' "$1"; else getp "$2"; fi; }

          # profile: the preset's profile wins when a preset is selected
          if [ "${USING_PRESET}" = true ]; then
            PROFILE="$(getp profile)"; [ -z "${PROFILE}" ] && PROFILE="${IN_PROFILE}"
          else
            PROFILE="${IN_PROFILE}"
          fi
          VUS="$(resolve "${IN_VUS}" vus)"
          ITERATIONS="$(getp iterations)"          # no manual input for iterations
          DURATION="$(resolve "${IN_DURATION}" duration)"
          STAGES="$(resolve "${IN_STAGES}" stages)"
          RPS="$(resolve "${IN_RPS}" rps)"
          SCENARIOS="$(resolve "${IN_SCENARIOS}" scenarios)"; [ -z "${SCENARIOS}" ] && SCENARIOS="all"
          P95_MS="$(resolve "${IN_P95_MS}" p95Ms)"
          ERROR_RATE="$(resolve "${IN_ERROR_RATE}" errorRate)"
          # env_name: a preset may pin it; otherwise the input
          ENVP="$(getp envName)"; ENV_NAME="${IN_ENV_NAME}"; [ -n "${ENVP}" ] && ENV_NAME="${ENVP}"
          TARGET_URL_INPUT="$(resolve "${IN_TARGET_URL}" targetUrl)"

          # This is the "continuous simulation" workflow: with no preset and no
          # explicit shape, keep the historical 15m smoke so dashboards stay alive.
          if [ "${USING_PRESET}" = false ] && [ -z "${DURATION}${STAGES}${RPS}" ]; then
            DURATION="15m"
          fi

          # run_all short mode: cap EVERY preset to one short duration for a quick
          # comprehensive pass — clear stages/rps/iterations so the short duration
          # actually governs (ramps/arrival-rate would otherwise set their own length).
          if [ "${IN_RUN_ALL}" = "true" ] && [ -n "${IN_RUN_ALL_DURATION}" ]; then
            DURATION="${IN_RUN_ALL_DURATION}"; STAGES=""; RPS=""; ITERATIONS=""
            echo "run_all short mode: ${IN_PRESET} capped to duration=${DURATION}"
          fi

          {
            echo "K6SIM_PROFILE=${PROFILE}"
            echo "K6SIM_VUS=${VUS}"
            echo "K6SIM_ITERATIONS=${ITERATIONS}"
            echo "K6SIM_DURATION=${DURATION}"
            echo "K6SIM_STAGES=${STAGES}"
            echo "K6SIM_RPS=${RPS}"
            echo "K6SIM_SCENARIOS=${SCENARIOS}"
            echo "K6SIM_P95_MS=${P95_MS}"
            echo "K6SIM_ERROR_RATE=${ERROR_RATE}"
            echo "K6SIM_DEBUG=${IN_DEBUG}"
            echo "ENV_NAME=${ENV_NAME}"
            echo "ENV_NAME_INPUT=${ENV_NAME}"
            echo "TARGET_URL_INPUT=${TARGET_URL_INPUT}"
            echo "OTEL_RESOURCE_ATTRIBUTES=service.name=k6-microservices-smoke,service.namespace=jenkins-2026,deployment.environment=${ENV_NAME}"
          } >> "${GITHUB_ENV}"
          echo "Resolved: preset=${IN_PRESET} profile=${PROFILE} env=${ENV_NAME} vus=${VUS:-<def>} dur=${DURATION:-<none>} stages=${STAGES:-<none>} rps=${RPS:-<none>} scenarios=${SCENARIOS}"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        continue-on-error: true
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        continue-on-error: true

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet
        continue-on-error: true

      - name: Fetch GKE credentials
        run: |
          gcloud container clusters get-credentials jenkins-2026 \
            --zone europe-southwest1-a \
            --project ${{ secrets.GCP_PROJECT_ID }}
        continue-on-error: true

      - name: Run k6 Simulation
        env:
          K6_OTEL_SERVICE_NAME: k6-microservices-smoke
          K6_OTEL_EXPORT_INTERVAL: 2s
          # The K6SIM_* workload contract, ENV_NAME(_INPUT), TARGET_URL_INPUT and
          # OTEL_RESOURCE_ATTRIBUTES are resolved (preset + manual overrides) by the
          # "Resolve k6 parameters" step into $GITHUB_ENV — they are already in the
          # environment here.
          # Optional Grafana Cloud k6 (the k6-app) streaming; empty -> skipped.
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}
        run: |
          set -euo pipefail
          START_TIME_MS=$(date +%s%3N)
          NS="observability"

          # Detect the ACTIVE mode from in-cluster secrets (the cluster may have been
          # deployed with JENKINS2026_OBS_MODE overriding config.yaml's default, so
          # reading config.yaml would give the wrong mode).
          if kubectl get secret aws-managed-credentials -n "${NS}" >/dev/null 2>&1; then
            MODE="managed-aws"
          elif kubectl get secret azure-monitor-credentials -n "${NS}" >/dev/null 2>&1; then
            MODE="managed-azure"
          elif kubectl get secret grafana-cloud-credentials -n "${NS}" >/dev/null 2>&1; then
            MODE="grafana-cloud"
          else
            MODE="oss"
          fi
          echo "Observability mode (detected from cluster): ${MODE}"

          # --- RUM (Faro) test type selection + backend guard --------------------
          # profile=rum (the rum-faro preset) emits synthetic Grafana Faro beacons
          # instead of load-testing the microservices, and is only meaningful on
          # oss / grafana-cloud (Faro → Loki/Tempo). managed-azure/aws degrade Faro
          # to generic App Insights/CloudWatch, so skip cleanly there. See docs/302.
          K6_SCRIPT="jenkins/pipelines/k6/microservices-smoke.js"
          if [[ "${K6SIM_PROFILE}" == "rum" ]]; then
            if [[ "${MODE}" != "oss" && "${MODE}" != "grafana-cloud" ]]; then
              echo "::warning::RUM (Faro) test type is oss / grafana-cloud only (current: ${MODE}) — skipping."
              { echo "### ⏭️ RUM (Faro) preset skipped";
                echo "- \`rum-faro\` populates the Frontend RUM dashboard only on **oss** / **grafana-cloud** (Faro → Loki/Tempo). Current obs mode: \`${MODE}\` stores Faro as generic data. See docs/302."; } >> "${GITHUB_STEP_SUMMARY}"
              exit 0
            fi
            K6_SCRIPT="jenkins/pipelines/k6/faro-rum.js"
          fi

          # ---------------------------------------------------------------------------
          # Resolve OTLP destination and Grafana URL based on the active obs mode.
          #
          # grafana-cloud: HTTP/protobuf directly to the Grafana Cloud OTLP gateway.
          # All other modes (oss, managed-aws, managed-azure): port-forward the
          # in-cluster otel-collector-gateway and use gRPC — the collector then
          # remote-writes to the mode-specific backend (AMP, Azure Monitor, Prometheus).
          # ---------------------------------------------------------------------------
          GRAFANA_URL=""
          PF_PID=""

          if [[ "${MODE}" == "grafana-cloud" ]]; then
            if ! kubectl get secret grafana-cloud-credentials -n "${NS}" >/dev/null 2>&1; then
              echo "::error::grafana-cloud-credentials Secret not found — deploy the cluster (Day1.cluster.01, observability_mode=grafana-cloud) first."
              exit 1
            fi
            OTLP_ENDPOINT="$(kubectl get secret grafana-cloud-credentials -n "${NS}" \
              -o jsonpath='{.data.GRAFANA_CLOUD_OTLP_ENDPOINT}' | base64 -d)"
            OTLP_AUTH="$(kubectl get secret grafana-cloud-credentials -n "${NS}" \
              -o jsonpath='{.data.GRAFANA_CLOUD_OTLP_AUTH}' | base64 -d)"
            GRAFANA_URL="$(kubectl get secret grafana-cloud-credentials -n "${NS}" \
              -o jsonpath='{.data.GRAFANA_BASE_URL}' | base64 -d || true)"
            # k6 HTTP exporter expects host:port without scheme or path
            export K6_OTEL_EXPORTER_PROTOCOL=http/protobuf
            export K6_OTEL_HTTP_EXPORTER_ENDPOINT="$(echo "${OTLP_ENDPOINT}" \
              | sed -E 's|^https://||; s|/otlp$||'):443"
            export K6_OTEL_HTTP_EXPORTER_URL_PATH="/otlp/v1/metrics"
            export K6_OTEL_HEADERS="Authorization=Basic ${OTLP_AUTH}"
            echo "OTLP → Grafana Cloud (HTTP/protobuf): ${K6_OTEL_HTTP_EXPORTER_ENDPOINT}"
          else
            # Port-forward the in-cluster gateway to localhost:4317 (gRPC).
            # This works for oss, managed-aws, managed-azure — the collector
            # then remote-writes to whichever backend is active.
            kubectl port-forward svc/otel-collector-gateway -n "${NS}" 4317:4317 &
            PF_PID=$!
            sleep 4  # wait for the tunnel to establish
            echo "Port-forward PID: ${PF_PID} — k6 will send gRPC to localhost:4317"
            export K6_OTEL_EXPORTER_PROTOCOL=grpc
            export K6_OTEL_GRPC_EXPORTER_ENDPOINT=localhost:4317
            export K6_OTEL_GRPC_EXPORTER_INSECURE=true
            echo "OTLP → in-cluster otel-collector-gateway (gRPC insecure)"

            # Resolve Grafana URL per mode (best-effort, used only for the summary link).
            case "${MODE}" in
              managed-aws)
                GRAFANA_URL="$(kubectl get secret aws-managed-credentials -n "${NS}" \
                  -o jsonpath='{.data.GRAFANA_BASE_URL}' 2>/dev/null | base64 -d || true)" ;;
              managed-azure)
                GRAFANA_URL="$(kubectl get secret azure-monitor-credentials -n "${NS}" \
                  -o jsonpath='{.data.GRAFANA_BASE_URL}' 2>/dev/null | base64 -d || true)" ;;
              oss)
                # NOTE: the correct key is .gateway.baseDomain (same as the
                # TARGET_URL resolution below) — a prior .platform.baseDomain typo
                # here made yq print the literal string "null" (yq prints "null"
                # for a missing key, not empty), which passed the `-n` check and
                # produced the broken link https://grafana.null.
                DOMAIN="$(yq '.gateway.baseDomain' config/config.yaml 2>/dev/null || true)"
                [[ -n "${DOMAIN}" && "${DOMAIN}" != "null" ]] && GRAFANA_URL="https://grafana.${DOMAIN}" ;;
            esac
          fi

          echo "GRAFANA_BASE_URL=${GRAFANA_URL}" >> "${GITHUB_ENV}"

          # ---------------------------------------------------------------------------
          # Resolve the application target URL.
          #   explicit target_url input → use as-is
          #   env_name=develop          → the public microservices-develop host (its own
          #                               HTTPRoute, exposed by 09-gateway.sh)
          #   env_name=stable (default) → the public microservices host from config.yaml
          # ---------------------------------------------------------------------------
          APP_PF_PID=""
          if [[ -n "${TARGET_URL_INPUT:-}" ]]; then
            export TARGET_URL="${TARGET_URL_INPUT}"
          elif [[ "${ENV_NAME_INPUT}" == "develop" ]]; then
            HOST="$(yq '.gateway.hosts.microservicesDevelop' config/config.yaml 2>/dev/null || echo microservices-develop)"
            DOMAIN="$(yq '.gateway.baseDomain' config/config.yaml 2>/dev/null || true)"
            export TARGET_URL="https://${HOST}.${DOMAIN}"
          else
            HOST="$(yq '.gateway.hosts.microservices' config/config.yaml 2>/dev/null || echo microservices)"
            DOMAIN="$(yq '.gateway.baseDomain' config/config.yaml 2>/dev/null || true)"
            export TARGET_URL="https://${HOST}.${DOMAIN}"
          fi
          echo "TARGET_URL=${TARGET_URL}  (env=${ENV_NAME_INPUT}, profile=${K6SIM_PROFILE})"

          CLOUD_OUT=""
          if [[ -n "${K6_CLOUD_TOKEN:-}" && -n "${K6_CLOUD_PROJECT_ID:-}" ]]; then
            CLOUD_OUT="--out cloud"
          fi

          # Execution shape (VUs/duration/stages/rps) comes entirely from the
          # K6SIM_* env (the script's scenarios block) — no --vus/--duration CLI
          # flags, which k6 forbids mixing with a scenarios-based script.
          # TARGET_URL and ENV_NAME reach the script as __ENV automatically.
          set +e
          # k6-summary.json is written by the script's handleSummary() (CWD),
          # NOT --summary-export — k6 2.0's --summary-export emits a flattened
          # schema that made the jq summary below read all-zeros. See
          # jenkins/pipelines/k6/microservices-smoke.js.
          # ci_runner/k6_profile as k6 --tag (metric labels on every series), NOT
          # resource attributes: Grafana Cloud's OTLP ingestion only promotes a fixed
          # set of resource attrs to labels (deployment.environment yes, custom ones
          # land in target_info only) — so the dashboard's label_values()/filters need
          # them as metric tags, which k6 attaches to all metrics in every output.
          # RUM test type: also port-forward the faro receiver (:8027) and point the
          # script at it; beacons flow collector → Loki/Tempo. (k6's own metrics still
          # go out via -o opentelemetry, tagged k6_profile=rum, so the k6 board shows it.)
          FARO_PF_PID=""
          K6_TLS_FLAGS=""
          if [[ "${K6SIM_PROFILE}" == "rum" ]]; then
            kubectl port-forward svc/otel-collector-gateway -n "${NS}" 8027:8027 >/tmp/faro-pf.log 2>&1 &
            FARO_PF_PID=$!; sleep 4
            # Auto-detect backend TLS (docs/504) from the LIVE cluster instead of a
            # manual input that could drift from how the cluster was actually
            # provisioned (the #552/#556 input-parity lesson). The faro-backend-tls
            # BackendTLSPolicy only exists when 08.7-backend-tls.sh + 09-gateway.sh
            # activated it. When active the faro receiver serves HTTPS-only on 8027
            # (no plain-HTTP fallback), so both FARO_URL and the k6 run itself must
            # speak/accept TLS or every beacon fails silently (k6 reports a
            # connection/TLS error per request, not an HTTP error).
            # --insecure-skip-tls-verify: the runner doesn't carry the in-cluster CA -
            # fine here, this POSTs straight to the port-forwarded pod, not through
            # the LB/BackendTLSPolicy validation path.
            if kubectl get backendtlspolicy faro-backend-tls -n "${NS}" >/dev/null 2>&1; then
              export FARO_URL="https://localhost:8027/"
              K6_TLS_FLAGS="--insecure-skip-tls-verify"
            else
              export FARO_URL="http://localhost:8027/"
            fi
            echo "RUM: Faro beacons → ${FARO_URL} (collector faro receiver)"
          fi
          k6 run "${K6_SCRIPT}" \
            --tag ci_runner=gha --tag "k6_profile=${K6SIM_PROFILE}" --tag "k6_preset=${{ matrix.preset }}" \
            ${K6_TLS_FLAGS} -o opentelemetry ${CLOUD_OUT}
          EXIT_CODE=$?
          set -e

          # Stop port-forwards if we started any
          [[ -n "${PF_PID}" ]] && kill "${PF_PID}" 2>/dev/null || true
          [[ -n "${APP_PF_PID}" ]] && kill "${APP_PF_PID}" 2>/dev/null || true
          [[ -n "${FARO_PF_PID:-}" ]] && kill "${FARO_PF_PID}" 2>/dev/null || true

          END_TIME_MS=$(date +%s%3N)
          FROM_TIME=$((START_TIME_MS - 300000))
          TO_TIME=$((END_TIME_MS   + 300000))
          echo "GRAFANA_FROM=${FROM_TIME}" >> "${GITHUB_ENV}"
          echo "GRAFANA_TO=${TO_TIME}"     >> "${GITHUB_ENV}"
          echo "OBS_MODE=${MODE}"          >> "${GITHUB_ENV}"

          if [[ ${EXIT_CODE} -eq 0 || ${EXIT_CODE} -eq 99 ]]; then
            exit 0
          else
            exit ${EXIT_CODE}
          fi

      - name: Upload k6 Report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: k6-summary-report
          path: k6-summary.json
          retention-days: 7

      - name: Show Results Summary
        if: always()
        env:
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}
        run: |
          echo "=============================================================================="
          echo "K6 TRAFFIC SIMULATION SUMMARY  (mode: ${OBS_MODE:-unknown})"
          echo "=============================================================================="
          if [ -f k6-summary.json ] && [ "$(jq -r '.test // empty' k6-summary.json)" = "faro-rum" ]; then
            # The rum-faro preset runs faro-rum.js, whose handleSummary emits a
            # BESPOKE summary (no standard .metrics block) — print ITS fields
            # rather than the HTTP-load schema (which would read all-zeros and, on
            # the THRESHOLDS line, crash jq with `null | to_entries` -> exit 5).
            jq -r '
              "--- FARO RUM (synthetic beacons) ---",
              "  beacons sent:    \(.beacons_sent // 0)  (failed: \(.beacons_failed // 0))",
              "  JS exceptions:   \(.exceptions_sent // 0)",
              "  beacon POST p95: \(.beacon_post_p95_ms // 0) ms",
              "  web vitals p95:  LCP \(.web_vitals_p95.lcp // 0)ms  INP \(.web_vitals_p95.inp // 0)ms",
              "  env=\(.env // "?")  ->  \(.faro_url // "?")"
            ' k6-summary.json
          elif [ -f k6-summary.json ]; then
            jq -r '
              .metrics as $m
              | "--- SUMMARY ---",
                "checks:          \(($m.checks.values.passes // 0))/\((($m.checks.values.passes // 0)+($m.checks.values.fails // 0))) passed (\((((($m.checks.values.rate // 0)*10000)|round)/100))%)",
                "http_req_failed: \((((($m.http_req_failed.values.rate // 0)*10000)|round)/100))% failed",
                "http_reqs:       \(($m.http_reqs.values.count // 0)) total (\(((($m.http_reqs.values.rate // 0)*100)|round)/100)/s)",
                "",
                "--- LATENCY (http_req_duration, ms) ---",
                "  avg=\(($m.http_req_duration.values.avg // 0)|floor)  med=\(($m.http_req_duration.values.med // 0)|floor)  p90=\(($m.http_req_duration.values["p(90)"] // 0)|floor)  p95=\(($m.http_req_duration.values["p(95)"] // 0)|floor)  p99=\(($m.http_req_duration.values["p(99)"] // 0)|floor)  max=\(($m.http_req_duration.values.max // 0)|floor)",
                "  server (TTFB) avg=\(($m.http_req_waiting.values.avg // 0)|floor)  p95=\(($m.http_req_waiting.values["p(95)"] // 0)|floor)",
                "",
                "--- THROUGHPUT & RELIABILITY ---",
                "  iterations:    \(($m.iterations.values.count // 0)) (\(((($m.iterations.values.rate // 0)*100)|round)/100)/s)",
                "  dropped iters: \($m.dropped_iterations.values.count // 0)",
                "  peak VUs:      \($m.vus_max.values.value // $m.vus_max.values.max // 0)",
                "  data recv:     \((($m.data_received.values.count // 0)/1024)|floor) KB   sent: \((($m.data_sent.values.count // 0)/1024)|floor) KB",
                "",
                "--- THRESHOLDS ---",
                ( [ ($m // {}) | to_entries[] as $e | ($e.value.thresholds // {}) | to_entries[]
                    | (.value | if type=="object" then .ok else . end) as $ok
                    | "  [\(if $ok==false then "FAIL" else "PASS" end)] \($e.key): \(.key)" ]
                  | if length==0 then "  (none configured)" else .[] end )
            ' k6-summary.json
          else
            echo "k6-summary.json not found. Check the simulation logs for errors."
          fi
          echo ""
          echo "VIEW IN GRAFANA"
          echo "------------------------------------------------------------------------------"

          if [[ "${OBS_MODE:-}" == "grafana-cloud" ]]; then
            DS_PROM="grafanacloud-prom"
            DS_LOKI="grafanacloud-logs"
            DS_TEMPO="grafanacloud-traces"
          else
            # managed-aws / managed-azure / oss use mode-specific datasource UIDs.
            # The dashboard var-DS_PROMETHEUS default (set in the JSON) picks the right
            # one automatically when opened in the correct Grafana instance.
            DS_PROM=""
            DS_LOKI=""
            DS_TEMPO=""
          fi

          BASE="${GRAFANA_BASE_URL:-}"
          # Derive the dashboard uid from the canonical JSON instead of hardcoding it:
          # some dashboards were round-tripped through Grafana Cloud and now carry a
          # generated uid (not jenkins2026-<name>), so a hardcoded /d/<uid> link 404s.
          # Same derivation scripts/04-jenkins.sh uses for the Jenkins banner links.
          DASH_UID="$(jq -r '.uid // empty' observability/grafana/dashboards/k6-smoke-overview.json 2>/dev/null || true)"
          [[ -z "${DASH_UID}" ]] && DASH_UID="jenkins2026-k6-smoke-overview"
          PARAMS="orgId=1&var-deployment_environment=${ENV_NAME:-stable}"
          [[ -n "${DS_PROM}" ]]     && PARAMS="${PARAMS}&var-DS_PROMETHEUS=${DS_PROM}"
          [[ -n "${DS_LOKI}" ]]     && PARAMS="${PARAMS}&var-DS_LOKI=${DS_LOKI}"
          [[ -n "${DS_TEMPO}" ]]    && PARAMS="${PARAMS}&var-DS_TEMPO=${DS_TEMPO}"
          [[ -n "${GRAFANA_FROM}" ]] && PARAMS="${PARAMS}&from=${GRAFANA_FROM}&to=${GRAFANA_TO}"

          if [[ -n "${BASE}" ]]; then
            echo "${BASE}/d/${DASH_UID}?${PARAMS}"
          else
            echo "(Grafana URL not resolved — open the dashboard manually)"
          fi

          if [[ -n "${K6_CLOUD_PROJECT_ID:-}" && -n "${BASE}" ]]; then
            echo ""
            echo "Grafana Cloud k6 app: ${BASE}/a/k6-app/projects/${K6_CLOUD_PROJECT_ID}"
          fi
          echo "=============================================================================="
