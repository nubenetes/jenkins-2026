name: "Day2.redeploy.03 Tekton"

# Manually-triggered: re-applies the Tekton CI engine (scripts/04-tekton.sh =
# Pipelines/Triggers/Dashboard + RBAC, and scripts/06-tekton-pipelines.sh =
# tekton/ Tasks/Pipelines/Triggers + per-service PipelineRuns) against the
# cluster from the last "Day1.cluster.01 GKE provision" run that was provisioned
# with ci_engine=tekton, without touching terraform/gke or any other component.
#
# Use this to apply a Tekton-only change (a Task/Pipeline edit, a pinned version
# bump, the EventListener) without rerunning the whole provision lifecycle. The
# Tekton analogue of "Day2.redeploy.02 Jenkins". Requires the namespaces/secrets
# created by scripts/01-namespaces.sh + scripts/08.5-argocd.sh during a tekton
# "Day1.cluster.01 GKE" run to still exist on the cluster.
on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  TF_VERSION: "1.15.6"
  # Selects the Tekton path in scripts/lib/config.sh (and the 04/06 scripts).
  JENKINS2026_CI_ENGINE: tekton

jobs:
  redeploy-tekton:
    runs-on: ubuntu-latest
    # Manual approval gate (GitHub Environment required reviewers) - modifies a real
    # billed cluster, same posture as Day1/Decom and the other Day2.* workflows.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Check prereqs & add Helm repos (scripts/00-check-prereqs.sh)
        run: ./scripts/00-check-prereqs.sh

      - name: Refresh Tekton namespaces/credentials (scripts/01-namespaces.sh)
        run: ./scripts/01-namespaces.sh
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          IAP_OAUTH_CLIENT_ID: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
          IAP_OAUTH_CLIENT_SECRET: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
          TEKTON_GITHUB_WEBHOOK_SECRET: ${{ secrets.TEKTON_GITHUB_WEBHOOK_SECRET }}
          PAC_WEBHOOK_SECRET: ${{ secrets.PAC_WEBHOOK_SECRET }}
          # Optional Grafana Cloud k6 (k6-app) streaming for the k6 smoke pipeline.
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}

      - name: Redeploy Tekton control plane + Dashboard (scripts/04-tekton.sh)
        run: ./scripts/04-tekton.sh

      - name: Re-apply Tekton pipelines + activate PaC (scripts/06-tekton-pipelines.sh)
        run: ./scripts/06-tekton-pipelines.sh
        env:
          # PaC activation pushes .tekton/ to the forks + creates their webhooks.
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          PAC_WEBHOOK_SECRET: ${{ secrets.PAC_WEBHOOK_SECRET }}

      # Idempotent: (re)creates the public Gateway routes incl. the Tekton
      # Dashboard (IAP) and the PaC controller (pac.<domain>), so a Tekton-only
      # redeploy exposes them without a full Day1. Reads IAP creds from the
      # cluster Secrets refreshed by 01-namespaces above.
      - name: Re-apply Gateway routes (scripts/09-gateway.sh)
        run: ./scripts/09-gateway.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "### Tekton redeployed"
            echo
            echo "Re-applied the Tekton control plane + Dashboard (scripts/04-tekton.sh)"
            echo "and the tekton/ pipelines-as-code + per-service PipelineRuns"
            echo "(scripts/06-tekton-pipelines.sh) against the cluster from the last"
            echo "**Day1.cluster.01 GKE** run provisioned with ci_engine=tekton."
            echo "(Grafana dashboards are published by the per-backend dashboard workflows.)"
          } >> "${GITHUB_STEP_SUMMARY}"
