name: "Day1.cluster.01 GKE"

# Manually-triggered: provisions the throwaway GKE cluster (terraform/gke,
# with state in the GCS bucket from terraform/bootstrap) and deploys the full
# jenkins-2026 stack (scripts/up.sh) + smoke tests. See README.md
# "GitHub Actions automation" for one-time setup.
#
# IDEMPOTENT / RE-RUNNABLE: this is the way to apply changes. Re-run it on an
# already-provisioned cluster and it converges in place - `terraform apply` is a
# no-op when the cluster already exists in state, and up.sh re-applies every step
# (ArgoCD re-syncs from git; every kubectl/helm step is idempotent). You do NOT
# need to decommission to pick up a change. For a CI-engine-only change the
# lighter "Day2.redeploy.02 Jenkins" / "Day2.redeploy.03 Tekton" redeploys also
# converge in place.
#
# "Decom.cluster.01 GKE" is for TEARING THE CLUSTER DOWN when you're done (to
# stop charges) - not a prerequisite for applying changes. It shares the same
# Terraform state, so it finds and destroys what this workflow created.
on:
  workflow_dispatch:
    inputs:
      observability_mode:
        description: "Observability backend (only ONE is active per cluster). Deterministic & idempotent like ci_engine: a rerun that picks a different backend auto-retires the previously-deployed one and provisions the chosen one (scripts/03-observability.sh)."
        required: true
        default: "oss"
        type: choice
        options:
          - oss
          - grafana-cloud
          - managed-azure
          - managed-aws
      destroy_unused_backends:
        description: "DESTRUCTIVE / opt-in. Also terraform-destroy the PERSISTENT backend (Grafana Cloud stack / Azure / AWS Managed Grafana) of every observability mode you did NOT select, so only the chosen backend exists. ⚠ Irreversible: wipes that backend's history/dashboards; re-selecting the mode recreates it empty. Needs that backend's credentials/identifiers set. Default false (mode switch only retires the in-cluster footprint)."
        required: false
        default: false
        type: boolean
      ci_engine:
        description: "CI engine to deploy: jenkins (default - Helm + JCasC + Job-DSL seed) or tekton (Tekton Pipelines/Triggers/Dashboard, IAP-protected, with the pipeline ported to tekton/). Mutually exclusive - see docs/403-TEKTON.md."
        required: true
        default: "jenkins"
        type: choice
        options:
          - jenkins
          - tekton
      enable_gateway:
        description: "Create the public Gateway/HTTPRoutes/IAP (needs the one-time Day0.infra.01 Gateway + DNS + IAP OAuth client - see README \"Public access\"). Default true: this project's intended access path. Uncheck ONLY for a fresh env before Day0.infra.01 is done - leaving it on without the bootstrap deploys a Gateway that can't get an IP/cert, and deploying it OFF while the gateway is already up makes Jenkins' root URL (and OIDC redirect_uri) revert to localhost -> redirect_uri_mismatch."
        required: true
        default: true
        type: boolean
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  TF_VERSION: "1.15.6"
  # Surfaced as env so the managed-aws dashboard-publish steps can skip cleanly
  # (secrets can't be used in `if:`) when the role hasn't been set up yet.
  AWS_DASHBOARD_PUBLISH_ROLE_ARN: ${{ secrets.AWS_DASHBOARD_PUBLISH_ROLE_ARN }}

jobs:
  # ── Bootstrap pre-flight jobs ───────────────────────────────────────────────
  # Each runs only for its matching observability mode (skipped = success for
  # the purposes of the `needs` below). This ensures the persistent cloud
  # backend is always applied (idempotent tf apply) before `provision` reads
  # its terraform outputs to build in-cluster credentials Secrets.
  # oss mode has no external backend - all three jobs are skipped and
  # provision starts immediately.

  grafana-cloud-bootstrap:
    if: ${{ inputs.observability_mode == 'grafana-cloud' }}
    uses: ./.github/workflows/Day0.infra.02-grafana-cloud.yml
    secrets: inherit

  azure-bootstrap:
    if: ${{ inputs.observability_mode == 'managed-azure' }}
    uses: ./.github/workflows/Day0.infra.03-azure-grafana.yml
    secrets: inherit

  aws-bootstrap:
    if: ${{ inputs.observability_mode == 'managed-aws' }}
    uses: ./.github/workflows/Day0.infra.04-aws-grafana.yml
    secrets: inherit

  # ── Single-backend enforcement (opt-in, DESTRUCTIVE) ────────────────────────
  # When destroy_unused_backends=true, terraform-destroy the PERSISTENT backend of
  # every mode that is NOT the one being deployed, so only the selected Grafana
  # exists. Reuses the per-backend Decom.infra.0{2,3,4} workflows via workflow_call
  # (same pattern as the bootstrap jobs above). Independent of `provision` (they
  # touch different, external backends) and intentionally NOT in its `needs`, so a
  # destroy of a never-provisioned backend (missing creds) can't block the cluster.
  # Skipped entirely when the flag is off. oss selected => all three are destroyed.
  destroy-grafana-cloud:
    if: ${{ inputs.destroy_unused_backends && inputs.observability_mode != 'grafana-cloud' }}
    uses: ./.github/workflows/Decom.infra.02-grafana-cloud.yml
    secrets: inherit

  destroy-azure:
    if: ${{ inputs.destroy_unused_backends && inputs.observability_mode != 'managed-azure' }}
    uses: ./.github/workflows/Decom.infra.03-azure-grafana.yml
    secrets: inherit

  destroy-aws:
    if: ${{ inputs.destroy_unused_backends && inputs.observability_mode != 'managed-aws' }}
    uses: ./.github/workflows/Decom.infra.04-aws-grafana.yml
    secrets: inherit

  # ── Main provision job ──────────────────────────────────────────────────────
  provision:
    needs: [grafana-cloud-bootstrap, azure-bootstrap, aws-bootstrap]
    # always() prevents skipped bootstrap jobs from silently skipping provision.
    # !failure() still blocks provision if a bootstrap actually failed.
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform apply (provision GKE cluster, ~10 min)
        working-directory: terraform/gke
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          HEADLAMP_ADMIN_EMAILS: ${{ secrets.HEADLAMP_ADMIN_EMAILS }}
        run: |
          export TF_VAR_admin_emails="$(jq -nc --arg emails "${HEADLAMP_ADMIN_EMAILS}" '$emails | split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0))')"
          terraform apply -auto-approve -input=false

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      # Record the deployed CI engine as a durable GCS object. The managed-azure /
      # managed-aws dashboard publishers (Day2.publish.03 / .04) publish from the
      # repo + terraform state to external Grafana WITHOUT cluster access, so they
      # can't detect the engine via kubectl; they read this record to gate the
      # off-engine CI overview correctly (falling back to their manual ci_engine
      # input if the object is absent). Cluster-connected paths detect via
      # j2026_active_ci_engine instead.
      - name: Record active CI engine to GCS
        run: |
          printf '%s' "${{ inputs.ci_engine }}" \
            | gcloud storage cp - "gs://${{ secrets.TF_STATE_BUCKET }}/jenkins-2026/active-ci-engine"
          echo "Recorded active CI engine '${{ inputs.ci_engine }}' to gs://${{ secrets.TF_STATE_BUCKET }}/jenkins-2026/active-ci-engine"

      # The Grafana Cloud stack slug is generated (random) by terraform/grafana-
      # cloud-stack and is no longer a GitHub variable. Read it from that module's
      # GCS state (written by the grafana-cloud-bootstrap pre-flight job) and reuse
      # it for the token apply and the dashboard link, the same way managed-azure /
      # managed-aws read their backend outputs from state.
      - name: Read Grafana Cloud stack slug (from terraform/grafana-cloud-stack state)
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        id: gc_stack
        run: |
          cat > terraform/grafana-cloud-stack/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-stack"
            }
          }
          EOF
          for i in {1..3}; do
            terraform -chdir=terraform/grafana-cloud-stack init -input=false && break || {
              [ $i -lt 3 ] && { echo "init failed, retrying in 10s..."; sleep 10; } || exit 1
            }
          done
          slug="$(terraform -chdir=terraform/grafana-cloud-stack output -raw stack_slug)"
          if [[ -z "${slug}" ]]; then
            echo "::error::grafana-cloud-stack state has no stack_slug - the grafana-cloud-bootstrap job must have failed."
            exit 1
          fi
          echo "slug=${slug}" >> "${GITHUB_OUTPUT}"

      - name: Namespaces & prereqs
        env:
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          HEADLAMP_OIDC_CLIENT_ID: ${{ secrets.HEADLAMP_OIDC_CLIENT_ID }}
          HEADLAMP_OIDC_CLIENT_SECRET: ${{ secrets.HEADLAMP_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_CLIENT_ID: ${{ secrets.JENKINS_OIDC_CLIENT_ID }}
          JENKINS_OIDC_CLIENT_SECRET: ${{ secrets.JENKINS_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_ADMIN_EMAIL: ${{ secrets.JENKINS_OIDC_ADMIN_EMAIL }}
          IAP_OAUTH_CLIENT_ID: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
          IAP_OAUTH_CLIENT_SECRET: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
        run: |
          ./scripts/00-check-prereqs.sh
          if [[ "${{ inputs.observability_mode }}" == "grafana-cloud" ]]; then
            # Derived from the generated slug (read in the previous step) rather
            # than the grafana-cloud-token output, because that token step runs
            # later and needs jenkins-credentials to exist first. Standard
            # https://<slug>.grafana.net pattern, stored here for
            # microservicesK6Smoke's Grafana dashboard link.
            export GRAFANA_BASE_URL="https://${{ steps.gc_stack.outputs.slug }}.grafana.net"
          fi
          ./scripts/01-namespaces.sh

      - name: Configure GCS backend (terraform/grafana-cloud-token)
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        run: |
          cat > terraform/grafana-cloud-token/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-token"
            }
          }
          EOF

      - name: Terraform init (grafana-cloud-token)
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        working-directory: terraform/grafana-cloud-token
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform apply (Grafana Cloud access policy + tokens)
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        id: grafana_cloud_token
        working-directory: terraform/grafana-cloud-token
        env:
          TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
          TF_VAR_stack_slug: ${{ steps.gc_stack.outputs.slug }}
        run: |
          # Fetch jenkins admin password from the secret created in the previous step
          ADMIN_PASS=$(kubectl get secret jenkins-credentials -n jenkins -o jsonpath='{.data.admin-password}' | base64 -d)
          export TF_VAR_jenkins_admin_password="${ADMIN_PASS}"

          # The grafana.instance provider's auth is the dashboards SA token created
          # in THIS module, so on a fresh state (e.g. the first apply against a newly
          # created stack) Terraform can't configure that provider for
          # grafana_data_source.jenkins yet ("the Grafana client is required - set the
          # auth and url provider attributes"). Create the SA token first in a targeted
          # apply so its key is known, then apply the rest. Idempotent: a no-op once
          # the token already exists in state.
          terraform apply -auto-approve -input=false \
            -target=grafana_cloud_stack_service_account_token.dashboards
          terraform apply -auto-approve -input=false

          otlp_endpoint="$(terraform output -raw otlp_endpoint)"
          otlp_auth="$(terraform output -raw otlp_auth)"
          grafana_base_url="$(terraform output -raw grafana_base_url)"
          grafana_api_key="$(terraform output -raw grafana_api_key)"
          pdc_token="$(terraform output -raw pdc_token)"
          pdc_cluster="$(terraform output -raw pdc_cluster)"
          stack_id="$(terraform output -raw stack_id)"

          echo "::add-mask::${otlp_auth}"
          echo "::add-mask::${grafana_api_key}"
          echo "::add-mask::${pdc_token}"

          {
            echo "otlp_endpoint=${otlp_endpoint}"
            echo "otlp_auth=${otlp_auth}"
            echo "grafana_base_url=${grafana_base_url}"
            echo "grafana_api_key=${grafana_api_key}"
            echo "pdc_token=${pdc_token}"
            echo "pdc_cluster=${pdc_cluster}"
            echo "stack_id=${stack_id}"
          } >> "${GITHUB_OUTPUT}"

      - name: Apply Grafana Cloud credentials secret
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        run: |
          kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic grafana-cloud-credentials -n observability \
            --from-literal=GRAFANA_CLOUD_OTLP_ENDPOINT="${{ steps.grafana_cloud_token.outputs.otlp_endpoint }}" \
            --from-literal=GRAFANA_CLOUD_OTLP_AUTH="${{ steps.grafana_cloud_token.outputs.otlp_auth }}" \
            --from-literal=GRAFANA_BASE_URL="${{ steps.grafana_cloud_token.outputs.grafana_base_url }}" \
            --from-literal=GRAFANA_API_KEY="${{ steps.grafana_cloud_token.outputs.grafana_api_key }}" \
            --from-literal=GRAFANA_PDC_TOKEN="${{ steps.grafana_cloud_token.outputs.pdc_token }}" \
            --from-literal=GRAFANA_PDC_CLUSTER="${{ steps.grafana_cloud_token.outputs.pdc_cluster }}" \
            --from-literal=GRAFANA_STACK_ID="${{ steps.grafana_cloud_token.outputs.stack_id }}" \
            --from-literal=GRAFANA_TRACES_DASHBOARD_UID="${{ secrets.GRAFANA_TRACES_DASHBOARD_UID }}" \
            --from-literal=OTEL_LOGS_BACKEND_URL="${{ secrets.OTEL_LOGS_BACKEND_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Azure Monitor credentials secret (from terraform outputs)
        if: ${{ inputs.observability_mode == 'managed-azure' }}
        run: |
          # The terraform/azure-managed-grafana module (provisioned once by the
          # "Day0.infra.03 Day0.infra.03 Azure managed-grafana" workflow) holds the Azure
          # backend coordinates + the collector's Entra service-principal
          # credentials in its GCS state. Read its outputs here to build the
          # in-cluster Secret consumed by values-managed-azure*.yaml - reading
          # state needs no Azure auth (just the GCS backend, already authed
          # above), and no sensitive value lives in the repo or in a GitHub
          # secret. GRAFANA_API_KEY is intentionally left empty: dashboard
          # publishing to Azure Managed Grafana is a manual step (you hold
          # Grafana Admin) - see docs/observability.md "managed-azure".
          cat > terraform/azure-managed-grafana/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/azure-managed-grafana"
            }
          }
          EOF
          terraform -chdir=terraform/azure-managed-grafana init -input=false
          tf() { terraform -chdir=terraform/azure-managed-grafana output -raw "$1"; }
          conn="$(tf azure_monitor_connection_string)"
          prom="$(tf azure_monitor_prometheus_endpoint)"
          tenant="$(tf azure_tenant_id)"
          client="$(tf azure_client_id)"
          secret="$(tf azure_client_secret)"
          grafana="$(tf grafana_endpoint)"
          echo "::add-mask::${conn}"
          echo "::add-mask::${secret}"
          kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic azure-monitor-credentials -n observability \
            --from-literal=AZURE_MONITOR_CONNECTION_STRING="${conn}" \
            --from-literal=AZURE_MONITOR_PROMETHEUS_ENDPOINT="${prom}" \
            --from-literal=AZURE_TENANT_ID="${tenant}" \
            --from-literal=AZURE_CLIENT_ID="${client}" \
            --from-literal=AZURE_CLIENT_SECRET="${secret}" \
            --from-literal=GRAFANA_BASE_URL="${grafana}" \
            --from-literal=GRAFANA_API_KEY="" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply AWS managed credentials secret (from terraform outputs)
        if: ${{ inputs.observability_mode == 'managed-aws' }}
        run: |
          # The terraform/aws-managed-grafana module (provisioned once by the
          # "Day0.infra.04 AWS managed-grafana" workflow) holds the AMP endpoint, collector IAM
          # role ARN, region and log group in its GCS state. No AWS auth needed
          # here (terraform output just reads state, GCS already authed above);
          # the collector authenticates to AWS at runtime via web identity (no
          # access keys anywhere).
          cat > terraform/aws-managed-grafana/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/aws-managed-grafana"
            }
          }
          EOF
          terraform -chdir=terraform/aws-managed-grafana init -input=false
          tf() { terraform -chdir=terraform/aws-managed-grafana output -raw "$1"; }
          # Fail fast if the bootstrap outputs are empty (aws-bootstrap job
          # above should have applied them; empty means something went wrong).
          aws_region="$(tf aws_region)"
          if [[ -z "${aws_region}" ]]; then
            echo "::error::terraform/aws-managed-grafana outputs are empty — the aws-bootstrap job above must have failed. Check its logs."
            exit 1
          fi
          kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic aws-managed-credentials -n observability \
            --from-literal=AWS_REGION="${aws_region}" \
            --from-literal=AMP_REMOTE_WRITE_ENDPOINT="$(tf amp_remote_write_endpoint)" \
            --from-literal=AWS_ROLE_ARN="$(tf collector_role_arn)" \
            --from-literal=AWS_CLOUDWATCH_LOG_GROUP="$(tf cloudwatch_log_group)" \
            --from-literal=GRAFANA_BASE_URL="$(tf grafana_endpoint)" \
            --from-literal=GRAFANA_WORKSPACE_ID="$(tf grafana_workspace_id)" \
            --from-literal=AMP_QUERY_URL="$(tf amp_query_url)" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy the stack (scripts/up.sh)
        env:
          JENKINS2026_OBS_MODE: ${{ inputs.observability_mode }}
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
          JENKINS2026_HEADLAMP_ADMIN_EMAILS: ${{ secrets.HEADLAMP_ADMIN_EMAILS }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          HEADLAMP_OIDC_CLIENT_ID: ${{ secrets.HEADLAMP_OIDC_CLIENT_ID }}
          HEADLAMP_OIDC_CLIENT_SECRET: ${{ secrets.HEADLAMP_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_CLIENT_ID: ${{ secrets.JENKINS_OIDC_CLIENT_ID }}
          JENKINS_OIDC_CLIENT_SECRET: ${{ secrets.JENKINS_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_ADMIN_EMAIL: ${{ secrets.JENKINS_OIDC_ADMIN_EMAIL }}
          IAP_OAUTH_CLIENT_ID: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
          IAP_OAUTH_CLIENT_SECRET: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
          # Optional GitHub HMAC tokens for the Tekton Triggers EventListener and
          # for Pipelines-as-Code (ci_engine=tekton); empty unless the secrets are set.
          TEKTON_GITHUB_WEBHOOK_SECRET: ${{ secrets.TEKTON_GITHUB_WEBHOOK_SECRET }}
          PAC_WEBHOOK_SECRET: ${{ secrets.PAC_WEBHOOK_SECRET }}
          # Alert contact-point email for 07.5-grafana-alerts.sh. Per-mode secret
          # (grafana-cloud requires an org-member address) with a generic fallback;
          # empty falls back to jenkins-credentials oidc-admin-email. See docs/103 §3.
          GRAFANA_ALERT_EMAIL: ${{ secrets.GRAFANA_ALERT_EMAIL }}
          GRAFANA_ALERT_EMAIL_GRAFANA_CLOUD: ${{ secrets.GRAFANA_ALERT_EMAIL_GRAFANA_CLOUD }}
          GRAFANA_ALERT_EMAIL_OSS: ${{ secrets.GRAFANA_ALERT_EMAIL_OSS }}
          GRAFANA_ALERT_EMAIL_MANAGED_AZURE: ${{ secrets.GRAFANA_ALERT_EMAIL_MANAGED_AZURE }}
          GRAFANA_ALERT_EMAIL_MANAGED_AWS: ${{ secrets.GRAFANA_ALERT_EMAIL_MANAGED_AWS }}
          # Optional Grafana Cloud k6 (the k6-app) streaming for the k6 smoke
          # pipeline; empty unless set, in which case the run also does --out cloud.
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}
        run: |
          if [[ "${{ inputs.enable_gateway }}" != "true" ]]; then
            # gateway.baseDomain's committed default (jenkins2026.nubenetes.com)
            # would otherwise apply. Override to "" to disable public access
            # for this run (e.g. before the one-time "Day0.infra.01 Gateway"
            # workflow + DNS + IAP OAuth client setup is done) - see
            # README.md "Public access (GKE Gateway API + IAP)".
            export JENKINS2026_BASE_DOMAIN=""
          fi
          ./scripts/up.sh

      - name: Smoke test
        env:
          # Without this the smoke test sources config.yaml's default ci.engine
          # (jenkins) and runs Jenkins checks even on a tekton cluster - mirror the
          # engine the cluster was provisioned with (same override as the up.sh step).
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
        run: ./test/smoke-test.sh

      # Summary and Access URLs run BEFORE the AWS/Azure login steps so that
      # configure-aws-credentials / azure/login have not yet registered
      # cloud-specific values (e.g. the AWS region) as masked secrets -
      # otherwise those strings are replaced with *** in all subsequent log output,
      # including the Grafana workspace URL.
      - name: Summary
        if: always()
        working-directory: terraform/gke
        run: |
          {
            echo "### jenkins-2026 GKE cluster"
            echo
            echo "- Project: \`${{ secrets.GCP_PROJECT_ID }}\`"
            echo "- Cluster: \`$(terraform output -raw cluster_name)\`"
            echo "- Zone: \`$(terraform output -raw location)\`"
            echo "- Observability mode: \`${{ inputs.observability_mode }}\`"
            echo "- Gateway/IAP enabled: \`${{ inputs.enable_gateway }}\`"
            echo
            echo "See the **Access URLs** step (end of the job log, and below) for"
            echo "every service URL — IAP-protected and open — for this run's CI"
            echo "engine and observability mode."
            echo
            echo "To apply a change later, just **re-run this workflow** — it is"
            echo "idempotent and converges on the existing cluster, no decommission"
            echo "needed. Run **Decom.cluster.01 GKE** only when you're done, to"
            echo "avoid ongoing charges."
          } >> "${GITHUB_STEP_SUMMARY}"

      # Centralised access summary before any cloud login steps: every URL for this
      # run's CI engine + observability mode, grouped by IAP-protected / open /
      # observability. if: always() so it prints even if an earlier step (e.g. the
      # smoke test) failed. Also mirrored into the GitHub step summary panel.
      # Must stay before AWS/Azure login steps to avoid region masking in the log.
      - name: Access URLs
        if: always()
        run: |
          dom="jenkins2026.nubenetes.com"
          engine="${{ inputs.ci_engine }}"
          mode="${{ inputs.observability_mode }}"

          # Grafana URL depends on the observability mode (not the gateway/engine).
          if [[ "${mode}" == "grafana-cloud" ]]; then
            grafana="https://${{ steps.gc_stack.outputs.slug }}.grafana.net  (Grafana Cloud sign-in)"
          elif [[ "${mode}" == "oss" ]]; then
            grafana="https://grafana.${dom}  (IAP)"
          else
            sec="azure-monitor-credentials"; [[ "${mode}" == "managed-aws" ]] && sec="aws-managed-credentials"
            g="$(kubectl get secret "${sec}" -n observability -o jsonpath='{.data.GRAFANA_BASE_URL}' 2>/dev/null | base64 -d 2>/dev/null || true)"
            grafana="${g:-(see the ${mode} backend / terraform outputs)}  (managed)"
          fi

          # CI-engine-specific UI: Jenkins XOR Tekton Dashboard (mutually exclusive).
          if [[ "${engine}" == "tekton" ]]; then
            ci_iap="    Tekton Dashboard:      https://tekton.${dom}"
            ci_open=$'\n''    Tekton PaC webhook:    https://pac.'"${dom}"'  (GitHub -> Pipelines-as-Code, HMAC, no IAP)'
          else
            ci_iap="    Jenkins:               https://jenkins.${dom}"
            ci_open=""
          fi

          gen() {
            echo "════════════════════════════════════════════════════════════════════════"
            echo "  ACCESS URLs   (ci_engine=${engine}, observability_mode=${mode})"
            echo "════════════════════════════════════════════════════════════════════════"
            if [[ "${{ inputs.enable_gateway }}" == "true" ]]; then
              echo "  Behind Google IAP — sign in with an authorized Google account:"
              echo "    ArgoCD:                https://argocd.${dom}"
              echo "${ci_iap}"
              echo "    Headlamp:              https://headlamp.${dom}"
              echo "    pgAdmin:               https://pgadmin.${dom}"
              [[ "${mode}" == "oss" ]] && echo "    Grafana (OSS):         https://grafana.${dom}"
              echo
              echo "  Open (no IAP):"
              echo "    Microservices:         https://microservices.${dom}"
              echo "    Microservices develop: https://microservices-develop.${dom}${ci_open}"
              echo
              echo "  Observability:"
              echo "    Grafana:               ${grafana}"
              echo
              echo "  (IAP URLs need the one-time Day0.infra.01 Gateway + DNS + IAP OAuth client.)"
            else
              echo "  Gateway/IAP disabled for this run (enable_gateway=false) — no public URLs."
              echo "  Reach services via 'kubectl port-forward' (see README 'Accessing the UI')."
              echo "    Grafana:               ${grafana}"
            fi
            echo "════════════════════════════════════════════════════════════════════════"
          }
          gen                                   # -> normal job log
          { echo '```'; gen; echo '```'; } >> "${GITHUB_STEP_SUMMARY}"   # -> summary panel

      # Auto-publish the managed-azure dashboard variants to Azure Managed
      # Grafana, for parity with the grafana-cloud/oss modes (which publish via
      # 07-grafana-dashboards.sh). Uses GitHub OIDC -> Azure (the OIDC SP holds
      # Grafana Admin on the instance via terraform/azure-managed-grafana), so
      # no Grafana API token is stored anywhere.
      - name: Azure login (managed-azure dashboards)
        if: ${{ inputs.observability_mode == 'managed-azure' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish dashboards to Azure Managed Grafana
        if: ${{ inputs.observability_mode == 'managed-azure' }}
        env:
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
        run: |
          az extension add -n amg --only-show-errors || true
          az extension add -n resource-graph --only-show-errors || true
          # Discover the Azure Managed Grafana instance (the one the OIDC SP has
          # Grafana Admin on) without depending on terraform state outputs.
          read -r grafana rg < <(az grafana list \
            --query "[?starts_with(name,'jenkins-2026')].[name,resourceGroup] | [0]" -o tsv)
          if [[ -z "${grafana}" ]]; then
            echo "::warning::no Azure Managed Grafana found - skipping dashboard publish"
            exit 0
          fi
          # Resolve the App Insights resource and substitute it for the
          # ${appinsights} placeholder so the log/trace panels bind to a
          # concrete resource (a dashboard template variable wouldn't reliably
          # auto-select at view time). Kept out of the repo - resolved here.
          appinsights="$(az graph query -q "resources | where type =~ 'microsoft.insights/components' | project id" --query 'data[0].id' -o tsv)"
          echo "Publishing to ${grafana} (${rg}); App Insights: ${appinsights##*/}"
          # Ensure the shared "CI-CD Observability" folder (uid jenkins-2026) so the
          # Azure dashboards land in the SAME single folder as the alert rules (07.5)
          # — consistent with oss/grafana-cloud/aws, not the root. Created via the
          # data-plane API (AMG audience 6f2d169c) to pin the uid; `az grafana folder
          # create` can't set a uid, which would orphan a second same-titled folder.
          gf_ep="$(az grafana show -n "${grafana}" -g "${rg}" --query properties.endpoint -o tsv)"
          gf_tok="$(az account get-access-token --resource 6f2d169c-08f3-4a4c-a982-bcaf2d038c45 --query accessToken -o tsv)"
          curl -fsS -X POST "${gf_ep%/}/api/folders" -H "Authorization: Bearer ${gf_tok}" \
            -H "Content-Type: application/json" \
            -d '{"uid":"jenkins-2026","title":"CI-CD Observability"}' >/dev/null 2>&1 || true
          curl -fsS -X PUT "${gf_ep%/}/api/folders/jenkins-2026" -H "Authorization: Bearer ${gf_tok}" \
            -H "Content-Type: application/json" \
            -d '{"title":"CI-CD Observability","overwrite":true}' >/dev/null 2>&1 || true
          # Skip the off-engine CI overview (jenkins XOR tekton) and delete it
          # if it still exists from a previous run with a different engine.
          if [[ "${JENKINS2026_CI_ENGINE}" == "tekton" ]]; then
            skip_dash="jenkins-overview"; delete_uid="jenkins2026-jenkins-overview"
          else
            skip_dash="tekton-overview";  delete_uid="jenkins2026-tekton-overview"
          fi
          for f in observability/grafana/dashboards-azure/*-azure.json; do
            name="$(basename "${f}" -azure.json)"
            if [[ "${name}" == "${skip_dash}" ]]; then
              echo "skipping ${name}-azure (ci.engine=${JENKINS2026_CI_ENGINE})"
              continue
            fi
            sed "s|\${appinsights}|${appinsights}|g" "${f}" > /tmp/dash.json
            if az grafana dashboard create -n "${grafana}" -g "${rg}" \
                 --folder "jenkins-2026" \
                 --definition @/tmp/dash.json --overwrite --only-show-errors >/dev/null; then
              echo "published $(basename "${f}")"
            else
              echo "::warning::failed to publish $(basename "${f}")"
            fi
          done
          if az grafana dashboard show -n "${grafana}" -g "${rg}" \
               --definition "${delete_uid}" --only-show-errors >/dev/null 2>&1; then
            az grafana dashboard delete -n "${grafana}" -g "${rg}" \
              --definition "${delete_uid}" --only-show-errors \
              && echo "deleted off-engine dashboard ${delete_uid}" \
              || echo "::warning::could not delete off-engine dashboard ${delete_uid}"
          fi
          # Generic Kubernetes/node infra is covered by Azure Managed Grafana's
          # built-in dashboards (Compute Resources / Kubelet / Node Exporter /
          # USE Method), auto-provisioned from the Azure Monitor workspace
          # integration - the collector scrapes cadvisor/kubelet/node/ksm to
          # feed them (values-managed-azure.yaml). Nothing to publish here.

      # Provision the alert rules to Azure Managed Grafana. up.sh runs
      # 07.5-grafana-alerts.sh too, but inside up.sh the runner is not yet logged
      # into Azure (the azure/login above is a later step), so 07.5 cannot mint the
      # Azure AD token and the rules are skipped there. Re-run it here, post-login,
      # so the 5 rules land in the CI-CD Observability folder (Alerting -> Alert
      # rules) — the managed-azure equivalent of the OSS alerts. Idempotent.
      - name: Provision alerts to Azure Managed Grafana
        if: ${{ inputs.observability_mode == 'managed-azure' }}
        env:
          JENKINS2026_OBS_MODE: managed-azure
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
        run: ./scripts/07.5-grafana-alerts.sh

      # Auto-publish the managed-aws dashboard variants to Amazon Managed
      # Grafana. up.sh's 07-grafana-dashboards.sh skips when the runner has no
      # AWS credentials (the keyless design only federates the collector), so
      # authenticate here via GitHub OIDC - the least-privilege dashboard-
      # publisher role from terraform/aws-managed-grafana, no access keys - and
      # run the publisher (it mints a short-lived AMG service-account token).
      - name: AWS login (managed-aws dashboards)
        if: ${{ inputs.observability_mode == 'managed-aws' && env.AWS_DASHBOARD_PUBLISH_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_DASHBOARD_PUBLISH_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Publish dashboards to Amazon Managed Grafana
        if: ${{ inputs.observability_mode == 'managed-aws' && env.AWS_DASHBOARD_PUBLISH_ROLE_ARN != '' }}
        env:
          JENKINS2026_OBS_MODE: managed-aws
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
        run: ./scripts/07-grafana-dashboards.sh

      # Provision the alert rules to Amazon Managed Grafana, post AWS-login (same
      # reason as Azure above: 07.5 inside up.sh can't mint the AMG token without
      # AWS creds). Lands the 5 rules in the CI-CD Observability folder. Idempotent.
      - name: Provision alerts to Amazon Managed Grafana
        if: ${{ inputs.observability_mode == 'managed-aws' && env.AWS_DASHBOARD_PUBLISH_ROLE_ARN != '' }}
        env:
          JENKINS2026_OBS_MODE: managed-aws
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
        run: ./scripts/07.5-grafana-alerts.sh

