name: "Day1.cluster.01 GKE"

# Manually-triggered: provisions the throwaway GKE cluster (terraform/gke,
# with state in the GCS bucket from terraform/bootstrap) and deploys the full
# jenkins-2026 stack (scripts/up.sh) + smoke tests. See README.md
# "GitHub Actions automation" for one-time setup.
#
# IDEMPOTENT / RE-RUNNABLE: this is the way to apply changes. Re-run it on an
# already-provisioned cluster and it converges in place - `terraform apply` is a
# no-op when the cluster already exists in state, and up.sh re-applies every step
# (ArgoCD re-syncs from git; every kubectl/helm step is idempotent). You do NOT
# need to decommission to pick up a change. For a CI-engine-only change the
# lighter "Day2.redeploy.02 Jenkins" / "Day2.redeploy.03 Tekton" redeploys also
# converge in place.
#
# "Decom.cluster.01 GKE" is for TEARING THE CLUSTER DOWN when you're done (to
# stop charges) - not a prerequisite for applying changes. It shares the same
# Terraform state, so it finds and destroys what this workflow created.
on:
  workflow_dispatch:
    inputs:
      observability_mode:
        description: "Observability backend (only ONE is active per cluster). Deterministic & idempotent like ci_engine: a rerun that picks a different backend auto-retires the previously-deployed one and provisions the chosen one (scripts/03-observability.sh)."
        required: true
        default: "oss"
        type: choice
        options:
          - oss
          - grafana-cloud
          - managed-azure
          - managed-aws
      reapply_backend:
        description: "FORCE re-apply of the persistent managed-observability backend (Day0.infra.02/03/04) even if it already exists. Default false: an ungated pre-check auto-detects the backend from GCS state and bootstraps it ONLY when MISSING (first-ever setup), skipping it on a routine run → ONE gke-production approval. Set true to heal manual drift in an already-provisioned backend (adds a second, later approval that run)."
        required: false
        default: false
        type: boolean
      destroy_unused_backends:
        description: "DESTRUCTIVE / opt-in. Also terraform-destroy the PERSISTENT backend (Grafana Cloud stack / Azure / AWS Managed Grafana) of every observability mode you did NOT select, so only the chosen backend exists. ⚠ Irreversible: wipes that backend's history/dashboards; re-selecting the mode recreates it empty. Needs that backend's credentials/identifiers set. Default false (mode switch only retires the in-cluster footprint)."
        required: false
        default: false
        type: boolean
      ci_engine:
        description: "CI engine to deploy: jenkins (default - Helm + JCasC + Job-DSL seed), tekton (Tekton Pipelines/Triggers/Dashboard, IAP-protected; see docs/404), githubactions (ARC self-hosted ephemeral Spot runners, native GitHub webhooks, no in-cluster UI; see docs/405) or argoworkflows (Argo Workflows + Argo Events, IAP-protected Server UI; see docs/406). Mutually exclusive."
        required: true
        default: "jenkins"
        type: choice
        options:
          - jenkins
          - tekton
          - githubactions
          - argoworkflows
      secrets_backend:
        description: "How k8s Secrets are materialised: imperative (default - kubectl create from GitHub secrets) or eso (push to GCP Secret Manager + sync via External Secrets Operator, keyless). See docs/201 § Secrets backend."
        required: true
        default: "imperative"
        type: choice
        options:
          - imperative
          - eso
      enable_gateway:
        description: "Create the public Gateway/HTTPRoutes/IAP (needs the one-time Day0.infra.01 Gateway + DNS + IAP OAuth client - see README \"Public access\"). Default true: this project's intended access path. Uncheck ONLY for a fresh env before Day0.infra.01 is done - leaving it on without the bootstrap deploys a Gateway that can't get an IP/cert, and deploying it OFF while the gateway is already up makes Jenkins' root URL (and OIDC redirect_uri) revert to localhost -> redirect_uri_mismatch."
        required: true
        default: true
        type: boolean
      develop_track:
        description: "Deploy the optional 'develop' microservices tier alongside 'stable' (OFF by default). Adds a microservices-develop namespace + ArgoCD app from values-develop.yaml on the gitops 'develop' branch — a LEAN, non-HA tier (CNPG single instance, no backups) — plus -develop CI jobs/runs. Prereq: the gitops-config repo's 'develop' branch with values-develop.yaml. See docs/402."
        required: false
        default: false
        type: boolean
      intra_cluster_tls:
        description: "Intra-cluster TLS posture (pick ONE — MUTUALLY EXCLUSIVE, so it's a single dropdown, not two toggles). none = plain HTTP on the LB→pod hop inside the VPC (default; Google network-layer encryption + WireGuard inter-node). backend-tls = cert-manager LB→pod re-encryption, server-auth on that one hop (docs/504). cloud-service-mesh = managed Cloud Service Mesh: identity-based MUTUAL mTLS on ALL hops + L7 authZ (docs/506; the STANDALONE per-client SKU, cents for this PoC — NOT GKE Enterprise). Converges on this Day1 run (Terraform + up.sh together)."
        required: false
        default: "none"
        type: choice
        options:
          - none
          - backend-tls
          - cloud-service-mesh
      binary_authorization:
        description: "Opt-in Binary Authorization supply-chain admission control (docs/507): GKE only admits container images carrying a Cloud-KMS-signed attestation from this project's attestor — closing the DevSecOps scan→deploy loop. ORTHOGONAL to intra_cluster_tls (composes with any choice), so it's a separate toggle. Enforcement mode (dryrun=log-only default, or enforce=block) is set via config.yaml. OFF by default."
        required: false
        default: false
        type: boolean
      backstage_enabled:
        description: "Backstage developer portal (backstage.enabled — docs/505): the software catalog + engine-aware CI/CD views at backstage.<domain> (IAP, same Google identity). ON by default. ONE-TIME BOOTSTRAP: the app image must exist in GHCR (run Day2.publish.06 Backstage once per branch; it persists across rebuilds) — until then this converges green with a warning and the portal pod waits on the image. Disabling RETIRES the app-of-apps (incl. its CNPG db) on this run."
        required: false
        default: true
        type: boolean
      llm_enabled:
        description: "Opt-in keyless Grafana LLM app (observability.llm.enabled — docs/301): installs the grafana-llm-app plugin wired to Vertex AI via an in-cluster LiteLLM gateway + Workload Identity (no API key, no new public surface). oss mode ONLY — no-op on grafana-cloud (native assistant) and managed-azure/aws (no keyless path). OFF by default. Enabling/disabling CONVERGES on this run (terraform/gke GSA+WI binding, 03 plugin overlay, 08.8 LiteLLM). Overrides config.yaml for this run."
        required: false
        default: false
        type: boolean
      assistant_enabled:
        description: "Opt-in official Grafana Assistant chat (observability.assistant.enabled — docs/301): installs the signed grafana-assistant-app plugin. COST MODEL — your observability DATA stays in GKE (free, in-cluster; zero Grafana Cloud data ingestion) and ONLY the Grafana Cloud AI Assistant is used, which is FREE on the Grafana Cloud free tier (3 AI users/mo, 40M tokens/user, no card). SaaS-HYBRID: prompts go to Grafana Cloud (NOT keyless like the LLM app). oss mode ONLY. For a DURABLE connection set the GRAFANA_CLOUD_ASSISTANT_{BACKEND_URL,INSTANCE_ID,TOKEN} GitHub secrets (docs/103); WITHOUT them the plugin still installs but stays PENDING (a reminder is logged + shown in the run summary) — you then set the secrets or click Connect in the UI. OFF by default."
        required: false
        default: false
        type: boolean
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
      grafana_cloud_tier:
        description: "Grafana Cloud tier profile (grafana-cloud mode). free (default) = leanMetrics on + logMinSeverity=warn (fits free-tier limits); paid = full metrics + ship all logs. Traces are NOT sampled on either tier (100% shipped): in this low-traffic PoC they fit the free tier, and sampling would break trace↔log/metric correlation (a trace_id in a log could point to a dropped trace)."
        required: false
        default: "free"
        type: choice
        options:
          - free
          - paid
      log_min_severity:
        description: "Override the min log severity sent to Grafana (otel-collector-logs filter). auto (default) = derive from grafana_cloud_tier; or force trace/debug/info/warn/error."
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - trace
          - debug
          - info
          - warn
          - error
  # Reusable mirror of the dispatch inputs, so the "Day1.cluster.00 Everything up"
  # umbrella can call this workflow (choice inputs become string under workflow_call).
  workflow_call:
    inputs:
      observability_mode:
        required: false
        default: "oss"
        type: string
      reapply_backend:
        required: false
        default: false
        type: boolean
      destroy_unused_backends:
        required: false
        default: false
        type: boolean
      ci_engine:
        required: false
        default: "jenkins"
        type: string
      secrets_backend:
        required: false
        default: "imperative"
        type: string
      enable_gateway:
        required: false
        default: true
        type: boolean
      develop_track:
        required: false
        default: false
        type: boolean
      intra_cluster_tls:
        required: false
        default: "none"
        type: string
      binary_authorization:
        required: false
        default: false
        type: boolean
      backstage_enabled:
        required: false
        default: true
        type: boolean
      llm_enabled:
        required: false
        default: false
        type: boolean
      assistant_enabled:
        required: false
        default: false
        type: boolean
      git_ref:
        required: false
        default: ""
        type: string
      log_level:
        required: false
        default: "info"
        type: string
      grafana_cloud_tier:
        required: false
        default: "free"
        type: string
      log_min_severity:
        required: false
        default: "auto"
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  JENKINS2026_GRAFANA_CLOUD_TIER: ${{ inputs.grafana_cloud_tier || 'free' }}
  JENKINS2026_LOG_MIN_SEVERITY: ${{ inputs.log_min_severity || 'auto' }}
  # Intra-cluster TLS axis (MUTUALLY EXCLUSIVE — ONE dropdown, docs/506): backend TLS
  # (LB→pod re-encryption, docs/504) OR Cloud Service Mesh (identity mTLS everywhere,
  # docs/506) OR neither. The single intra_cluster_tls choice makes the conflict
  # impossible to express in the form; lib/config.sh additionally FAILS FAST as the
  # authoritative guard on every entry path. Both env vars are DERIVED from the one
  # input. TF_VAR_service_mesh_mode is set here too so the terraform apply step (Fleet
  # + managed control plane) sees it even before up.sh sources config.sh.
  JENKINS2026_GATEWAY_BACKEND_TLS_ENABLED: ${{ inputs.intra_cluster_tls == 'backend-tls' }}
  JENKINS2026_SERVICE_MESH_MODE: ${{ inputs.intra_cluster_tls == 'cloud-service-mesh' && 'cloud-service-mesh' || 'none' }}
  TF_VAR_service_mesh_mode: ${{ inputs.intra_cluster_tls == 'cloud-service-mesh' && 'cloud-service-mesh' || 'none' }}
  # Opt-in Binary Authorization supply-chain admission (docs/507). ORTHOGONAL to the
  # TLS axis (composes with any choice). enforce-vs-dryrun comes from config.yaml
  # (default dryrun); the form only toggles enabled. TF_VAR set here for the terraform
  # apply step (KMS key + attestor + policy); config.sh re-derives it under up.sh.
  JENKINS2026_BINARY_AUTHORIZATION_ENABLED: ${{ inputs.binary_authorization }}
  TF_VAR_binary_authorization_enabled: ${{ inputs.binary_authorization }}
  # Backstage developer portal (backstage.enabled, docs/505). Consumed inside
  # up.sh by 01 (namespace/secrets), 08.6/08.7 (eso + TLS slices), 08.95 (the
  # argocd/backstage app-of-apps or its retire) and 09 (route/IAP/audience).
  # Both the dispatch and workflow_call inputs default true, so the raw
  # reference is always defined (no `||` fallback — it would clobber false).
  JENKINS2026_BACKSTAGE_ENABLED: ${{ inputs.backstage_enabled }}
  # Opt-in keyless Grafana LLM app (observability.llm.enabled, oss mode only —
  # docs/301). Consumed by config.sh (J2026_OBS_LLM_ENABLED + TF_VAR_* export),
  # the terraform/gke apply step (GSA + WI binding), 03-observability.sh (plugin
  # overlay in the oss app-of-apps) and 08.8-grafana-llm.sh (LiteLLM gateway).
  # Like backend_tls, this boolean input is ALWAYS set (true/false), so in CI the
  # form is authoritative and config.yaml's durable default is the LOCAL fallback
  # (test/e2e.sh, where the env is unset → config.sh reads config.yaml).
  JENKINS2026_OBS_LLM_ENABLED: ${{ inputs.llm_enabled }}
  # Opt-in official Grafana Assistant (observability.assistant.enabled, oss,
  # SaaS-hybrid — docs/301). Inherited by config.sh in the up.sh step (03 plugin
  # overlay + 08.9 connection Secret); no GCP resources, so no TF_VAR.
  JENKINS2026_OBS_ASSISTANT_ENABLED: ${{ inputs.assistant_enabled }}
  TF_VERSION: "1.15.6"
  # Surfaced as env so the managed-aws dashboard-publish steps can skip cleanly
  # (secrets can't be used in `if:`) when the role hasn't been set up yet.
  AWS_DASHBOARD_PUBLISH_ROLE_ARN: ${{ secrets.AWS_DASHBOARD_PUBLISH_ROLE_ARN }}

jobs:
  # ── Persistent-backend existence probe (UNGATED — adds ZERO approval prompts) ─
  # Reads each managed-observability backend's GCS Terraform state so the
  # Day0.infra.02/03/04 bootstrap jobs below auto-run ONLY when the backend is
  # MISSING (first-ever setup) and SKIP on a routine run — one gke-production
  # approval in steady state, and "Day1 self-provisions the backend if absent" on
  # a fresh one, with no flag to remember. GCP WIF only: `terraform output` reads
  # the state file and never authenticates the Azure/AWS provider (as provision's
  # own state reads prove). The ABSENCE of `environment:` here is LOAD-BEARING —
  # any environment would add an approval prompt and defeat the single-gate design.
  precheck:
    runs-on: ubuntu-latest
    outputs:
      grafana_missing: ${{ steps.probe.outputs.grafana_missing }}
      azure_missing: ${{ steps.probe.outputs.azure_missing }}
      aws_missing: ${{ steps.probe.outputs.aws_missing }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref || github.ref }}
      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Probe persistent-backend state (does it already exist?)
        id: probe
        run: |
          set -uo pipefail
          # $1 = terraform dir basename (== the GCS state prefix suffix);
          # $2 = a stable output that only exists once the module was applied.
          # Echoes its value ('' on a never-applied / empty state → treat as MISSING).
          probe() {
            printf 'terraform {\n  backend "gcs" {\n    bucket = "%s"\n    prefix = "jenkins-2026/%s"\n  }\n}\n' \
              "${{ secrets.TF_STATE_BUCKET }}" "$1" > "terraform/$1/backend_override.tf"
            for i in 1 2 3; do
              terraform -chdir="terraform/$1" init -input=false >/dev/null 2>&1 && break \
                || { [ "$i" -lt 3 ] && sleep 10 || true; }
            done
            terraform -chdir="terraform/$1" output -raw "$2" 2>/dev/null || true
          }
          gm=false; am=false; wm=false
          case "${{ inputs.observability_mode }}" in
            grafana-cloud) [[ -z "$(probe grafana-cloud-stack   stack_slug)"       ]] && gm=true ;;
            managed-azure) [[ -z "$(probe azure-managed-grafana grafana_endpoint)" ]] && am=true ;;
            managed-aws)   [[ -z "$(probe aws-managed-grafana   aws_region)"       ]] && wm=true ;;
          esac
          echo "grafana_missing=${gm}" >> "${GITHUB_OUTPUT}"
          echo "azure_missing=${am}"   >> "${GITHUB_OUTPUT}"
          echo "aws_missing=${wm}"     >> "${GITHUB_OUTPUT}"
          echo "Backend presence (mode=${{ inputs.observability_mode }}): grafana_missing=${gm} azure_missing=${am} aws_missing=${wm} — bootstrap runs only where missing (or reapply_backend=true)."

  # ── Bootstrap pre-flight jobs (auto-run ONLY when the backend is MISSING) ────
  # Each runs for its mode when the precheck found no existing backend, OR when
  # reapply_backend forces it. Skipped = success for the `needs` below. oss mode
  # has no external backend → all three skip and provision starts immediately.

  grafana-cloud-bootstrap:
    needs: precheck
    if: ${{ inputs.observability_mode == 'grafana-cloud' && (inputs.reapply_backend || needs.precheck.outputs.grafana_missing == 'true') }}
    uses: ./.github/workflows/Day0.infra.02-grafana-cloud.yml
    with:
      log_level: ${{ inputs.log_level || 'info' }}
    secrets: inherit

  azure-bootstrap:
    needs: precheck
    if: ${{ inputs.observability_mode == 'managed-azure' && (inputs.reapply_backend || needs.precheck.outputs.azure_missing == 'true') }}
    uses: ./.github/workflows/Day0.infra.03-azure-grafana.yml
    with:
      log_level: ${{ inputs.log_level || 'info' }}
    secrets: inherit

  aws-bootstrap:
    needs: precheck
    if: ${{ inputs.observability_mode == 'managed-aws' && (inputs.reapply_backend || needs.precheck.outputs.aws_missing == 'true') }}
    uses: ./.github/workflows/Day0.infra.04-aws-grafana.yml
    with:
      log_level: ${{ inputs.log_level || 'info' }}
    secrets: inherit

  # ── Single-backend enforcement (opt-in, DESTRUCTIVE) ────────────────────────
  # When destroy_unused_backends=true, terraform-destroy the PERSISTENT backend of
  # every mode that is NOT the one being deployed, so only the selected Grafana
  # exists. Reuses the per-backend Decom.infra.0{2,3,4} workflows via workflow_call
  # (same pattern as the bootstrap jobs above). Independent of `provision` (they
  # touch different, external backends) and intentionally NOT in its `needs`, so a
  # destroy of a never-provisioned backend (missing creds) can't block the cluster.
  # Skipped entirely when the flag is off. oss selected => all three are destroyed.
  # grafana-cloud has a per-cluster grafana-cloud-token (a Grafana Cloud SA / access-policy
  # token scoped to THIS stack) that MUST be revoked BEFORE the stack is destroyed — otherwise
  # the token is left dangling and Decom.infra.02's ordering guard aborts (which is exactly
  # what happens on a destroy_unused_backends mode-switch: there is no Decom.cluster to
  # destroy the token first, as the full decom does via Decom.cluster.01 → Decom.infra.02).
  # So retire the token here, and gate the stack destroy (below) on it via `needs`. azure/aws
  # need no equivalent — they use identifiers, not a per-cluster token. Mirrors the token
  # teardown in Decom.cluster.01-gke.yml.
  destroy-grafana-cloud-token:
    if: ${{ inputs.destroy_unused_backends && inputs.observability_mode != 'grafana-cloud' }}
    runs-on: ubuntu-latest
    environment: gke-production
    permissions:
      contents: read
      id-token: write
    env:
      HAS_GRAFANA_CLOUD_TOKEN: ${{ secrets.GRAFANA_CLOUD_API_TOKEN != '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Clear stale Terraform state lock (grafana-cloud-token)
        if: ${{ env.HAS_GRAFANA_CLOUD_TOKEN == 'true' }}
        uses: ./.github/actions/tf-remove-stale-lock
        with:
          bucket: ${{ secrets.TF_STATE_BUCKET }}
          prefix: jenkins-2026/grafana-cloud-token
      - name: Read Grafana Cloud stack slug (from terraform/grafana-cloud-stack state)
        if: ${{ env.HAS_GRAFANA_CLOUD_TOKEN == 'true' }}
        id: gc_stack
        run: |
          cat > terraform/grafana-cloud-stack/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-stack"
            }
          }
          EOF
          for i in {1..3}; do
            terraform -chdir=terraform/grafana-cloud-stack init -input=false && break || {
              [ $i -lt 3 ] && { echo "init failed, retrying in 10s..."; sleep 10; } || exit 1
            }
          done
          echo "slug=$(terraform -chdir=terraform/grafana-cloud-stack output -raw stack_slug 2>/dev/null || true)" >> "${GITHUB_OUTPUT}"
      # Guard on a non-empty slug: if the stack is already gone there is nothing to revoke.
      - name: Configure GCS backend (terraform/grafana-cloud-token)
        if: ${{ env.HAS_GRAFANA_CLOUD_TOKEN == 'true' && steps.gc_stack.outputs.slug != '' }}
        run: |
          cat > terraform/grafana-cloud-token/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-token"
            }
          }
          EOF
      - name: Terraform init (grafana-cloud-token)
        if: ${{ env.HAS_GRAFANA_CLOUD_TOKEN == 'true' && steps.gc_stack.outputs.slug != '' }}
        working-directory: terraform/grafana-cloud-token
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done
      - name: Terraform destroy (revoke Grafana Cloud access policy + tokens)
        if: ${{ env.HAS_GRAFANA_CLOUD_TOKEN == 'true' && steps.gc_stack.outputs.slug != '' }}
        working-directory: terraform/grafana-cloud-token
        env:
          TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
          TF_VAR_stack_slug: ${{ steps.gc_stack.outputs.slug }}
          TF_VAR_jenkins_admin_password: "destroy-placeholder"
        run: terraform destroy -auto-approve -input=false

  # `confirm: 'destroy'` mirrors the explicit `destroy_unused_backends` checkbox
  # back into the reusable workflow's own guard — these jobs only run when that
  # checkbox is true (see `if:` above), so the checkbox IS the confirmation.
  destroy-grafana-cloud:
    # Runs AFTER the token is retired (above) so Decom.infra.02's token-ordering guard passes.
    needs: [destroy-grafana-cloud-token]
    if: ${{ inputs.destroy_unused_backends && inputs.observability_mode != 'grafana-cloud' }}
    uses: ./.github/workflows/Decom.infra.02-grafana-cloud.yml
    with:
      confirm: "destroy"
      log_level: ${{ inputs.log_level || 'info' }}
    secrets: inherit

  destroy-azure:
    if: ${{ inputs.destroy_unused_backends && inputs.observability_mode != 'managed-azure' }}
    uses: ./.github/workflows/Decom.infra.03-azure-grafana.yml
    with:
      confirm: "destroy"
      log_level: ${{ inputs.log_level || 'info' }}
    secrets: inherit

  destroy-aws:
    if: ${{ inputs.destroy_unused_backends && inputs.observability_mode != 'managed-aws' }}
    uses: ./.github/workflows/Decom.infra.04-aws-grafana.yml
    with:
      confirm: "destroy"
      log_level: ${{ inputs.log_level || 'info' }}
    secrets: inherit

  # ── Main provision job (the SOLE gke-production approval gate) ───────────────
  provision:
    # The bootstrap jobs are opt-in (reapply_backend, default false) → on a routine
    # run they skip and resolve instantly, so provision's OWN gke-production gate
    # enters "waiting" at t=0 as the single "Review deployments" prompt in EVERY
    # mode (one gated job → one prompt structurally, no dependence on GitHub's
    # simultaneous-wait grouping). With reapply_backend=true, provision correctly
    # waits for the fresh bootstrap outputs (the accepted 2nd, later prompt then).
    needs: [precheck, grafana-cloud-bootstrap, azure-bootstrap, aws-bootstrap]
    # always()+!failure()+!cancelled(): skipped bootstraps must not skip provision,
    # but a real (opted-in) bootstrap failure still blocks it. A REJECTED approval
    # skips provision directly now that provision itself owns the environment.
    if: ${{ always() && !failure() && !cancelled() }}
    runs-on: ubuntu-latest
    # Constant gke-production for EVERY mode. Managed: REQUIRED — provision's own
    # azure/login (App B) + AWS configure-aws-credentials OIDC subs are pinned to
    # environment:gke-production. oss/grafana-cloud: harmless (GCP WIF is repo-
    # scoped, so the env name doesn't change the matched sub) AND load-bearing —
    # keeps their single approval now the `approve` job is gone (do NOT blank it,
    # or a billed GKE cluster would provision with ZERO approvals).
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform apply (provision GKE cluster, ~10 min)
        working-directory: terraform/gke
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          HEADLAMP_ADMIN_EMAILS: ${{ secrets.HEADLAMP_ADMIN_EMAILS }}
        run: |
          export TF_VAR_admin_emails="$(jq -nc --arg emails "${HEADLAMP_ADMIN_EMAILS}" '$emails | split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0))')"
          # Node Auto-Provisioning toggle: single source of truth is config.yaml
          # (nodeAutoProvisioning.enabled), derived here so cluster-level NAP can never
          # desync from the in-cluster ComputeClass wiring that up.sh applies later.
          export TF_VAR_enable_node_autoprovisioning="$(yq '.nodeAutoProvisioning.enabled // true' ../../config/config.yaml)"
          # Grafana LLM app toggle: also drives the grafana-llm GSA + Workload
          # Identity binding, so the cloud IAM can't desync from the in-cluster
          # wiring (08.8-grafana-llm.sh). Honour the llm_enabled workflow input
          # (JENKINS2026_OBS_LLM_ENABLED, set at env: above) FIRST — same
          # env-over-config precedence config.sh uses — falling back to config.yaml
          # only when unset (local test/e2e.sh). Reading config.yaml directly here
          # would ignore the form toggle and desync Terraform from up.sh.
          export TF_VAR_observability_llm_enabled="${JENKINS2026_OBS_LLM_ENABLED:-$(yq '.observability.llm.enabled // false' ../../config/config.yaml)}"
          # The GSA/KSA identity names + namespace flow in too (the WI binding is
          # keyed on them), so a config.yaml rename can't silently break the binding.
          export TF_VAR_grafana_llm_gsa_account_id="$(yq '.observability.llm.gcp.googleServiceAccount // "grafana-llm-gsa"' ../../config/config.yaml)"
          export TF_VAR_grafana_llm_ksa_namespace="$(yq '.observability.namespace // "observability"' ../../config/config.yaml)"
          export TF_VAR_grafana_llm_ksa_name="$(yq '.observability.llm.gcp.kubernetesServiceAccount // "grafana-llm-sa"' ../../config/config.yaml)"

          # Adopt a lingering Binary Authorization KMS keyring/key (docs/104 §2, docs/507 §
          # Rebuild-safety). KMS keyrings can NEVER be deleted and keys only enter a
          # scheduled-destruction window, so a prior Decom drops them from Terraform STATE
          # while they LINGER in GCP — a plain create then 409s (`KeyRing ... already
          # exists`, seen live: runs 29433092250 / 29434750534). Import them into state ONLY
          # when they already exist, so apply converges instead of colliding. Lives HERE
          # (inside the apply step, not a standalone one) because `terraform import` needs
          # the SAME TF_VAR_* this step exports — a standalone step tried that once and
          # failed invisibly: it never set TF_VAR_project_id (only a plain PROJECT_ID for
          # gcloud), the import errored "No value for required variable", and a naive
          # `|| true` swallowed it (run 29434750534) — apply then hit the same 409 with
          # nothing actually imported. This shell has `set -e` (GHA's default), so each
          # import is captured via `if VAR=$(cmd); then` — never bare `cmd || true` — and a
          # genuine failure surfaces as `::warning::` instead of vanishing; "already managed"
          # (an idempotent Day1 re-run where it's already in state) is the one benign case.
          if [[ "${TF_VAR_binary_authorization_enabled}" == "true" ]]; then
            KMS_REGION="europe-southwest1" # var.region's default — the keyring's location
            KR="projects/${TF_VAR_project_id}/locations/${KMS_REGION}/keyRings/jenkins-2026-binauthz"
            if gcloud kms keyrings describe jenkins-2026-binauthz --location "${KMS_REGION}" --project "${TF_VAR_project_id}" >/dev/null 2>&1; then
              echo "KMS keyring exists in GCP — adopting it into state so apply doesn't 409."

              # STEP 1 — restore any scheduled-for-destruction key VERSION *first*, before ANY
              # terraform command touches it. The crypto-key OBJECT survives a Decom but its
              # VERSION only enters a scheduled-destruction window (up to 30 days). A scheduled
              # version makes `data.google_kms_crypto_key_version` (security.tf, reads the
              # primary version's public key for the attestor's trust) 400 with "is not
              # enabled, current state is: DESTROY_SCHEDULED" — and that data source is
              # evaluated during the crypto-key IMPORT's refresh, not only at apply. Ordering
              # the restore *after* the import (as a first cut did — run 29523146657) let the
              # import 400 → the key never entered state → apply then 409'd creating it. So:
              # restore, THEN import. Same key material the attestor already trusts; reversible.
              if gcloud kms keys describe jenkins-2026-attestor-key --keyring jenkins-2026-binauthz --location "${KMS_REGION}" --project "${TF_VAR_project_id}" >/dev/null 2>&1; then
                for ver in $(gcloud kms keys versions list --key jenkins-2026-attestor-key --keyring jenkins-2026-binauthz --location "${KMS_REGION}" --project "${TF_VAR_project_id}" --filter='state=DESTROY_SCHEDULED' --format='value(name)' 2>/dev/null); do
                  vnum="${ver##*/}"
                  echo "KMS key version ${vnum} is scheduled for destruction — restoring + re-enabling it (before any terraform import)."
                  gcloud kms keys versions restore "${vnum}" --key jenkins-2026-attestor-key --keyring jenkins-2026-binauthz --location "${KMS_REGION}" --project "${TF_VAR_project_id}" --quiet \
                    && gcloud kms keys versions enable "${vnum}" --key jenkins-2026-attestor-key --keyring jenkins-2026-binauthz --location "${KMS_REGION}" --project "${TF_VAR_project_id}" --quiet \
                    || echo "::warning::Could not restore/enable KMS key version ${vnum} — the import + apply will likely fail on data.google_kms_crypto_key_version."
                done
              fi

              # STEP 2 — import the keyring, then the crypto key. Its refresh now reads an
              # ENABLED primary version, so it succeeds and the key enters state; apply adopts
              # both instead of trying to create them.
              if import_out=$(terraform import -input=false "google_kms_key_ring.binauthz[0]" "${KR}" 2>&1); then
                echo "  keyring imported."
              else
                rc=$?
                if grep -qi "already managed" <<<"${import_out}"; then
                  echo "  keyring already in state (idempotent re-run) — nothing to import."
                else
                  echo "::warning::KMS keyring import failed (exit ${rc}) — apply may 409 on it:"
                  echo "${import_out}"
                fi
              fi
              if gcloud kms keys describe jenkins-2026-attestor-key --keyring jenkins-2026-binauthz --location "${KMS_REGION}" --project "${TF_VAR_project_id}" >/dev/null 2>&1; then
                if import_out=$(terraform import -input=false "google_kms_crypto_key.binauthz[0]" "${KR}/cryptoKeys/jenkins-2026-attestor-key" 2>&1); then
                  echo "  crypto key imported."
                else
                  rc=$?
                  if grep -qi "already managed" <<<"${import_out}"; then
                    echo "  crypto key already in state (idempotent re-run) — nothing to import."
                  else
                    echo "::warning::KMS crypto key import failed (exit ${rc}) — apply may 409 on it:"
                    echo "${import_out}"
                  fi
                fi
              fi
            else
              echo "No lingering KMS keyring — apply will create it fresh."
            fi
          fi

          terraform apply -auto-approve -input=false

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      # Record the deployed CI engine as a durable GCS object. The managed-azure /
      # managed-aws dashboard publishers (Day2.publish.03 / .04) publish from the
      # repo + terraform state to external Grafana WITHOUT cluster access, so they
      # can't detect the engine via kubectl; they read this record to gate the
      # off-engine CI overview correctly (falling back to their manual ci_engine
      # input if the object is absent). Cluster-connected paths detect via
      # j2026_active_ci_engine instead.
      - name: Record active CI engine to GCS
        run: |
          printf '%s' "${{ inputs.ci_engine }}" \
            | gcloud storage cp - "gs://${{ secrets.TF_STATE_BUCKET }}/jenkins-2026/active-ci-engine"
          echo "Recorded active CI engine '${{ inputs.ci_engine }}' to gs://${{ secrets.TF_STATE_BUCKET }}/jenkins-2026/active-ci-engine"

      # The Grafana Cloud stack slug is generated (random) by terraform/grafana-
      # cloud-stack and is no longer a GitHub variable. Read it from that module's
      # GCS state (written by the grafana-cloud-bootstrap pre-flight job) and reuse
      # it for the token apply and the dashboard link, the same way managed-azure /
      # managed-aws read their backend outputs from state.
      - name: Read Grafana Cloud stack slug (from terraform/grafana-cloud-stack state)
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        id: gc_stack
        run: |
          cat > terraform/grafana-cloud-stack/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-stack"
            }
          }
          EOF
          for i in {1..3}; do
            terraform -chdir=terraform/grafana-cloud-stack init -input=false && break || {
              [ $i -lt 3 ] && { echo "init failed, retrying in 10s..."; sleep 10; } || exit 1
            }
          done
          slug="$(terraform -chdir=terraform/grafana-cloud-stack output -raw stack_slug)"
          if [[ -z "${slug}" ]]; then
            echo "::error::grafana-cloud-stack state has no stack_slug - the grafana-cloud-bootstrap job must have failed."
            exit 1
          fi
          echo "slug=${slug}" >> "${GITHUB_OUTPUT}"

      - name: Namespaces & prereqs
        env:
          # Provision the develop tier's namespace + netpol/secrets/RBAC when on (default off).
          JENKINS2026_DEVELOP_TRACK_ENABLED: ${{ inputs.develop_track }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          HEADLAMP_OIDC_CLIENT_ID: ${{ secrets.HEADLAMP_OIDC_CLIENT_ID }}
          HEADLAMP_OIDC_CLIENT_SECRET: ${{ secrets.HEADLAMP_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_CLIENT_ID: ${{ secrets.JENKINS_OIDC_CLIENT_ID }}
          JENKINS_OIDC_CLIENT_SECRET: ${{ secrets.JENKINS_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_ADMIN_EMAIL: ${{ secrets.JENKINS_OIDC_ADMIN_EMAIL }}
          IAP_OAUTH_CLIENT_ID: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
          IAP_OAUTH_CLIENT_SECRET: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
          # Optional Backstage GitHub-Actions-tab OAuth App (docs/505) — also on
          # this pre-pass so the very first 01 run seeds the real values (the
          # up.sh step below re-runs 01 with them anyway; 01's keep-if-present
          # guard protects them from env-less callers).
          BACKSTAGE_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.BACKSTAGE_GITHUB_OAUTH_CLIENT_ID }}
          BACKSTAGE_GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.BACKSTAGE_GITHUB_OAUTH_CLIENT_SECRET }}
        run: |
          ./scripts/00-check-prereqs.sh
          if [[ "${{ inputs.observability_mode }}" == "grafana-cloud" ]]; then
            # Derived from the generated slug (read in the previous step) rather
            # than the grafana-cloud-token output, because that token step runs
            # later and needs jenkins-credentials to exist first. Standard
            # https://<slug>.grafana.net pattern, stored here for
            # microservicesK6Smoke's Grafana dashboard link.
            export GRAFANA_BASE_URL="https://${{ steps.gc_stack.outputs.slug }}.grafana.net"
          fi
          ./scripts/01-namespaces.sh

      - name: Configure GCS backend (terraform/grafana-cloud-token)
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        run: |
          cat > terraform/grafana-cloud-token/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-token"
            }
          }
          EOF

      - name: Terraform init (grafana-cloud-token)
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        working-directory: terraform/grafana-cloud-token
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform apply (Grafana Cloud access policy + tokens)
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        id: grafana_cloud_token
        working-directory: terraform/grafana-cloud-token
        env:
          TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
          TF_VAR_stack_slug: ${{ steps.gc_stack.outputs.slug }}
          # Backend TLS moves Jenkins' plain-HTTP listener to :8082 - the
          # datasource URL (dialed in-cluster by the PDC tunnel) must follow.
          TF_VAR_jenkins_backend_tls: ${{ inputs.intra_cluster_tls == 'backend-tls' }}
        run: |
          # Fetch jenkins admin password from the secret created in the previous step
          ADMIN_PASS=$(kubectl get secret jenkins-credentials -n jenkins -o jsonpath='{.data.admin-password}' | base64 -d)
          export TF_VAR_jenkins_admin_password="${ADMIN_PASS}"

          # The grafana.instance provider's auth is the dashboards SA token created
          # in THIS module, so on a fresh state (e.g. the first apply against a newly
          # created stack) Terraform can't configure that provider for
          # grafana_data_source.jenkins yet ("the Grafana client is required - set the
          # auth and url provider attributes"). Create the SA token first in a targeted
          # apply so its key is known, then apply the rest. Idempotent: a no-op once
          # the token already exists in state.
          terraform apply -auto-approve -input=false \
            -target=grafana_cloud_stack_service_account_token.dashboards
          terraform apply -auto-approve -input=false

          otlp_endpoint="$(terraform output -raw otlp_endpoint)"
          otlp_auth="$(terraform output -raw otlp_auth)"
          grafana_base_url="$(terraform output -raw grafana_base_url)"
          grafana_api_key="$(terraform output -raw grafana_api_key)"
          backstage_grafana_token="$(terraform output -raw backstage_grafana_token)"
          pdc_token="$(terraform output -raw pdc_token)"
          pdc_cluster="$(terraform output -raw pdc_cluster)"
          stack_id="$(terraform output -raw stack_id)"

          echo "::add-mask::${otlp_auth}"
          echo "::add-mask::${grafana_api_key}"
          echo "::add-mask::${backstage_grafana_token}"
          echo "::add-mask::${pdc_token}"

          {
            echo "otlp_endpoint=${otlp_endpoint}"
            echo "otlp_auth=${otlp_auth}"
            echo "grafana_base_url=${grafana_base_url}"
            echo "grafana_api_key=${grafana_api_key}"
            echo "backstage_grafana_token=${backstage_grafana_token}"
            echo "pdc_token=${pdc_token}"
            echo "pdc_cluster=${pdc_cluster}"
            echo "stack_id=${stack_id}"
          } >> "${GITHUB_OUTPUT}"

      - name: Apply Grafana Cloud credentials secret
        if: ${{ inputs.observability_mode == 'grafana-cloud' }}
        run: |
          kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic grafana-cloud-credentials -n observability \
            --from-literal=GRAFANA_CLOUD_OTLP_ENDPOINT="${{ steps.grafana_cloud_token.outputs.otlp_endpoint }}" \
            --from-literal=GRAFANA_CLOUD_OTLP_AUTH="${{ steps.grafana_cloud_token.outputs.otlp_auth }}" \
            --from-literal=GRAFANA_BASE_URL="${{ steps.grafana_cloud_token.outputs.grafana_base_url }}" \
            --from-literal=GRAFANA_API_KEY="${{ steps.grafana_cloud_token.outputs.grafana_api_key }}" \
            --from-literal=GRAFANA_PDC_TOKEN="${{ steps.grafana_cloud_token.outputs.pdc_token }}" \
            --from-literal=GRAFANA_PDC_CLUSTER="${{ steps.grafana_cloud_token.outputs.pdc_cluster }}" \
            --from-literal=GRAFANA_STACK_ID="${{ steps.grafana_cloud_token.outputs.stack_id }}" \
            --from-literal=GRAFANA_TRACES_DASHBOARD_UID="${{ secrets.GRAFANA_TRACES_DASHBOARD_UID }}" \
            --from-literal=OTEL_LOGS_BACKEND_URL="${{ secrets.OTEL_LOGS_BACKEND_URL }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply Azure Monitor credentials secret (from terraform outputs)
        if: ${{ inputs.observability_mode == 'managed-azure' }}
        run: |
          # The terraform/azure-managed-grafana module (provisioned once by the
          # "Day0.infra.03 Day0.infra.03 Azure managed-grafana" workflow) holds the Azure
          # backend coordinates + the collector's Entra service-principal
          # credentials in its GCS state. Read its outputs here to build the
          # in-cluster Secret consumed by values-managed-azure*.yaml - reading
          # state needs no Azure auth (just the GCS backend, already authed
          # above), and no sensitive value lives in the repo or in a GitHub
          # secret. GRAFANA_API_KEY is intentionally left empty: dashboard
          # publishing to Azure Managed Grafana is a manual step (you hold
          # Grafana Admin) - see docs/observability.md "managed-azure".
          cat > terraform/azure-managed-grafana/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/azure-managed-grafana"
            }
          }
          EOF
          terraform -chdir=terraform/azure-managed-grafana init -input=false
          tf() { terraform -chdir=terraform/azure-managed-grafana output -raw "$1"; }
          conn="$(tf azure_monitor_connection_string)"
          # Fail loud if the Azure backend was never bootstrapped (empty state
          # outputs) instead of silently building an empty azure-monitor-credentials
          # Secret. Run Day0.infra.03 once, or re-run Day1 with reapply_backend=true.
          if [[ -z "${conn}" ]]; then
            echo "::error::terraform/azure-managed-grafana outputs are empty — the Azure backend was never bootstrapped. Run Day0.infra.03 once (it also prints the AZURE_PUBLISH_CLIENT_ID secret to set), or re-run Day1 with reapply_backend=true."
            exit 1
          fi
          prom="$(tf azure_monitor_prometheus_endpoint)"
          tenant="$(tf azure_tenant_id)"
          client="$(tf azure_client_id)"
          secret="$(tf azure_client_secret)"
          grafana="$(tf grafana_endpoint)"
          # DURABLE-AUTH FIX (docs/D drift): the dashboard-publish "azure/login" step below
          # authenticates as App B (the low-priv publish SP). App B is torn down + recreated
          # whenever the Azure backend is re-bootstrapped (Decom.infra.03 → fresh Day0.infra.03),
          # so the MANUALLY-SET AZURE_PUBLISH_CLIENT_ID secret drifts and the login then dies
          # with AADSTS700016 (application not found in the directory). Read App B's CURRENT
          # client id straight from this module's state (the single source of truth) and thread
          # it to the login step via $GITHUB_ENV, so a re-bootstrapped App B never needs a manual
          # secret update. Fall back to the secret if the output is absent (older state not yet
          # re-applied). A client id is a NON-secret identifier (publish_app_client_id is not a
          # `sensitive` output), so it is safe to carry in a plain env var.
          publish_client="$(tf publish_app_client_id 2>/dev/null || echo '')"
          if [[ -n "${publish_client}" ]]; then
            echo "AZURE_PUBLISH_CLIENT_ID_RESOLVED=${publish_client}" >> "${GITHUB_ENV}"
            echo "Resolved App B (publish) client id from azure-managed-grafana state — the dashboard login is drift-proof."
          else
            echo "::warning::publish_app_client_id output absent (older Azure backend state) — the dashboard login falls back to the AZURE_PUBLISH_CLIENT_ID secret. Re-run Day0.infra.03 to refresh the output."
          fi
          echo "::add-mask::${conn}"
          echo "::add-mask::${secret}"
          kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic azure-monitor-credentials -n observability \
            --from-literal=AZURE_MONITOR_CONNECTION_STRING="${conn}" \
            --from-literal=AZURE_MONITOR_PROMETHEUS_ENDPOINT="${prom}" \
            --from-literal=AZURE_TENANT_ID="${tenant}" \
            --from-literal=AZURE_CLIENT_ID="${client}" \
            --from-literal=AZURE_CLIENT_SECRET="${secret}" \
            --from-literal=GRAFANA_BASE_URL="${grafana}" \
            --from-literal=GRAFANA_API_KEY="" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply AWS managed credentials secret (from terraform outputs)
        if: ${{ inputs.observability_mode == 'managed-aws' }}
        run: |
          # The terraform/aws-managed-grafana module (provisioned once by the
          # "Day0.infra.04 AWS managed-grafana" workflow) holds the AMP endpoint, collector IAM
          # role ARN, region and log group in its GCS state. No AWS auth needed
          # here (terraform output just reads state, GCS already authed above);
          # the collector authenticates to AWS at runtime via web identity (no
          # access keys anywhere).
          cat > terraform/aws-managed-grafana/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/aws-managed-grafana"
            }
          }
          EOF
          terraform -chdir=terraform/aws-managed-grafana init -input=false
          tf() { terraform -chdir=terraform/aws-managed-grafana output -raw "$1"; }
          # Fail fast if the bootstrap outputs are empty (aws-bootstrap job
          # above should have applied them; empty means something went wrong).
          aws_region="$(tf aws_region)"
          if [[ -z "${aws_region}" ]]; then
            echo "::error::terraform/aws-managed-grafana outputs are empty — the aws-bootstrap job above must have failed. Check its logs."
            exit 1
          fi
          kubectl create namespace observability --dry-run=client -o yaml | kubectl apply -f -
          kubectl create secret generic aws-managed-credentials -n observability \
            --from-literal=AWS_REGION="${aws_region}" \
            --from-literal=AMP_REMOTE_WRITE_ENDPOINT="$(tf amp_remote_write_endpoint)" \
            --from-literal=AWS_ROLE_ARN="$(tf collector_role_arn)" \
            --from-literal=AWS_CLOUDWATCH_LOG_GROUP="$(tf cloudwatch_log_group)" \
            --from-literal=GRAFANA_BASE_URL="$(tf grafana_endpoint)" \
            --from-literal=GRAFANA_WORKSPACE_ID="$(tf grafana_workspace_id)" \
            --from-literal=AMP_QUERY_URL="$(tf amp_query_url)" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy the stack (scripts/up.sh)
        env:
          JENKINS2026_OBS_MODE: ${{ inputs.observability_mode }}
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
          JENKINS2026_SECRETS_BACKEND: ${{ inputs.secrets_backend }}
          # Optional second deploy tier (off by default). Flows through up.sh to
          # 08.5-argocd (AppSet develop generator), 04-jenkins/06-seed (Jenkins
          # -develop jobs) and 06-tekton-pipelines (Tekton develop runs).
          JENKINS2026_DEVELOP_TRACK_ENABLED: ${{ inputs.develop_track }}
          JENKINS2026_HEADLAMP_ADMIN_EMAILS: ${{ secrets.HEADLAMP_ADMIN_EMAILS }}
          # Grafana Assistant (observability.assistant.enabled) connection to your
          # Grafana Cloud stack — consumed by 08.9-grafana-assistant.sh. Empty when
          # the secrets aren't set (the plugin then installs but stays unconfigured).
          GRAFANA_CLOUD_ASSISTANT_BACKEND_URL: ${{ secrets.GRAFANA_CLOUD_ASSISTANT_BACKEND_URL }}
          GRAFANA_CLOUD_ASSISTANT_INSTANCE_ID: ${{ secrets.GRAFANA_CLOUD_ASSISTANT_INSTANCE_ID }}
          GRAFANA_CLOUD_ASSISTANT_TOKEN: ${{ secrets.GRAFANA_CLOUD_ASSISTANT_TOKEN }}
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          GIT_USERNAME: ${{ secrets.GIT_USERNAME }}
          GIT_TOKEN: ${{ secrets.GIT_TOKEN }}
          HEADLAMP_OIDC_CLIENT_ID: ${{ secrets.HEADLAMP_OIDC_CLIENT_ID }}
          HEADLAMP_OIDC_CLIENT_SECRET: ${{ secrets.HEADLAMP_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_CLIENT_ID: ${{ secrets.JENKINS_OIDC_CLIENT_ID }}
          JENKINS_OIDC_CLIENT_SECRET: ${{ secrets.JENKINS_OIDC_CLIENT_SECRET }}
          JENKINS_OIDC_ADMIN_EMAIL: ${{ secrets.JENKINS_OIDC_ADMIN_EMAIL }}
          IAP_OAUTH_CLIENT_ID: ${{ secrets.IAP_OAUTH_CLIENT_ID }}
          IAP_OAUTH_CLIENT_SECRET: ${{ secrets.IAP_OAUTH_CLIENT_SECRET }}
          # Optional GitHub OAuth App for the Backstage GitHub Actions tab's
          # per-user popup (docs/505); 'unset' placeholders keep it booting
          # without them.
          BACKSTAGE_GITHUB_OAUTH_CLIENT_ID: ${{ secrets.BACKSTAGE_GITHUB_OAUTH_CLIENT_ID }}
          BACKSTAGE_GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.BACKSTAGE_GITHUB_OAUTH_CLIENT_SECRET }}
          # Backstage Monitoring tab (docs/505 § Grafana integration): the
          # Terraform-minted Viewer stack SA token, read from the
          # grafana-cloud-token module's outputs above - NEVER a GitHub secret
          # (the azure/aws credentials pattern). Empty in every other
          # observability mode (the step is skipped): 01-namespaces then keeps
          # the existing value, 08.95 mints one in-cluster (oss), or the
          # 'unset' placeholder stands (managed-*).
          BACKSTAGE_GRAFANA_TOKEN: ${{ steps.grafana_cloud_token.outputs.backstage_grafana_token }}
          # Optional GitHub HMAC tokens for the Tekton Triggers EventListener and
          # for Pipelines-as-Code (ci_engine=tekton); empty unless the secrets are set.
          TEKTON_GITHUB_WEBHOOK_SECRET: ${{ secrets.TEKTON_GITHUB_WEBHOOK_SECRET }}
          PAC_WEBHOOK_SECRET: ${{ secrets.PAC_WEBHOOK_SECRET }}
          # GitHub App credentials for ARC (ci_engine=githubactions); empty unless set,
          # in which case 01-namespaces builds the arc-github-app Secret from them and
          # ARC registers runners via the App (else it falls back to the GIT_TOKEN PAT).
          ARC_GITHUB_APP_ID: ${{ secrets.ARC_GITHUB_APP_ID }}
          ARC_GITHUB_APP_INSTALLATION_ID: ${{ secrets.ARC_GITHUB_APP_INSTALLATION_ID }}
          ARC_GITHUB_APP_PRIVATE_KEY: ${{ secrets.ARC_GITHUB_APP_PRIVATE_KEY }}
          # Optional GitHub HMAC for the Argo Events EventSource (ci_engine=argoworkflows);
          # empty unless set, in which case 06-argoworkflows-pipelines seeds it (else it
          # generates one). Falls back to PAC_WEBHOOK_SECRET in 01-namespaces.
          ARGOWORKFLOWS_GITHUB_WEBHOOK_SECRET: ${{ secrets.ARGOWORKFLOWS_GITHUB_WEBHOOK_SECRET }}
          # Alert contact-point email for 07.5-grafana-alerts.sh. Per-mode secret
          # (grafana-cloud requires an org-member address) with a generic fallback;
          # empty falls back to jenkins-credentials oidc-admin-email. See docs/103 §3.
          GRAFANA_ALERT_EMAIL: ${{ secrets.GRAFANA_ALERT_EMAIL }}
          GRAFANA_ALERT_EMAIL_GRAFANA_CLOUD: ${{ secrets.GRAFANA_ALERT_EMAIL_GRAFANA_CLOUD }}
          GRAFANA_ALERT_EMAIL_OSS: ${{ secrets.GRAFANA_ALERT_EMAIL_OSS }}
          GRAFANA_ALERT_EMAIL_MANAGED_AZURE: ${{ secrets.GRAFANA_ALERT_EMAIL_MANAGED_AZURE }}
          GRAFANA_ALERT_EMAIL_MANAGED_AWS: ${{ secrets.GRAFANA_ALERT_EMAIL_MANAGED_AWS }}
          # Optional Grafana Cloud k6 (the k6-app) streaming for the k6 smoke
          # pipeline; empty unless set, in which case the run also does --out cloud.
          K6_CLOUD_TOKEN: ${{ secrets.K6_CLOUD_TOKEN }}
          K6_CLOUD_PROJECT_ID: ${{ secrets.K6_CLOUD_PROJECT_ID }}
        run: |
          if [[ "${{ inputs.enable_gateway }}" != "true" ]]; then
            # gateway.baseDomain's committed default (jenkins2026.nubenetes.com)
            # would otherwise apply. Override to "" to disable public access
            # for this run (e.g. before the one-time "Day0.infra.01 Gateway"
            # workflow + DNS + IAP OAuth client setup is done) - see
            # README.md "Public access (GKE Gateway API + IAP)".
            export JENKINS2026_BASE_DOMAIN=""
          fi
          ./scripts/up.sh

      - name: Smoke test
        env:
          # Without this the smoke test sources config.yaml's default ci.engine
          # (jenkins) and runs Jenkins checks even on a tekton cluster - mirror the
          # engine the cluster was provisioned with (same override as the up.sh step).
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
          # Same reason for observability: without it the smoke test sees config.yaml's
          # default obs mode (oss) and runs the OSS-Grafana pod check even on a
          # grafana-cloud/managed cluster (no in-cluster Grafana) -> false FAIL.
          JENKINS2026_OBS_MODE: ${{ inputs.observability_mode }}
        run: ./test/smoke-test.sh

      # Summary and Access URLs run BEFORE the AWS/Azure login steps so that
      # configure-aws-credentials / azure/login have not yet registered
      # cloud-specific values (e.g. the AWS region) as masked secrets -
      # otherwise those strings are replaced with *** in all subsequent log output,
      # including the Grafana workspace URL.
      - name: Summary
        if: always()
        working-directory: terraform/gke
        run: |
          {
            echo "### jenkins-2026 GKE cluster"
            echo
            echo "- Project: \`${{ secrets.GCP_PROJECT_ID }}\`"
            echo "- Cluster: \`$(terraform output -raw cluster_name)\`"
            echo "- Zone: \`$(terraform output -raw location)\`"
            echo "- Observability mode: \`${{ inputs.observability_mode }}\`"
            echo "- Gateway/IAP enabled: \`${{ inputs.enable_gateway }}\`"
            echo "- Intra-cluster TLS (docs/504 backend-tls · docs/506 mesh): \`${{ inputs.intra_cluster_tls }}\`"
            echo "- Binary Authorization (docs/507): \`${{ inputs.binary_authorization }}\`"
            echo
            echo "See the **Access URLs** step (end of the job log, and below) for"
            echo "every service URL — IAP-protected and open — for this run's CI"
            echo "engine and observability mode."
            echo
            echo "To apply a change later, just **re-run this workflow** — it is"
            echo "idempotent and converges on the existing cluster, no decommission"
            echo "needed. Run **Decom.cluster.01 GKE** only when you're done, to"
            echo "avoid ongoing charges."
          } >> "${GITHUB_STEP_SUMMARY}"

      # Centralised access summary before any cloud login steps: every URL for this
      # run's CI engine + observability mode, grouped by IAP-protected / open /
      # observability. if: always() so it prints even if an earlier step (e.g. the
      # smoke test) failed. Also mirrored into the GitHub step summary panel.
      # Must stay before AWS/Azure login steps to avoid region masking in the log.
      - name: Access URLs
        if: always()
        run: |
          dom="jenkins2026.nubenetes.com"
          engine="${{ inputs.ci_engine }}"
          mode="${{ inputs.observability_mode }}"

          # Project NUMBER (not the masked GCP_PROJECT_ID secret) for the Secret
          # Manager console links below — the secret would be redacted to
          # project=*** in the log/summary, but the number isn't a registered
          # secret and the console accepts project=<number>, so the link works.
          proj_num="$(gcloud projects describe "${{ secrets.GCP_PROJECT_ID }}" --format='value(projectNumber)' 2>/dev/null || true)"

          # Grafana URL depends on the observability mode (not the gateway/engine).
          # Compute the raw URL (for a clickable link) and a short note separately.
          if [[ "${mode}" == "grafana-cloud" ]]; then
            grafana_url="https://${{ steps.gc_stack.outputs.slug }}.grafana.net"; grafana_note="Grafana Cloud sign-in"
          elif [[ "${mode}" == "oss" ]]; then
            grafana_url="https://grafana.${dom}"; grafana_note="IAP"
          else
            sec="azure-monitor-credentials"; [[ "${mode}" == "managed-aws" ]] && sec="aws-managed-credentials"
            grafana_url="$(kubectl get secret "${sec}" -n observability -o jsonpath='{.data.GRAFANA_BASE_URL}' 2>/dev/null | base64 -d 2>/dev/null || true)"
            grafana_note="managed"
          fi
          grafana="${grafana_url:-(see the ${mode} backend / terraform outputs)}  (${grafana_note})"

          # CI-engine-specific UI: Jenkins / Tekton Dashboard / GitHub Actions tab
          # (mutually exclusive). githubactions has NO in-cluster UI (runs live in
          # GitHub's Actions tab, ARC ephemeral Spot runners) - so no IAP URL.
          if [[ "${engine}" == "tekton" ]]; then
            ci_iap="    Tekton Dashboard:      https://tekton.${dom}"
            ci_open=$'\n''    Tekton PaC webhook:    https://pac.'"${dom}"'  (GitHub -> Pipelines-as-Code, HMAC, no IAP)'
          elif [[ "${engine}" == "githubactions" ]]; then
            # GitHub Actions has NO in-cluster UI (unlike the Jenkins UI / Tekton Dashboard /
            # Argo UI). GitHub.com is the control plane — it stores the workflow, queues the
            # jobs and shows the logs; ARC only supplies the in-cluster ephemeral Spot runners.
            # So the "pipelines" are the microservices-ci.yml workflows in each microservices
            # fork, watched in that fork's Actions tab. List them from the SAME services.yaml the
            # seed renders from (06-githubactions-pipelines.sh), so the URLs are always accurate.
            ci_iap="    CI (GitHub Actions):   no in-cluster UI — pipelines run in each fork's Actions tab:"
            svc_file="jenkins/pipelines/seed/services.yaml"
            if command -v yq >/dev/null 2>&1 && [[ -f "${svc_file}" ]]; then
              while IFS= read -r u; do
                [[ -z "${u}" || "${u}" == "null" ]] && continue
                ci_iap+=$'\n'"      ${u%.git}/actions"
              done < <(yq -r '.services[].repoUrl' "${svc_file}" 2>/dev/null | sort -u)
            fi
            ci_iap+=$'\n'"      (ARC ephemeral Spot runners execute these — GitHub hosts the UI; see docs/405)"
            ci_open=""
          elif [[ "${engine}" == "argoworkflows" ]]; then
            ci_iap="    Argo Workflows UI:     https://argo.${dom}"
            ci_open=$'\n''    Argo Events webhook:   https://argo-events.'"${dom}"'  (GitHub -> Argo Events Sensor, HMAC, no IAP)'
          else
            ci_iap="    Jenkins:               https://jenkins.${dom}"
            ci_open=""
          fi

          gen() {
            echo "════════════════════════════════════════════════════════════════════════"
            echo "  ACCESS URLs   (ci_engine=${engine}, observability_mode=${mode})"
            echo "════════════════════════════════════════════════════════════════════════"
            if [[ "${{ inputs.enable_gateway }}" == "true" ]]; then
              echo "  Behind Google IAP — sign in with an authorized Google account:"
              echo "    ArgoCD:                https://argocd.${dom}  (single sign-on: IAP + Dex authproxy; admin email = role:admin, else readonly)"
              echo "${ci_iap}"
              echo "    Headlamp:              https://headlamp.${dom}"
              echo "    pgAdmin:               https://pgadmin.${dom}"
              if [[ "${{ inputs.backstage_enabled }}" == "true" ]]; then
                echo "    Backstage:             https://backstage.${dom}  (developer portal; image bootstrap = Day2.publish.06 — docs/505)"
              fi
              [[ "${mode}" == "oss" ]] && echo "    Grafana (OSS):         https://grafana.${dom}"
              echo
              echo "  Open (no IAP):"
              echo "    Microservices:         https://microservices.${dom}${ci_open}"
              # The optional lean develop tier gets its own public route (09-gateway.sh).
              if [[ "${{ inputs.develop_track }}" == "true" ]]; then
                echo "    Microservices develop: https://microservices-develop.${dom}"
              fi
              echo "    Faro RUM ingest:       https://faro.${dom}  (browser Faro beacon → otel-collector; not a UI — the Angular SPA posts here)"
              echo
              echo "  Observability:"
              echo "    Grafana:               ${grafana}"
              echo
              echo "  (IAP URLs need the one-time Day0.infra.01 Gateway + DNS + IAP OAuth client.)"
              echo
              echo "  ⚠️  NOTE on GKE Gateway Convergence:"
              echo "       The GKE Gateway compiles into a Google global external load balancer that then needs ~2-5 min to"
              echo "       (1) finish programming its forwarding rules + HTTPRoutes, and (2) mark each backend's NEG endpoints"
              echo "       HEALTHY via the LB health checks before it will route to them — and with backend TLS on, that"
              echo "       health check must converge to HTTPS first. IAP/OAuth on the admin UIs also settles in this window."
              echo "       So a browser hit right now can return 502, an SSL error, or 'upstream connect error ... reset"
              echo "       reason: local connection failure' — that is the LB with no healthy backend yet, not a broken run."
              echo "       Nothing to do: wait a few minutes and refresh. (See docs/504 § GKE NEG self-healing for the details.)"
            else
              echo "  Gateway/IAP disabled for this run (enable_gateway=false) — no public URLs."
              echo "  Reach services via 'kubectl port-forward' (see README 'Accessing the UI')."
              echo "    Grafana:               ${grafana}"
            fi
            if [[ "${{ inputs.secrets_backend }}" == "eso" && "${{ inputs.enable_gateway }}" == "true" ]]; then
              echo
              echo "  Secrets (secrets.backend=eso → GCP Secret Manager, synced by External Secrets):"
              echo "    gateway-iap-oauth:     https://console.cloud.google.com/security/secret-manager/secret/gateway-iap-oauth/versions?project=${proj_num:-<your-project>}"
            fi
            echo "════════════════════════════════════════════════════════════════════════"
          }
          gen                                   # -> normal job log
          { echo '```'; gen; echo '```'; } >> "${GITHUB_STEP_SUMMARY}"   # -> summary panel

          # Clickable links (the code block above isn't clickable). Markdown links
          # in the step summary so Grafana — OSS, Azure, AWS or Grafana Cloud — and
          # the IAP UIs can be opened in one click.
          {
            echo
            echo "### 🔗 Quick links"
            echo
            if [[ -n "${grafana_url:-}" ]]; then
              echo "- **Grafana** (${grafana_note}): [${grafana_url}](${grafana_url})"
            else
              echo "- **Grafana**: see the ${mode} backend / terraform outputs"
            fi
            if [[ "${{ inputs.enable_gateway }}" == "true" ]]; then
              echo "- **ArgoCD**: [https://argocd.${dom}](https://argocd.${dom})"
              if [[ "${engine}" == "tekton" ]]; then
                echo "- **Tekton Dashboard**: [https://tekton.${dom}](https://tekton.${dom})"
              elif [[ "${engine}" == "githubactions" ]]; then
                # No in-cluster UI: one clickable Actions-tab link per microservices fork.
                echo "- **CI (GitHub Actions)** — no in-cluster UI; pipelines run in each fork's Actions tab (ARC ephemeral Spot runners):"
                svc_file="jenkins/pipelines/seed/services.yaml"
                if command -v yq >/dev/null 2>&1 && [[ -f "${svc_file}" ]]; then
                  while IFS= read -r u; do
                    [[ -z "${u}" || "${u}" == "null" ]] && continue
                    base="${u%.git}"; echo "  - [${base##*/}](${base}/actions)"
                  done < <(yq -r '.services[].repoUrl' "${svc_file}" 2>/dev/null | sort -u)
                fi
              elif [[ "${engine}" == "argoworkflows" ]]; then
                echo "- **Argo Workflows UI**: [https://argo.${dom}](https://argo.${dom})"
              else
                echo "- **Jenkins**: [https://jenkins.${dom}](https://jenkins.${dom})"
              fi
              echo "- **Headlamp**: [https://headlamp.${dom}](https://headlamp.${dom})"
              echo "- **pgAdmin**: [https://pgadmin.${dom}](https://pgadmin.${dom})"
              if [[ "${{ inputs.backstage_enabled }}" == "true" ]]; then
                echo "- **Backstage**: [https://backstage.${dom}](https://backstage.${dom})"
              fi
              echo "- **Microservices**: [https://microservices.${dom}](https://microservices.${dom})"
              if [[ "${{ inputs.secrets_backend }}" == "eso" ]]; then
                echo "- **Secret Manager** (gateway-iap-oauth, secrets.backend=eso): [console](https://console.cloud.google.com/security/secret-manager/secret/gateway-iap-oauth/versions?project=${proj_num:-})"
              fi
            fi
            echo
          } >> "${GITHUB_STEP_SUMMARY}"

      # Auto-publish the managed-azure dashboard variants to Azure Managed
      # Grafana, for parity with the grafana-cloud/oss modes (which publish via
      # 07-grafana-dashboards.sh). Uses GitHub OIDC -> Azure as the low-privilege
      # PUBLISH app (App B), which holds ONLY Grafana Admin + Reader via
      # terraform/azure-managed-grafana - NOT the Contributor+UAA bootstrap app.
      # See docs/102 § Why the per-cloud asymmetry.
      - name: Azure login (managed-azure dashboards)
        if: ${{ inputs.observability_mode == 'managed-azure' }}
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          # Prefer App B's client id RESOLVED FROM STATE (drift-proof, set above); fall back to
          # the manually-set secret only when the output was absent. See the durable-auth fix in
          # "Apply Azure Monitor credentials secret".
          client-id: ${{ env.AZURE_PUBLISH_CLIENT_ID_RESOLVED || secrets.AZURE_PUBLISH_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish dashboards to Azure Managed Grafana
        if: ${{ inputs.observability_mode == 'managed-azure' }}
        env:
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
        run: |
          # Publish via the Grafana DATA-PLANE API (curl), NOT `az grafana
          # list/show/dashboard create` — those make ARM calls that depend on the
          # resource group and have started failing with InvalidApiVersionParameter
          # (stale api-version in the amg CLI extension). The data-plane API needs
          # only the endpoint + an Azure AD token (AMG audience 6f2d169c). This is
          # the same approach 07-grafana-dashboards.sh uses for grafana-cloud/aws.
          ep="$(kubectl get secret azure-monitor-credentials -n observability \
            -o jsonpath='{.data.GRAFANA_BASE_URL}' 2>/dev/null | base64 -d 2>/dev/null || true)"
          if [[ -z "${ep}" ]]; then
            echo "::warning::no Azure Managed Grafana endpoint in azure-monitor-credentials - skipping dashboard publish"
            exit 0
          fi
          tok="$(az account get-access-token --resource 6f2d169c-08f3-4a4c-a982-bcaf2d038c45 --query accessToken -o tsv)"
          gapi() { local m="$1" p="$2"; shift 2; curl -fsS -X "${m}" "${ep%/}${p}" \
            -H "Authorization: Bearer ${tok}" -H "Content-Type: application/json" "$@"; }
          # Resolve the App Insights resource for the ${appinsights} placeholder
          # (log/trace panels). resource-graph extension; non-fatal if it fails.
          az extension add -n resource-graph --only-show-errors || true
          appinsights="$(az graph query -q "resources | where type =~ 'microsoft.insights/components' | project id" --query 'data[0].id' -o tsv 2>/dev/null || true)"
          echo "Publishing dashboards (App Insights: ${appinsights##*/}) to: ${ep}"
          # Shared "CI-CD Observability" folder (uid jenkins-2026) — same single
          # folder as the alert rules (07.5), consistent with oss/grafana-cloud/aws.
          gapi POST /api/folders -d '{"uid":"jenkins-2026","title":"CI-CD Observability"}' >/dev/null 2>&1 || true
          gapi PUT /api/folders/jenkins-2026 -d '{"title":"CI-CD Observability","overwrite":true}' >/dev/null 2>&1 || true
          # Keep only the ACTIVE engine's CI overview; skip + delete the other three
          # (jenkins/tekton/githubactions/argoworkflows are mutually exclusive). Mirrors
          # the KEEP_CI_DASHBOARD / ALL_CI_DASHBOARDS gating in 07-grafana-dashboards.sh.
          case "${JENKINS2026_CI_ENGINE}" in
            tekton)        keep_dash="tekton-overview" ;;
            githubactions) keep_dash="github-actions-ci" ;;
            argoworkflows) keep_dash="argo-workflows-ci" ;;
            *)             keep_dash="jenkins-overview" ;;
          esac
          all_ci_dash="jenkins-overview tekton-overview github-actions-ci argo-workflows-ci"
          for f in observability/grafana/dashboards-azure/*-azure.json; do
            name="$(basename "${f}" -azure.json)"
            skip=""
            for d in ${all_ci_dash}; do
              [[ "${name}" == "${d}" && "${name}" != "${keep_dash}" ]] && skip="yes"
            done
            if [[ -n "${skip}" ]]; then
              echo "skipping ${name}-azure (ci.engine=${JENKINS2026_CI_ENGINE})"
              continue
            fi
            sed "s|\${appinsights}|${appinsights}|g" "${f}" > /tmp/dash.json
            payload="$(jq -n --slurpfile db /tmp/dash.json \
              '{dashboard: ($db[0] + {id: null}), folderUid: "jenkins-2026", overwrite: true}')"
            if printf '%s' "${payload}" | gapi POST /api/dashboards/db --data-binary @- >/dev/null 2>&1; then
              echo "published $(basename "${f}")"
            else
              echo "::warning::failed to publish $(basename "${f}")"
            fi
          done
          # Delete the inactive engines' overview dashboards by uid (data-plane; no-op if
          # absent). The published uid is whatever the canonical JSON carries — NOT always
          # jenkins2026-<name> (jenkins-overview has a Grafana-generated uid; the -azure
          # variants preserve the canonical uid) — so derive it with jq. Also try the
          # legacy jenkins2026-<name> uid: a persistent stack may still hold a copy
          # published under it.
          for d in ${all_ci_dash}; do
            [[ "${d}" == "${keep_dash}" ]] && continue
            canon_uid="$(jq -r '.uid // empty' "observability/grafana/dashboards/${d}.json" 2>/dev/null || true)"
            [[ "${canon_uid}" == "jenkins2026-${d}" ]] && canon_uid=""
            for off_uid in ${canon_uid} "jenkins2026-${d}"; do
              gapi DELETE "/api/dashboards/uid/${off_uid}" >/dev/null 2>&1 \
                && echo "deleted off-engine dashboard ${d} (uid ${off_uid})" || true
            done
          done
          # Generic Kubernetes/node infra is covered by Azure Managed Grafana's
          # built-in dashboards (Compute Resources / Kubelet / Node Exporter /
          # USE Method), auto-provisioned from the Azure Monitor workspace
          # integration - the collector scrapes cadvisor/kubelet/node/ksm to
          # feed them (values-managed-azure.yaml). Nothing to publish here.

      # Provision the alert rules to Azure Managed Grafana. up.sh runs
      # 07.5-grafana-alerts.sh too, but inside up.sh the runner is not yet logged
      # into Azure (the azure/login above is a later step), so 07.5 cannot mint the
      # Azure AD token and the rules are skipped there. Re-run it here, post-login,
      # so the 5 rules land in the CI-CD Observability folder (Alerting -> Alert
      # rules) — the managed-azure equivalent of the OSS alerts. Idempotent.
      - name: Provision alerts to Azure Managed Grafana
        if: ${{ inputs.observability_mode == 'managed-azure' }}
        env:
          JENKINS2026_OBS_MODE: managed-azure
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
        run: ./scripts/07.5-grafana-alerts.sh

      # Auto-publish the managed-aws dashboard variants to Amazon Managed
      # Grafana. up.sh's 07-grafana-dashboards.sh skips when the runner has no
      # AWS credentials (the keyless design only federates the collector), so
      # authenticate here via GitHub OIDC - the least-privilege dashboard-
      # publisher role from terraform/aws-managed-grafana, no access keys - and
      # run the publisher (it mints a short-lived AMG service-account token).
      - name: AWS login (managed-aws dashboards)
        if: ${{ inputs.observability_mode == 'managed-aws' && env.AWS_DASHBOARD_PUBLISH_ROLE_ARN != '' }}
        uses: aws-actions/configure-aws-credentials@e6de054238d6b7531b4efff3b6587d9aade6a06c # v6.2.3
        with:
          role-to-assume: ${{ env.AWS_DASHBOARD_PUBLISH_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}

      - name: Publish dashboards to Amazon Managed Grafana
        if: ${{ inputs.observability_mode == 'managed-aws' && env.AWS_DASHBOARD_PUBLISH_ROLE_ARN != '' }}
        env:
          JENKINS2026_OBS_MODE: managed-aws
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
        run: ./scripts/07-grafana-dashboards.sh

      # Provision the alert rules to Amazon Managed Grafana, post AWS-login (same
      # reason as Azure above: 07.5 inside up.sh can't mint the AMG token without
      # AWS creds). Lands the 5 rules in the CI-CD Observability folder. Idempotent.
      - name: Provision alerts to Amazon Managed Grafana
        if: ${{ inputs.observability_mode == 'managed-aws' && env.AWS_DASHBOARD_PUBLISH_ROLE_ARN != '' }}
        env:
          JENKINS2026_OBS_MODE: managed-aws
          JENKINS2026_CI_ENGINE: ${{ inputs.ci_engine }}
        run: ./scripts/07.5-grafana-alerts.sh

