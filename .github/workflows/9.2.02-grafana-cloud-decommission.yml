name: "9.2.02 Grafana Cloud decommission"

# Manually-triggered teardown: destroys terraform/grafana-cloud-stack to remove
# the Grafana Cloud stack (the org/free tier is untouched). The slug is read from
# state, and there is no delete_protection, so the destroy succeeds; the next
# 0.1.02 run creates a fresh stack with a new generated slug.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  TF_VERSION: "1.15.6"

jobs:
  decommission:
    runs-on: ubuntu-latest
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/grafana-cloud-stack)
        run: |
          cat > terraform/grafana-cloud-stack/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/grafana-cloud-stack"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/grafana-cloud-stack
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform destroy (destroy Grafana Cloud stack)
        working-directory: terraform/grafana-cloud-stack
        env:
          TF_VAR_grafana_cloud_api_token: ${{ secrets.GRAFANA_CLOUD_API_TOKEN }}
        run: terraform destroy -auto-approve -input=false

      - name: Summary
        if: always()
        run: |
          echo "### Grafana Cloud stack decommissioned" >> "${GITHUB_STEP_SUMMARY}"
