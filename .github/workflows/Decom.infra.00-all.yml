name: "Decom.infra.00 All persistent backends (umbrella, opt-in)"

# Opt-in convenience umbrella that tears down the SELECTED persistent backends in
# one dispatch, REUSING each per-backend Decom workflow via `workflow_call` (no
# decommission logic is duplicated here). Nothing runs unless you tick its checkbox
# AND type "destroy" to confirm — these backends are persistent and independent, so
# this never blindly destroys all of them. Run AFTER Decom.cluster.01-gke (the
# cluster must already be down). Each selected backend is a `terraform destroy` of
# its own module; they are independent, so they run in parallel.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "destroy" to confirm tearing down the SELECTED backends (IRREVERSIBLE)'
        required: true
        type: string
      grafana_cloud:
        description: "Destroy the Grafana Cloud stack (Decom.infra.02)"
        type: boolean
        default: false
      azure_grafana:
        description: "Destroy Azure Managed Grafana (Decom.infra.03)"
        type: boolean
        default: false
      aws_grafana:
        description: "Destroy Amazon Managed Grafana (Decom.infra.04)"
        type: boolean
        default: false
      gateway:
        description: "Destroy the Gateway static IP + cert (Decom.infra.01) — ⚠ loses the IP, forces DNS re-propagation"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

jobs:
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation + selection
        run: |
          if [ "${{ inputs.confirm }}" != "destroy" ]; then
            echo "::error::You must type 'destroy' in the confirm box to proceed."; exit 1
          fi
          if [ "${{ inputs.grafana_cloud }}" != "true" ] && \
             [ "${{ inputs.azure_grafana }}" != "true" ] && \
             [ "${{ inputs.aws_grafana }}" != "true" ] && \
             [ "${{ inputs.gateway }}" != "true" ]; then
            echo "::error::Nothing selected — tick at least one backend checkbox."; exit 1
          fi

  grafana-cloud:
    needs: guard
    if: ${{ inputs.grafana_cloud }}
    uses: ./.github/workflows/Decom.infra.02-grafana-cloud.yml
    secrets: inherit

  azure-grafana:
    needs: guard
    if: ${{ inputs.azure_grafana }}
    uses: ./.github/workflows/Decom.infra.03-azure-grafana.yml
    secrets: inherit

  aws-grafana:
    needs: guard
    if: ${{ inputs.aws_grafana }}
    uses: ./.github/workflows/Decom.infra.04-aws-grafana.yml
    secrets: inherit

  gateway:
    needs: guard
    if: ${{ inputs.gateway }}
    uses: ./.github/workflows/Decom.infra.01-gateway.yml
    secrets: inherit
