name: "Day2.scale.01 Pause cluster (nodes → 0, save cost)"

# Cost-saving PAUSE: scales every GKE node pool to 0 (and disables autoscaling so
# it can't bounce back) WITHOUT destroying anything. The cluster, its persistent
# volumes (CNPG Postgres data), ArgoCD + all apps, the reserved static IP, DNS and
# certs all survive — only the worker VMs (the 24/7 cost) go away. Resume in minutes
# with "Day2.scale.02 Resume", NOT a full Decom + Day1 rebuild.
#
# What still costs while paused (all tiny): the zonal control plane (covered by the
# GKE free-tier management credit), persistent disks for the PVs, and the reserved
# static IP. Grafana Cloud is free-tier (nothing to pause); the Azure/AWS managed
# backends, if ever provisioned, are billed separately and are not paused here.
#
# It disables autoRepair + force-drains (kubectl drain --disable-eviction, which
# bypasses PodDisruptionBudgets like the CNPG Postgres ones) before resizing to 0,
# otherwise the graceful resize stalls forever and autoRepair bounces nodes back.
# "Day2.scale.02 Resume" re-enables autoscaling AND autoRepair.
#
# State note: this uses imperative `gcloud` (fast), so terraform/gke state drifts
# (it still records autoscaling on / node_count N). That is benign — "Day2.scale.02
# Resume" restores it, and a later `Day1.cluster.01-gke` re-apply reconciles it too.
on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

# Share the cluster-wide lock so a pause can't race a Day1/Decom/Day2 run.
concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

jobs:
  pause:
    name: Scale node pools to 0
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Pause — disable autoscaling + autoRepair, force-drain, scale to 0
        run: |
          set -euo pipefail
          CLUSTER="$(gcloud container clusters list --format='value(name)' | head -1)"
          if [[ -z "${CLUSTER}" ]]; then
            echo "::warning::No GKE cluster found — nothing to pause (already decommissioned?)."
            exit 0
          fi
          ZONE="$(gcloud container clusters list --filter="name=${CLUSTER}" --format='value(location)' | head -1)"
          echo "Cluster=${CLUSTER} location=${ZONE}"
          gcloud components install gke-gcloud-auth-plugin --quiet
          gcloud container clusters get-credentials "${CLUSTER}" --location "${ZONE}" --project "${{ secrets.GCP_PROJECT_ID }}"

          mapfile -t POOLS < <(gcloud container node-pools list --cluster "${CLUSTER}" --location "${ZONE}" --format='value(name)')

          # Helper to wait for any RUNNING GKE operations in the zone
          wait_for_gke_operations() {
            local op_count
            for i in $(seq 1 30); do
              mapfile -t RUNNING_OPS < <(gcloud container operations list --location "${ZONE}" --filter="status=RUNNING" --format="value(name,operationType)" 2>/dev/null || true)
              local clean_ops=()
              for op in "${RUNNING_OPS[@]}"; do
                [[ -n "${op}" ]] && clean_ops+=("${op}")
              done
              op_count="${#clean_ops[@]}"
              if [[ "${op_count:-0}" -eq 0 ]]; then
                return 0
              fi
              echo "Waiting for ${op_count} running GKE operation(s) to finish:"
              printf "  - %s\n" "${clean_ops[@]}"
              sleep 15
            done
            echo "::warning::Timed out waiting for running GKE operations to finish."
            return 1
          }

          # 0. Disable cluster-level Node Auto-Provisioning (NAP) FIRST. NAP is a
          #    CLUSTER setting (separate from a node pool's autoscaling): for any
          #    Pending pod it can't place, it spins up brand-new nodes/pools — so even
          #    with the node pool's own autoscaling off, NAP re-provisions nodes for the
          #    Pending workloads and the cluster bounces straight back up mid-pause.
          #    (This is the gap that made a "successful" pause leave 1-3 nodes running.)
          #    terraform/gke does NOT manage NAP, so leaving it off is IaC-consistent;
          #    the node pool's min/max autoscaling — re-enabled by Resume — is enough.
          wait_for_gke_operations
          echo "::group::Disable cluster Node Auto-Provisioning (NAP)"
          gcloud container clusters update "${CLUSTER}" --location "${ZONE}" \
            --no-enable-autoprovisioning --quiet
          echo "::endgroup::"

          # 1. Disable autoscaling (so it can't re-add nodes for the now-Pending pods),
          #    autoRepair (it recreates cordoned/drained nodes it deems "unhealthy") AND
          #    autoUpgrade (a surge upgrade creates replacement nodes) — any of the three
          #    otherwise bounces the pool straight back up mid-pause.
          #    "Day2.scale.02 Resume" re-enables autoscaling/autoRepair/autoUpgrade.
          for NP in "${POOLS[@]}"; do
            wait_for_gke_operations
            echo "::group::Disable autoscaling + autoRepair + autoUpgrade on ${NP}"
            gcloud container node-pools update "${NP}" --cluster "${CLUSTER}" --location "${ZONE}" \
              --no-enable-autoscaling --quiet
            wait_for_gke_operations
            gcloud container node-pools update "${NP}" --cluster "${CLUSTER}" --location "${ZONE}" \
              --no-enable-autorepair --no-enable-autoupgrade --quiet
            echo "::endgroup::"
          done

          # 2. Force-drain every node. --disable-eviction uses DELETE instead of the
          #    eviction API, so it BYPASSES PodDisruptionBudgets — the CNPG Postgres
          #    PDBs (minAvailable=1 on single-instance pods, ALLOWED DISRUPTIONS=0)
          #    otherwise block a graceful node-pool resize forever. Data is on the PVs,
          #    so evicting Postgres is safe for a pause.
          echo "::group::Force-drain all nodes (bypass PDBs via DELETE)"
          for N in $(kubectl get nodes -o name 2>/dev/null); do
            kubectl drain "${N}" --force --ignore-daemonsets --delete-emptydir-data \
              --disable-eviction --grace-period=30 --timeout=120s || true
          done
          echo "::endgroup::"

          # 3. Resize each pool to 0. Nodes are already empty + autoRepair off, so the
          #    resize completes promptly and STAYS at 0 (nothing recreates them).
          for NP in "${POOLS[@]}"; do
            wait_for_gke_operations
            echo "::group::Scale ${NP} -> 0"
            gcloud container clusters resize "${CLUSTER}" --location "${ZONE}" \
              --node-pool "${NP}" --num-nodes 0 --quiet
            echo "::endgroup::"
          done

      - name: Summary
        if: always()
        run: |
          {
            echo "### ⏸️ Cluster paused (nodes scaled to 0)"
            echo
            echo "All worker VMs removed — compute cost ≈ \$0 while paused."
            echo "Preserved: cluster, PVs/CNPG data, ArgoCD + apps, static IP, DNS, certs."
            echo
            echo "Workloads are now **Pending** (no nodes). Resume with **Day2.scale.02 Resume**"
            echo "— it scales nodes back, pods reschedule and ArgoCD reconciles automatically."
            echo
            echo "Grafana Cloud is free-tier (not paused). Azure/AWS managed backends, if used,"
            echo "are billed separately and are not paused by this workflow."
          } >> "${GITHUB_STEP_SUMMARY}"
