name: "Day0.infra.04 AWS managed-grafana"

# Rebuild-safety: serialize the paired Day0/Decom.infra.04 aws runs on the ONE shared
# aws-managed-grafana Terraform state prefix so two same-module runs never contend for
# its state lock. cancel-in-progress:false -> never cancel an in-flight
# apply/destroy (a cancelled run would strand the lock).
concurrency:
  group: jenkins-2026-tfstate-aws-managed-grafana
  cancel-in-progress: false


# Manually-triggered, one-time setup step: applies terraform/aws-managed-grafana
# to create (or, on re-runs, confirm) the persistent AWS backend that
# observability_mode: managed-aws sends OpenTelemetry data to - Amazon Managed
# Grafana, Amazon Managed Service for Prometheus, the CloudWatch log group, the
# GKE->AWS OIDC provider and the collector IAM role. State is remote (GCS,
# prefix "jenkins-2026/aws-managed-grafana"). Safe to re-run.
#
# Auth: GitHub OIDC -> AWS (aws-actions/configure-aws-credentials assumes
# AWS_BOOTSTRAP_ROLE_ARN; no stored access keys) + GitHub WIF -> GCP for the GCS
# state backend.
#
# Required secrets: AWS_BOOTSTRAP_ROLE_ARN, AWS_REGION, GKE_OIDC_ISSUER_URL,
# plus the GCP_*/TF_STATE_BUCKET state-backend secrets.
#
# Day1.cluster.01-gke.yml (managed-aws) does NOT run this - it only reads this
# module's outputs from the GCS state to build the aws-managed-credentials Secret.
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "apply" to confirm provisioning this persistent, billed resource'
        required: true
        type: string
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
  # Called by Day1.cluster.01-gke when observability_mode=managed-aws so the
  # persistent AWS backend is always applied (idempotent) before the provision
  # job reads its terraform outputs to build the aws-managed-credentials Secret.
  workflow_call:
    inputs:
      log_level:
        required: false
        default: "info"
        type: string

permissions:
  contents: read
  id-token: write

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"

jobs:
  # Only enforced on a direct dispatch: when reused via `workflow_call`
  # (Day1.cluster.01's observability_mode=managed-aws preflight), `confirm` is
  # not part of the caller's input schema, so this is a no-op — selecting the
  # mode is itself the deliberate action for routine, idempotent provisioning.
  guard:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ -n "${{ inputs.confirm }}" ] && [ "${{ inputs.confirm }}" != "apply" ]; then
            echo "::error::You must type 'apply' in the confirm box to proceed."; exit 1
          fi

  bootstrap:
    needs: guard
    runs-on: ubuntu-latest
    # Must match the AWS IAM role trust policy condition
    # token.actions.githubusercontent.com:sub = repo:<owner>/<repo>:environment:gke-production
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials (GitHub OIDC)
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ secrets.AWS_BOOTSTRAP_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
          role-session-name: jenkins-2026-aws-bootstrap

      - name: Authenticate to GCP (Terraform state backend)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/aws-managed-grafana)
        run: |
          cat > terraform/aws-managed-grafana/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/aws-managed-grafana"
            }
          }
          EOF

      - name: Clear stale Terraform state lock
        uses: ./.github/actions/tf-remove-stale-lock
        with:
          bucket: ${{ secrets.TF_STATE_BUCKET }}
          prefix: jenkins-2026/aws-managed-grafana

      - name: Terraform init
        working-directory: terraform/aws-managed-grafana
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform apply (create/confirm persistent AWS backend)
        working-directory: terraform/aws-managed-grafana
        env:
          TF_VAR_region: ${{ vars.AWS_REGION || secrets.AWS_REGION }}
          TF_VAR_gke_oidc_issuer_url: ${{ secrets.GKE_OIDC_ISSUER_URL }}
          # Scopes the dashboard-publisher role's GitHub-OIDC trust to this repo.
          TF_VAR_github_repo: ${{ github.repository }}
          # Comma-separated emails of IAM Identity Center users to grant Grafana
          # Admin on the workspace. Empty = no user assignment (access via console).
          TF_VAR_grafana_admin_sso_emails: ${{ secrets.AWS_GRAFANA_ADMIN_SSO_EMAILS }}
        run: terraform apply -auto-approve -input=false

      - name: Summary
        if: always()
        working-directory: terraform/aws-managed-grafana
        run: |
          {
            echo "### AWS managed-grafana backend"
            echo
            echo "- Grafana endpoint: \`$(terraform output -raw grafana_endpoint 2>/dev/null || echo 'n/a')\`"
            echo
            echo "Day1.cluster.01 GKE (observability_mode: managed-aws) reads this module's"
            echo "outputs from the GCS state to build the aws-managed-credentials Secret."
            echo "Grant your AWS_SSO users Admin on the Grafana workspace in IAM Identity Center."
          } >> "${GITHUB_STEP_SUMMARY}"
