name: "Day0.infra.03 Azure managed-grafana"

# Manually-triggered, one-time setup step: applies terraform/azure-managed-grafana
# to create (or, on re-runs, confirm) the persistent Azure backend that
# observability_mode: managed-azure sends OpenTelemetry data to - Azure Managed
# Grafana, the Azure Monitor workspace (+ DCE/DCR for managed Prometheus),
# Application Insights + Log Analytics, and the Entra service principal the
# collector authenticates with. State is remote (GCS, prefix
# "jenkins-2026/azure-managed-grafana", same bucket as terraform/gke), so this
# is safe to re-run - it's a no-op once the resources exist.
#
# Auth: GitHub OIDC -> Azure (no stored client secret; the federated credential
# trusts environment:azure-bootstrap), and GitHub WIF -> GCP for the GCS state
# backend. All sensitive inputs are GitHub secrets injected as TF_VAR_* / ARM_*
# here - nothing sensitive lives in the repo.
#
# Required secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_SUBSCRIPTION_ID,
# AZURE_GRAFANA_ADMIN_OBJECT_IDS (comma-separated Entra object IDs granted
# Grafana Admin), plus the GCP_*/TF_STATE_BUCKET state-backend secrets.
#
# Day1.cluster.01-gke.yml calls this via workflow_call when
# observability_mode=managed-azure so the persistent Azure backend is always
# confirmed before Day1.cluster.01 reads its outputs to build the in-cluster Secret.
on:
  workflow_dispatch:
    inputs:
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
  workflow_call:
    inputs:
      log_level:
        required: false
        default: "info"
        type: string

permissions:
  contents: read
  id-token: write

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    # Must match the federated credential subject
    # repo:<owner>/<repo>:environment:azure-bootstrap on the Entra app.
    environment: azure-bootstrap
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Authenticate to GCP (Terraform state backend)
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure GCS backend (terraform/azure-managed-grafana)
        run: |
          cat > terraform/azure-managed-grafana/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/azure-managed-grafana"
            }
          }
          EOF

      - name: Build TF_VAR_grafana_admin_object_ids (JSON list)
        id: admins
        env:
          ADMIN_OBJECT_IDS: ${{ secrets.AZURE_GRAFANA_ADMIN_OBJECT_IDS }}
        run: |
          json="$(jq -nc --arg ids "${ADMIN_OBJECT_IDS}" '$ids | split(",") | map(gsub("^\\s+|\\s+$";"")) | map(select(length > 0))')"
          echo "json=${json}" >> "${GITHUB_OUTPUT}"

      - name: Terraform init
        working-directory: terraform/azure-managed-grafana
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Terraform apply (create/confirm persistent Azure backend)
        working-directory: terraform/azure-managed-grafana
        env:
          # GitHub OIDC -> Azure (no client secret stored).
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          TF_VAR_grafana_admin_object_ids: ${{ steps.admins.outputs.json }}
        run: terraform apply -auto-approve -input=false

      - name: Summary
        if: always()
        working-directory: terraform/azure-managed-grafana
        run: |
          {
            echo "### Azure managed-grafana backend"
            echo
            echo "- Grafana endpoint: \`$(terraform output -raw grafana_endpoint 2>/dev/null || echo 'n/a')\`"
            echo
            echo "Day1.cluster.01 GKE (observability_mode: managed-azure) reads this module's"
            echo "outputs from the GCS state to build the azure-monitor-credentials Secret."
          } >> "${GITHUB_STEP_SUMMARY}"
