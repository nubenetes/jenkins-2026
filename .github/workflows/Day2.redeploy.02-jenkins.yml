name: "Day2.redeploy.02 Jenkins"

# Manually-triggered: re-applies only scripts/04-jenkins.sh (Helm
# upgrade --install of helm/jenkins + jenkins/casc JCasC fragments) and
# scripts/06-seed-pipelines.sh against the cluster from the last "Day1.cluster.01 GKE
# provision" run, without touching terraform/gke or any other component of the
# stack.
#
# Use this to apply a Jenkins-only change (Helm values, JCasC, plugin list,
# shared library) without rerunning the whole provision/decommission lifecycle.
# Requires the namespaces/secrets created by scripts/01-namespaces.sh during
# that "Day1.cluster.01 GKE" run to still exist on the cluster.
#
# NOTE: Grafana dashboards are deliberately NOT republished here - that's the
# job of the per-backend dashboard workflows (e.g. "Day2.publish.04 Publish AWS
# dashboards"). Running scripts/07 here would assume config.yaml's default
# observability.mode (grafana-cloud) regardless of the live cluster's mode, and
# the grafana-cloud branch hard-fails when its credentials secret is absent.
# 09-gateway.sh (below) IS obs_mode-sensitive though (it generates/retires the
# oss Grafana HTTPRoute+HealthCheckPolicy), hence the observability_mode input.
on:
  workflow_dispatch:
    inputs:
      develop_track:
        description: "Regenerate the optional lean 'develop' microservices Jenkins jobs alongside 'stable' (OFF by default). MUST MATCH how the cluster was provisioned: 09-gateway.sh generates the develop host's HTTPRoute + HealthCheckPolicy when true and RETIRES them when false (the deliberate disable-cleanup path) — so develop_track=false against a develop-enabled cluster tears down the develop host's route. The develop ArgoCD app/namespace itself is owned by Day1.cluster.01 — run that with develop_track=true first to provision the tier."
        required: false
        default: false
        type: boolean
      observability_mode:
        description: "observability.mode of the cluster (must match the live cluster). Only affects the in-cluster oss Grafana route: 09-gateway.sh generates its HTTPRoute+HealthCheckPolicy(+BackendTLSPolicy) when oss and RETIRES them for any other value — the deliberate mode-switch cleanup path. Passing the wrong value against an oss cluster tears down the Grafana route."
        required: false
        default: "oss"
        type: choice
        options:
          - grafana-cloud
          - oss
          - managed-azure
          - managed-aws
      git_ref:
        description: "Git branch, tag, or SHA to check out (leave empty to use the branch/tag selected in 'Use workflow from' above)"
        required: false
        default: ""
        type: string
      run_node_pool:
        description: "Where build-agent pods run (jenkins.runNodePool). 'config' = use config.yaml (default static). 'static' = the long-lived jenkins-2026-pool (robust). 'ci-spot' = the NAP Spot ComputeClass (needs nodeAutoProvisioning + SSD_TOTAL_GB headroom). Jenkins tolerates Spot well, but ci-spot can stall on the 500 GB quota — see docs/501."
        required: false
        default: "config"
        type: choice
        options:
          - config
          - static
          - ci-spot
      log_level:
        description: "Script/Terraform verbosity: info (default) or debug (adds [DEBUG] script lines + TF_LOG=DEBUG). For runner-level tracing use GitHub's ACTIONS_STEP_DEBUG."
        required: false
        default: "info"
        type: choice
        options:
          - info
          - debug
      intra_cluster_tls:
        description: "Intra-cluster TLS — the single MUTUALLY-EXCLUSIVE choice, matching Day1 (docs/504 backend-tls · docs/506 mesh). 'backend-tls' fully converges end-to-end HERE (no Day1 needed): this workflow runs 08.7-backend-tls.sh (mints the Jenkins JKS keystore), 04-jenkins.sh (the sole renderer of the Jenkins TLS values overlay), and 09-gateway.sh (BackendTLSPolicy + HTTPS HealthCheckPolicy). 'cloud-service-mesh' is honored for exclusivity/consistency (keeps backend-tls off) but the mesh itself is (re)applied by Day1.cluster.01 (08.85), not this redeploy. 'none' = neither. MUST MATCH the live cluster."
        required: false
        default: "none"
        type: choice
        options:
          - none
          - backend-tls
          - cloud-service-mesh
      binary_authorization:
        description: "Opt-in Binary Authorization (docs/507) — MUST MATCH the live cluster. ORTHOGONAL to intra_cluster_tls (composes with any). 04-jenkins.sh re-renders the Jenkins app here; omitting a live binauthz would strip the signer-GSA KSA annotation (Hook 2) → image signing breaks. enforce-vs-dryrun is set in config.yaml."
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: jenkins-2026-gke
  cancel-in-progress: false

env:
  JENKINS2026_LOG_LEVEL: ${{ inputs.log_level || 'info' }}
  TF_LOG: ${{ inputs.log_level == 'debug' && 'DEBUG' || '' }}
  TF_VERSION: "1.15.6"
  # Honour the develop tier in 04-jenkins (writes develop-enabled into jenkins-credentials)
  # and the re-seed (generates the -develop jobs). Off by default.
  JENKINS2026_DEVELOP_TRACK_ENABLED: ${{ inputs.develop_track }}
  # Build-agent placement override (empty = fall back to config.yaml jenkins.runNodePool).
  JENKINS2026_JENKINS_RUN_NODE_POOL: ${{ inputs.run_node_pool != 'config' && inputs.run_node_pool || '' }}
  # Must match the live cluster - see the input (only affects 09-gateway.sh's oss
  # Grafana route/policies).
  JENKINS2026_OBS_MODE: ${{ inputs.observability_mode }}
  # Intra-cluster TLS axis (backend-tls XOR mesh — ONE dropdown, matches Day1; docs/504·506)
  # + orthogonal Binary Authorization (docs/507), DERIVED from the two inputs exactly as
  # Day1.cluster.01 does — so this redeploy PRESERVES the live cluster's flags instead of
  # silently resetting them (the workflow-input-parity rule).
  JENKINS2026_GATEWAY_BACKEND_TLS_ENABLED: ${{ inputs.intra_cluster_tls == 'backend-tls' }}
  JENKINS2026_SERVICE_MESH_MODE: ${{ inputs.intra_cluster_tls == 'cloud-service-mesh' && 'cloud-service-mesh' || 'none' }}
  JENKINS2026_BINARY_AUTHORIZATION_ENABLED: ${{ inputs.binary_authorization }}

jobs:
  redeploy-jenkins:
    runs-on: ubuntu-latest
    # Manual approval gate (GitHub Environment required reviewers) - modifies a real
    # billed cluster, same posture as Day1/Decom and the other Day2.* workflows.
    environment: gke-production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Install yq
        run: |
          sudo curl -fsSL -o /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.53.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Configure GCS backend (terraform/gke)
        run: |
          cat > terraform/gke/backend_override.tf <<EOF
          terraform {
            backend "gcs" {
              bucket = "${{ secrets.TF_STATE_BUCKET }}"
              prefix = "jenkins-2026/gke"
            }
          }
          EOF

      - name: Terraform init
        working-directory: terraform/gke
        run: |
          for i in {1..3}; do
            terraform init -input=false && break || {
              if [ $i -lt 3 ]; then
                echo "Terraform init failed, retrying in 10s..."
                sleep 10
              else
                exit 1
              fi
            }
          done

      - name: Fetch kubeconfig credentials
        working-directory: terraform/gke
        run: |
          gcloud container clusters get-credentials \
            "$(terraform output -raw cluster_name)" \
            --zone "$(terraform output -raw location)" \
            --project "${{ secrets.GCP_PROJECT_ID }}"

      - name: Check prereqs & add Helm repos (scripts/00-check-prereqs.sh)
        run: ./scripts/00-check-prereqs.sh

      - name: Backend TLS (scripts/08.7-backend-tls.sh, opt-in)
        # No-op (with deterministic retire) when gateway.backendTls.enabled=false,
        # the default. When on, mints/re-asserts the Jenkins JKS keystore + CA
        # trust bundle BEFORE 04-jenkins.sh renders the TLS values overlay, so the
        # controller pod never starts pointing at a cert Secret that doesn't exist
        # yet (docs/504).
        run: ./scripts/08.7-backend-tls.sh

      - name: Redeploy Jenkins (scripts/04-jenkins.sh)
        run: ./scripts/04-jenkins.sh

      - name: Re-seed Microservices pipelines (scripts/06-seed-pipelines.sh)
        run: ./scripts/06-seed-pipelines.sh

      - name: Refresh Backstage runtime config (scripts/08.95-backstage.sh)
        # Engine-switch parity: 08.95 is the SOLE writer of backstage-runtime-config's CI_ENGINE
        # and the app-of-apps ciEngine overlay, and it restarts the pod. Without this a Day2 engine
        # switch left the portal's CI/CD (and Kubernetes) tab pointed at the PREVIOUS engine (found
        # live 2026-07-16). Self-gates on backstage.enabled; idempotent. Runs before 09-gateway
        # (which wires the backstage IAP route + JWT audience), matching scripts/up.sh order.
        run: ./scripts/08.95-backstage.sh

      - name: Re-apply Gateway routes (scripts/09-gateway.sh)
        # Idempotent: attaches/retires the Jenkins BackendTLSPolicy + HTTPS
        # HealthCheckPolicy to match the controller's current protocol (set by
        # 04-jenkins.sh above), so a backend_tls flip on this workflow converges
        # end-to-end without a full Day1.
        run: ./scripts/09-gateway.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "### Jenkins redeployed"
            echo
            echo "Re-applied helm/jenkins + jenkins/casc and re-triggered seed-jobs"
            echo "against the cluster from the last **Day1.cluster.01 GKE** run."
            echo "(Grafana dashboards are published by the per-backend dashboard"
            echo "workflows, e.g. **Day2.publish.04 AWS dashboards**.)"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Access URLs
        if: always()
        # Shared single source (scripts/access-urls.sh): the engine-aware ACCESS URLs block that
        # used to live only in Day1's step. This workflow doesn't export JENKINS2026_CI_ENGINE
        # (jenkins is the config default), so pass it explicitly. Best-effort, never fails the job.
        run: JENKINS2026_CI_ENGINE=jenkins AU_DEVELOP_TRACK='${{ inputs.develop_track }}' ./scripts/access-urls.sh || true
